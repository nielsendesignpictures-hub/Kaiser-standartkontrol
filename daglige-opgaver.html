<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Daglige opgaver</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#17181c;
      --panel:rgba(28, 30, 36, 0.90);
      --border:rgba(255,255,255,0.10);
      --text:rgba(255,255,255,0.93);
      --muted:rgba(255,255,255,0.70);
      --muted2:rgba(255,255,255,0.50);
      --gold:#d6b24a;
      --gold2:#b9921f;
      --goldGlow:rgba(214,178,74,.22);
      --danger:#ff6b6b;
    }

    html,body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:var(--bg);}
    body{
      background:
        radial-gradient(1100px 700px at 15% -10%, rgba(214,178,74,0.12), transparent 55%),
        radial-gradient(900px 600px at 105% 10%, rgba(214,178,74,0.08), transparent 50%),
        radial-gradient(900px 800px at 20% 115%, rgba(255,255,255,0.05), transparent 55%),
        linear-gradient(180deg, #17181c, #1b1d24 55%, #17181c);
    }

    .shell{max-width:820px}
    .topbar{
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025));
      border-radius:22px;padding:22px 18px;
      backdrop-filter: blur(10px);
      box-shadow:0 28px 70px rgba(0,0,0,.45);
      text-align:center;
    }
    .kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted2);font-weight:800;}
    .title{font-family:"Playfair Display",serif;font-size:34px;line-height:1.06;letter-spacing:-0.015em;font-weight:700;margin-top:8px;}
    .subtitle{color:var(--muted);font-weight:600;font-size:13px;margin-top:10px;}
    .goldline{height:2px;margin-top:16px;border-radius:999px;background:linear-gradient(90deg, transparent, rgba(214,178,74,0.95), transparent);opacity:.9;}

    .panel{background:var(--panel);border:1px solid var(--border);border-radius:20px;box-shadow:0 26px 72px rgba(0,0,0,.55);backdrop-filter: blur(12px);}
    .divider{height:1px;background:rgba(255,255,255,.10);}

    .label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);font-weight:900;}
    .input, select, textarea{
      width:100%;border-radius:14px;border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      padding:14px 14px;outline:none;color:rgba(255,255,255,0.92);
    }
    select option{color:#0b0c0f;}
    .input:focus, select:focus, textarea:focus{
      border-color: rgba(214,178,74,0.55);
      box-shadow: 0 0 0 4px var(--goldGlow);
      background: rgba(255,255,255,0.08);
    }

    .btn{
      width:100%;border-radius:16px;font-weight:900;letter-spacing:.02em;padding:14px 16px;
      transition:transform .08s ease,filter .18s ease;user-select:none;border:none;
    }
    .btn:active{transform:translateY(1px);}
    .btn-primary{background:linear-gradient(135deg, var(--gold), var(--gold2));color:#0b0c0f;box-shadow:0 18px 40px rgba(214,178,74,0.18);}
    .btn-primary:hover{filter:brightness(1.04);}
    .btn-secondary{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.90);}

    .muted{color:var(--muted);font-weight:600;font-size:13px;}
    .hint{color:var(--muted2);font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;}

    .tabs{display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;}
    .tabBtn{
      border-radius:16px;
      padding:12px 12px;
      font-weight:900;
      letter-spacing:.02em;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.90);
      cursor:pointer;
    }
    .tabBtn.on{
      border-color: rgba(214,178,74,0.38);
      background: rgba(214,178,74,0.10);
      box-shadow: 0 0 0 4px rgba(214,178,74,0.10);
    }
    .tabBtn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .task{
      display:flex;align-items:flex-start;gap:12px;padding:14px 14px;border-radius:16px;
      border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.03);
      cursor:pointer;transition: background .18s ease, border-color .18s ease;user-select:none;
    }
    .task:hover{background:rgba(214,178,74,0.06);border-color:rgba(214,178,74,0.22);}
    .task.locked{opacity:.55; cursor:not-allowed;}
    .taskNum{
      width:34px;height:34px;border-radius:14px;display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(214,178,74,0.22);background:rgba(214,178,74,0.08);
      font-weight:900;color:rgba(255,255,255,0.90);flex:0 0 auto;
    }
    .taskTitle{font-weight:900; letter-spacing:-0.01em;}
    .check{
      margin-left:auto;width:24px;height:24px;border-radius:10px;border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-weight:900;flex:0 0 auto;
    }
    .check.on{border-color: rgba(98, 210, 111, 0.55);background: rgba(98, 210, 111, 0.18);color: rgba(255,255,255,0.92);}

    .progressWrap{border:1px solid rgba(255,255,255,0.10);background: rgba(255,255,255,0.04);border-radius: 999px;overflow:hidden;height: 10px;}
    .progressBar{height: 10px;width: 0%;background: linear-gradient(90deg, var(--gold), var(--gold2));}

    .miniBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 12px;
      border-radius:14px;
      font-weight:900;
      letter-spacing:.02em;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.90);
      cursor:pointer;
      width:100%;
    }
  </style>
</head>

<body class="min-h-screen flex justify-center p-4">
  <div class="shell w-full">

    <header class="topbar mt-6 mb-5">
      <div class="kicker">KAISER</div>
      <div class="title">Daglige opgaver</div>
      <div class="subtitle" id="subTitle">Sender kun mangler • pr. lokation</div>
      <div class="goldline"></div>
    </header>

    <section id="formWrap" class="space-y-4">
      <form id="taskForm" class="space-y-4" method="POST"
        action="https://formsubmit.co/6a45e9587d47fb185f4ab36d6632672b">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="box">
        <input type="hidden" name="_subject" id="subjectField" value="Liste – Lokation – YYYY-MM-DD – Mangler: X">
        <input type="hidden" name="_next" id="nextField" value="">
        <input type="text" name="_honey" style="display:none">
        <textarea name="Rapport" id="reportPayload" style="display:none"></textarea>

        <section class="panel p-5 space-y-4">
          <div class="tabs">
            <button type="button" id="tabMorning" class="tabBtn">Morgen</button>
            <button type="button" id="tabLunch" class="tabBtn">Frokost</button>
            <button type="button" id="tabEvening" class="tabBtn">Aften</button>
          </div>

          <div class="grid md:grid-cols-2 gap-3">
            <div class="hint" id="activeWindowText">Aktiv liste: —</div>
            <button type="button" id="overrideBtn" class="miniBtn">Skift liste (leder)</button>
          </div>

          <div class="divider"></div>

          <div class="grid md:grid-cols-2 gap-4">
            <div class="space-y-2">
              <div class="label">Lokation</div>
              <select id="locationSelect" required>
                <option value="">Vælg lokation...</option>
                <option>Café Kaiser Helsingør</option>
                <option>Café Kaiser Hillerød</option>
                <option>Café Kaiser Farum</option>
                <option>Café Kaiser Hørsholm</option>
                <option>Café Kaiser Vanløse</option>
              </select>
              <div class="hint" id="gpsStatus">GPS: ikke tjekket endnu</div>
            </div>

            <div class="space-y-2">
              <div class="label">Dato / tid</div>
              <input class="input" id="timeField" readonly>
              <div class="hint"><span id="dayKeyText">—</span></div>
            </div>
          </div>

          <div class="space-y-2">
            <div class="label">Status</div>
            <div class="progressWrap"><div id="progressBar" class="progressBar"></div></div>
            <div class="muted" id="progressText">0/0</div>
          </div>
        </section>

        <section class="panel p-5 space-y-4">
          <div class="flex items-center justify-between gap-3 flex-wrap">
            <div class="text-lg font-extrabold" id="listTitle">—</div>
            <div class="hint" id="missingHint">—</div>
          </div>
          <div class="divider"></div>
          <div id="taskList" class="space-y-3"></div>

          <div id="doneBox" class="hidden" style="border:1px solid rgba(98,210,111,0.35); background: rgba(98,210,111,0.10); border-radius:16px; padding:14px;">
            <div style="font-weight:900;">Fuldført for i dag.</div>
            <div class="muted" id="doneText" style="margin-top:4px;"></div>
          </div>
        </section>

        <section class="space-y-3">
          <button id="submitBtn" class="btn btn-primary" type="submit">Send mangler</button>
          <button id="resetBtn" class="btn btn-secondary" type="button">Nulstil (kun denne enhed)</button>
          <div class="muted">Når alle punkter er fuldført, låses listen til næste dag.</div>
          <div id="errorText" class="hidden" style="color:var(--danger);font-weight:900;"></div>
        </section>
      </form>
    </section>

    <section id="thanksWrap" class="hidden space-y-4">
      <div class="panel p-6 text-center space-y-4">
        <div class="hint">Indsendt</div>
        <div style="font-size:18px; font-weight:900; letter-spacing:-0.01em;">Mangler sendt.</div>
        <div id="quoteText" class="muted" style="margin-top:6px;"></div>
        <div class="pt-2 space-y-3">
          <a class="btn btn-primary inline-block text-center" href="./daglige-opgaver.html">Tilbage</a>
        </div>
      </div>
    </section>
  </div>

  <script>
    // --------- DINE TIDSREGLER ----------
    // Morgen: før 11:00
    // Frokost: 11:00-17:00
    // Aften: 17:00-23:59
    // -----------------------------------
    const TIME_WINDOWS = {
      morning: { start: 0, end: 10 },   // 00-10
      lunch:   { start: 11, end: 16 },  // 11-16
      evening: { start: 17, end: 23 }   // 17-23
    };

    // Leder override kode (mit forslag)
    const OVERRIDE_CODE = "KAISER2026";
    const OVERRIDE_HOURS = 8;

    // Reset dag ruller kl. 04:00
    const ROLLOVER_HOUR = 4;

    // GPS tolerance (meter)
    const GPS_MAX_DISTANCE_M = 600;
    // Auto-vælg lokation via GPS hvis inden for:
    const GPS_AUTOSELECT_M = 900;

    const LOCATION_COORDS = {
      "Café Kaiser Helsingør": { lat: 56.033919, lng: 12.610563 },
      "Café Kaiser Hillerød": { lat: 55.928199, lng: 12.298147 },
      "Café Kaiser Farum": { lat: 55.814500, lng: 12.379595 },
      "Café Kaiser Hørsholm": { lat: 55.881489, lng: 12.497737 },
      "Café Kaiser Vanløse": { lat: 55.687849, lng: 12.490876 }
    };

    const QUOTES = [
      "Det du tjekker, bliver gjort.",
      "Standarder gør hverdagen lettere.",
      "Små rutiner skaber stor driftssikkerhed."
    ];

    const LISTS = {
      morning: {
        id: "morning",
        name: "Morgenliste",
        tasks: [
          { id: 1, text: "Åbne kassen" },
          { id: 2, text: "Åbne sodavands anlæg" },
          { id: 3, text: "Sætte filterkaffe over" },
          { id: 4, text: "Tjek om der er dækket op til reservationer" },
          { id: 5, text: "Sæt lys på borde" },
          { id: 7, text: "Tag stole ned" },
          { id: 8, text: "Tænde for aircon" },
          { id: 9, text: "Sæt BC varer på plads" },
          { id: 10, text: "Lav klude til bar" }
        ]
      },
      lunch: {
        id: "lunch",
        name: "Frokostliste",
        tasks: [
          { id: 1, text: "Dæk op til reservationer til aften" },
          { id: 2, text: "Bestil vare (BC)" },
          { id: 3, text: "Opfylding af bar" },
          { id: 4, text: "Tjekke toiletter", onlyLocations: ["Café Kaiser Helsingør","Café Kaiser Farum","Café Kaiser Hørsholm"] },
          { id: 5, text: "Tag en fejerunde" },
          { id: 6, text: "Evt. opdatering af kælderliste" }
        ]
      },
      evening: {
        id: "evening",
        name: "Aftenliste",
        tasks: [
          { id: 1, text: "Dæk op til reservationer ( til & med frokost )" },
          { id: 2, text: "Gøre toiletter rent", onlyLocations: ["Café Kaiser Helsingør","Café Kaiser Farum","Café Kaiser Hørsholm"] },
          { id: 3, text: "Lukke udenfor" },
          { id: 4, text: "Samle skrald & glas flasker" },
          { id: 5, text: "Slukke for aircon", onlyLocations: ["Café Kaiser Hørsholm","Café Kaiser Farum"] },
          { id: 6, text: "Tælle kassen" },
          { id: 7, text: "Fejerunde" },
          { id: 8, text: "Opfylding af bar" },
          { id: 9, text: "Sæt lys til opladning" },
          { id: 10, text: "Lukke baren" }
        ]
      }
    };

    function $(id){ return document.getElementById(id); }
    function nowDK(){ return new Date().toLocaleString("da-DK"); }

    function dayKey(){
      const d = new Date();
      const off = d.getTimezoneOffset();
      const local = new Date(d.getTime() - off * 60000);
      if (local.getHours() < ROLLOVER_HOUR) local.setDate(local.getDate() - 1);
      return local.toISOString().slice(0,10);
    }

    function currentListByTime(){
      const h = new Date().getHours();
      if (h <= TIME_WINDOWS.morning.end) return "morning";
      if (h >= TIME_WINDOWS.lunch.start && h <= TIME_WINDOWS.lunch.end) return "lunch";
      return "evening";
    }

    function formatActiveWindow(){
      const h = new Date().getHours();
      if (h <= 10) return "Morgen (00:00–10:59)";
      if (h <= 16) return "Frokost (11:00–16:59)";
      return "Aften (17:00–23:59)";
    }

    // Haversine distance (m)
    function distanceM(lat1, lon1, lat2, lon2){
      const R = 6371000;
      const toRad = (x) => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // localStorage keys
    const keyBase = "kaiser_daily_tasks_v3";
    function keyProgress(listId, loc, dk){ return keyBase + "_progress_" + listId + "_" + loc + "_" + dk; }
    function keyDone(listId, loc, dk){ return keyBase + "_done_" + listId + "_" + loc + "_" + dk; }

    // Override session
    function overrideKey(){ return "kaiser_daily_override_until"; }
    function isOverrideOn(){
      const until = Number(localStorage.getItem(overrideKey()) || "0");
      return Date.now() < until;
    }
    function setOverrideOn(){
      const until = Date.now() + OVERRIDE_HOURS * 60 * 60 * 1000;
      localStorage.setItem(overrideKey(), String(until));
    }

    // DOM
    const tabMorning = $("tabMorning");
    const tabLunch = $("tabLunch");
    const tabEvening = $("tabEvening");
    const activeWindowText = $("activeWindowText");
    const overrideBtn = $("overrideBtn");

    const listTitle = $("listTitle");
    const subTitle = $("subTitle");
    const locationSelect = $("locationSelect");
    const gpsStatus = $("gpsStatus");

    const taskList = $("taskList");
    const progressBar = $("progressBar");
    const progressText = $("progressText");
    const missingHint = $("missingHint");
    const dayKeyText = $("dayKeyText");
    const timeField = $("timeField");
    const submitBtn = $("submitBtn");
    const resetBtn = $("resetBtn");
    const errorText = $("errorText");
    const doneBox = $("doneBox");
    const doneText = $("doneText");
    const form = $("taskForm");

    $("nextField").value = window.location.origin + window.location.pathname + "?sent=1";

    const state = {
      listId: currentListByTime(),
      loc: "",
      locked: false,
      progress: {}
    };

    function setError(msg){
      if (!msg){
        errorText.classList.add("hidden");
        errorText.textContent = "";
        return;
      }
      errorText.textContent = msg;
      errorText.classList.remove("hidden");
    }

    function visibleTasks(){
      const list = LISTS[state.listId];
      const loc = state.loc;
      return list.tasks.filter(t => {
        if (!t.onlyLocations) return true;
        return t.onlyLocations.indexOf(loc) >= 0;
      });
    }

    function loadProgress(){
      if (!state.loc) { state.progress = {}; return; }
      const dk = dayKey();
      const raw = localStorage.getItem(keyProgress(state.listId, state.loc, dk));
      if (!raw) { state.progress = {}; return; }
      try {
        const obj = JSON.parse(raw);
        state.progress = (obj && typeof obj === "object") ? obj : {};
      } catch(e){
        state.progress = {};
      }
    }

    function saveProgress(){
      if (!state.loc) return;
      const dk = dayKey();
      localStorage.setItem(keyProgress(state.listId, state.loc, dk), JSON.stringify(state.progress));
    }

    function getDoneMeta(){
      if (!state.loc) return null;
      const dk = dayKey();
      const raw = localStorage.getItem(keyDone(state.listId, state.loc, dk));
      if (!raw) return null;
      try { return JSON.parse(raw); } catch(e){ return null; }
    }

    function markDone(meta){
      const dk = dayKey();
      localStorage.setItem(keyDone(state.listId, state.loc, dk), JSON.stringify(meta));
    }

    function isTaskDone(taskId){ return !!state.progress[String(taskId)]; }
    function setTaskDone(taskId, val){
      state.progress[String(taskId)] = !!val;
      saveProgress();
    }

    function missingTasks(){
      const tasks = visibleTasks();
      return tasks.filter(t => !isTaskDone(t.id));
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c]));
    }

    function renderTasks(){
      taskList.innerHTML = "";
      const tasks = visibleTasks();

      tasks.forEach((t) => {
        const isOn = isTaskDone(t.id);
        const row = document.createElement("div");
        row.className = "task" + (state.locked ? " locked" : "");
        row.innerHTML = `
          <div class="taskNum">${t.id}</div>
          <div style="flex:1;">
            <div class="taskTitle">${escapeHtml(t.text)}</div>
          </div>
          <div class="check ${isOn ? "on" : ""}">${isOn ? "✓" : ""}</div>
        `;

        row.addEventListener("click", () => {
          if (state.locked) return;
          setTaskDone(t.id, !isTaskDone(t.id));
          updateUI();
        });

        taskList.appendChild(row);
      });
    }

    function updateSubject(loc, missCount){
      const dateIso = dayKey();
      const listName = LISTS[state.listId].name;
      $("subjectField").value = listName + " – " + (loc || "Lokation") + " – " + dateIso + " – Mangler: " + missCount;
    }

    function setTabsByPolicy(){
      const active = currentListByTime();
      activeWindowText.textContent = "Aktiv liste: " + formatActiveWindow();

      const override = isOverrideOn();
      // Hvis override: alt er muligt
      if (override) {
        tabMorning.disabled = false;
        tabLunch.disabled = false;
        tabEvening.disabled = false;
        return;
      }

      // Hvis ikke override: kun den aktive fane kan vælges
      tabMorning.disabled = active !== "morning";
      tabLunch.disabled = active !== "lunch";
      tabEvening.disabled = active !== "evening";

      // Auto-sæt listId til aktiv
      state.listId = active;
    }

    function updateTabUI(){
      tabMorning.classList.toggle("on", state.listId === "morning");
      tabLunch.classList.toggle("on", state.listId === "lunch");
      tabEvening.classList.toggle("on", state.listId === "evening");
    }

    function updateUI(){
      state.loc = locationSelect.value || "";

      setTabsByPolicy();
      updateTabUI();

      const listName = LISTS[state.listId].name;
      listTitle.textContent = listName;
      subTitle.textContent = listName + " – sender kun mangler";

      const done = getDoneMeta();
      state.locked = !!done;

      renderTasks();

      const tasks = visibleTasks();
      const total = tasks.length;
      const doneCount = tasks.filter(t => isTaskDone(t.id)).length;
      const missCount = total - doneCount;

      progressText.textContent = doneCount + "/" + total;
      progressBar.style.width = total ? Math.round((doneCount/total)*100) + "%" : "0%";
      missingHint.textContent = state.locked ? "Låst" : ("Mangler: " + missCount);

      dayKeyText.textContent = dayKey();
      timeField.value = nowDK();

      // Hvis alt er ok => lås og SKJUL listen
      if (!done && state.loc && total > 0 && missCount === 0) {
        markDone({ doneAt: nowDK() });
        state.locked = true;
      }

      if (state.locked) {
        taskList.classList.add("hidden");
        doneBox.classList.remove("hidden");

        const meta = getDoneMeta();
        const doneAt = meta && meta.doneAt ? meta.doneAt : nowDK();
        doneText.textContent = "Fuldført: " + doneAt + " • Åbner igen i morgen";

        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.55";
        submitBtn.style.cursor = "not-allowed";
        submitBtn.textContent = "Send mangler";

        resetBtn.disabled = true;
        resetBtn.style.opacity = "0.55";
        resetBtn.style.cursor = "not-allowed";

        setError("");
        return;
      }

      // Ikke låst => vis listen
      taskList.classList.remove("hidden");
      doneBox.classList.add("hidden");
      doneText.textContent = "";

      // Send kun hvis der mangler noget
      const canSend = !!state.loc && missCount > 0;
      submitBtn.disabled = !canSend;
      submitBtn.style.opacity = canSend ? "1" : "0.55";
      submitBtn.style.cursor = canSend ? "pointer" : "not-allowed";
      submitBtn.textContent = canSend ? ("Send mangler (" + missCount + ")") : "Send mangler";

      resetBtn.disabled = false;
      resetBtn.style.opacity = "1";
      resetBtn.style.cursor = "pointer";

      setError("");
    }

    function getGPS(){
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve({ ok:false, msg:"GPS ikke understøttet" });
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({
            ok:true,
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            acc: Math.round(pos.coords.accuracy || 0)
          }),
          (err) => resolve({ ok:false, msg: err && err.message ? err.message : "GPS afvist" }),
          { enableHighAccuracy:false, timeout:8000, maximumAge:300000 }
        );
      });
    }

    async function tryAutoSelectLocation(){
      gpsStatus.textContent = "GPS: tjekker…";
      const gps = await getGPS();
      if (!gps.ok) {
        gpsStatus.textContent = "GPS: (ikke tilgængelig) " + (gps.msg || "");
        return;
      }

      // Find nærmeste lokation
      let best = { name:null, dist: Infinity };
      for (const name in LOCATION_COORDS) {
        const c = LOCATION_COORDS[name];
        const dist = distanceM(gps.lat, gps.lng, c.lat, c.lng);
        if (dist < best.dist) best = { name, dist };
      }

      const distM = Math.round(best.dist);
      if (best.name && distM <= GPS_AUTOSELECT_M) {
        gpsStatus.textContent = "GPS: nær " + best.name + " (" + distM + "m) → valgt";
        locationSelect.value = best.name;
        state.loc = best.name;
        loadProgress();
        updateUI();
      } else {
        gpsStatus.textContent = "GPS: fundet (" + distM + "m) – vælg lokation manuelt";
      }
    }

    // TAB events (kun hvis override tillader det)
    tabMorning.addEventListener("click", () => {
      if (!isOverrideOn() && currentListByTime() !== "morning") return;
      state.listId = "morning";
      loadProgress();
      updateUI();
    });
    tabLunch.addEventListener("click", () => {
      if (!isOverrideOn() && currentListByTime() !== "lunch") return;
      state.listId = "lunch";
      loadProgress();
      updateUI();
    });
    tabEvening.addEventListener("click", () => {
      if (!isOverrideOn() && currentListByTime() !== "evening") return;
      state.listId = "evening";
      loadProgress();
      updateUI();
    });

    overrideBtn.addEventListener("click", () => {
      const code = prompt("Lederkode:");
      if (!code) return;
      if (code.trim() === OVERRIDE_CODE) {
        setOverrideOn();
        alert("Override aktiv i " + OVERRIDE_HOURS + " timer.");
        updateUI();
      } else {
        alert("Forkert kode.");
      }
    });

    locationSelect.addEventListener("change", () => {
      state.loc = locationSelect.value || "";
      loadProgress();
      updateUI();
    });

    resetBtn.addEventListener("click", () => {
      if (getDoneMeta()) return setError("Listen er låst for i dag og kan ikke nulstilles.");
      if (!state.loc) return setError("Vælg lokation før du nulstiller.");

      const dk = dayKey();
      localStorage.removeItem(keyProgress(state.listId, state.loc, dk));
      localStorage.removeItem(keyDone(state.listId, state.loc, dk));
      state.progress = {};
      updateUI();
    });

    // Submit: send kun mangler + GPS validation
    form.addEventListener("submit", async function(ev){
      ev.preventDefault();
      setError("");

      state.loc = locationSelect.value || "";
      if (!state.loc) return setError("Vælg lokation.");

      const done = getDoneMeta();
      if (done) return setError("Listen er allerede fuldført for i dag.");

      const miss = missingTasks();
      if (miss.length === 0) {
        markDone({ doneAt: nowDK() });
        updateUI();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "GPS…";

      const gps = await getGPS();

      // GPS validering mod valgt lokation
      const coords = LOCATION_COORDS[state.loc];
      if (coords && gps.ok) {
        const dist = Math.round(distanceM(gps.lat, gps.lng, coords.lat, coords.lng));
        if (dist > GPS_MAX_DISTANCE_M) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Send mangler (" + miss.length + ")";
          setError("GPS matcher ikke valgt lokation (afstand ca. " + dist + " m). Vælg korrekt lokation.");
          return;
        }
      }

      submitBtn.textContent = "Sender…";

      updateSubject(state.loc, miss.length);

      let gpsBlock = "GPS: -";
      if (gps.ok) {
        gpsBlock =
          "GPS: " + gps.lat + ", " + gps.lng + " (±" + gps.acc + "m)\n" +
          "Kort: https://maps.google.com/?q=" + gps.lat + "," + gps.lng;
      } else {
        gpsBlock = "GPS: (ikke tilgængelig) " + (gps.msg || "");
      }

      const lines = [];
      lines.push(LISTS[state.listId].name + " – MANGLER");
      lines.push("");
      lines.push("Lokation: " + state.loc);
      lines.push("Dato: " + dayKey());
      lines.push("Tid: " + nowDK());
      lines.push(gpsBlock);
      lines.push("");
      lines.push("Mangler (" + miss.length + "):");
      miss.forEach(t => lines.push("— " + t.id + ": " + t.text));

      $("reportPayload").value = lines.join("\n");

      form.submit();
    });

    // Thanks view
    const params = new URLSearchParams(window.location.search);
    if (params.get("sent") === "1") {
      $("formWrap").classList.add("hidden");
      $("thanksWrap").classList.remove("hidden");
      $("quoteText").textContent = "“" + QUOTES[Math.floor(Math.random() * QUOTES.length)] + "”";
    }

    // Init
    $("dayKeyText").textContent = dayKey();
    $("timeField").value = nowDK();

    // Auto-tab (baseret på tid) + auto GPS-lokation
    setTabsByPolicy();
    updateTabUI();
    tryAutoSelectLocation();

    // Når lokation vælges senere, bliver progress loaded
    updateUI();

    // Opdater “aktiv liste” tekst hvert minut
    setInterval(() => {
      if (!isOverrideOn()) {
        const newList = currentListByTime();
        if (newList !== state.listId) {
          state.listId = newList;
          loadProgress();
        }
      }
      updateUI();
    }, 60000);
  </script>
</body>
</html>
