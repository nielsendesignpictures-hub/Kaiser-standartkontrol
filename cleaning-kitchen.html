  <style>

      --bg:#17181c;
      --panel:rgba(28, 30, 36, 0.90);

        radial-gradient(900px 800px at 20% 115%, rgba(255,255,255,0.05), transparent 55%),
        linear-gradient(180deg, #17181c, #1b1d24 55%, #17181c);
    }

    .shell{max-width:900px}
    .topbar{
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.025));
      border-radius:22px;padding:22px 18px;
      backdrop-filter: blur(10px);
      box-shadow:0 28px 70px rgba(0,0,0,.45);
      text-align:center;
    }
    .kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted2);font-weight:800;}
    .title{font-family:"Playfair Display",serif;font-size:34px;line-height:1.06;letter-spacing:-0.015em;font-weight:700;margin-top:8px;}
    .subtitle{color:var(--muted);font-weight:600;font-size:13px;margin-top:10px;}
    .goldline{height:2px;margin-top:16px;border-radius:999px;background:linear-gradient(90deg, transparent, rgba(214,178,74,0.95), transparent);opacity:.9;}

    .panel{background:var(--panel);border:1px solid var(--border);border-radius:20px;box-shadow:0 26px 72px rgba(0,0,0,.55);backdrop-filter: blur(12px);}
    .divider{height:1px;background:rgba(255,255,255,.10);}

    .label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);font-weight:900;}
    .input, select, textarea{
      width:100%;border-radius:14px;border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      padding:14px 14px;outline:none;color:rgba(255,255,255,0.92);

    select option{color:#0b0c0f;}
    .input:focus, select:focus, textarea:focus{
      border-color: rgba(214,178,74,0.55);

    .btn{
      width:100%;border-radius:16px;font-weight:900;letter-spacing:.02em;padding:14px 16px;
      transition:transform .08s ease,filter .18s ease;user-select:none;border:none;
    }
    .btn:active{transform:translateY(1px);}
    .btn-primary{background:linear-gradient(135deg, var(--gold), var(--gold2));color:#0b0c0f;box-shadow:0 18px 40px rgba(214,178,74,0.18);}
    .btn-primary:hover{filter:brightness(1.04);}
    .btn-secondary{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.90);}

    .muted{color:var(--muted);font-weight:600;font-size:13px;}
    .hint{color:var(--muted2);font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;}

    .tabs7{display:grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap:8px;}
    .tabBtn{
      border-radius:14px;
      padding:10px 8px;

      letter-spacing:.02em;

    .task{

    /* Accordion (dropdown sections) */
    .acc{

      list-style:none;

      user-select:none;

    .acc .accMeta{

<body class="min-h-screen flex justify-center p-4">
  <div class="shell w-full">

    <header class="topbar mt-6 mb-5">
      <div class="kicker">KAISER</div>

    <section id="formWrap" class="space-y-4">
      <form id="kitchenForm" class="space-y-4" method="POST"
        action="https://formsubmit.co/6a45e9587d47fb185f4ab36d6632672b">

        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="box">
        <input type="hidden" name="_subject" id="subjectField" value="Kitchen cleaning – Location – Week – Day – Missing: X">
        <input type="hidden" name="_next" id="nextField" value="">
        <input type="text" name="_honey" style="display:none">
        <textarea name="Report" id="reportPayload" style="display:none"></textarea>

        <section class="panel p-5 space-y-4">
          <div class="flex items-center justify-between gap-3 flex-wrap">

          <div class="divider"></div>

          <div class="grid md:grid-cols-2 gap-4">

              </select>

            </div>

            <div class="space-y-2">
              <div class="label">Performed by</div>
              <input id="doneBy" class="input" placeholder="Name (required)" />
              <div class="hint">Stored per day</div>
            </div>
          </div>

          <div class="grid md:grid-cols-2 gap-4">
            <div class="space-y-2">

              <div class="hint" id="dateText">—</div>
            </div>

            <div class="space-y-2">
              <div class="label">Day</div>
              <div class="tabs7" id="dayTabs"></div>

          <div class="space-y-2">

        </section>

        <section class="panel p-5 space-y-4">
          <div class="flex items-center justify-between gap-3 flex-wrap">
            <div class="text-lg font-extrabold" id="listTitle">Checklist</div>
            <div class="hint" id="missingHint">—</div>
          </div>
          <div class="divider"></div>

          <div id="taskList" class="space-y-3"></div>

          <div id="doneBox" class="hidden" style="border:1px solid rgba(98,210,111,0.35); background: rgba(98,210,111,0.10); border-radius:16px; padding:14px;">
            <div style="font-weight:900;">Completed for the day.</div>
            <div class="muted" id="doneText" style="margin-top:4px;"></div>
          </div>
        </section>

        <section class="space-y-3">
          <button id="submitBtn" class="btn btn-primary" type="submit">Send missing items</button>
          <button id="resetBtn" class="btn btn-secondary" type="button">Reset (this device only)</button>

        </section>

    <section id="thanksWrap" class="hidden space-y-4">
      <div class="panel p-6 text-center space-y-4">
        <div class="hint">Sent</div>
        <div style="font-size:18px; font-weight:900; letter-spacing:-0.01em;">Missing items were sent.</div>
        <div id="quoteText" class="muted" style="margin-top:6px;"></div>
        <div class="pt-2 space-y-3">
          <a class="btn btn-primary inline-block text-center" href="./cleaning-kitchen.html">Back</a>
        </div>
      </div>

  </div>

  <script>
    // ===== Config =====
    const GPS_MAX_DISTANCE_M = 600;
    const GPS_AUTOSELECT_M = 900;

    const LOCATION_COORDS = {
      "Café Kaiser Helsingør": { lat: 56.033919, lng: 12.610563 },
      "Café Kaiser Hillerød": { lat: 55.928199, lng: 12.298147 },
      "Café Kaiser Farum": { lat: 55.814500, lng: 12.379595 },
      "Café Kaiser Hørsholm": { lat: 55.881489, lng: 12.497737 },
      "Café Kaiser Vanløse": { lat: 55.687849, lng: 12.490876 }
    };

    const QUOTES = [
      "Your effort makes the difference.",
      "Details create excellence.",
      "Clean kitchen, calm service.",
      "Standards don’t keep themselves—thank you.",
      "Consistency builds reputation.",
      "A clean station is a fast station."
    ];

    // ===== Base list (Vanløse list) =====
    const BASE_LIST = {
      morning: [
        "Check if cleaning was done the night before (floor, fridge handles, dishwasher machine, paper, soap)",
        "Unpack BC ASAP (always first priority)",

      ],
      everyday: [
        "Sweep and wash floor",
        "Clean all tables with soap and spray with disinfectant",
        "Clean fridge handles (big and small)",
        "Trash out",
        "Clean stove and under the stove",
        "Grill cleaning",
        "Refill soap and paper whenever it runs out (one backup at Royal fridge)"
      ],
      everynight: [
        "Floor – also under fridges",
        "All tables",
        "Fridge handles (big and small)",
        "Trash out",
        "Stove and under the stove",
        "Grill cleaning"
      ],
      weekly: {
        mon: ["All shelves in the kitchen – clean and organize"],
        tue: ["Small fridge – inside"],
        wed: ["Dishwasher machine – inside & outside deep cleaning + ice cube machine"],
        thu: ["Stove & oven – outside & inside deep + hallway (dishwasher area)"],
        fri: ["Green section"],
        sat: ["Big fridges + ice cube machine"],
        sun: ["Big fridges + ice cube machine"]
      }
    };

    // ===== Lists per location =====
    const LISTS = {
      // Vanløse = current list
      list1: BASE_LIST,

      // Hørsholm: same base, custom weekly
      list_horsholm: {
        ...BASE_LIST,
        weekly: {
          mon: [
            "Check all cleaning is done from the weekend",
            "All shelves (hot, cold and backup sections)",
            "Deep fryer",
            "Green fridge"
          ],
          tue: [
            "Normal cleaning (as usual)",
            "Big fridges"
          ],
          wed: [
            "Ventilation cleaning",
            "Oven",
            "Below grill and stove"
          ],
          thu: [
            "Deep fryer",
            "Dishwashing area"
          ],
          fri: [
            "Depot (basic)",
            "Basic cleaning"
          ],
          sat: [
            "Everything",
            "Shelves",
            "Fridges (small + big) + deep clean",
            "Dishwashing area (deep)",
            "Ventilation (deep)",
            "Oven (deep)",
            "Under the fridge, oven and grill",
            "Depot",
            "Depot floor",
            "Wash all pots/pans hanging in the hot section",
            "Wash all fryer baskets + souch baskets",
            "Change all dirty boxes",
            "Green section",
            "All sinks",
            "Basement",
            "Stegt flæsk stand",
            "Outside oil area"
          ],
          sun: [
            "Everything",
            "Shelves",
            "Fridges (small + big) + deep clean",
            "Dishwashing area (deep)",
            "Ventilation (deep)",
            "Oven (deep)",
            "Under the fridge, oven and grill",
            "Depot",
            "Depot floor",
            "Wash all pots/pans hanging in the hot section",
            "Wash all fryer baskets + souch baskets",
            "Change all dirty boxes",
            "Green section",
            "All sinks",
            "Basement",
            "Stegt flæsk stand",
            "Outside oil area"
          ]
        }
      },

      // Farum: same base, custom weekly
      list_farum: {
        ...BASE_LIST,
        weekly: {
          mon: [
            "Hot/cold section shelves",
            "Deep fryer",
            "Organize depot"
          ],
          tue: [],
          wed: [],
          thu: [
            "Deep fryer",
            "Ventilation (not deep cleaning)",
            "Dishwasher area"
          ],
          fri: [
            "Dishwasher area",
            "Shelves",
            "Trash bins"
          ],
          sat: [
            "Green section",
            "Dishwasher area (DEEP)",
            "Trash bins",
            "Sinks"
          ],
          sun: [
            "Big fridges",
            "Ventilation (DEEP)",
            "Shelves",
            "Small fridges and oven",
            "Trash bins",
            "Door and tray stand",
            "Kitchen door"
          ]
        }
      }
    };

    // Vanløse keeps list1, Hillerød same list1, Hørsholm/Farum custom
    const LOCATION_TO_LIST = {
      "Café Kaiser Vanløse": "list1",
      "Café Kaiser Hillerød": "list1",

      "Café Kaiser Hørsholm": "list_horsholm",
      "Café Kaiser Farum": "list_farum",

      "Café Kaiser Helsingør": "list1"
    };

    function getListForLocation(loc){
      const key = LOCATION_TO_LIST[loc] || "list1";
      return LISTS[key] || LISTS.list1;
    }

    // Days
    const DAYS = [
      { key:"mon", label:"Mon", full:"Monday" },
      { key:"tue", label:"Tue", full:"Tuesday" },
      { key:"wed", label:"Wed", full:"Wednesday" },
      { key:"thu", label:"Thu", full:"Thursday" },
      { key:"fri", label:"Fri", full:"Friday" },
      { key:"sat", label:"Sat", full:"Saturday" },
      { key:"sun", label:"Sun", full:"Sunday" }
    ];

    // ===== Helpers =====
    function $(id){ return document.getElementById(id); }
    function nowDK(){ return new Date().toLocaleString("da-DK"); }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c]));
    }

    function dayKeyISO(){
      const d = new Date();
      const off = d.getTimezoneOffset();
      const local = new Date(d.getTime() - off * 60000);
      return local.toISOString().slice(0,10);
    }

    function getDayKeyToday(){
      const js = new Date().getDay(); // 0 Sun..6 Sat
      if (js === 0) return "sun";
      if (js === 1) return "mon";
      if (js === 2) return "tue";
      if (js === 3) return "wed";
      if (js === 4) return "thu";
      if (js === 5) return "fri";
      return "sat";
    }

    function isoWeekKey(date){
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
      const year = d.getUTCFullYear();
      const ww = String(weekNo).padStart(2,"0");
      return year + "-W" + ww;
    }

    function distanceM(lat1, lon1, lat2, lon2){
      const R = 6371000;
      const toRad = (x) => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function getGPS(){
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve({ ok:false, msg:"GPS not supported" });
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({
            ok:true,
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            acc: Math.round(pos.coords.accuracy || 0)
          }),
          (err) => resolve({ ok:false, msg: err && err.message ? err.message : "GPS denied" }),
          { enableHighAccuracy:false, timeout:8000, maximumAge:300000 }
        );
      });
    }

    // ===== Storage =====
    const keyBase = "kaiser_kitchen_clean_2024_v2";
    function kProgress(loc, week, day){ return `${keyBase}_progress_${loc}_${week}_${day}`; }
    function kDone(loc, week, day){ return `${keyBase}_done_${loc}_${week}_${day}`; }
    function kDoneBy(loc, week, day){ return `${keyBase}_doneby_${loc}_${week}_${day}`; }

    // ===== DOM =====
    const weekKeyText = $("weekKeyText");
    const dateText = $("dateText");
    const timeField = $("timeField");
    const locationSelect = $("locationSelect");
    const doneBy = $("doneBy");
    const gpsStatus = $("gpsStatus");
    const dayTabs = $("dayTabs");

    const listTitle = $("listTitle");
    const missingHint = $("missingHint");
    const taskList = $("taskList");
    const doneBox = $("doneBox");
    const doneText = $("doneText");

    const progressBar = $("progressBar");
    const progressText = $("progressText");
    const submitBtn = $("submitBtn");
    const resetBtn = $("resetBtn");
    const errorText = $("errorText");
    const form = $("kitchenForm");

    $("nextField").value = window.location.origin + window.location.pathname + "?sent=1";

    const state = {
      loc: "",
      weekKey: isoWeekKey(new Date()),
      day: getDayKeyToday(),
      progress: {},
      locked: false,
      gps: null
    };

    function setError(msg){
      if (!msg){
        errorText.classList.add("hidden");
        errorText.textContent = "";
        return;
      }
      errorText.textContent = msg;
      errorText.classList.remove("hidden");
    }

    // Build accordion sections (dropdowns) for chosen location/day
    function buildSectionsForDay(loc, dayKey){
      const L = getListForLocation(loc);

      const sections = [];
      sections.push({
        secId: "morning",
        title: "Morning",
        tasks: (L.morning || []).map((text, i) => ({ id:`M${i+1}`, text }))
      });

      sections.push({
        secId: "everyday",
        title: "Every day cleaning",
        tasks: (L.everyday || []).map((text, i) => ({ id:`D${i+1}`, text }))
      });

      sections.push({
        secId: "everynight",
        title: "Every night cleaning",
        tasks: (L.everynight || []).map((text, i) => ({ id:`N${i+1}`, text }))
      });

      const weeklyExtra = (L.weekly && L.weekly[dayKey]) ? L.weekly[dayKey] : [];
      sections.push({
        secId: "weekly",
        title: "Weekly deep clean",
        tasks: (weeklyExtra || []).map((text, i) => ({ id:`W${i+1}`, text }))
      });

      return sections;
    }

    function loadProgress(){
      if (!state.loc) { state.progress = {}; return; }
      const raw = localStorage.getItem(kProgress(state.loc, state.weekKey, state.day));
      if (!raw) { state.progress = {}; return; }
      try {
        const obj = JSON.parse(raw);
        state.progress = (obj && typeof obj === "object") ? obj : {};
      } catch(e){
        state.progress = {};
      }
    }

    function saveProgress(){
      if (!state.loc) return;
      localStorage.setItem(kProgress(state.loc, state.weekKey, state.day), JSON.stringify(state.progress));
    }

    function isTaskDone(id){ return !!state.progress[String(id)]; }
    function setTaskDone(id, val){
      state.progress[String(id)] = !!val;
      saveProgress();
    }

    function getDoneMeta(){
      if (!state.loc) return null;
      const raw = localStorage.getItem(kDone(state.loc, state.weekKey, state.day));
      if (!raw) return null;
      try { return JSON.parse(raw); } catch(e){ return null; }
    }

    function markDone(meta){
      localStorage.setItem(kDone(state.loc, state.weekKey, state.day), JSON.stringify(meta));
    }

    function loadDoneBy(){
      if (!state.loc) { doneBy.value = ""; return; }
      doneBy.value = localStorage.getItem(kDoneBy(state.loc, state.weekKey, state.day)) || "";
    }

    function saveDoneBy(){
      if (!state.loc) return;
      localStorage.setItem(kDoneBy(state.loc, state.weekKey, state.day), (doneBy.value || "").trim());
    }

    function getAllTasks(){
      const secs = buildSectionsForDay(state.loc, state.day);
      return secs.flatMap(s => s.tasks);
    }

    function missingTasks(){
      const tasks = getAllTasks();
      return tasks.filter(t => !isTaskDone(t.id));
    }

    function renderDayTabs(){
      dayTabs.innerHTML = "";
      DAYS.forEach(d => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "tabBtn" + (state.day === d.key ? " on" : "");
        b.textContent = d.label;
        b.addEventListener("click", () => {
          state.day = d.key;
          loadProgress();
          loadDoneBy();
          updateUI();
          renderDayTabs();
        });
        dayTabs.appendChild(b);
      });
    }

    function renderTasks(){
      // Remember which sections are open, so it doesn’t jump around on re-render
      const openMap = {};
      document.querySelectorAll('details[data-sec]').forEach(d => {
        openMap[d.dataset.sec] = d.open;
      });

      taskList.innerHTML = "";

      const sections = buildSectionsForDay(state.loc, state.day);

      sections.forEach((sec, secIndex) => {
        const total = sec.tasks.length;
        const doneCount = sec.tasks.filter(t => isTaskDone(t.id)).length;
        const complete = total > 0 && doneCount === total;

        const details = document.createElement("details");
        details.className = "acc";
        details.dataset.sec = sec.secId;

        const wasOpen = openMap[sec.secId];
        details.open = complete ? false : (typeof wasOpen === "boolean" ? wasOpen : (secIndex === 0));

        const summary = document.createElement("summary");
        summary.innerHTML = `
          <span>${escapeHtml(sec.title)}</span>
          <span class="accMeta">${doneCount}/${total}</span>
        `;
        details.appendChild(summary);

        const body = document.createElement("div");
        body.className = "accBody";

        if (total === 0) {
          const empty = document.createElement("div");
          empty.className = "muted";
          empty.textContent = "No tasks today.";
          body.appendChild(empty);
        } else {
          sec.tasks.forEach(item => {
            const on = isTaskDone(item.id);
            const row = document.createElement("div");
            row.className = "task" + (state.locked ? " locked" : "");
            row.innerHTML = `
              <div class="taskNum">${escapeHtml(item.id)}</div>
              <div style="flex:1;">
                <div class="taskTitle">${escapeHtml(item.text)}</div>
              </div>
              <div class="check ${on ? "on" : ""}">${on ? "✓" : ""}</div>
            `;

            row.addEventListener("click", () => {
              if (state.locked) return;
              setTaskDone(item.id, !isTaskDone(item.id));
              updateUI(); // auto-close completed sections + update progress
            });

            body.appendChild(row);
          });
        }

        details.appendChild(body);
        taskList.appendChild(details);
      });
    }

    function updateSubject(loc, missCount){
      const wk = state.weekKey;
      const dayFull = (DAYS.find(x => x.key === state.day) || {}).full || state.day;
      $("subjectField").value =
        "Kitchen cleaning – " + (loc || "Location") + " – " + wk + " – " + dayFull + " – Missing: " + missCount;
    }

    async function tryAutoSelectLocation(){
      gpsStatus.textContent = "GPS: checking…";
      const gps = await getGPS();
      state.gps = gps;

      if (!gps.ok) {
        gpsStatus.textContent = "GPS: not available (" + (gps.msg || "") + ")";
        return;
      }

      let bestName = null;
      let bestDist = Infinity;
      for (const name in LOCATION_COORDS) {
        const c = LOCATION_COORDS[name];
        const dist = distanceM(gps.lat, gps.lng, c.lat, c.lng);
        if (dist < bestDist) { bestDist = dist; bestName = name; }
      }

      const distM = Math.round(bestDist);
      if (bestName && distM <= GPS_AUTOSELECT_M) {
        gpsStatus.textContent = "GPS: near " + bestName + " (" + distM + "m) → selected";
        locationSelect.value = bestName;
        state.loc = bestName;
        loadProgress();
        loadDoneBy();
        updateUI();
        renderDayTabs();
      } else {
        gpsStatus.textContent = "GPS: select location manually";
      }
    }

    function updateUI(){
      state.loc = locationSelect.value || "";
      state.weekKey = isoWeekKey(new Date());

      weekKeyText.textContent = "Week: " + state.weekKey;
      dateText.textContent = dayKeyISO();
      timeField.value = nowDK();

      const done = getDoneMeta();
      state.locked = !!done;

      const tasks = getAllTasks();
      const total = tasks.length;
      const doneCount = tasks.filter(t => isTaskDone(t.id)).length;
      const missCount = total - doneCount;

      const dayFull = (DAYS.find(x => x.key === state.day) || {}).full || state.day;
      listTitle.textContent = "Checklist • " + dayFull;
      missingHint.textContent = state.locked ? "Completed" : ("Missing: " + missCount);

      progressText.textContent = doneCount + "/" + total;
      progressBar.style.width = total ? Math.round((doneCount/total)*100) + "%" : "0%";

      // Keep button text updated
      submitBtn.textContent = missCount > 0 ? ("Send missing items (" + missCount + ")") : "Send missing items";

      // Auto-complete if everything done
      if (!done && state.loc && total > 0 && missCount === 0) {
        const who = (doneBy.value || "").trim();
        if (!who) {
          setError("Performed by is required before marking completed.");
        } else {
          saveDoneBy();
          markDone({ doneAt: nowDK(), doneBy: who });
          state.locked = true;
        }
      }

      if (state.locked) {
        taskList.classList.add("hidden");
        doneBox.classList.remove("hidden");

        const meta = getDoneMeta() || {};
        doneText.textContent = "Completed: " + (meta.doneAt || "") + " • Performed by: " + (meta.doneBy || "-");

        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.55";
        resetBtn.disabled = true;
        resetBtn.style.opacity = "0.55";
      } else {
        taskList.classList.remove("hidden");
        doneBox.classList.add("hidden");
        doneText.textContent = "";

        const canSend = !!state.loc && missCount > 0;
        submitBtn.disabled = !canSend;
        submitBtn.style.opacity = canSend ? "1" : "0.55";

        resetBtn.disabled = false;
        resetBtn.style.opacity = "1";
      }

      renderTasks();
    }

    // Events
    locationSelect.addEventListener("change", () => {
      state.loc = locationSelect.value || "";
      loadProgress();
      loadDoneBy();
      updateUI();
      renderDayTabs();
    });

    doneBy.addEventListener("input", () => saveDoneBy());

    resetBtn.addEventListener("click", () => {
      if (getDoneMeta()) return setError("This day is completed and cannot be reset.");
      if (!state.loc) return setError("Select a location before reset.");

      localStorage.removeItem(kProgress(state.loc, state.weekKey, state.day));
      localStorage.removeItem(kDone(state.loc, state.weekKey, state.day));
      localStorage.removeItem(kDoneBy(state.loc, state.weekKey, state.day));
      state.progress = {};
      doneBy.value = "";
      updateUI();
    });

    // Submit: send missing only + GPS validate
    form.addEventListener("submit", async function(ev){
      ev.preventDefault();
      setError("");

      state.loc = locationSelect.value || "";
      if (!state.loc) return setError("Select a location.");

      const who = (doneBy.value || "").trim();
      if (!who) return setError("Performed by is required.");

      const done = getDoneMeta();
      if (done) return setError("This day is already completed.");

      const miss = missingTasks();
      if (miss.length === 0) {
        saveDoneBy();
        markDone({ doneAt: nowDK(), doneBy: who });
        updateUI();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "GPS…";

      const gps = await getGPS();
      state.gps = gps;

      const coords = LOCATION_COORDS[state.loc];
      if (coords && gps.ok) {
        const dist = Math.round(distanceM(gps.lat, gps.lng, coords.lat, coords.lng));
        if (dist > GPS_MAX_DISTANCE_M) {
          submitBtn.disabled = false;
          submitBtn.textContent = "Send missing items (" + miss.length + ")";
          setError("GPS does not match selected location (distance ~" + dist + " m). Select correct location.");
          return;
        }
      }

      submitBtn.textContent = "Sending…";

      updateSubject(state.loc, miss.length);

      const dayFull = (DAYS.find(x => x.key === state.day) || {}).full || state.day;

      let gpsBlock = "GPS: -";
      if (gps.ok) {
        gpsBlock =
          "GPS: " + gps.lat + ", " + gps.lng + " (±" + gps.acc + "m)\n" +
          "Map: https://maps.google.com/?q=" + gps.lat + "," + gps.lng;
      } else {
        gpsBlock = "GPS: (not available) " + (gps.msg || "");
      }

      const lines = [];
      lines.push("Kitchen cleaning – MISSING");
      lines.push("");
      lines.push("Location: " + state.loc);
      lines.push("Week: " + state.weekKey);
      lines.push("Day: " + dayFull);
      lines.push("Date: " + dayKeyISO());
      lines.push("Time: " + nowDK());
      lines.push("Performed by: " + who);
      lines.push(gpsBlock);
      lines.push("");
      lines.push("Missing (" + miss.length + "):");
      miss.forEach(t => lines.push("— " + t.id + ": " + t.text));

      $("reportPayload").value = lines.join("\n");
      form.submit();
    });

    // Thanks view
    const params = new URLSearchParams(window.location.search);
    if (params.get("sent") === "1") {
      $("formWrap").classList.add("hidden");
      $("thanksWrap").classList.remove("hidden");
      $("quoteText").textContent = "“" + QUOTES[Math.floor(Math.random() * QUOTES.length)] + "”";
    }

    // Init
    weekKeyText.textContent = "Week: " + state.weekKey;
    dateText.textContent = dayKeyISO();
    timeField.value = nowDK();
    renderDayTabs();
    tryAutoSelectLocation();
    updateUI();
  </script>
</body>
</html>
