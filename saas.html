<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive KPI Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top left,#0f172a,#020617 70%);
  color:white;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:40px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:40px;
}

.title{
  font-size:28px;
  font-weight:700;
  letter-spacing:-0.5px;
}

.glass{
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.grid{
  display:grid;
  gap:20px;
}

.grid-4{
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}

.kpi{
  font-size:34px;
  font-weight:700;
}

.sub{
  color:#94a3b8;
  font-size:14px;
}

.positive{color:#22c55e;}
.negative{color:#ef4444;}

button{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border:none;
  padding:10px 18px;
  border-radius:12px;
  color:white;
  cursor:pointer;
  font-weight:600;
}

select,input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
  margin-top:5px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  width:400px;
}

.score{
  font-size:28px;
  font-weight:700;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
  <div class="title">Executive KPI Intelligence</div>
  <button onclick="openModal()">+ Opret måned</button>
</div>

<div class="glass" style="margin-bottom:30px;">
  Lokation:
  <select id="locationSelect" onchange="render()">
    <option>Helsingør</option>
    <option>Hillerød</option>
    <option>Farum</option>
    <option>Hørsholm</option>
    <option>Vanløse</option>
  </select>
</div>

<div class="grid grid-4" id="kpis"></div>

<div class="glass">
  <canvas id="chart"></canvas>
</div>

</div>

<div class="modal" id="modal">
  <div class="glass modal-content">
    <h3>Opret måned</h3>

    Måned:
    <select id="month">
      <option>Januar</option>
      <option>Februar</option>
      <option>Marts</option>
      <option>April</option>
      <option>Maj</option>
      <option>Juni</option>
      <option>Juli</option>
      <option>August</option>
      <option>September</option>
      <option>Oktober</option>
      <option>November</option>
      <option>December</option>
    </select>

    Omsætning (inkl moms)
    <input type="number" id="revenue">

    Løn (ex moms)
    <input type="number" id="salary">

    Køkken indkøb
    <input type="number" id="kitchen">

    Bar indkøb
    <input type="number" id="bar">

    <br><br>
    <button onclick="saveMonth()">Gem</button>
    <button onclick="closeModal()" style="background:#334155;">Annuller</button>
  </div>
</div>

<script>

let VAT = 1.25;
let chartInstance;

let data = JSON.parse(localStorage.getItem("executiveKPI")) || {};

function saveData(){
  localStorage.setItem("executiveKPI", JSON.stringify(data));
}

function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function saveMonth(){
  const loc=document.getElementById("locationSelect").value;
  const month=document.getElementById("month").value;
  const revenue=parseFloat(document.getElementById("revenue").value);
  const salary=parseFloat(document.getElementById("salary").value);
  const kitchen=parseFloat(document.getElementById("kitchen").value);
  const bar=parseFloat(document.getElementById("bar").value);

  if(!data[loc]) data[loc]=[];

  data[loc].push({month,revenue,salary,kitchen,bar});
  saveData();
  closeModal();
  render();
}

function render(){
  const loc=document.getElementById("locationSelect").value;
  const months=data[loc]||[];
  if(months.length===0) return;

  const latest=months[months.length-1];
  const revenueNet=latest.revenue/VAT;

  const kPct=latest.kitchen/revenueNet*100;
  const bPct=latest.bar/revenueNet*100;
  const sPct=latest.salary/revenueNet*100;

  const score=Math.max(0,100-(kPct-30)-(sPct-35));

  document.getElementById("kpis").innerHTML=`
    <div class="glass">
      <div class="sub">Omsætning ex moms</div>
      <div class="kpi">${revenueNet.toFixed(0)} kr</div>
    </div>
    <div class="glass">
      <div class="sub">Køkken %</div>
      <div class="kpi">${kPct.toFixed(1)}%</div>
    </div>
    <div class="glass">
      <div class="sub">Bar %</div>
      <div class="kpi">${bPct.toFixed(1)}%</div>
    </div>
    <div class="glass">
      <div class="sub">Løn %</div>
      <div class="kpi">${sPct.toFixed(1)}%</div>
    </div>
    <div class="glass">
      <div class="sub">Performance Score</div>
      <div class="score">${score.toFixed(0)} / 100</div>
    </div>
  `;

  if(chartInstance) chartInstance.destroy();

  chartInstance=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:months.map(m=>m.month),
      datasets:[
        {
          label:"Køkken %",
          data:months.map(m=>m.kitchen/(m.revenue/VAT)*100),
          borderColor:"#22c55e",
          tension:0.4
        },
        {
          label:"Løn %",
          data:months.map(m=>m.salary/(m.revenue/VAT)*100),
          borderColor:"#ef4444",
          tension:0.4
        }
      ]
    },
    options:{
      plugins:{legend:{labels:{color:"white"}}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

render();

</script>

</body>
</html>
