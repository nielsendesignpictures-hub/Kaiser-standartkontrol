<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Intelligence Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-body: #050505;
  --bg-card: #111111;
  --bg-sidebar: #0a0a0a;
  --text-main: #ffffff;
  --text-muted: #888888;
  --accent-orange: #FF512F;
  --accent-red: #DD2476;
  --border-color: #222222;
}

* { box-sizing: border-box; outline: none; }

body {
  margin: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg-body);
  color: var(--text-main);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 80px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 30px;
  z-index: 10;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--accent-orange), var(--accent-red));
  border-radius: 10px;
  margin-bottom: 50px;
}

.nav-item {
  width: 45px;
  height: 45px;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: var(--text-muted);
  cursor: pointer;
  margin-bottom: 15px;
  transition: 0.3s;
}

.nav-item:hover, .nav-item.active {
  background: rgba(255, 255, 255, 0.1);
  color: white;
}

.nav-item.active {
  background: linear-gradient(135deg, var(--accent-orange), var(--accent-red));
}

/* MAIN CONTENT */
.main-content {
  flex: 1;
  padding: 40px;
  overflow-y: auto;
  position: relative;
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}

.page-title h1 {
  font-size: 28px;
  font-weight: 600;
  margin: 0;
}

.page-title p {
  color: var(--text-muted);
  margin: 5px 0 0 0;
  font-size: 14px;
}

.btn-primary {
  background: var(--accent-orange);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(255, 81, 47, 0.3);
}

.location-select {
  background: #1a1a1a;
  color: white;
  border: 1px solid #333;
  padding: 10px 15px;
  border-radius: 10px;
}

/* DASHBOARD GRID */
.grid-container {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 25px;
}

/* CARD STYLES */
.card {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 25px;
  border: 1px solid var(--border-color);
  position: relative;
  overflow: hidden;
}

.card-lg { grid-column: span 8; }
.card-md { grid-column: span 4; }
.card-sm { grid-column: span 3; }

@media (max-width: 1200px) {
  .card-lg, .card-md, .card-sm { grid-column: span 6; }
}
@media (max-width: 800px) {
  .card-lg, .card-md, .card-sm { grid-column: span 12; }
  .sidebar { width: 60px; }
}

.kpi-value {
  font-size: 38px;
  font-weight: 700;
  margin: 10px 0;
  letter-spacing: -1px;
}

.kpi-label {
  font-size: 13px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-dot {
  height: 8px;
  width: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}

.gradient-text-orange { background: linear-gradient(to right, #FF512F, #DD2476); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.table-header {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
}

table { width: 100%; border-collapse: collapse; }
th { text-align: left; color: var(--text-muted); font-weight: 500; padding: 10px 0; border-bottom: 1px solid #333; }
td { padding: 15px 0; border-bottom: 1px solid #222; font-size: 14px; }
tr:last-child td { border-bottom: none; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(5px);
  z-index: 100;
  justify-content: center;
  align-items: center;
}

.modal-box {
  background: #1A1A1A;
  padding: 30px;
  border-radius: 20px;
  width: 400px;
  border: 1px solid #333;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

.modal-box h3 { margin-top: 0; }

.input-group { margin-bottom: 15px; }
.input-group label { display: block; color: var(--text-muted); font-size: 12px; margin-bottom: 5px; }
.input-group input, .input-group select {
  width: 100%;
  background: #000;
  border: 1px solid #333;
  padding: 12px;
  border-radius: 8px;
  color: white;
}

</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo-icon"></div>
  <div class="nav-item active" onclick="switchView('dashboard', this)">📊</div>
  <div class="nav-item" onclick="switchView('overview', this)">🏢</div>
  <div class="nav-item">⚙️</div>
</div>

<!-- MAIN -->
<div class="main-content">
  
  <!-- HEADER -->
  <div class="header-row">
    <div class="page-title">
      <h1 id="pageTitle">Executive Dashboard</h1>
      <p id="pageSubtitle">Welcome back.</p>
    </div>
    
    <div style="display:flex; gap:15px;">
       <select id="locationSelect" class="location-select" onchange="render()">
        <option value="Helsingør">Helsingør</option>
        <option value="Hillerød">Hillerød</option>
        <option value="Farum">Farum</option>
        <option value="Hørsholm">Hørsholm</option>
        <option value="Vanløse">Vanløse</option>
      </select>
      <button class="btn-primary" onclick="openModal()">+ Opret Måned</button>
    </div>
  </div>

  <!-- KPI CARDS -->
  <div class="grid-container" id="kpiGrid">
    <!-- Injected via JS -->
  </div>

  <!-- BOTTOM SECTION (Chart + Table) -->
  <div class="grid-container" style="margin-top: 25px;">
    <div class="card card-lg">
      <canvas id="chart" height="100"></canvas>
    </div>
    <div class="card card-md">
      <div class="table-header">Seneste Aktivitet</div>
      <table id="miniTable"></table>
    </div>
  </div>

  <!-- FULL DATA TABLE -->
  <div class="card" style="margin-top: 25px;">
    <div class="table-header">Månedsoversigt</div>
    <table id="dataTable"></table>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Ny Måned</h3>
    
    <div class="input-group">
      <label>Afdeling</label>
      <select id="modalLoc">
        <option value="Helsingør">Helsingør</option>
        <option value="Hillerød">Hillerød</option>
        <option value="Farum">Farum</option>
        <option value="Hørsholm">Hørsholm</option>
        <option value="Vanløse">Vanløse</option>
      </select>
    </div>

    <div class="input-group">
      <label>Måned & År</label>
      <input type="month" id="inpMonth">
    </div>

    <div class="input-group">
      <label>Omsætning (Inkl Moms)</label>
      <input type="number" id="inpRev" placeholder="0">
    </div>

    <div class="input-group">
      <label>Løn (Ex Moms)</label>
      <input type="number" id="inpSal" placeholder="0">
    </div>

    <div class="input-group">
      <label>Køkken Indkøb</label>
      <input type="number" id="inpKit" placeholder="0">
    </div>

    <div class="input-group">
      <label>Bar Indkøb</label>
      <input type="number" id="inpBar" placeholder="0">
    </div>

    <div style="display:flex; justify-content:space-between; margin-top:20px;">
      <button class="btn-primary" style="background:#333;" onclick="closeModal()">Luk</button>
      <button class="btn-primary" onclick="saveData()">Gem Data</button>
    </div>
  </div>
</div>

<script>
const VAT = 1.25;

// CONFIGURATION
const TARGETS = {
  "Helsingør": { salary: 35, fb: 33 },
  "Hillerød":  { salary: 35, fb: 33 },
  "Farum":     { salary: 36, fb: 33 },
  "Hørsholm":  { salary: 35, fb: 33 },
  "Vanløse":   { salary: 35, fb: 33 }
};

let data = JSON.parse(localStorage.getItem("execFinV2")) || {};
let currentView = 'dashboard';
let chartInstance = null;

function saveStorage() {
  localStorage.setItem("execFinV2", JSON.stringify(data));
}

// --- MODAL LOGIC ---
function openModal() {
  // Reset fields immediately
  document.getElementById("inpMonth").valueAsDate = new Date();
  document.getElementById("inpRev").value = '';
  document.getElementById("inpSal").value = '';
  document.getElementById("inpKit").value = '';
  document.getElementById("inpBar").value = '';
  document.getElementById("modalLoc").value = locationSelect.value;
  
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function saveData() {
  const loc = document.getElementById("modalLoc").value;
  const m = document.getElementById("inpMonth").value;
  const rev = parseFloat(document.getElementById("inpRev").value);
  const sal = parseFloat(document.getElementById("inpSal").value);
  const kit = parseFloat(document.getElementById("inpKit").value);
  const bar = parseFloat(document.getElementById("inpBar").value);

  if(!data[loc]) data[loc] = [];
  
  data[loc].push({ m, rev, sal, kit, bar });
  saveStorage();
  closeModal();
  render();
}

// --- RENDER LOGIC ---

function getNet(rev) { return rev / VAT; }
function getColor(pct, target) {
  if(pct <= target) return "#22C55E"; // Green
  if(pct <= target + 1) return "#FACC15"; // Yellow
  return "#EF4444"; // Red
}

function switchView(view, el) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  
  document.getElementById("pageTitle").innerText = view === 'dashboard' ? "Executive Dashboard" : "Koncern Overblik";
  document.getElementById("pageSubtitle").innerText = view === 'dashboard' ? 
    locationSelect.value + " Performance" : 
    "Samlet økonomi alle lokationer";
    
  render();
}

function render() {
  if(currentView === 'dashboard') renderDashboard();
  else renderOverview();
}

// DASHBOARD (Single Loc)
function renderDashboard() {
  const loc = locationSelect.value;
  const months = data[loc] || [];
  
  // Sort chronologically
  months.sort((a,b) => new Date(a.m) - new Date(b.m));

  const latest = months[months.length-1];
  if(!latest) {
    document.getElementById("kpiGrid").innerHTML = "<div style='color:#666'>Ingen data. Opret måned.</div>";
    return;
  }

  const net = getNet(latest.rev);
  const sPct = (latest.sal / net) * 100;
  const fPct = ((latest.kit + latest.bar) / net) * 100;
  
  const t = TARGETS[loc];
  const score = Math.max(0, 100 - Math.max(sPct-t.salary,0)*10 - Math.max(fPct-t.fb,0)*10);

  // Top Cards
  const kpiHTML = `
    <div class="card card-sm">
      <div class="kpi-label">Omsætning (Ex Moms)</div>
      <div class="kpi-value">${net.toLocaleString()}</div>
      <div class="status-dot" style="background:white;"></div> Netto
    </div>
    <div class="card card-sm">
      <div class="kpi-label">Løn %</div>
      <div class="kpi-value" style="color:${getColor(sPct, t.salary)}">${sPct.toFixed(1)}</div>
      <div class="status-dot" style="background:${getColor(sPct, t.salary)}"></div> Tgt: ${t.salary}%
    </div>
    <div class="card card-sm">
      <div class="kpi-label">Køkken + Bar %</div>
      <div class="kpi-value" style="color:${getColor(fPct, t.fb)}">${fPct.toFixed(1)}</div>
      <div class="status-dot" style="background:${getColor(fPct, t.fb)}"></div> Tgt: ${t.fb}%
    </div>
    <div class="card card-sm" style="background: linear-gradient(180deg, #111 0%, #1a100e 100%);">
      <div class="kpi-label">Performance Score</div>
      <div class="kpi-value gradient-text-orange">${score.toFixed(0)}</div>
      <div class="status-dot" style="background:var(--accent-orange);"></div> Index
    </div>
  `;
  document.getElementById("kpiGrid").innerHTML = kpiHTML;

  // Tables
  const tableRows = months.map(row => {
    const r = getNet(row.rev);
    return `<tr>
      <td>${row.m}</td>
      <td>${r.toLocaleString()}</td>
      <td><span style="color:${getColor((row.sal/r)*100, t.salary)}">(${(row.sal/r)*100}.toFixed(1))%</span></td>
      <td><span style="color:${getColor(((row.kit+row.bar)/r)*100, t.fb)}">(${((row.kit+row.bar)/r)*100}.toFixed(1))%</span></td>
    </tr>`;
  }).join("");

  document.getElementById("dataTable").innerHTML = `<tr><th>Måned</th><th>Oms</th><th>Løn %</th><th>F&B %</th></tr>` + tableRows;
  
  // Mini Table (Top 3)
  document.getElementById("miniTable").innerHTML = tableRows.split('<tr>').slice(1,4).map(r=>'<tr>'+r+'</tr>').join('');

  // Chart
  renderChart(months);
}

// OVERVIEW (All Locs)
function renderOverview() {
  let totalRev = 0, totalKit = 0, totalBar = 0, totalSal = 0;
  let count = 0;
  
  Object.keys(data).forEach(loc => {
    if(data[loc].length > 0) {
      const last = data[loc].sort((a,b)=>new Date(a.m)-new Date(b.m)).pop();
      totalRev += getNet(last.rev);
      totalKit += last.kit;
      totalBar += last.bar;
      totalSal += last.sal;
      count++;
    }
  });

  const globalFB = ((totalKit + totalBar) / totalRev) * 100;
  const globalSal = (totalSal / totalRev) * 100;
  const globalScore = Math.max(0, 100 - Math.max(globalSal-35,0)*10 - Math.max(globalFB-33,0)*10);

  const kpiHTML = `
    <div class="card card-sm">
      <div class="kpi-label">Total Omsætning</div>
      <div class="kpi-value">${totalRev.toLocaleString()}</div>
      <div>${count} Lokationer aktive</div>
    </div>
    <div class="card card-sm">
      <div class="kpi-label">Gns Løn %</div>
      <div class="kpi-value" style="color:${globalSal<=35?'#22C55E':'#EF4444'}">${globalSal.toFixed(1)}</div>
      <div>Tgt: 35%</div>
    </div>
    <div class="card card-sm">
      <div class="kpi-label">Gns Vareforbrug</div>
      <div class="kpi-value" style="color:${globalFB<=33?'#22C55E':'#EF4444'}">${globalFB.toFixed(1)}</div>
      <div>Tgt: 33%</div>
    </div>
    <div class="card card-sm">
      <div class="kpi-label">Status</div>
      <div class="kpi-value gradient-text-orange">${globalScore.toFixed(0)}</div>
      <div>Global Index</div>
    </div>
  `;
  document.getElementById("kpiGrid").innerHTML = kpiHTML;
  document.getElementById("dataTable").innerHTML = "<tr><td colspan='4' style='text-align:center;'>Vis kun enkelt afdelings detaljer i Dashboard fanen</td></tr>";
  document.getElementById("miniTable").innerHTML = "";
  
  if(chartInstance) chartInstance.destroy();
  document.getElementById("chart").getContext('2d').clearRect(0,0,800,300); // Clear canvas roughly
}

// CHART CONFIG
function renderChart(months) {
  const ctx = document.getElementById('chart').getContext('2d');
  if(chartInstance) chartInstance.destroy();

  // Create Gradient
  let gradient = ctx.createLinearGradient(0, 0, 0, 300);
  gradient.addColorStop(0, "rgba(255, 81, 47, 0.2)");
  gradient.addColorStop(1, "rgba(255, 81, 47, 0)");

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: months.map(m => m.m.substring(5)), // Show Month Name
      datasets: [{
        label: 'Løn % vs F&B %',
        data: months.map(m => [getNet(m.rev)]).map(v => 0), // Placeholder logic simplified
        borderColor: '#FF512F',
        backgroundColor: gradient,
        fill: true,
        tension: 0.4,
        pointRadius: 4,
        pointBackgroundColor: '#fff',
        data: months.map(m => {
          const net = getNet(m.rev);
          return ((m.kit+m.bar)/net)*100; // Plotting F&B primarily
        })
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#222' }, ticks: { color: '#666' } },
        y: { grid: { color: '#222' }, ticks: { color: '#666' }, suggestedMax: 50 }
      }
    }
  });
}

// Init
render();
</script>
</body>
</html>
