<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive KPI Metrics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0B1220;
  color:#E5E7EB;
}

.container{
  max-width:1300px;
  margin:auto;
  padding:60px 40px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:60px;
}

.title{
  font-size:22px;
  font-weight:600;
}

.controls{
  display:flex;
  gap:15px;
}

select,input{
  background:#111827;
  border:1px solid #1F2937;
  padding:8px 12px;
  border-radius:8px;
  color:#E5E7EB;
}

button{
  background:#2563EB;
  border:none;
  padding:9px 16px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.metrics{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:60px;
  margin-bottom:60px;
}

.metric span{
  font-size:13px;
  color:#6B7280;
}

.metric h2{
  font-size:46px;
  margin:8px 0;
  font-weight:600;
}

.good{color:#22C55E;}
.warn{color:#FACC15;}
.bad{color:#EF4444;}

.score{
  font-size:42px;
  font-weight:600;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:40px;
}

th{
  text-align:left;
  color:#6B7280;
  padding-bottom:10px;
}

td{
  padding:14px 0;
  border-bottom:1px solid #1F2937;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:400px;
}

.modal-box input{
  width:100%;
  margin-bottom:12px;
}

</style>
</head>
<body>

<div class="container">

<div class="topbar">
  <div class="title">Executive KPI Metrics</div>
  <div class="controls">
    <select id="locationSelect" onchange="render()">
      <option>Helsingør</option>
      <option>Hillerød</option>
      <option>Farum</option>
      <option>Hørsholm</option>
      <option>Vanløse</option>
    </select>
    <button onclick="openModal()">+ Opret måned</button>
  </div>
</div>

<div class="metrics" id="metrics"></div>

<table id="table"></table>

</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Opret måned</h3>
    <input type="month" id="month">
    <input type="number" id="revenue" placeholder="Omsætning (inkl moms)">
    <input type="number" id="salary" placeholder="Løn">
    <input type="number" id="kitchen" placeholder="Køkken">
    <input type="number" id="bar" placeholder="Bar">
    <button onclick="saveMonth()">Gem</button>
  </div>
</div>

<script>

const VAT=1.25;

const TARGETS={
  "Helsingør":{salary:35,fb:33},
  "Hillerød":{salary:35,fb:33},
  "Farum":{salary:36,fb:33},
  "Hørsholm":{salary:35,fb:33},
  "Vanløse":{salary:35,fb:33}
};

let data=JSON.parse(localStorage.getItem("execKPI"))||{};

function save(){localStorage.setItem("execKPI",JSON.stringify(data));}

function openModal(){
  modal.style.display="flex";
}

function saveMonth(){
  const loc=locationSelect.value;
  if(!data[loc]) data[loc]=[];

  data[loc].push({
    month:month.value,
    revenue:+revenue.value,
    salary:+salary.value,
    kitchen:+kitchen.value,
    bar:+bar.value
  });

  save();
  modal.style.display="none";
  render();
}

function colorClass(value,target){
  if(value<=target) return "good";
  if(value<=target+1) return "warn";
  return "bad";
}

function render(){
  const loc=locationSelect.value;
  const months=data[loc]||[];
  if(months.length===0) return;

  months.sort((a,b)=>new Date(a.month)-new Date(b.month));
  const latest=months[months.length-1];
  const net=latest.revenue/VAT;

  const salaryPct=latest.salary/net*100;
  const fbPct=(latest.kitchen+latest.bar)/net*100;

  const salaryTarget=TARGETS[loc].salary;
  const fbTarget=TARGETS[loc].fb;

  const salaryDiff=Math.max(salaryPct-salaryTarget,0);
  const fbDiff=Math.max(fbPct-fbTarget,0);

  const score=Math.max(0,100-(salaryDiff*10)-(fbDiff*10));

  document.getElementById("metrics").innerHTML=`
    <div class="metric">
      <span>Omsætning ex moms</span>
      <h2>${net.toFixed(0)}</h2>
    </div>
    <div class="metric">
      <span>Løn % (Target ${salaryTarget}%)</span>
      <h2 class="${colorClass(salaryPct,salaryTarget)}">${salaryPct.toFixed(1)}%</h2>
    </div>
    <div class="metric">
      <span>Køkken + Bar % (Target ${fbTarget}%)</span>
      <h2 class="${colorClass(fbPct,fbTarget)}">${fbPct.toFixed(1)}%</h2>
    </div>
    <div class="metric">
      <span>Performance Index</span>
      <h2 class="score">${score.toFixed(0)}</h2>
    </div>
  `;

  document.getElementById("table").innerHTML=
    "<tr><th>Måned</th><th>Oms</th><th>Løn%</th><th>F&B%</th></tr>"+
    months.map(m=>{
      const n=m.revenue/VAT;
      return `<tr>
        <td>${m.month}</td>
        <td>${n.toFixed(0)}</td>
        <td>${(m.salary/n*100).toFixed(1)}%</td>
        <td>${((m.kitchen+m.bar)/n*100).toFixed(1)}%</td>
      </tr>`;
    }).join("");
}

render();

</script>

</body>
</html>
