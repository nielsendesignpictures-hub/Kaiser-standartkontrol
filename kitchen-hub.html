<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Hub - Kaiser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg0: #070A12;
            --bg1: #0B1020;
            --panel: rgba(255,255,255,0.055);
            --panel2: rgba(255,255,255,0.035);
            --border: rgba(255,255,255,0.10);
            
            --text: rgba(255,255,255,0.94);
            --muted: rgba(255,255,255,0.74);
            --muted2: rgba(255,255,255,0.52);
            
            --gold: #d6b24a;
            --gold2: #b9921f;
            
            --kitchen: #f59e0b;
            --drift: #38bdf8;
            --quality: #a78bfa;
            
            --success: #22c55e;
            --danger: #ff6b6b;
            --shadow: 0 26px 75px rgba(0,0,0,.55);
            --shadow2: 0 18px 55px rgba(0,0,0,.35);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.10), transparent 55%),
                radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
                radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
                linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        body:before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 38px 38px;
            opacity: 0.06;
            pointer-events: none;
            mask-image: radial-gradient(1000px 700px at 50% 0%, black, transparent 75%);
        }
        
        .shell {
            max-width: 1400px;
            margin: 0 auto;
            padding: 18px 16px 44px;
        }
        
        /* Header */
        .header {
            position: relative;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--muted);
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: var(--gold);
            color: var(--bg0);
            border-color: var(--gold);
        }
        
        .header-title h1 {
            font-family: "Playfair Display", serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .header-title p {
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
        }
        
        .location-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            color: var(--bg0);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .location-badge .icon {
            font-size: 18px;
        }
        
        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 20px;
        }
        
        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1200px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        /* Panel */
        .panel {
            position: relative;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 24px;
            box-shadow: var(--shadow2);
            transition: all 0.3s ease;
        }
        
        .panel:hover {
            border-color: rgba(255,255,255,0.15);
            box-shadow: var(--shadow);
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .panel-icon {
            font-size: 24px;
        }
        
        .panel-header h2 {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text);
        }
        
        .refresh-btn {
            cursor: pointer;
            font-size: 16px;
            opacity: 0.7;
            transition: all 0.3s ease;
            margin-left: auto;
            padding: 6px;
            border-radius: 8px;
        }
        
        .refresh-btn:hover {
            opacity: 1;
            background: rgba(255,255,255,0.1);
            transform: rotate(180deg);
        }
        
        /* Tool Links */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .tool-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
        }
        
        .tool-link:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--gold);
            transform: translateY(-3px);
        }
        
        .tool-link .icon {
            font-size: 28px;
        }
        
        .tool-link .label {
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Catering Styles */
        #cateringList {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .catering-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-left: 4px solid var(--gold);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s ease;
        }
        
        .catering-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateX(4px);
        }
        
        .catering-date {
            font-size: 13px;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .catering-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
        }
        
        .catering-guests {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        
        .catering-note {
            font-size: 13px;
            color: var(--muted2);
            background: rgba(255,255,255,0.03);
            padding: 10px 12px;
            border-radius: 8px;
            border-left: 3px solid var(--muted2);
            margin-top: 10px;
            line-height: 1.5;
        }
        
        .catering-empty {
            text-align: center;
            padding: 30px;
            color: var(--muted2);
            font-size: 14px;
        }
        
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 30px;
            color: var(--muted);
            font-size: 14px;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Iframe Panel */
        .iframe-container {
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            min-height: 300px;
        }
        
        .iframe-container iframe {
            width: 100%;
            height: 350px;
            border: none;
        }
        
        /* Full Width Panel */
        .panel.full-width {
            grid-column: 1 / -1;
        }
        
        /* Status Indicator */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Time Display */
        .time-display {
            text-align: center;
            padding: 20px;
        }
        
        .time-display .time {
            font-family: "Playfair Display", serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .time-display .date {
            font-size: 14px;
            color: var(--muted);
            font-weight: 600;
        }
        
        /* Quick Stats */
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 4px;
        }
        
        .stat-card .label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .header-left {
                flex-direction: column;
            }
            
            .tool-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .header-title h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        
        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <a href="portal.html" class="back-btn" title="Tilbage til Portal">←</a>
                <div class="header-title">
                    <h1>👨‍🍳 Kitchen Hub</h1>
                    <p>Køkkenets kommandocentral</p>
                </div>
            </div>
            <div class="location-badge">
                <span class="icon">📍</span>
                <span id="locationName">Indlæser...</span>
            </div>
        </header>
        
        <!-- GRID -->
        <div class="grid">
            
            <!-- CLOCK & DATE -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-icon">🕐</span>
                    <h2>Tid & Dato</h2>
                    <div class="status-dot"></div>
                </div>
                <div class="time-display">
                    <div class="time" id="currentTime">--:--</div>
                    <div class="date" id="currentDate">--</div>
                </div>
            </div>
            
            <!-- QUICK TOOLS -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-icon">🛠️</span>
                    <h2>Hurtige Tools</h2>
                </div>
                <div class="tool-grid">
                    <a href="kitchen-percent.html" class="tool-link">
                        <span class="icon">📈</span>
                        <span class="label">Kitchen %</span>
                    </a>
                    <a href="MIS.html" class="tool-link">
                        <span class="icon">🍽️</span>
                        <span class="label">MIS</span>
                    </a>
                    <a href="3-timers-regel.html" class="tool-link">
                        <span class="icon">⏰</span>
                        <span class="label">3-Timers</span>
                    </a>
                    <a href="cleaning-kitchen.html" class="tool-link">
                        <span class="icon">🧽</span>
                        <span class="label">Rengøring</span>
                    </a>
                </div>
            </div>
            
            <!-- CATERING -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-icon">🎉</span>
                    <h2>Kommende Catering</h2>
                    <span class="refresh-btn" onclick="loadCatering()" title="Opdater">🔄</span>
                </div>
                <div id="cateringList">
                    <div class="loading-state">
                        <span class="spinner"></span>
                        Henter catering...
                    </div>
                </div>
            </div>
            
            <!-- 3-TIMERS REGEL -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-icon">⏰</span>
                    <h2>3-Timers Regel</h2>
                </div>
                <div class="iframe-container">
                    <iframe src="3-timers-regel.html" title="3-Timers Regel"></iframe>
                </div>
            </div>
            
            <!-- CLEANING -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-icon">🧽</span>
                    <h2>Rengøring</h2>
                </div>
                <div class="iframe-container">
                    <iframe src="cleaning-kitchen.html" title="Køkken Rengøring"></iframe>
                </div>
            </div>
            
            <!-- QUICK STATS -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-icon">📊</span>
                    <h2>Hurtig Status</h2>
                </div>
                <div class="quick-stats">
                    <div class="stat-card">
                        <div class="value" id="cateringCount">-</div>
                        <div class="label">Catering i dag</div>
                    </div>
                    <div class="stat-card">
                        <div class="value" id="upcomingCount">-</div>
                        <div class="label">Kommende</div>
                    </div>
                </div>
            </div>
            
        </div>
        
    </div>
    
    <script>
        // ===== CONFIGURATION =====
        const CATERING_API = 'https://script.google.com/macros/s/AKfycbw8ztJIUOk-4GkhkTwHbpJiSOi7uJjPivpWc5skVr0KXJ1m-j3dcVNF3BSe3sbnWIds/exec';
        
        // Location mapping
        const LOCATIONS = {
            'helsingor': 'Café Kaiser Helsingør',
            'helsingør': 'Café Kaiser Helsingør',
            'hillerod': 'Café Kaiser Hillerød',
            'hillerød': 'Café Kaiser Hillerød',
            'farum': 'Café Kaiser Farum',
            'horsholm': 'Café Kaiser Hørsholm',
            'hørsholm': 'Café Kaiser Hørsholm',
            'vanlose': 'Café Kaiser Vanløse',
            'vanløse': 'Café Kaiser Vanløse'
        };
        
        // ===== GET CURRENT LOCATION =====
        function getCurrentLocation() {
            const urlParams = new URLSearchParams(window.location.search);
            const loc = urlParams.get('loc') || '';
            return loc.toLowerCase();
        }
        
        function getLocationDisplayName() {
            const loc = getCurrentLocation();
            return LOCATIONS[loc] || 'Ukendt Lokation';
        }
        
        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            // Set location name
            document.getElementById('locationName').textContent = getLocationDisplayName();
            
            // Start clock
            updateClock();
            setInterval(updateClock, 1000);
            
            // Load catering
            loadCatering();
            
            // Auto-refresh catering every 60 seconds
            setInterval(loadCatering, 60000);
        });
        
        // ===== CLOCK =====
        function updateClock() {
            const now = new Date();
            
            // Time
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
            
            // Date
            const days = ['Søndag', 'Mandag', 'Tirsdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lørdag'];
            const months = ['januar', 'februar', 'marts', 'april', 'maj', 'juni', 'juli', 'august', 'september', 'oktober', 'november', 'december'];
            
            const dayName = days[now.getDay()];
            const day = now.getDate();
            const month = months[now.getMonth()];
            const year = now.getFullYear();
            
            document.getElementById('currentDate').textContent = `${dayName} d. ${day}. ${month} ${year}`;
        }
        
        // ===== CATERING =====
        async function loadCatering() {
            const container = document.getElementById('cateringList');
            const currentLoc = getCurrentLocation();
            
            container.innerHTML = `
                <div class="loading-state">
                    <span class="spinner"></span>
                    Henter catering...
                </div>
            `;
            
            try {
                const response = await fetch(CATERING_API + '?action=list');
                const data = await response.json();
                
                if (data.status === 'success') {
                    let events = data.data || [];
                    
                    // Filter for current location
                    if (currentLoc) {
                        events = events.filter(e => {
                            if (!e.location) return false;
                            const eventLoc = e.location.toLowerCase();
                            return eventLoc === currentLoc || 
                                   eventLoc.includes(currentLoc) ||
                                   currentLoc.includes(eventLoc);
                        });
                    }
                    
                    // Filter out past events
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const upcomingEvents = events.filter(e => new Date(e.date) >= today);
                    
                    // Sort by date
                    upcomingEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
                    
                    // Update stats
                    updateStats(upcomingEvents);
                    
                    // Take only next 5 events
                    const displayEvents = upcomingEvents.slice(0, 5);
                    
                    renderCatering(displayEvents);
                } else {
                    container.innerHTML = '<div class="catering-empty">❌ Kunne ikke hente catering</div>';
                }
            } catch (error) {
                console.error('Catering load error:', error);
                container.innerHTML = '<div class="catering-empty">❌ Fejl ved hentning</div>';
            }
        }
        
        function renderCatering(events) {
            const container = document.getElementById('cateringList');
            
            if (events.length === 0) {
                container.innerHTML = '<div class="catering-empty">🎉 Ingen kommende catering</div>';
                return;
            }
            
            container.innerHTML = events.map(e => `
                <div class="catering-card">
                    <div class="catering-date">📅 ${formatCateringDate(e.date)} kl. ${e.time}</div>
                    <div class="catering-title">${e.title || 'Ingen titel'}</div>
                    <div class="catering-guests">👥 ${e.guests} gæster</div>
                    ${e.note ? `<div class="catering-note">📝 ${e.note}</div>` : ''}
                </div>
            `).join('');
        }
        
        function updateStats(events) {
            // Today's catering
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            const todayCount = events.filter(e => {
                const eventDate = new Date(e.date);
                return eventDate >= today && eventDate < tomorrow;
            }).length;
            
            document.getElementById('cateringCount').textContent = todayCount;
            document.getElementById('upcomingCount').textContent = events.length;
        }
        
        function formatCateringDate(dateString) {
            const date = new Date(dateString);
            const days = ['Søn', 'Man', 'Tirs', 'Ons', 'Tors', 'Fre', 'Lør'];
            const months = ['jan', 'feb', 'mar', 'apr', 'maj', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
            
            const dayName = days[date.getDay()];
            const day = date.getDate();
            const month = months[date.getMonth()];
            
            // Check if it's today or tomorrow
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const eventDate = new Date(date);
            eventDate.setHours(0, 0, 0, 0);
            
            const diffDays = Math.floor((eventDate - today) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) {
                return `🔴 I DAG`;
            } else if (diffDays === 1) {
                return `🟡 I MORGEN`;
            } else {
                return `${dayName} ${day}. ${month}`;
            }
        }
    </script>
</body>
</html>
