<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Hub – Kaiser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --bg2: #0f1420;
            --card: rgba(255,255,255,0.04);
            --card-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --text-muted2: rgba(255,255,255,0.4);
            --gold: #d4af37;
            --gold-dim: rgba(212,175,55,0.15);
            --accent: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f97316;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: var(--gold);
            color: var(--bg);
            border-color: var(--gold);
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .location-badge {
            background: linear-gradient(135deg, var(--gold), #b8960c);
            color: #000;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== MAIN LAYOUT ===== */
        .main {
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* ===== 3-TIMERS SECTION (TOP) ===== */
        .timer-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .timer-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .timer-header h2 {
            font-size: 16px;
            font-weight: 700;
            flex: 1;
        }

        .timers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .timer-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .timer-card.warning {
            border-color: var(--orange);
            background: rgba(249, 115, 22, 0.1);
        }
        .timer-card.danger {
            border-color: var(--red);
            background: rgba(239, 68, 68, 0.1);
            animation: pulse-danger 1s infinite;
        }

        @keyframes pulse-danger {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .timer-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .timer-display {
            font-size: 36px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: var(--text);
        }
        .timer-card.warning .timer-display { color: var(--orange); }
        .timer-card.danger .timer-display { color: var(--red); }

        .timer-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
        }

        .timer-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .timer-btn.start { background: var(--green); color: #fff; }
        .timer-btn.stop { background: var(--red); color: #fff; }
        .timer-btn.reset { background: var(--card); color: var(--text-muted); border: 1px solid var(--border); }

        /* ===== WIDGETS ROW ===== */
        .widgets-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (max-width: 900px) {
            .widgets-row { grid-template-columns: 1fr; }
        }

        .widget {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .widget-header h3 {
            font-size: 14px;
            font-weight: 700;
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .widget-header .refresh-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s;
        }
        .widget-header .refresh-btn:hover {
            opacity: 1;
            transform: rotate(180deg);
        }

        /* Catering Widget */
        #cateringList {
            max-height: 300px;
            overflow-y: auto;
        }

        .catering-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-left: 4px solid var(--gold);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .catering-item:last-child { margin-bottom: 0; }

        .catering-date {
            font-size: 11px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .catering-date.today { color: var(--red); }
        .catering-date.tomorrow { color: var(--orange); }

        .catering-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .catering-info {
            font-size: 12px;
            color: var(--text-muted);
        }

        .catering-note {
            font-size: 11px;
            color: var(--text-muted2);
            background: rgba(0,0,0,0.2);
            padding: 8px 10px;
            border-radius: 6px;
            margin-top: 8px;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Kitchen % Widget */
        .kitchen-percent-display {
            text-align: center;
            padding: 20px;
        }
        .kitchen-percent-value {
            font-size: 56px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .kitchen-percent-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* ===== TABS SECTION ===== */
        .tabs-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .tabs-header {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tab-btn:hover { background: var(--card-hover); }
        .tab-btn.active {
            color: var(--gold);
            background: var(--gold-dim);
            border-bottom: 2px solid var(--gold);
        }

        .tab-content {
            display: none;
            padding: 24px;
            max-height: 400px;
            overflow-y: auto;
        }
        .tab-content.active { display: block; }

        /* Todo & Cleaning Lists */
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .task-item:hover { background: var(--card-hover); }
        .task-item:last-child { margin-bottom: 0; }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .task-checkbox.checked {
            background: var(--green);
            border-color: var(--green);
        }
        .task-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .task-text {
            flex: 1;
            font-size: 14px;
        }
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        /* Mobile */
        @media (max-width: 768px) {
            .header { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
            .main { padding: 16px; }
            .timer-section, .widget, .tabs-section { padding: 16px; }
            .timer-display { font-size: 28px; }
            .kitchen-percent-value { font-size: 42px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <a href="portal.html" class="back-btn">←</a>
            <div class="header-title">
                <h1>👨‍🍳 Kitchen Hub</h1>
                <p>Køkkenets kommandocentral</p>
            </div>
        </div>
        <div class="location-badge" id="locationBadge">📍 <span id="locationName">Indlæser...</span></div>
    </header>

    <!-- MAIN -->
    <main class="main">

        <!-- 3-TIMERS SECTION -->
        <section class="timer-section">
            <div class="timer-header">
                <span>⏰</span>
                <h2>3-Timers Regel</h2>
            </div>
            <div class="timers-grid" id="timersGrid">
                <!-- Timers generated by JS -->
            </div>
            <div style="text-align: center; margin-top: 16px;">
                <button class="timer-btn reset" onclick="addTimer()">+ Tilføj Timer</button>
            </div>
        </section>

        <!-- WIDGETS ROW -->
        <div class="widgets-row">
            
            <!-- CATERING WIDGET -->
            <div class="widget">
                <div class="widget-header">
                    <span>🎉</span>
                    <h3>Kommende Catering</h3>
                    <button class="refresh-btn" onclick="loadCatering()">🔄</button>
                </div>
                <div id="cateringList">
                    <div class="empty-state"><span class="spinner"></span> Henter...</div>
                </div>
            </div>

            <!-- KITCHEN % WIDGET -->
            <div class="widget">
                <div class="widget-header">
                    <span>📈</span>
                    <h3>Kitchen %</h3>
                </div>
                <div class="kitchen-percent-display">
                    <div class="kitchen-percent-value" id="kitchenPercent">--</div>
                    <div class="kitchen-percent-label">Dagens kitchen procent</div>
                </div>
                <div style="text-align: center; margin-top: 12px;">
                    <a href="kitchen-percent.html" style="color: var(--gold); font-size: 13px;">Åbn beregner →</a>
                </div>
            </div>

        </div>

        <!-- TABS SECTION -->
        <section class="tabs-section">
            <div class="tabs-header">
                <button class="tab-btn active" onclick="switchTab('todo', this)">📋 Todo</button>
                <button class="tab-btn" onclick="switchTab('cleaning', this)">🧹 Rengøring</button>
            </div>

            <!-- TODO TAB -->
            <div class="tab-content active" id="todoTab">
                <div id="todoList"></div>
            </div>

            <!-- CLEANING TAB -->
            <div class="tab-content" id="cleaningTab">
                <div id="cleaningList"></div>
            </div>
        </section>

    </main>

    <!-- ALARM SOUND -->
    <audio id="alarmSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdH2Onq2tqYmAd3NucHWAjJmenZaIgXt3dnuDjJSamZKJgXt3d3yFjpWZlpCHf3t3eX+Ij5SXlI+GgHt4eoCHjpOVko+HgHt5e4GHjZKUkY2GgHt6e4GGi5CSkI2FgHt7fIKGi4+Qjo2FgHt7fIKGio6PjYuEf3t7fIGFiY2OjIuEf3t8fYGFiIyNi4qDf3t8fYCEh4uMioqDfnt9foCEhomKiYmCfnt9fn+Dhoha" type="audio/wav">
    </audio>

    <script>
        // ===== CONFIGURATION =====
        const API_URL = 'https://script.google.com/macros/s/AKfycbw8ztJIUOk-4GkhkTwHbpJiSOi7uJjPivpWc5skVr0KXJ1m-j3dcVNF3BSe3sbnWIds/exec';

        const LOCATIONS = {
            'helsingor': 'Helsingør', 'helsingør': 'Helsingør',
            'hillerod': 'Hillerød', 'hillerød': 'Hillerød',
            'farum': 'Farum',
            'horsholm': 'Hørsholm', 'hørsholm': 'Hørsholm',
            'vanlose': 'Vanløse', 'vanløse': 'Vanløse'
        };

        const TODO_ITEMS = [
            'Tjek køleskabstemperaturer',
            'Gennemgå dagens catering ordrer',
            'Klargør mise en place',
            'Tjek lagerbeholdning',
            'Rengør arbejdsstationer',
            'Forbered sauce og tilbehør'
        ];

        const CLEANING_ITEMS = [
            'Rengør komfur og ovn',
            'Aftør alle arbejdsflader',
            'Tøm og rengør friture',
            'Vask gulve',
            'Rengør køleskabe indvendigt',
            'Tøm skraldespande',
            'Rengør opvaskemaskine',
            'Aftør hylder og reoler'
        ];

        // ===== HELPERS =====
        function getUrlParam(param) {
            return new URLSearchParams(window.location.search).get(param) || '';
        }

        function getCurrentLocation() {
            return getUrlParam('loc').toLowerCase();
        }

        function getLocationDisplayName() {
            const loc = getCurrentLocation();
            return LOCATIONS[loc] ? `Café Kaiser ${LOCATIONS[loc]}` : 'Vælg lokation';
        }

        // JSONP Fetch
        function jsonpFetch(url) {
            return new Promise((resolve, reject) => {
                const callbackName = 'cb_' + Date.now() + Math.random().toString(36).substr(2, 5);
                const script = document.createElement('script');
                const timeout = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 10000);

                function cleanup() {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    if (script.parentNode) script.parentNode.removeChild(script);
                }

                window[callbackName] = (data) => { cleanup(); resolve(data); };
                script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
                script.onerror = () => { cleanup(); reject(new Error('Load error')); };
                document.body.appendChild(script);
            });
        }

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('locationName').textContent = getLocationDisplayName();
            initTimers();
            loadCatering();
            loadKitchenPercent();
            renderTodoList();
            renderCleaningList();
            setInterval(loadCatering, 60000);
        });

        // ===== TIMERS =====
        let timers = [];
        let timerIntervals = {};

        function initTimers() {
            const saved = localStorage.getItem('kitchenTimers_' + getCurrentLocation());
            if (saved) {
                timers = JSON.parse(saved);
            } else {
                timers = [
                    { id: 1, label: 'Timer 1', seconds: 10800, running: false },
                    { id: 2, label: 'Timer 2', seconds: 10800, running: false }
                ];
            }
            renderTimers();
        }

        function saveTimers() {
            localStorage.setItem('kitchenTimers_' + getCurrentLocation(), JSON.stringify(timers));
        }

        function renderTimers() {
            const grid = document.getElementById('timersGrid');
            grid.innerHTML = timers.map(t => {
                let status = '';
                if (t.seconds <= 0) status = 'danger';
                else if (t.seconds <= 900) status = 'danger';
                else if (t.seconds <= 1800) status = 'warning';

                return `
                    <div class="timer-card ${status}" id="timer-${t.id}">
                        <div class="timer-label">${t.label}</div>
                        <div class="timer-display">${formatTime(t.seconds)}</div>
                        <div class="timer-buttons">
                            ${t.running 
                                ? `<button class="timer-btn stop" onclick="stopTimer(${t.id})">Stop</button>`
                                : `<button class="timer-btn start" onclick="startTimer(${t.id})">Start</button>`
                            }
                            <button class="timer-btn reset" onclick="resetTimer(${t.id})">Reset</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function startTimer(id) {
            const timer = timers.find(t => t.id === id);
            if (!timer || timer.running) return;
            timer.running = true;
            saveTimers();
            renderTimers();

            timerIntervals[id] = setInterval(() => {
                timer.seconds--;
                if (timer.seconds <= 900 && timer.seconds % 60 === 0) {
                    playAlarm();
                }
                if (timer.seconds <= 0) {
                    timer.seconds = 0;
                    stopTimer(id);
                    playAlarm();
                }
                saveTimers();
                renderTimers();
            }, 1000);
        }

        function stopTimer(id) {
            const timer = timers.find(t => t.id === id);
            if (!timer) return;
            timer.running = false;
            if (timerIntervals[id]) {
                clearInterval(timerIntervals[id]);
                delete timerIntervals[id];
            }
            saveTimers();
            renderTimers();
        }

        function resetTimer(id) {
            stopTimer(id);
            const timer = timers.find(t => t.id === id);
            if (timer) timer.seconds = 10800;
            saveTimers();
            renderTimers();
        }

        function addTimer() {
            const newId = Math.max(...timers.map(t => t.id), 0) + 1;
            timers.push({ id: newId, label: `Timer ${newId}`, seconds: 10800, running: false });
            saveTimers();
            renderTimers();
        }

        function playAlarm() {
            const audio = document.getElementById('alarmSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(() => {});
            }
        }

        // ===== CATERING =====
        async function loadCatering() {
            const container = document.getElementById('cateringList');
            const currentLoc = getCurrentLocation();

            container.innerHTML = '<div class="empty-state"><span class="spinner"></span> Henter catering...</div>';

            try {
                const data = await jsonpFetch(API_URL + '?action=get');

                if (data.ok && data.events) {
                    let events = data.events;

                    if (currentLoc) {
                        events = events.filter(e => {
                            if (!e.location) return false;
                            const loc = e.location.toLowerCase();
                            return loc.includes(currentLoc) || currentLoc.includes(loc);
                        });
                    }

                    const today = new Date();
                    today.setHours(0,0,0,0);
                    events = events.filter(e => new Date(e.date) >= today);
                    events.sort((a,b) => new Date(a.date) - new Date(b.date));

                    renderCatering(events.slice(0, 5));
                } else {
                    throw new Error(data.error || 'Fejl');
                }
            } catch (error) {
                console.error('Catering error:', error);
                container.innerHTML = '<div class="empty-state">⚠️ Kunne ikke hente catering</div>';
            }
        }

        function renderCatering(events) {
            const container = document.getElementById('cateringList');

            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state">🎉 Ingen kommende catering</div>';
                return;
            }

            container.innerHTML = events.map(e => {
                const dateClass = getDateClass(e.date);
                return `
                    <div class="catering-item">
                        <div class="catering-date ${dateClass.class}">${dateClass.text} kl. ${e.time || '--:--'}</div>
                        <div class="catering-title">${escapeHtml(e.title) || 'Ingen titel'}</div>
                        <div class="catering-info">👥 ${e.guests || '?'} gæster</div>
                        ${e.note ? `<div class="catering-note">${escapeHtml(e.note)}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function getDateClass(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            today.setHours(0,0,0,0);
            const diff = Math.floor((date - today) / (1000*60*60*24));

            if (diff === 0) return { text: '🔴 I DAG', class: 'today' };
            if (diff === 1) return { text: '🟡 I MORGEN', class: 'tomorrow' };
            
            const days = ['Søn','Man','Tirs','Ons','Tors','Fre','Lør'];
            const months = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
            return { text: `📅 ${days[date.getDay()]} ${date.getDate()}. ${months[date.getMonth()]}`, class: '' };
        }

        // ===== KITCHEN % =====
        function loadKitchenPercent() {
            const saved = localStorage.getItem('kitchenPercentToday_' + getCurrentLocation());
            if (saved) {
                const data = JSON.parse(saved);
                if (data.date === new Date().toDateString()) {
                    document.getElementById('kitchenPercent').textContent = data.percent + '%';
                    return;
                }
            }
            document.getElementById('kitchenPercent').textContent = '--';
        }

        // ===== TABS =====
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tabId + 'Tab').classList.add('active');
        }

        // ===== TODO LIST =====
        function renderTodoList() {
            const container = document.getElementById('todoList');
            const saved = JSON.parse(localStorage.getItem('kitchenTodo_' + getCurrentLocation()) || '{}');

            container.innerHTML = TODO_ITEMS.map((item, i) => {
                const checked = saved[i] || false;
                return `
                    <div class="task-item ${checked ? 'completed' : ''}">
                        <div class="task-checkbox ${checked ? 'checked' : ''}" onclick="toggleTodo(${i})"></div>
                        <div class="task-text">${item}</div>
                    </div>
                `;
            }).join('');
        }

        function toggleTodo(index) {
            const saved = JSON.parse(localStorage.getItem('kitchenTodo_' + getCurrentLocation()) || '{}');
            saved[index] = !saved[index];
            localStorage.setItem('kitchenTodo_' + getCurrentLocation(), JSON.stringify(saved));
            renderTodoList();
        }

        // ===== CLEANING LIST =====
        function renderCleaningList() {
            const container = document.getElementById('cleaningList');
            const saved = JSON.parse(localStorage.getItem('kitchenCleaning_' + getCurrentLocation()) || '{}');

            container.innerHTML = CLEANING_ITEMS.map((item, i) => {
                const checked = saved[i] || false;
                return `
                    <div class="task-item ${checked ? 'completed' : ''}">
                        <div class="task-checkbox ${checked ? 'checked' : ''}" onclick="toggleCleaning(${i})"></div>
                        <div class="task-text">${item}</div>
                    </div>
                `;
            }).join('');
        }

        function toggleCleaning(index) {
            const saved = JSON.parse(localStorage.getItem('kitchenCleaning_' + getCurrentLocation()) || '{}');
            saved[index] = !saved[index];
            localStorage.setItem('kitchenCleaning_' + getCurrentLocation(), JSON.stringify(saved));
            renderCleaningList();
        }

        // ===== HELPERS =====
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
