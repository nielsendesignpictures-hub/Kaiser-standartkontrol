<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Kitchen Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#070A12; --bg1:#0B1020;
      --text:rgba(255,255,255,0.94);
      --muted:rgba(255,255,255,0.74);
      --muted2:rgba(255,255,255,0.52);
      --gold:#d6b24a; --gold2:#b9921f;
      --danger:#ff6b6b; --warn:#f59e0b; --ok:#62d26f;
      --shadow: 0 26px 75px rgba(0,0,0,.55);
      --shadow2: 0 18px 55px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box;}
    html,body{height:100%;margin:0;}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.10), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      overflow-x:hidden;
    }
    body:before{
      content:""; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity:0.06; pointer-events:none;
    }

    .shell{max-width:1400px; margin:0 auto; padding:18px 16px 44px;}

    /* Hero */
    .hero{
      border-radius: 28px;
      border:1px solid rgba(255,255,255,0.10);
      background:
        radial-gradient(900px 260px at 50% 0%, rgba(255,255,255,0.08), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      padding: 18px;
      position:relative; overflow:hidden;
    }
    .hero:after{
      content:""; position:absolute; inset:-2px;
      background:
        radial-gradient(700px 240px at 20% 0%, rgba(245,158,11,0.18), transparent 60%),
        radial-gradient(700px 240px at 80% 0%, rgba(56,189,248,0.14), transparent 60%);
      opacity:.55; pointer-events:none;
    }

    .heroTop{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;position:relative;z-index:1;}
    .heroLeft{display:flex;align-items:center;gap:14px;}
    .logo{font-family:"Playfair Display",serif;font-size:28px;font-weight:700;letter-spacing:-0.02em;}
    .logoSub{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.15em;}

    .heroRight{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    .pill,.btn{
      display:inline-flex;align-items:center;justify-content:center;gap:6px;
      padding:8px 12px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:10px;
      color: rgba(255,255,255,0.90);white-space:nowrap;user-select:none;
    }
    .btn{cursor:pointer;transition:all .15s ease;}
    .btn:hover{background:rgba(255,255,255,0.08);}
    .btn:active{transform:translateY(1px);}
    .btn.primary{border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0b0c0f;}
    .btn.ghost{background:rgba(255,255,255,0.06);}
    .btn.sm{padding:6px 10px;font-size:9px;}

    /* Clock */
    .clockWrap{position:relative;z-index:1;margin-top:12px;text-align:center;display:none;}
    .clockWrap.show{display:block;}
    .clockTime{font-family:"Playfair Display",serif;font-size:64px;font-weight:700;line-height:1;letter-spacing:-0.02em;}
    .clockDate{font-size:14px;font-weight:600;color:var(--muted);margin-top:4px;}

    /* Mini widgets grid */
    .widgetGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      margin-top:14px;
    }
    @media (max-width: 700px){
      .widgetGrid{grid-template-columns:1fr;}
    }

    .widget{
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.03);
      padding:14px;
      position:relative;
    }
    .widgetHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
    .widgetTitle{font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);display:flex;align-items:center;gap:8px;}
    .widgetDot{width:8px;height:8px;border-radius:50%;background:var(--gold);}

    /* Kitchen % mini */
    .kPctBig{font-family:"Playfair Display",serif;font-size:42px;font-weight:700;line-height:1;}
    .kPctSub{font-size:12px;font-weight:600;color:var(--muted);margin-top:4px;}

    /* Catering mini */
    .cMiniList{display:flex;flex-direction:column;gap:8px;max-height:150px;overflow:auto;}
    .cMiniEvent{
      display:flex;align-items:center;gap:10px;
      padding:10px;border-radius:12px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
    }
    .cMiniBar{width:4px;height:36px;border-radius:4px;}
    .cMiniBar.green{background:var(--ok);}
    .cMiniBar.yellow{background:var(--warn);}
    .cMiniBar.red{background:var(--danger);}
    .cMiniBar.gray{background:rgba(255,255,255,0.3);}
    .cMiniInfo{flex:1;min-width:0;}
    .cMiniTitle{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cMiniMeta{font-size:11px;color:var(--muted);margin-top:2px;}
    .cMiniEmpty{text-align:center;padding:20px;color:var(--muted2);font-size:12px;}

    /* Section */
    .section{
      margin-top:14px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.03);
      overflow:hidden;
    }
    .sectionHead{
      padding:12px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      background:rgba(255,255,255,0.02);
      cursor:pointer;
      user-select:none;
      transition:background .15s;
    }
    .sectionHead:hover{background:rgba(255,255,255,0.04);}
    .sectionTitle{font-weight:800;letter-spacing:.15em;text-transform:uppercase;font-size:11px;color:rgba(255,255,255,0.72);display:flex;align-items:center;gap:8px;}
    .sectionDot{width:8px;height:8px;border-radius:50%;background:var(--gold);}
    .sectionArrow{font-size:14px;transition:transform .2s;color:var(--muted);}
    .sectionArrow.open{transform:rotate(180deg);}
    .sectionBody{display:none;padding:14px;}
    .sectionBody.open{display:block;}
    .divider{height:1px;background:rgba(255,255,255,0.08);}

    /* Timer */
    .timerRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
    .segBtn{
      padding:8px 12px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.86);
      font-weight:700;font-size:10px;letter-spacing:.10em;text-transform:uppercase;
      cursor:pointer;transition:all .15s;
    }
    .segBtn:hover{background:rgba(255,255,255,0.08);}
    .segBtn.on{border-color:rgba(214,178,74,0.35);background:rgba(214,178,74,0.12);}

    .input{
      flex:1;min-width:150px;border-radius:12px;border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);padding:10px 12px;outline:none;color:rgba(255,255,255,0.92);
      font-weight:600;font-size:13px;
    }
    .input:focus{border-color:var(--gold);}

    .timerList{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
    .tCard{
      flex:0 0 auto;width:280px;
      border-radius:18px;border:1px solid rgba(255,255,255,0.12);
      background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      padding:12px;position:relative;
    }
    .tName{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:60px;}
    .tTime{font-family:"Playfair Display",serif;font-size:32px;font-weight:700;margin-top:4px;}
    .tMeta{font-size:11px;color:var(--muted);margin-top:4px;}
    .tTag{
      position:absolute;top:10px;right:10px;
      padding:6px 8px;border-radius:999px;
      font-weight:700;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    }
    .tTag.ok{background:rgba(98,210,111,0.15);border:1px solid rgba(98,210,111,0.30);color:var(--ok);}
    .tTag.warn{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.30);color:var(--warn);}
    .tTag.exp{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.30);color:var(--danger);}
    .barWrap{margin-top:8px;height:6px;border-radius:999px;background:rgba(255,255,255,0.08);overflow:hidden;}
    .barFill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .3s;}
    .barFill.warn{background:linear-gradient(90deg,var(--warn),var(--gold));}
    .barFill.exp{background:linear-gradient(90deg,var(--danger),var(--warn));}
    .tActions{margin-top:8px;display:flex;justify-content:flex-end;}
    .smallBtn{
      padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.85);
      font-weight:700;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
      cursor:pointer;transition:all .15s;
    }
    .smallBtn:hover{background:rgba(255,255,255,0.10);}
    .smallBtn.danger{border-color:rgba(255,107,107,0.30);background:rgba(255,107,107,0.12);}

    /* Tools dropdown */
    .toolsGrid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
      gap:10px;
    }
    .toolItem{
      padding:14px;border-radius:14px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.03);
      cursor:pointer;transition:all .15s;
      display:flex;align-items:center;gap:12px;
    }
    .toolItem:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.18);transform:translateY(-2px);}
    .toolIcon{font-size:24px;}
    .toolInfo{flex:1;}
    .toolName{font-weight:700;font-size:14px;}
    .toolDesc{font-size:11px;color:var(--muted);margin-top:2px;}

    /* Tool viewer */
    .toolViewer{display:none;margin-top:14px;}
    .toolViewer.open{display:block;}
    .toolBar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .frame{width:100%;height:70vh;border:1px solid rgba(255,255,255,0.12);border-radius:18px;background:rgba(0,0,0,0.3);}

    .emptyState{text-align:center;padding:20px;color:var(--muted2);}
    .errBox{padding:10px;background:rgba(255,107,107,0.15);color:var(--danger);border-radius:10px;font-weight:600;font-size:12px;display:none;}
  </style>
</head>

<body>
  <div class="shell">

    <!-- Hero Header -->
    <header class="hero">
      <div class="heroTop">
        <div class="heroLeft">
          <div>
            <div class="logo">Kaiser</div>
            <div class="logoSub">Kitchen Hub</div>
          </div>
        </div>
        <div class="heroRight">
          <div class="pill" id="locPill">📍 —</div>
          <button class="btn ghost sm" id="clockToggle">🕐 Clock</button>
          <button class="btn ghost sm" id="fsBtn">⛶ Full</button>
          <button class="btn ghost sm" id="wakeBtn">☀️ Awake</button>
        </div>
      </div>

      <!-- Toggleable Clock -->
      <div class="clockWrap" id="clockWrap">
        <div class="clockTime" id="clockTime">--:--</div>
        <div class="clockDate" id="clockDate">--</div>
      </div>
    </header>

    <!-- Mini Widgets: Kitchen % + Catering -->
    <div class="widgetGrid">
      <!-- Kitchen % Mini -->
      <div class="widget">
        <div class="widgetHead">
          <div class="widgetTitle"><span class="widgetDot"></span> Kitchen %</div>
          <button class="btn sm ghost" id="refreshKBtn">🔄</button>
        </div>
        <div class="kPctBig" id="kPct">—</div>
        <div class="kPctSub" id="kMeta">Loading...</div>
        <div class="errBox" id="kErr"></div>
      </div>

      <!-- Catering Mini -->
      <div class="widget">
        <div class="widgetHead">
          <div class="widgetTitle"><span class="widgetDot"></span> Catering</div>
          <button class="btn sm ghost" id="refreshCBtn">🔄</button>
        </div>
        <div class="cMiniList" id="cMiniList">
          <div class="cMiniEmpty">Loading...</div>
        </div>
      </div>
    </div>

    <!-- 3-Hour Timer (Collapsible) -->
    <section class="section">
      <div class="sectionHead" id="timerHead">
        <div class="sectionTitle"><span class="sectionDot"></span> 3-Hour Timer <span id="timerCount" style="color:var(--gold);margin-left:6px;">(0)</span></div>
        <span class="sectionArrow" id="timerArrow">▼</span>
      </div>
      <div class="divider"></div>
      <div class="sectionBody open" id="timerBody">
        <div class="timerRow" id="tplRow">
          <button class="segBtn on" data-tpl="Bacon">🥓 Bacon</button>
          <button class="segBtn" data-tpl="Pancakes">🥞 Pancakes</button>
          <button class="segBtn" data-tpl="Free text">✏️ Free</button>
        </div>
        <div class="timerRow">
          <input id="textInput" class="input" placeholder="Optional note..." />
          <button class="btn primary" id="start3hBtn">⏰ 3h</button>
          <button class="btn ghost" id="start30Btn">⏰ 30m</button>
          <button class="btn ghost" id="clearExpBtn">🗑️ Clear</button>
        </div>
        <div class="timerList" id="timerList">
          <div class="emptyState">No active timers</div>
        </div>
      </div>
    </section>

    <!-- Quick Tools (Collapsible) -->
    <section class="section">
      <div class="sectionHead" id="toolsHead">
        <div class="sectionTitle"><span class="sectionDot"></span> Quick Tools</div>
        <span class="sectionArrow" id="toolsArrow">▼</span>
      </div>
      <div class="divider"></div>
      <div class="sectionBody" id="toolsBody">
        <div class="toolsGrid">
          <div class="toolItem" data-url="./MIS.html">
            <div class="toolIcon">📋</div>
            <div class="toolInfo">
              <div class="toolName">MIS</div>
              <div class="toolDesc">Mise en place</div>
            </div>
          </div>
          <div class="toolItem" data-url="./cleaning-kitchen.html">
            <div class="toolIcon">✨</div>
            <div class="toolInfo">
              <div class="toolName">Cleaning</div>
              <div class="toolDesc">Daily/weekly lists</div>
            </div>
          </div>
          <div class="toolItem" data-url="./kitchen-percent.html">
            <div class="toolIcon">📊</div>
            <div class="toolInfo">
              <div class="toolName">Kitchen %</div>
              <div class="toolDesc">Full analytics</div>
            </div>
          </div>
          <div class="toolItem" data-url="./3-timers-regel.html">
            <div class="toolIcon">⏱️</div>
            <div class="toolInfo">
              <div class="toolName">Timer</div>
              <div class="toolDesc">Full timer page</div>
            </div>
          </div>
          <div class="toolItem" data-url="./catering-schedule.html">
            <div class="toolIcon">📅</div>
            <div class="toolInfo">
              <div class="toolName">Catering</div>
              <div class="toolDesc">Full schedule</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Tool Viewer (iframe) -->
    <div class="toolViewer" id="toolViewer">
      <div class="toolBar">
        <div class="pill" id="toolName">—</div>
        <div style="display:flex;gap:8px;">
          <button class="btn ghost sm" id="closeToolBtn">← Back</button>
          <button class="btn ghost sm" id="newTabBtn">↗ New tab</button>
        </div>
      </div>
      <iframe id="toolFrame" class="frame" src="about:blank"></iframe>
    </div>

  </div>

  <script>
    // ============================================================
    // CONFIGURATION - OPDATER DENNE URL!
    // ============================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8ztJIUOk-4GkhkTwHbpJiSOi7uJjPivpWc5skVr0KXJ1m-j3dcVNF3BSe3sbnWIds/exec";
    const TOKEN = "KAISER_TOKEN_2026";
    const VAT_FACTOR = 1.25;

    const LOCATIONS = ["Helsingør", "Hillerød", "Farum", "Hørsholm", "Vanløse"];
    const LOC_KEY = "kaiser_kitchenpct_loc";
    const TIMER_KEY = "kaiser_3timer_v1_1";
    const CLOCK_KEY = "kaiser_clock_visible";

    const DEFAULT_DURATION_MS = 3 * 60 * 60 * 1000;
    const SHORT_DURATION_MS = 30 * 60 * 1000;
    const WARN_30_MS = 30 * 60 * 1000;
    const WARN_10_MS = 10 * 60 * 1000;

    const BASELINE_DATA = {
      "Café Kaiser Hillerød": { revGross: 424048.75, buy: 64582.71 },
      "Café Kaiser Farum": { revGross: 352679.74, buy: 59115.96 },
      "Café Kaiser Hørsholm": { revGross: 377223.23, buy: 45801.28 },
      "Café Kaiser Vanløse": { revGross: 402930.64, buy: 65871.02 },
      "Café Kaiser Helsingør": { revGross: 293146.85, buy: 43294.36 }
    };

    const GREEN_HOURS = 48;
    const YELLOW_HOURS = 168;

    // ============================================================
    // HELPERS
    // ============================================================
    const $ = id => document.getElementById(id);
    const now = () => Date.now();
    const clamp01 = x => Math.max(0, Math.min(1, x));

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    }

    function fmtHHMMSS(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const hh = String(Math.floor(s / 3600)).padStart(2, "0");
      const mm = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function isoToday() {
      return new Date().toISOString().slice(0, 10);
    }

    function monthKey(iso) { return String(iso || "").slice(0, 7); }

    function pctStr(p) {
      if (p === null || !isFinite(p)) return "—";
      return (p * 100).toFixed(1).replace(".", ",") + "%";
    }

    function fmtDKK(n) {
      return Number(n || 0).toLocaleString("da-DK", { style: "currency", currency: "DKK", maximumFractionDigits: 0 });
    }

    function hoursUntil(dateStr, timeStr) {
      const t = (timeStr && /^\d{2}:\d{2}$/.test(timeStr)) ? timeStr : "12:00";
      const dt = new Date(dateStr + "T" + t + ":00");
      return (dt.getTime() - Date.now()) / (3600 * 1000);
    }

    function colorFor(h) {
      if (!isFinite(h) || h < 0) return "gray";
      if (h <= GREEN_HOURS) return "green";
      if (h <= YELLOW_HOURS) return "yellow";
      return "red";
    }

    // ============================================================
    // LOCATION
    // ============================================================
    function getLoc() {
      const fromQS = new URLSearchParams(location.search).get("loc");
      if (fromQS) localStorage.setItem(LOC_KEY, fromQS);
      return localStorage.getItem(LOC_KEY) || "";
    }

    // ============================================================
    // JSONP
    // ============================================================
    function jsonp(url, params) {
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams({ ...params, callback: cb }).toString();
        const src = url + (url.includes("?") ? "&" : "?") + qs;

        const s = document.createElement("script");
        const t = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 15000);

        function cleanup() {
          clearTimeout(t);
          delete window[cb];
          s.remove();
        }

        window[cb] = (data) => { cleanup(); resolve(data); };
        s.src = src;
        s.onerror = () => { cleanup(); reject(new Error("load error")); };
        document.body.appendChild(s);
      });
    }

    // ============================================================
    // CLOCK
    // ============================================================
    let clockVisible = localStorage.getItem(CLOCK_KEY) !== "false";

    function updateClock() {
      const now = new Date();
      $("clockTime").textContent = now.toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" });
      $("clockDate").textContent = now.toLocaleDateString("da-DK", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    }

    function toggleClock() {
      clockVisible = !clockVisible;
      localStorage.setItem(CLOCK_KEY, clockVisible);
      $("clockWrap").classList.toggle("show", clockVisible);
      $("clockToggle").textContent = clockVisible ? "🕐 Hide" : "🕐 Clock";
    }

    // ============================================================
    // KITCHEN %
    // ============================================================
    async function loadKitchenPct() {
      const loc = getLoc();
      const fullLoc = "Café Kaiser " + loc;
      
      if (!loc) {
        $("kPct").textContent = "—";
        $("kMeta").textContent = "No location set";
        return;
      }

      $("kErr").style.display = "none";
      const m = monthKey(isoToday());

      try {
        const data = await jsonp(SCRIPT_URL, { action: "get", loc: fullLoc, month: m });
        
        if (!data || !data.ok) {
          $("kMeta").textContent = "Could not load";
          return;
        }

        const entries = Array.isArray(data.entries) ? data.entries : [];
        const base = BASELINE_DATA[fullLoc] || { revGross: 0, buy: 0 };
        const applyBaseline = m === "2026-03" && !entries.some(e => e.date >= "2026-03-01" && e.date <= "2026-03-10");

        const totalGross = Number(data.totals.revenueGross || 0) + (applyBaseline ? base.revGross : 0);
        const totalBuy = Number(data.totals.purchases || 0) + (applyBaseline ? base.buy : 0);
        const totalNet = totalGross / VAT_FACTOR;
        const pct = totalNet > 0 ? (totalBuy / totalNet) : null;

        $("kPct").textContent = pctStr(pct);
        $("kMeta").textContent = "Purchases: " + fmtDKK(totalBuy);

      } catch (e) {
        $("kMeta").textContent = "Error loading";
      }
    }

    // ============================================================
    // CATERING MINI
    // ============================================================
    async function loadCateringMini() {
      const loc = getLoc();
      
      if (!loc) {
        $("cMiniList").innerHTML = '<div class="cMiniEmpty">No location set</div>';
        return;
      }

      try {
        const data = await jsonp(SCRIPT_URL, { action: "catering_get", loc: loc });

        if (!data || !data.ok || !data.events || !data.events.length) {
          $("cMiniList").innerHTML = '<div class="cMiniEmpty">No upcoming events</div>';
          return;
        }

        const html = data.events.slice(0, 3).map(ev => {
          const h = hoursUntil(ev.date, ev.time);
          const col = colorFor(h);
          const dateStr = ev.date.split('-').reverse().join('/');
          return `
            <div class="cMiniEvent">
              <div class="cMiniBar ${col}"></div>
              <div class="cMiniInfo">
                <div class="cMiniTitle">${escapeHtml(ev.title)}</div>
                <div class="cMiniMeta">${dateStr} ${ev.time ? 'at ' + ev.time : ''} • ${ev.guests || 0} guests</div>
              </div>
            </div>
          `;
        }).join('');

        $("cMiniList").innerHTML = html;

      } catch (e) {
        $("cMiniList").innerHTML = '<div class="cMiniEmpty">Error loading</div>';
      }
    }

    // ============================================================
    // TIMER
    // ============================================================
    let selectedTpl = "Bacon";

    function loadTimers() {
      try {
        const raw = localStorage.getItem(TIMER_KEY);
        if (!raw) return [];
        const obj = JSON.parse(raw);
        return Array.isArray(obj.timers) ? obj.timers : [];
      } catch (e) { return []; }
    }

    function saveTimers(timers) {
      localStorage.setItem(TIMER_KEY, JSON.stringify({ timers: timers || [] }));
    }

    function uid() { return Math.random().toString(16).slice(2) + "_" + Date.now().toString(16); }

    function buildTimerName() {
      const text = ($("textInput").value || "").trim();
      if (selectedTpl === "Free text") return text;
      return text ? (selectedTpl + " – " + text) : selectedTpl;
    }

    function addTimer(durationMs) {
      const name = buildTimerName();
      if (selectedTpl === "Free text" && !name) {
        alert("Enter a name!");
        return;
      }
      const timers = loadTimers();
      timers.push({
        id: uid(),
        name: name || "Unnamed",
        startedAt: now(),
        durationMs: durationMs,
        expiresAt: now() + durationMs
      });
      saveTimers(timers);
      $("textInput").value = "";
      renderTimers();
    }

    function removeTimer(id) {
      saveTimers(loadTimers().filter(t => t.id !== id));
      renderTimers();
    }

    function clearExpired() {
      saveTimers(loadTimers().filter(t => (t.expiresAt || 0) > now()));
      renderTimers();
    }

    function timerState(t) {
      const left = (t.expiresAt || 0) - now();
      if (left <= 0) return "exp";
      if (left <= WARN_10_MS) return "warn";
      if (left <= WARN_30_MS) return "warn";
      return "ok";
    }

    function updateTplUI() {
      document.querySelectorAll("#tplRow .segBtn").forEach(btn => {
        btn.classList.toggle("on", btn.dataset.tpl === selectedTpl);
      });
      $("textInput").placeholder = selectedTpl === "Free text" ? "Name (required)" : "Optional note...";
    }

    function renderTimers() {
      const list = $("timerList");
      const timers = loadTimers().sort((a, b) => (a.expiresAt || 0) - (b.expiresAt || 0));
      
      $("timerCount").textContent = `(${timers.length})`;

      if (!timers.length) {
        list.innerHTML = '<div class="emptyState">No active timers</div>';
        return;
      }

      list.innerHTML = timers.map(t => {
        const left = (t.expiresAt || 0) - now();
        const st = timerState(t);
        const pct = clamp01(left / (t.durationMs || DEFAULT_DURATION_MS)) * 100;
        const tagText = st === "exp" ? "EXPIRED" : (left <= WARN_10_MS ? "10 MIN" : (left <= WARN_30_MS ? "30 MIN" : "OK"));

        return `
          <div class="tCard">
            <div class="tTag ${st}">${tagText}</div>
            <div class="tName">${escapeHtml(t.name)}</div>
            <div class="tTime">${st === "exp" ? "00:00:00" : fmtHHMMSS(left)}</div>
            <div class="tMeta">Ends: ${new Date(t.expiresAt).toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" })}</div>
            <div class="barWrap"><div class="barFill ${st === 'exp' ? 'exp' : st === 'warn' ? 'warn' : ''}" style="width:${st === 'exp' ? 100 : pct}%"></div></div>
            ${st === "exp" ? `<div class="tActions"><button class="smallBtn danger" onclick="removeTimer('${t.id}')">Remove</button></div>` : ''}
          </div>
        `;
      }).join('');
    }

    // ============================================================
    // COLLAPSIBLE SECTIONS
    // ============================================================
    function setupCollapsible(headId, bodyId, arrowId) {
      $(headId).onclick = () => {
        $(bodyId).classList.toggle("open");
        $(arrowId).classList.toggle("open");
      };
    }

    // ============================================================
    // TOOLS
    // ============================================================
    let currentToolUrl = "";

    function openTool(url) {
      currentToolUrl = url;
      $("toolName").textContent = url.replace("./", "");
      $("toolFrame").src = url;
      $("toolViewer").classList.add("open");
      $("toolViewer").scrollIntoView({ behavior: "smooth" });
    }

    function closeTool() {
      $("toolViewer").classList.remove("open");
      $("toolFrame").src = "about:blank";
      currentToolUrl = "";
    }

    // ============================================================
    // FULLSCREEN & WAKE LOCK
    // ============================================================
    let wakeLock = null;

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (e) { }
    }

    async function toggleWakeLock() {
      try {
        if (!("wakeLock" in navigator)) {
          alert("Wake Lock not supported");
          return;
        }
        if (wakeLock) {
          await wakeLock.release();
          wakeLock = null;
          $("wakeBtn").textContent = "☀️ Awake";
          return;
        }
        wakeLock = await navigator.wakeLock.request("screen");
        $("wakeBtn").textContent = "☀️ ON";
        wakeLock.onrelease = () => {
          wakeLock = null;
          $("wakeBtn").textContent = "☀️ Awake";
        };
      } catch (e) {
        alert("Could not enable wake lock");
      }
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    document.querySelectorAll("#tplRow .segBtn").forEach(btn => {
      btn.onclick = () => {
        selectedTpl = btn.dataset.tpl;
        updateTplUI();
      };
    });

    $("start3hBtn").onclick = () => addTimer(DEFAULT_DURATION_MS);
    $("start30Btn").onclick = () => addTimer(SHORT_DURATION_MS);
    $("clearExpBtn").onclick = clearExpired;
    $("textInput").onkeydown = e => { if (e.key === "Enter") addTimer(DEFAULT_DURATION_MS); };

    $("refreshKBtn").onclick = loadKitchenPct;
    $("refreshCBtn").onclick = loadCateringMini;

    $("clockToggle").onclick = toggleClock;
    $("fsBtn").onclick = toggleFullscreen;
    $("wakeBtn").onclick = toggleWakeLock;

    setupCollapsible("timerHead", "timerBody", "timerArrow");
    setupCollapsible("toolsHead", "toolsBody", "toolsArrow");

    document.querySelectorAll(".toolItem").forEach(item => {
      item.onclick = () => openTool(item.dataset.url);
    });

    $("closeToolBtn").onclick = closeTool;
    $("newTabBtn").onclick = () => { if (currentToolUrl) window.open(currentToolUrl, "_blank"); };

    // ============================================================
    // INIT
    // ============================================================
    (function init() {
      const loc = getLoc();
      $("locPill").textContent = "📍 " + (loc || "Not set");

      // Clock
      $("clockWrap").classList.toggle("show", clockVisible);
      $("clockToggle").textContent = clockVisible ? "🕐 Hide" : "🕐 Clock";
      updateClock();

      // Load data
      updateTplUI();
      renderTimers();
      loadKitchenPct();
      loadCateringMini();

      // Intervals
      setInterval(updateClock, 1000);
      setInterval(renderTimers, 1000);
      setInterval(loadKitchenPct, 60000);
      setInterval(loadCateringMini, 60000);
    })();
  </script>
</body>
</html>
