<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Hub – Kaiser</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #05070a;
      --card: rgba(255,255,255,0.03);
      --card-hover: rgba(255,255,255,0.055);
      --border: rgba(255,255,255,0.06);
      --text: #fff;
      --text-muted: rgba(255,255,255,0.5);
      --gold: #bfa14a;
      --gold-glow: rgba(191,161,74,0.25);
      --green: #2ed47a;
      --red: #ff5c5c;
      --orange: #ffaa00;
      --radius: 18px;
      --header-height: 70px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ───────── HEADER ───────── */
    header {
      height: var(--header-height);
      background: linear-gradient(135deg, rgba(30,30,30,0.85), rgba(20,20,20,0.85));
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--gold);
    }

    .logo img {
      height: 38px;
      border-radius: 10px;
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.6; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    #clock {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .back-link {
      font-size: 0.78rem;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid var(--gold);
      padding: 7px 16px;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
    }

    .back-link:hover {
      background: var(--gold);
      color: #000;
    }

    /* ───────── MAIN GRID ───────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 22px;
      padding: 22px 28px 28px;
      overflow: auto;
    }

    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr; }
    }

    /* ───────── 3-TIMERS (FULL WIDTH TOP) ───────── */
    .timers-bar {
      grid-column: 1 / -1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 28px;
      overflow-x: auto;
    }

    .timers-bar h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .timer-group {
      display: flex;
      gap: 16px;
      flex: 1;
      justify-content: center;
      flex-wrap: wrap;
    }

    .timer-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 22px;
      min-width: 150px;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .timer-box.warning {
      border-color: var(--orange);
      box-shadow: 0 0 18px rgba(255,170,0,0.25);
    }

    .timer-box.danger {
      border-color: var(--red);
      box-shadow: 0 0 22px rgba(255,92,92,0.35);
      animation: shake 0.4s infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }

    .timer-box .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .timer-box .time {
      font-size: 1.65rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .timer-box.warning .time { color: var(--orange); }
    .timer-box.danger .time { color: var(--red); }

    .timer-box .controls {
      margin-top: 10px;
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .timer-box .controls button {
      font-size: 0.7rem;
      padding: 5px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s;
    }

    .timer-box .controls button:active { transform: scale(0.94); }

    .btn-start { background: var(--green); color: #000; }
    .btn-pause { background: var(--orange); color: #000; }
    .btn-reset { background: var(--card-hover); color: var(--text-muted); border: 1px solid var(--border) !important; }

    .add-timer-btn {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s;
    }

    .add-timer-btn:hover { transform: scale(1.04); }

    /* ───────── PANELS ───────── */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      min-height: 340px;
      max-height: 520px;
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .panel-header .icon { font-size: 1.1rem; }

    .panel-header .refresh-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.3s;
    }

    .panel-header .refresh-btn:hover {
      transform: rotate(180deg);
      color: var(--gold);
    }

    .panel-body {
      flex: 1;
      padding: 18px 20px;
      overflow-y: auto;
    }

    /* ───────── WIDGET: CATERING ───────── */
    .catering-item {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-left: 4px solid var(--gold);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      transition: background 0.2s, transform 0.2s;
    }

    .catering-item:hover {
      background: rgba(255,255,255,0.045);
      transform: translateX(4px);
    }

    .catering-item:last-child { margin-bottom: 0; }

    .catering-date {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .catering-date.today { color: var(--red); }
    .catering-date.tomorrow { color: var(--orange); }

    .catering-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .catering-info {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .catering-note {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.25);
      border-left: 3px solid var(--text-muted);
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      gap: 8px;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ───────── WIDGET: KITCHEN % ───────── */
    .kitchen-percent-widget {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
    }

    .percent-ring {
      position: relative;
      width: 160px;
      height: 160px;
    }

    .percent-ring svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .percent-ring circle {
      fill: none;
      stroke-width: 12;
    }

    .percent-ring .bg { stroke: var(--border); }

    .percent-ring .fill {
      stroke: var(--gold);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.6s ease;
    }

    .percent-ring .value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 800;
    }

    .percent-label {
      margin-top: 14px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .percent-link {
      margin-top: 16px;
      color: var(--gold);
      font-size: 0.78rem;
      text-decoration: none;
      border: 1px solid var(--gold);
      padding: 8px 18px;
      border-radius: 999px;
      transition: background 0.2s, color 0.2s;
    }

    .percent-link:hover {
      background: var(--gold);
      color: #000;
    }

    /* ───────── TABS PANEL ───────── */
    .tabs-header {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      border-bottom: 2px solid transparent;
    }

    .tab-btn:hover { background: var(--card-hover); }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      background: rgba(191,161,74,0.08);
    }

    .tab-content {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
    }

    .tab-content.active { display: block; }

    /* ───────── TASK ITEMS ───────── */
    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      transition: background 0.2s;
    }

    .task-item:hover { background: var(--card-hover); }
    .task-item:last-child { margin-bottom: 0; }

    .task-checkbox {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .task-checkbox:hover { border-color: var(--gold); }

    .task-checkbox.checked {
      background: var(--green);
      border-color: var(--green);
    }

    .task-checkbox.checked::after {
      content: '✓';
      color: #000;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .task-text {
      flex: 1;
      font-size: 0.88rem;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* ───────── SCROLLBAR ───────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* ───────── MOBILE ───────── */
    @media (max-width: 700px) {
      header { padding: 0 16px; }
      main { padding: 14px; gap: 14px; }
      .timers-bar { padding: 14px; gap: 14px; flex-wrap: wrap; }
      .timer-box { min-width: 120px; padding: 12px 16px; }
      .timer-box .time { font-size: 1.3rem; }
      .panel { min-height: 280px; }
    }
  </style>
</head>
<body>

  <!-- ════════════ HEADER ════════════ -->
  <header>
    <div class="logo">
      <span>👨‍🍳</span>
      <span>Kitchen Hub</span>
    </div>
    <div class="header-center">
      <span class="live-dot"></span>
      <span id="locationName">Indlæser...</span>
    </div>
    <div class="header-right">
      <span id="clock">--:--</span>
      <a href="portal.html" class="back-link">← Portal</a>
    </div>
  </header>

  <!-- ════════════ MAIN ════════════ -->
  <main>

    <!-- ───────── 3-TIMERS BAR ───────── -->
    <section class="timers-bar">
      <h2>⏰ 3-Timers</h2>
      <div class="timer-group" id="timerGroup">
        <!-- Timers rendered by JS -->
      </div>
      <button class="add-timer-btn" onclick="addTimer()">+ Tilføj</button>
    </section>

    <!-- ───────── LEFT: CATERING ───────── -->
    <div class="panel">
      <div class="panel-header">
        <span class="icon">🎉</span>
        Kommende Catering
        <button class="refresh-btn" onclick="loadCatering()" title="Opdater">🔄</button>
      </div>
      <div class="panel-body" id="cateringList">
        <div class="empty-state">
          <div class="spinner"></div>
          <span>Henter catering...</span>
        </div>
      </div>
    </div>

    <!-- ───────── RIGHT: KITCHEN % ───────── -->
    <div class="panel">
      <div class="panel-header">
        <span class="icon">📈</span>
        Kitchen Procent
      </div>
      <div class="panel-body">
        <div class="kitchen-percent-widget">
          <div class="percent-ring">
            <svg viewBox="0 0 100 100">
              <circle class="bg" cx="50" cy="50" r="42"></circle>
              <circle class="fill" id="percentCircle" cx="50" cy="50" r="42" 
                      stroke-dasharray="264" stroke-dashoffset="264"></circle>
            </svg>
            <div class="value" id="percentValue">--%</div>
          </div>
          <div class="percent-label">Dagens Kitchen %</div>
          <a href="kitchen-percent.html" class="percent-link">Åbn beregner →</a>
        </div>
      </div>
    </div>

    <!-- ───────── LEFT: TODO / CLEANING TABS ───────── -->
    <div class="panel" style="grid-column: 1 / -1;">
      <div class="tabs-header">
        <button class="tab-btn active" onclick="switchTab('todo', this)">📋 Daglige Opgaver</button>
        <button class="tab-btn" onclick="switchTab('cleaning', this)">🧹 Rengøring</button>
      </div>
      <div class="tab-content active" id="todoTab">
        <div id="todoList"></div>
      </div>
      <div class="tab-content" id="cleaningTab">
        <div id="cleaningList"></div>
      </div>
    </div>

  </main>

  <!-- ════════════ ALARM SOUND ════════════ -->
  <audio id="alarmSound" preload="auto">
    <source src="data:audio/wav;base64,UklGRl9vT19teleXQVZFZm10IBAAAAABAAEA..." type="audio/wav">
  </audio>

  <script>
    // ═══════════════════════════════════════════════════════════
    // CONFIGURATION
    // ═══════════════════════════════════════════════════════════
    const API_URL = 'https://script.google.com/macros/s/AKfycbw8ztJIUOk-4GkhkTwHbpJiSOi7uJjPivpWc5skVr0KXJ1m-j3dcVNF3BSe3sbnWIds/exec';

    const LOCATIONS = {
      'helsingor': 'Café Kaiser Helsingør',
      'helsingør': 'Café Kaiser Helsingør',
      'hillerod': 'Café Kaiser Hillerød',
      'hillerød': 'Café Kaiser Hillerød',
      'farum': 'Café Kaiser Farum',
      'horsholm': 'Café Kaiser Hørsholm',
      'hørsholm': 'Café Kaiser Hørsholm',
      'vanlose': 'Café Kaiser Vanløse',
      'vanløse': 'Café Kaiser Vanløse'
    };

    const TODO_ITEMS = [
      'Tjek køleskabstemperaturer',
      'Gennemgå dagens catering',
      'Mise en place klar',
      'Tjek lagerbeholdning',
      'Klargør saucer og tilbehør',
      'Rengør arbejdsstation'
    ];

    const CLEANING_ITEMS = [
      'Rengør komfur og ovn',
      'Aftør alle flader',
      'Tøm og rengør friture',
      'Vask gulve',
      'Rengør køleskabe',
      'Tøm skraldespande',
      'Rengør opvasker',
      'Organiser tørvarer'
    ];

    // ═══════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════
    function getUrlParam(param) {
      return new URLSearchParams(window.location.search).get(param) || '';
    }

    function getCurrentLocation() {
      return getUrlParam('loc').toLowerCase();
    }

    function getLocationKey() {
      return getCurrentLocation() || 'default';
    }

    function getLocationDisplayName() {
      const loc = getCurrentLocation();
      return LOCATIONS[loc] || 'Vælg lokation';
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // JSONP Fetch for Google Apps Script
    function jsonpFetch(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        const script = document.createElement('script');
        const timeout = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 12000);

        function cleanup() {
          clearTimeout(timeout);
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[callbackName] = (data) => { cleanup(); resolve(data); };
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
        script.onerror = () => { cleanup(); reject(new Error('Script error')); };
        document.body.appendChild(script);
      });
    }

    // ═══════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('locationName').textContent = getLocationDisplayName();
      
      updateClock();
      setInterval(updateClock, 1000);
      
      initTimers();
      loadCatering();
      loadKitchenPercent();
      renderTodoList();
      renderCleaningList();
      
      // Auto-refresh catering every 60 seconds
      setInterval(loadCatering, 60000);
    });

    // ═══════════════════════════════════════════════════════════
    // CLOCK
    // ═══════════════════════════════════════════════════════════
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      const s = now.getSeconds().toString().padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    }

    // ═══════════════════════════════════════════════════════════
    // 3-TIMERS
    // ═══════════════════════════════════════════════════════════
    let timers = [];
    let timerIntervals = {};

    function initTimers() {
      const saved = localStorage.getItem('kt_timers_' + getLocationKey());
      if (saved) {
        timers = JSON.parse(saved);
        // Restart running timers
        timers.forEach(t => {
          if (t.running) {
            t.running = false;
            startTimer(t.id);
          }
        });
      } else {
        timers = [
          { id: 1, label: 'Timer 1', seconds: 10800, running: false },
          { id: 2, label: 'Timer 2', seconds: 10800, running: false }
        ];
      }
      renderTimers();
    }

    function saveTimers() {
      localStorage.setItem('kt_timers_' + getLocationKey(), JSON.stringify(timers));
    }

    function renderTimers() {
      const container = document.getElementById('timerGroup');
      container.innerHTML = timers.map(t => {
        let statusClass = '';
        if (t.seconds <= 0) statusClass = 'danger';
        else if (t.seconds <= 900) statusClass = 'danger';  // 15 min
        else if (t.seconds <= 1800) statusClass = 'warning'; // 30 min

        return `
          <div class="timer-box ${statusClass}" id="timer-${t.id}">
            <div class="label">${t.label}</div>
            <div class="time">${formatTime(t.seconds)}</div>
            <div class="controls">
              ${t.running
                ? `<button class="btn-pause" onclick="pauseTimer(${t.id})">Pause</button>`
                : `<button class="btn-start" onclick="startTimer(${t.id})">Start</button>`
              }
              <button class="btn-reset" onclick="resetTimer(${t.id})">Reset</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function formatTime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function startTimer(id) {
      const timer = timers.find(t => t.id === id);
      if (!timer || timer.running) return;
      
      timer.running = true;
      saveTimers();
      renderTimers();

      timerIntervals[id] = setInterval(() => {
        timer.seconds--;
        
        // Alarm ved 15 min tilbage
        if (timer.seconds === 900) {
          playAlarm();
        }
        
        // Alarm ved 0
        if (timer.seconds <= 0) {
          timer.seconds = 0;
          pauseTimer(id);
          playAlarm();
        }
        
        saveTimers();
        renderTimers();
      }, 1000);
    }

    function pauseTimer(id) {
      const timer = timers.find(t => t.id === id);
      if (!timer) return;
      
      timer.running = false;
      if (timerIntervals[id]) {
        clearInterval(timerIntervals[id]);
        delete timerIntervals[id];
      }
      saveTimers();
      renderTimers();
    }

    function resetTimer(id) {
      pauseTimer(id);
      const timer = timers.find(t => t.id === id);
      if (timer) {
        timer.seconds = 10800; // 3 hours
      }
      saveTimers();
      renderTimers();
    }

    function addTimer() {
      const newId = timers.length > 0 ? Math.max(...timers.map(t => t.id)) + 1 : 1;
      timers.push({
        id: newId,
        label: `Timer ${newId}`,
        seconds: 10800,
        running: false
      });
      saveTimers();
      renderTimers();
    }

    function playAlarm() {
      // Try to play sound
      try {
        const audio = document.getElementById('alarmSound');
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(() => {});
        }
      } catch (e) {}
      
      // Also try notification
      if (Notification.permission === 'granted') {
        new Notification('⏰ Timer Alert!', { body: '15 minutter tilbage!' });
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission();
      }
    }

    // ═══════════════════════════════════════════════════════════
    // CATERING (Google Sheets)
    // ═══════════════════════════════════════════════════════════
    async function loadCatering() {
      const container = document.getElementById('cateringList');
      const currentLoc = getCurrentLocation();

      container.innerHTML = `
        <div class="empty-state">
          <div class="spinner"></div>
          <span>Henter catering...</span>
        </div>
      `;

      try {
        const data = await jsonpFetch(API_URL + '?action=get');

        if (data.ok && data.events) {
          let events = data.events;

          // Filter by location
          if (currentLoc) {
            events = events.filter(e => {
              if (!e.location) return false;
              const loc = e.location.toLowerCase();
              return loc.includes(currentLoc) || currentLoc.includes(loc);
            });
          }

          // Filter out past events
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          events = events.filter(e => new Date(e.date) >= today);

          // Sort by date
          events.sort((a, b) => new Date(a.date) - new Date(b.date));

          // Render max 5
          renderCatering(events.slice(0, 5));
        } else {
          throw new Error(data.error || 'Ukendt fejl');
        }
      } catch (error) {
        console.error('Catering error:', error);
        container.innerHTML = `
          <div class="empty-state">
            <span>⚠️ Kunne ikke hente catering</span>
            <span style="font-size: 0.75rem; opacity: 0.6;">Klik 🔄 for at prøve igen</span>
          </div>
        `;
      }
    }

    function renderCatering(events) {
      const container = document.getElementById('cateringList');

      if (events.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <span>🎉</span>
            <span>Ingen kommende catering</span>
          </div>
        `;
        return;
      }

      container.innerHTML = events.map(e => {
        const dateInfo = getCateringDateClass(e.date);
        return `
          <div class="catering-item">
            <div class="catering-date ${dateInfo.class}">${dateInfo.text} kl. ${e.time || '--:--'}</div>
            <div class="catering-title">${escapeHtml(e.title) || 'Uden titel'}</div>
            <div class="catering-info">👥 ${e.guests || '?'} gæster</div>
            ${e.note ? `<div class="catering-note">${escapeHtml(e.note)}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function getCateringDateClass(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const diff = Math.floor((date - today) / (1000 * 60 * 60 * 24));

      if (diff === 0) return { text: '🔴 I DAG', class: 'today' };
      if (diff === 1) return { text: '🟡 I MORGEN', class: 'tomorrow' };

      const days = ['Søn', 'Man', 'Tirs', 'Ons', 'Tors', 'Fre', 'Lør'];
      const months = ['jan', 'feb', 'mar', 'apr', 'maj', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
      return {
        text: `📅 ${days[date.getDay()]} ${date.getDate()}. ${months[date.getMonth()]}`,
        class: ''
      };
    }

    // ═══════════════════════════════════════════════════════════
    // KITCHEN PERCENT
    // ═══════════════════════════════════════════════════════════
    function loadKitchenPercent() {
      const saved = localStorage.getItem('kp_today_' + getLocationKey());
      
      if (saved) {
        try {
          const data = JSON.parse(saved);
          const today = new Date().toDateString();
          if (data.date === today && data.percent !== undefined) {
            setKitchenPercent(data.percent);
            return;
          }
        } catch (e) {}
      }
      
      setKitchenPercent(null);
    }

    function setKitchenPercent(percent) {
      const circle = document.getElementById('percentCircle');
      const valueEl = document.getElementById('percentValue');
      const circumference = 264; // 2 * PI * 42

      if (percent === null || percent === undefined) {
        valueEl.textContent = '--%';
        circle.style.strokeDashoffset = circumference;
        return;
      }

      const p = Math.min(100, Math.max(0, percent));
      const offset = circumference - (p / 100) * circumference;
      
      circle.style.strokeDashoffset = offset;
      valueEl.textContent = p.toFixed(1) + '%';

      // Color based on percentage
      if (p < 28) {
        circle.style.stroke = '#2ed47a'; // Green - good
      } else if (p <= 32) {
        circle.style.stroke = '#bfa14a'; // Gold - ok
      } else {
        circle.style.stroke = '#ff5c5c'; // Red - bad
      }
    }

    // ═══════════════════════════════════════════════════════════
    // TABS
    // ═══════════════════════════════════════════════════════════
    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      btn.classList.add('active');
      document.getElementById(tabId + 'Tab').classList.add('active');
    }

    // ═══════════════════════════════════════════════════════════
    // TODO LIST
    // ═══════════════════════════════════════════════════════════
    function renderTodoList() {
      const container = document.getElementById('todoList');
      const saved = JSON.parse(localStorage.getItem('kt_todo_' + getLocationKey()) || '{}');

      container.innerHTML = TODO_ITEMS.map((item, i) => {
        const checked = saved[i] || false;
        return `
          <div class="task-item ${checked ? 'completed' : ''}">
            <div class="task-checkbox ${checked ? 'checked' : ''}" onclick="toggleTodo(${i})"></div>
            <div class="task-text">${item}</div>
          </div>
        `;
      }).join('');
    }

    function toggleTodo(index) {
      const saved = JSON.parse(localStorage.getItem('kt_todo_' + getLocationKey()) || '{}');
      saved[index] = !saved[index];
      localStorage.setItem('kt_todo_' + getLocationKey(), JSON.stringify(saved));
      renderTodoList();
    }

    // ═══════════════════════════════════════════════════════════
    // CLEANING LIST
    // ═══════════════════════════════════════════════════════════
    function renderCleaningList() {
      const container = document.getElementById('cleaningList');
      const saved = JSON.parse(localStorage.getItem('kt_cleaning_' + getLocationKey()) || '{}');

      container.innerHTML = CLEANING_ITEMS.map((item, i) => {
        const checked = saved[i] || false;
        return `
          <div class="task-item ${checked ? 'completed' : ''}">
            <div class="task-checkbox ${checked ? 'checked' : ''}" onclick="toggleCleaning(${i})"></div>
            <div class="task-text">${item}</div>
          </div>
        `;
      }).join('');
    }

    function toggleCleaning(index) {
      const saved = JSON.parse(localStorage.getItem('kt_cleaning_' + getLocationKey()) || '{}');
      saved[index] = !saved[index];
      localStorage.setItem('kt_cleaning_' + getLocationKey(), JSON.stringify(saved));
      renderCleaningList();
    }
  </script>
