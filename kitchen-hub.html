<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- VIGTIGT: Fuld jQuery version for at dropdowns virker -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <style>
    /* DIT ORIGINALE DESIGN */
    body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
    .card { background-color: #1e1e1e; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.2s; }
    .card:hover { transform: translateY(-2px); }
    .card-header { background-color: #2c2c2c; border-bottom: 1px solid #333; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .btn-status { margin-right: 5px; }
    .timer-display { font-family: 'Courier New', monospace; font-size: 1.2rem; font-weight: bold; color: #00ff9d; }
    .detail-row { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .badge-allergies { background-color: #cf6679; color: #000; }
    
    /* Status farver fra dit design */
    .status-Bekræftet { border-left: 5px solid #ffc107; } /* Gul */
    .status-Igang { border-left: 5px solid #0d6efd; } /* Blå */
    .status-Klar { border-left: 5px solid #198754; } /* Grøn */
  </style>
</head>
<body>

<div class="container-fluid mt-4">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4 p-3 rounded" style="background-color: #1e1e1e;">
    <h2 class="m-0"><i class="fas fa-utensils me-2 text-warning"></i>Kitchen Hub <span class="badge bg-dark border border-secondary ms-2">Live</span></h2>
    <div class="d-flex align-items-center">
      <div id="clock" class="me-4 text-white fw-bold fs-5">00:00:00</div>
      <button class="btn btn-outline-light btn-sm" onclick="loadKitchenOrders()"><i class="fas fa-sync-alt"></i> Opdater</button>
    </div>
  </div>

  <!-- Loading og Error beskeder -->
  <div id="loading" class="text-center mt-5">
    <div class="spinner-border text-warning" role="status"></div>
    <p class="mt-2 text-muted">Henter ordrer fra serveren...</p>
  </div>
  
  <div id="error-msg" class="alert alert-danger d-none"></div>

  <!-- Her indsættes kortene dynamisk -->
  <div id="orders-container" class="row"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  $(document).ready(function() {
    loadKitchenOrders();
    setInterval(updateClock, 1000);
    // Auto-refresh hvert minut
    setInterval(loadKitchenOrders, 60000);
  });

  function updateClock() {
    const now = new Date();
    $('#clock').text(now.toLocaleTimeString('da-DK'));
  }

  function loadKitchenOrders() {
    $('#loading').show();
    $('#error-msg').addClass('d-none');
    
    google.script.run
      .withSuccessHandler(renderOrders)
      .withFailureHandler(handleError)
      .getKitchenOrders();
  }

  function renderOrders(orders) {
    $('#loading').hide();
    const container = $('#orders-container');
    container.empty();

    if (!orders || orders.length === 0) {
      container.html('<div class="col-12 text-center text-muted mt-5"><h4><i class="fas fa-check-circle"></i> Alt er stille</h4><p>Ingen aktive ordrer i øjeblikket.</p></div>');
      return;
    }

    orders.forEach(order => {
      // Bestem farver baseret på status (matcher dit design)
      let statusClass = 'status-' + order.status.replace(' ', '');
      let badgeClass = 'bg-secondary';
      if(order.status === 'Bekræftet') badgeClass = 'bg-warning text-dark';
      if(order.status === 'I gang') badgeClass = 'bg-primary';
      if(order.status === 'Klar') badgeClass = 'bg-success';

      const html = `
        <div class="col-md-6 col-lg-4">
          <div class="card ${statusClass}">
            <div class="card-header">
              <div>
                <span class="badge bg-dark border border-secondary me-2">#${order.id.toString().substring(0,6)}</span>
                <i class="far fa-clock"></i> ${order.deliveryTime}
              </div>
              <span class="badge ${badgeClass}">${order.status}</span>
            </div>
            
            <div class="card-body">
              <h4 class="card-title text-white mb-3">${order.menu} <span class="badge bg-light text-dark float-end">${order.guests} pers</span></h4>
              
              ${order.allergies ? `<div class="mb-3"><span class="badge badge-allergies w-100 p-2"><i class="fas fa-exclamation-triangle"></i> ALLERGI: ${order.allergies}</span></div>` : ''}
              
              <div class="detail-row">
                <div class="detail-label">Kunde</div>
                <div class="text-light">${order.customerName}</div>
              </div>

              <div class="detail-row">
                <div class="detail-label">Lokation</div>
                <div class="text-light">${order.location}</div>
              </div>
              
              ${order.requests ? `
              <div class="detail-row">
                <div class="detail-label text-warning">Noter</div>
                <div class="text-warning fst-italic">${order.requests}</div>
              </div>` : ''}
              
              <hr style="border-color: #444;">
              
              <div class="d-flex justify-content-between align-items-center mt-3">
                 <div class="timer-section">
                    ${order.status === 'I gang' ? 
                      `<i class="fas fa-stopwatch text-muted me-2"></i><span class="timer-display" id="timer-${order.id}">00:00</span>` : 
                      ''
                    }
                 </div>
                 <div class="btn-group">
                   ${getButtons(order)}
                 </div>
              </div>
            </div>
          </div>
        </div>
      `;
      container.append(html);
      
      if(order.status === 'I gang') {
        startLocalTimer(order.id);
      }
    });
  }

  function getButtons(order) {
    if (order.status === 'Bekræftet') {
      return `<button class="btn btn-primary btn-sm" onclick="updateStatus('${order.id}', 'I gang')">Start <i class="fas fa-play ms-1"></i></button>`;
    } else if (order.status === 'I gang') {
      return `<button class="btn btn-success btn-sm" onclick="updateStatus('${order.id}', 'Klar')">Færdig <i class="fas fa-check ms-1"></i></button>`;
    } else {
      return `<button class="btn btn-secondary btn-sm" disabled>Afsluttet</button>`;
    }
  }

  function updateStatus(id, status) {
    // Visuel feedback
    const btn = event.target.closest('button');
    $(btn).prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span>');

    google.script.run
      .withSuccessHandler(function() {
        loadKitchenOrders(); 
      })
      .withFailureHandler(handleError)
      .updateOrderStatus(id, status);
  }

  function startLocalTimer(id) {
    let seconds = 0;
    setInterval(function() {
        seconds++;
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        $(`#timer-${id}`).text((m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s);
    }, 1000);
  }

  function handleError(error) {
    $('#loading').hide();
    $('#error-msg').text("Fejl: " + error.message).removeClass('d-none');
  }
</script>
</body>
</html>
