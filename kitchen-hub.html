<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Kitchen Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#0d1117;
      --bg1:#161b22;
      --bg2:#21262d;
      --text:rgba(255,255,255,0.95);
      --muted:rgba(255,255,255,0.80);
      --muted2:rgba(255,255,255,0.60);
      --gold:#d6b24a;
      --gold2:#b9921f;
      --danger:#ff6b6b;
      --warn:#f59e0b;
      --ok:#62d26f;
      --shadow: 0 20px 60px rgba(0,0,0,.40);
      --shadow2: 0 12px 40px rgba(0,0,0,.30);
    }

    *{box-sizing:border-box;}
    html,body{height:100%;margin:0;}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.12), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.10), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 50%, var(--bg0));
      overflow-x:hidden;
    }
    body:before{
      content:""; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity:0.08; pointer-events:none;
    }

    .shell{max-width:1400px; margin:0 auto; padding:18px 16px 44px;}

    .hero{
      border-radius: 28px;
      border:1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(900px 260px at 50% 0%, rgba(255,255,255,0.10), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      padding: 22px 18px 16px;
      position:relative; overflow:hidden;
    }
    .hero:after{
      content:""; position:absolute; inset:-2px;
      background:
        radial-gradient(700px 240px at 20% 0%, rgba(245,158,11,0.20), transparent 60%),
        radial-gradient(700px 240px at 80% 0%, rgba(56,189,248,0.16), transparent 60%);
      opacity:.6; pointer-events:none;
    }

    .kicker{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted2);font-weight:900;text-align:center;position:relative;z-index:1;}
    .title{font-family:"Playfair Display",serif;font-size:clamp(32px,8vw,48px);line-height:1.02;letter-spacing:-0.02em;font-weight:700;text-align:center;margin-top:8px;position:relative;z-index:1;}
    .subtitle{color:var(--muted);font-weight:700;font-size:14px;text-align:center;margin-top:8px;position:relative;z-index:1;}
    .goldline{height:2px;margin:16px auto 0;max-width:720px;border-radius:999px;background:linear-gradient(90deg,transparent,rgba(214,178,74,0.95),transparent);position:relative;z-index:1;}

    .controls{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;position:relative;z-index:1;}

    .pill,.btn{
      display:inline-flex;align-items:center;justify-content:center;gap:6px;
      padding:10px 14px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:11px;
      color: rgba(255,255,255,0.92);white-space:nowrap;user-select:none;
    }
    .btn{cursor:pointer;transition:all .15s ease;}
    .btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.25);}
    .btn:active{transform:translateY(1px);}
    .btn.primary{border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0b0c0f;}
    .btn.ghost{background:rgba(255,255,255,0.08);}
    .btn.on{background:rgba(214,178,74,0.20);border-color:rgba(214,178,74,0.40);color:var(--gold);}

    .clockWrap{position:relative;z-index:1;margin-top:16px;text-align:center;display:none;}
    .clockWrap.show{display:block;}
    .clockTime{font-family:"Playfair Display",serif;font-size:72px;font-weight:700;line-height:1;letter-spacing:-0.02em;}
    .clockDate{font-size:16px;font-weight:600;color:var(--muted);margin-top:6px;}

    .widgetGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      margin-top:16px;
    }
    @media (max-width: 700px){
      .widgetGrid{grid-template-columns:1fr;}
    }

    .widget{
      border-radius:22px;
      border:1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      padding:16px;
      position:relative;
    }
    .widgetHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
    .widgetTitle{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);display:flex;align-items:center;gap:8px;}
    .widgetDot{width:8px;height:8px;border-radius:50%;background:var(--gold);}

    .kPctBig{font-family:"Playfair Display",serif;font-size:48px;font-weight:700;line-height:1;}
    .kPctSub{font-size:13px;font-weight:600;color:var(--muted);margin-top:6px;}

    .cMiniList{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow:auto;}
    .cMiniEvent{
      display:flex;align-items:center;gap:10px;
      padding:12px;border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      transition:all .15s;
    }
    .cMiniEvent:hover{background:rgba(255,255,255,0.08);}
    .cMiniBar{width:5px;height:40px;border-radius:4px;flex:0 0 auto;}
    .cMiniBar.green{background:var(--ok);}
    .cMiniBar.yellow{background:var(--warn);}
    .cMiniBar.red{background:var(--danger);}
    .cMiniBar.gray{background:rgba(255,255,255,0.3);}
    .cMiniInfo{flex:1;min-width:0;}
    .cMiniTitle{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cMiniMeta{font-size:12px;color:var(--muted);margin-top:3px;}
    .cMiniEmpty{text-align:center;padding:24px;color:var(--muted2);font-size:13px;}

    .section{
      margin-top:16px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      overflow:hidden;
    }
    .sectionHead{
      padding:14px 16px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      background:rgba(255,255,255,0.03);
      cursor:pointer;
      user-select:none;
      transition:background .15s;
    }
    .sectionHead:hover{background:rgba(255,255,255,0.06);}
    .sectionTitle{font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:10px;}
    .sectionDot{width:10px;height:10px;border-radius:50%;background:var(--gold);}
    .sectionRight{display:flex;align-items:center;gap:10px;}
    .sectionCount{font-size:12px;font-weight:700;color:var(--gold);}
    .sectionArrow{font-size:14px;transition:transform .2s;color:var(--muted);}
    .sectionArrow.open{transform:rotate(180deg);}
    .sectionBody{display:none;padding:16px;}
    .sectionBody.open{display:block;}
    .divider{height:1px;background:rgba(255,255,255,0.10);}

    .timerRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
    .segBtn{
      padding:10px 14px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.90);
      font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
      cursor:pointer;transition:all .15s;
    }
    .segBtn:hover{background:rgba(255,255,255,0.10);}
    .segBtn.on{border-color:rgba(214,178,74,0.40);background:rgba(214,178,74,0.15);color:var(--gold);}

    .input{
      flex:1;min-width:150px;border-radius:14px;border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.08);padding:12px 14px;outline:none;color:var(--text);
      font-weight:600;font-size:14px;transition:all .15s;
    }
    .input:focus{border-color:var(--gold);background:rgba(255,255,255,0.10);}
    .input::placeholder{color:rgba(255,255,255,0.45);}

    .timerList{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;}
    .timerList::-webkit-scrollbar{height:6px;}
    .timerList::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:10px;}

    .tCard{
      flex:0 0 auto;width:300px;
      border-radius:20px;border:1px solid rgba(255,255,255,0.12);
      background:linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
      padding:14px;position:relative;
      transition:all .15s;
    }
    .tCard:hover{border-color:rgba(255,255,255,0.20);transform:translateY(-2px);}
    .tName{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:70px;}
    .tTime{font-family:"Playfair Display",serif;font-size:36px;font-weight:700;margin-top:6px;}
    .tMeta{font-size:12px;color:var(--muted);margin-top:6px;}
    .tTag{
      position:absolute;top:12px;right:12px;
      padding:6px 10px;border-radius:999px;
      font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    }
    .tTag.ok{background:rgba(98,210,111,0.18);border:1px solid rgba(98,210,111,0.35);color:var(--ok);}
    .tTag.warn{background:rgba(245,158,11,0.18);border:1px solid rgba(245,158,11,0.35);color:var(--warn);}
    .tTag.exp{background:rgba(255,107,107,0.18);border:1px solid rgba(255,107,107,0.35);color:var(--danger);}

    .barWrap{margin-top:10px;height:8px;border-radius:999px;background:rgba(255,255,255,0.10);overflow:hidden;}
    .barFill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .3s;}
    .barFill.warn{background:linear-gradient(90deg,var(--warn),var(--gold));}
    .barFill.exp{background:linear-gradient(90deg,var(--danger),var(--warn));}

    .tActions{margin-top:10px;display:flex;gap:8px;justify-content:flex-end;}
    .smallBtn{
      padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.90);
      font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
      cursor:pointer;transition:all .15s;
    }
    .smallBtn:hover{background:rgba(255,255,255,0.12);}
    .smallBtn.danger{border-color:rgba(255,107,107,0.35);background:rgba(255,107,107,0.15);color:var(--danger);}
    .smallBtn.danger:hover{background:rgba(255,107,107,0.25);}

    .toolsGrid{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
      gap:12px;
    }
    .toolItem{
      padding:16px;border-radius:16px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      cursor:pointer;transition:all .15s;
      display:flex;align-items:center;gap:14px;
    }
    .toolItem:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.20);transform:translateY(-2px);}
    .toolIcon{font-size:28px;}
    .toolInfo{flex:1;}
    .toolName{font-weight:700;font-size:15px;}
    .toolDesc{font-size:12px;color:var(--muted);margin-top:3px;}

    .toolViewer{display:none;margin-top:16px;}
    .toolViewer.open{display:block;}
    .toolBar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .frame{width:100%;height:70vh;border:1px solid rgba(255,255,255,0.12);border-radius:20px;background:rgba(0,0,0,0.25);}

    .emptyState{text-align:center;padding:30px;color:var(--muted2);font-size:13px;}
    .errBox{padding:12px;background:rgba(255,107,107,0.15);color:var(--danger);border-radius:12px;font-weight:600;font-size:13px;display:none;margin-top:10px;}
  </style>
</head>

<body>
  <div class="shell">

    <header class="hero">
      <div class="kicker">KAISER</div>
      <div class="title">Kitchen Hub</div>
      <div class="subtitle">One screen for all kitchen tools</div>
      <div class="goldline"></div>

      <div class="controls">
        <div class="pill" id="locPill">📍 Location: —</div>
        <button class="btn ghost" id="clockToggle" type="button">🕐 Show Clock</button>
        <button class="btn ghost" id="fsBtn" type="button">⛶ Fullscreen</button>
        <button class="btn ghost" id="wakeBtn" type="button">☀️ Keep Awake</button>
      </div>

      <div class="clockWrap" id="clockWrap">
        <div class="clockTime" id="clockTime">--:--</div>
        <div class="clockDate" id="clockDate">--</div>
      </div>
    </header>

    <div class="widgetGrid">
      <div class="widget">
        <div class="widgetHead">
          <div class="widgetTitle"><span class="widgetDot"></span> Kitchen %</div>
          <button class="btn ghost" style="padding:6px 10px;font-size:10px;" id="refreshKBtn" type="button">🔄 Refresh</button>
        </div>
        <div class="kPctBig" id="kPct">—</div>
        <div class="kPctSub" id="kMeta">Loading...</div>
        <div class="errBox" id="kErr"></div>
      </div>

      <div class="widget">
        <div class="widgetHead">
          <div class="widgetTitle"><span class="widgetDot"></span> Catering Events</div>
          <button class="btn ghost" style="padding:6px 10px;font-size:10px;" id="refreshCBtn" type="button">🔄 Refresh</button>
        </div>
        <div class="cMiniList" id="cMiniList">
          <div class="cMiniEmpty">Loading...</div>
        </div>
      </div>
    </div>

    <section class="section">
      <div class="sectionHead" id="timerHead">
        <div class="sectionTitle"><span class="sectionDot"></span> 3-Hour Timer</div>
        <div class="sectionRight">
          <span class="sectionCount" id="timerCount">0 active</span>
          <span class="sectionArrow open" id="timerArrow">▼</span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="sectionBody open" id="timerBody">
        <div class="timerRow" id="tplRow">
          <button class="segBtn on" data-tpl="Bacon" type="button">🥓 Bacon</button>
          <button class="segBtn" data-tpl="Pancakes" type="button">🥞 Pancakes</button>
          <button class="segBtn" data-tpl="Free text" type="button">✏️ Free text</button>
        </div>
        <div class="timerRow">
          <input id="textInput" class="input" placeholder="Optional note (e.g. tray 2)" />
          <button class="btn primary" id="start3hBtn" type="button">⏰ Start 3h</button>
          <button class="btn ghost" id="clearExpBtn" type="button">🗑️ Clear Expired</button>
        </div>
        <div class="timerList" id="timerList">
          <div class="emptyState">No active timers — start one above</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="sectionHead" id="toolsHead">
        <div class="sectionTitle"><span class="sectionDot"></span> Quick Tools</div>
        <div class="sectionRight">
          <span class="sectionArrow" id="toolsArrow">▼</span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="sectionBody" id="toolsBody">
        <div class="toolsGrid">
          <div class="toolItem" data-url="./MIS.html">
            <div class="toolIcon">📋</div>
            <div class="toolInfo">
              <div class="toolName">MIS</div>
              <div class="toolDesc">Mise en place overview</div>
            </div>
          </div>
          <div class="toolItem" data-url="./cleaning-kitchen.html">
            <div class="toolIcon">✨</div>
            <div class="toolInfo">
              <div class="toolName">Cleaning</div>
              <div class="toolDesc">Daily & weekly lists</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="toolViewer" id="toolViewer">
      <div class="toolBar">
        <div class="pill" id="toolName">—</div>
        <div style="display:flex;gap:8px;">
          <button class="btn ghost" id="closeToolBtn" type="button">← Back to Hub</button>
          <button class="btn ghost" id="newTabBtn" type="button">↗ Open in New Tab</button>
        </div>
      </div>
      <iframe id="toolFrame" class="frame" src="about:blank" referrerpolicy="no-referrer"></iframe>
    </div>

  </div>

  <script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8ztJIUOk-4GkhkTwHbpJiSOi7uJjPivpWc5skVr0KXJ1m-j3dcVNF3BSe3sbnWIds/exec";
    const VAT_FACTOR = 1.25;

    const LOC_KEY = "kaiser_kitchenpct_loc";
    const TIMER_KEY = "kaiser_3timer_v1_1";
    const CLOCK_KEY = "kaiser_clock_visible";
    const TIMER_ALARM_KEY = "kaiser_timer_alarm_fired_v1";

    const DEFAULT_DURATION_MS = 3 * 60 * 60 * 1000;
    const WARN_30_MS = 30 * 60 * 1000;
    const WARN_10_MS = 10 * 60 * 1000;
    const ALARM_AT_MS = 15 * 60 * 1000;

    const BASELINE_DATA = {
      "Café Kaiser Hillerød": { revGross: 424048.75, buy: 64582.71 },
      "Café Kaiser Farum": { revGross: 352679.74, buy: 59115.96 },
      "Café Kaiser Hørsholm": { revGross: 377223.23, buy: 45801.28 },
      "Café Kaiser Vanløse": { revGross: 402930.64, buy: 65871.02 },
      "Café Kaiser Helsingør": { revGross: 293146.85, buy: 43294.36 }
    };

    const GREEN_HOURS = 48;
    const YELLOW_HOURS = 168;

    // ============================================================
    // HELPERS
    // ============================================================
    const $ = id => document.getElementById(id);
    const nowTs = () => Date.now();
    const clamp01 = x => Math.max(0, Math.min(1, x));

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    }

    function fmtHHMMSS(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const hh = String(Math.floor(s / 3600)).padStart(2, "0");
      const mm = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
      const ss = String(s % 60).padStart(2, "0");
      return `${hh}:${mm}:${ss}`;
    }

    function isoTodayLocal() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function monthKey(iso) {
      return String(iso || "").slice(0, 7);
    }

    function pctStr(p) {
      if (p === null || !isFinite(p)) return "—";
      return (p * 100).toFixed(1).replace(".", ",") + "%";
    }

    function fmtDKK(n) {
      return Number(n || 0).toLocaleString("da-DK", {
        style: "currency",
        currency: "DKK",
        maximumFractionDigits: 0
      });
    }

    function colorFor(h) {
      if (!isFinite(h) || h < 0) return "gray";
      if (h <= GREEN_HOURS) return "green";
      if (h <= YELLOW_HOURS) return "yellow";
      return "red";
    }

    function parseLocalDateTime(dateStr, timeStr) {
      if (!dateStr) return NaN;
      const t = (timeStr && /^\d{2}:\d{2}$/.test(timeStr)) ? timeStr : "12:00";
      const [y, m, d] = String(dateStr).split("-").map(Number);
      const [hh, mm] = String(t).split(":").map(Number);

      if (!y || !m || !d) return NaN;
      return new Date(y, m - 1, d, hh || 0, mm || 0, 0, 0).getTime();
    }

    function sameYMD(dateStr, ymd) {
      return String(dateStr || "").trim() === String(ymd || "").trim();
    }

    // ============================================================
    // LOCATION
    // ============================================================
    function getLoc() {
      const fromQS = new URLSearchParams(location.search).get("loc");
      if (fromQS) localStorage.setItem(LOC_KEY, fromQS);
      return localStorage.getItem(LOC_KEY) || "";
    }

    // ============================================================
    // JSONP
    // ============================================================
    function jsonp(url, params = {}) {
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams({ ...params, callback: cb }).toString();
        const src = url + (url.includes("?") ? "&" : "?") + qs;

        const s = document.createElement("script");
        const t = setTimeout(() => {
          cleanup();
          reject(new Error("timeout"));
        }, 15000);

        function cleanup() {
          clearTimeout(t);
          try { delete window[cb]; } catch (_) {}
          if (s.parentNode) s.parentNode.removeChild(s);
        }

        window[cb] = (data) => {
          cleanup();
          resolve(data);
        };

        s.src = src;
        s.async = true;
        s.onerror = () => {
          cleanup();
          reject(new Error("load error"));
        };

        document.body.appendChild(s);
      });
    }

    // ============================================================
    // CLOCK
    // ============================================================
    let clockVisible = localStorage.getItem(CLOCK_KEY) === "true";

    function updateClock() {
      const d = new Date();
      $("clockTime").textContent = d.toLocaleTimeString("da-DK", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
      $("clockDate").textContent = d.toLocaleDateString("da-DK", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function toggleClock() {
      clockVisible = !clockVisible;
      localStorage.setItem(CLOCK_KEY, String(clockVisible));
      updateClockUI();
    }

    function updateClockUI() {
      $("clockWrap").classList.toggle("show", clockVisible);
      $("clockToggle").textContent = clockVisible ? "🕐 Hide Clock" : "🕐 Show Clock";
      $("clockToggle").classList.toggle("on", clockVisible);
    }

    // ============================================================
    // KITCHEN %
    // ============================================================
    async function loadKitchenPct() {
      const loc = getLoc();
      const fullLoc = loc ? ("Café Kaiser " + loc) : "";

      if (!loc) {
        $("kPct").textContent = "—";
        $("kMeta").textContent = "No location set";
        $("kErr").style.display = "none";
        return;
      }

      $("kErr").style.display = "none";
      const m = monthKey(isoTodayLocal());

      try {
        const data = await jsonp(SCRIPT_URL, { action: "get", loc: fullLoc, month: m });

        if (!data || !data.ok) {
          $("kPct").textContent = "—";
          $("kMeta").textContent = "Could not load";
          $("kErr").textContent = "Kitchen % data could not be loaded.";
          $("kErr").style.display = "block";
          return;
        }

        const entries = Array.isArray(data.entries) ? data.entries : [];
        const base = BASELINE_DATA[fullLoc] || { revGross: 0, buy: 0 };
        const applyBaseline = m === "2026-03" && !entries.some(e => e.date >= "2026-03-01" && e.date <= "2026-03-10");

        const totalGross = Number(data?.totals?.revenueGross || 0) + (applyBaseline ? base.revGross : 0);
        const totalBuy = Number(data?.totals?.purchases || 0) + (applyBaseline ? base.buy : 0);
        const totalNet = totalGross / VAT_FACTOR;
        const pct = totalNet > 0 ? (totalBuy / totalNet) : null;

        $("kPct").textContent = pctStr(pct);
        $("kMeta").textContent = "MTD Purchases: " + fmtDKK(totalBuy);
      } catch (e) {
        console.error("Kitchen % load error:", e);
        $("kPct").textContent = "—";
        $("kMeta").textContent = "Error loading";
        $("kErr").textContent = "Kitchen % could not be loaded.";
        $("kErr").style.display = "block";
      }
    }

    // ============================================================
    // CATERING MINI
    // Shows events for selected location:
    // - all events from TODAY and forward
    // - sorted by date/time
    // - max 3 shown
    // ============================================================
    async function loadCateringMini() {
      const loc = getLoc();

      if (!loc) {
        $("cMiniList").innerHTML = '<div class="cMiniEmpty">📍 No location set</div>';
        return;
      }

      try {
        const data = await jsonp(SCRIPT_URL, { action: "getOrders" });

        if (!data || !data.ok || !Array.isArray(data.orders)) {
          $("cMiniList").innerHTML = '<div class="cMiniEmpty">📅 No catering data</div>';
          return;
        }

        const todayYMD = isoTodayLocal();
        const startOfToday = parseLocalDateTime(todayYMD, "00:00");

        const events = data.orders
          .filter(o => {
            const orderLoc = String(o.location || "").trim().toLowerCase();
            const currentLoc = String(loc || "").trim().toLowerCase();
            return orderLoc === currentLoc;
          })
          .map(o => {
            const date = String(o.deliveryDate || "").trim();
            const time = (o.deliveryTime && /^\d{2}:\d{2}$/.test(o.deliveryTime)) ? o.deliveryTime : "12:00";
            const ts = parseLocalDateTime(date, time);

            return {
              title: o.customerName || "Catering",
              date,
              time,
              guests: o.guests || 0,
              note: o.note || "",
              ts,
              isToday: sameYMD(date, todayYMD)
            };
          })
          .filter(ev => isFinite(ev.ts) && ev.ts >= startOfToday)
          .sort((a, b) => a.ts - b.ts)
          .slice(0, 3);

        if (!events.length) {
          $("cMiniList").innerHTML = '<div class="cMiniEmpty">📅 No events today/upcoming</div>';
          return;
        }

        $("cMiniList").innerHTML = events.map(ev => {
          const h = (ev.ts - Date.now()) / (3600 * 1000);
          const col = colorFor(h);
          const dateStr = ev.date ? ev.date.split("-").reverse().join("/") : "--/--/----";
          const todayBadge = ev.isToday ? " • Today" : "";

          return `
            <div class="cMiniEvent">
              <div class="cMiniBar ${col}"></div>
              <div class="cMiniInfo">
                <div class="cMiniTitle">${escapeHtml(ev.title)}</div>
                <div class="cMiniMeta">📅 ${dateStr} ⏰ ${escapeHtml(ev.time)} • 👥 ${escapeHtml(ev.guests)}${todayBadge}</div>
              </div>
            </div>
          `;
        }).join("");
      } catch (e) {
        console.error("Catering load error:", e);
        $("cMiniList").innerHTML = '<div class="cMiniEmpty">❌ Error loading</div>';
      }
    }

    // ============================================================
    // TIMER
    // ============================================================
    let selectedTpl = "Bacon";
    let audioReady = false;

    function loadTimers() {
      try {
        const raw = localStorage.getItem(TIMER_KEY);
        if (!raw) return [];
        const obj = JSON.parse(raw);
        return Array.isArray(obj.timers) ? obj.timers : [];
      } catch (e) {
        return [];
      }
    }

    function saveTimers(timers) {
      localStorage.setItem(TIMER_KEY, JSON.stringify({ timers: timers || [] }));
    }

    function loadAlarmState() {
      try {
        return JSON.parse(localStorage.getItem(TIMER_ALARM_KEY) || "{}");
      } catch (e) {
        return {};
      }
    }

    function saveAlarmState(state) {
      localStorage.setItem(TIMER_ALARM_KEY, JSON.stringify(state || {}));
    }

    function cleanupAlarmState(timers) {
      const ids = new Set((timers || []).map(t => t.id));
      const state = loadAlarmState();
      let changed = false;

      Object.keys(state).forEach(id => {
        if (!ids.has(id)) {
          delete state[id];
          changed = true;
        }
      });

      if (changed) saveAlarmState(state);
    }

    function uid() {
      return Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
    }

    function buildTimerName() {
      const text = ($("textInput").value || "").trim();
      if (selectedTpl === "Free text") return text;
      return text ? (selectedTpl + " – " + text) : selectedTpl;
    }

    function addTimer(durationMs) {
      const name = buildTimerName();

      if (selectedTpl === "Free text" && !name) {
        alert("Please enter a name!");
        $("textInput").focus();
        return;
      }

      const timers = loadTimers();
      const newTimer = {
        id: uid(),
        name: name || "Unnamed",
        startedAt: nowTs(),
        durationMs: durationMs,
        expiresAt: nowTs() + durationMs
      };

      timers.push(newTimer);
      saveTimers(timers);

      const fired = loadAlarmState();
      delete fired[newTimer.id];
      saveAlarmState(fired);

      $("textInput").value = "";
      renderTimers();
    }

    function stopTimer(id) {
      if (confirm("Stop this timer?")) {
        const next = loadTimers().filter(t => t.id !== id);
        saveTimers(next);

        const fired = loadAlarmState();
        delete fired[id];
        saveAlarmState(fired);

        renderTimers();
      }
    }

    function clearExpired() {
      const timers = loadTimers();
      const active = timers.filter(t => (t.expiresAt || 0) > nowTs());
      const removed = timers.length - active.length;

      saveTimers(active);
      cleanupAlarmState(active);
      renderTimers();

      if (removed > 0) {
        alert(`Removed ${removed} expired timer(s)`);
      }
    }

    function timerState(t) {
      const left = (t.expiresAt || 0) - nowTs();
      if (left <= 0) return "exp";
      if (left <= WARN_10_MS) return "warn";
      if (left <= WARN_30_MS) return "warn";
      return "ok";
    }

    function updateTplUI() {
      document.querySelectorAll("#tplRow .segBtn").forEach(btn => {
        btn.classList.toggle("on", btn.dataset.tpl === selectedTpl);
      });
      $("textInput").placeholder = selectedTpl === "Free text"
        ? "Name (required)"
        : "Optional note (e.g. tray 2)";
    }

    function renderTimers() {
      const list = $("timerList");
      const timers = loadTimers().sort((a, b) => (a.expiresAt || 0) - (b.expiresAt || 0));

      $("timerCount").textContent = `${timers.length} active`;

      if (!timers.length) {
        list.innerHTML = '<div class="emptyState">No active timers — start one above</div>';
        return;
      }

      list.innerHTML = timers.map(t => {
        const left = (t.expiresAt || 0) - nowTs();
        const st = timerState(t);
        const pct = clamp01(left / (t.durationMs || DEFAULT_DURATION_MS)) * 100;
        const tagText = st === "exp"
          ? "EXPIRED"
          : (left <= WARN_10_MS ? "⚠️ 10 MIN" : (left <= WARN_30_MS ? "⚠️ 30 MIN" : "✓ OK"));

        return `
          <div class="tCard">
            <div class="tTag ${st}">${tagText}</div>
            <div class="tName">${escapeHtml(t.name)}</div>
            <div class="tTime">${st === "exp" ? "00:00:00" : fmtHHMMSS(left)}</div>
            <div class="tMeta">Ends: ${new Date(t.expiresAt).toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" })}</div>
            <div class="barWrap">
              <div class="barFill ${st === "exp" ? "exp" : st === "warn" ? "warn" : ""}" style="width:${st === "exp" ? 100 : pct}%"></div>
            </div>
            <div class="tActions">
              <button class="smallBtn danger" type="button" data-stop-id="${escapeHtml(t.id)}">🛑 Stop</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function enableAudio() {
      audioReady = true;
    }

    function playAlarm() {
      if (!audioReady) return;

      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        const ctx = new AudioCtx();
        if (ctx.state === "suspended") {
          ctx.resume().catch(() => {});
        }

        const notes = [
          { f: 880, d: 0.20 },
          { f: 988, d: 0.20 },
          { f: 1047, d: 0.25 },
          { f: 880, d: 0.20 }
        ];

        let start = ctx.currentTime;

        notes.forEach(n => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.type = "sine";
          osc.frequency.setValueAtTime(n.f, start);

          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.20, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + n.d);

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.start(start);
          osc.stop(start + n.d);

          start += n.d + 0.03;
        });

        setTimeout(() => {
          try { ctx.close(); } catch (_) {}
        }, 1500);
      } catch (e) {
        console.error("Alarm error:", e);
      }
    }

    function checkTimerAlarms() {
      const timers = loadTimers();
      const fired = loadAlarmState();
      let changed = false;

      timers.forEach(t => {
        const left = (t.expiresAt || 0) - nowTs();
        if (left > 0 && left <= ALARM_AT_MS && !fired[t.id]) {
          playAlarm();
          fired[t.id] = true;
          changed = true;
        }
      });

      if (changed) saveAlarmState(fired);
      cleanupAlarmState(timers);
    }

    // ============================================================
    // COLLAPSIBLE SECTIONS
    // ============================================================
    function setupCollapsible(headId, bodyId, arrowId) {
      $(headId).addEventListener("click", () => {
        $(bodyId).classList.toggle("open");
        $(arrowId).classList.toggle("open");
      });
    }

    // ============================================================
    // TOOLS
    // ============================================================
    let currentToolUrl = "";

    function openTool(url) {
      if (!url) return;
      currentToolUrl = url;
      $("toolName").textContent = url.replace("./", "");
      $("toolFrame").src = url;
      $("toolViewer").classList.add("open");
      $("toolViewer").scrollIntoView({ behavior: "smooth" });
    }

    function closeTool() {
      $("toolViewer").classList.remove("open");
      $("toolFrame").src = "about:blank";
      currentToolUrl = "";
    }

    // ============================================================
    // FULLSCREEN & WAKE LOCK
    // ============================================================
    let wakeLock = null;

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
        else await document.exitFullscreen();
      } catch (_) {}
    }

    async function toggleWakeLock() {
      try {
        if (!("wakeLock" in navigator)) {
          alert("Wake Lock not supported on this device");
          return;
        }

        if (wakeLock) {
          await wakeLock.release();
          wakeLock = null;
          $("wakeBtn").textContent = "☀️ Keep Awake";
          $("wakeBtn").classList.remove("on");
          return;
        }

        wakeLock = await navigator.wakeLock.request("screen");
        $("wakeBtn").textContent = "☀️ Awake ON";
        $("wakeBtn").classList.add("on");

        wakeLock.onrelease = () => {
          wakeLock = null;
          $("wakeBtn").textContent = "☀️ Keep Awake";
          $("wakeBtn").classList.remove("on");
        };
      } catch (_) {
        alert("Could not enable wake lock");
      }
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    document.addEventListener("click", enableAudio, { once: true });
    document.addEventListener("touchstart", enableAudio, { once: true });

    document.querySelectorAll("#tplRow .segBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        selectedTpl = btn.dataset.tpl;
        updateTplUI();
      });
    });

    $("start3hBtn").addEventListener("click", () => addTimer(DEFAULT_DURATION_MS));
    $("clearExpBtn").addEventListener("click", clearExpired);
    $("textInput").addEventListener("keydown", e => {
      if (e.key === "Enter") addTimer(DEFAULT_DURATION_MS);
    });

    $("refreshKBtn").addEventListener("click", loadKitchenPct);
    $("refreshCBtn").addEventListener("click", loadCateringMini);

    $("clockToggle").addEventListener("click", toggleClock);
    $("fsBtn").addEventListener("click", toggleFullscreen);
    $("wakeBtn").addEventListener("click", toggleWakeLock);

    setupCollapsible("timerHead", "timerBody", "timerArrow");
    setupCollapsible("toolsHead", "toolsBody", "toolsArrow");

    document.querySelectorAll(".toolItem").forEach(item => {
      item.addEventListener("click", () => openTool(item.dataset.url));
    });

    $("closeToolBtn").addEventListener("click", closeTool);
    $("newTabBtn").addEventListener("click", () => {
      if (currentToolUrl) window.open(currentToolUrl, "_blank", "noopener,noreferrer");
    });

    $("timerList").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-stop-id]");
      if (!btn) return;
      stopTimer(btn.getAttribute("data-stop-id"));
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible" && wakeLock === null) {
        if ($("wakeBtn").classList.contains("on") && "wakeLock" in navigator) {
          try {
            wakeLock = await navigator.wakeLock.request("screen");
            wakeLock.onrelease = () => {
              wakeLock = null;
              $("wakeBtn").textContent = "☀️ Keep Awake";
              $("wakeBtn").classList.remove("on");
            };
          } catch (_) {}
        }
      }
    });

    // ============================================================
    // INIT
    // ============================================================
    (function init() {
      const loc = getLoc();
      $("locPill").textContent = "📍 Location: " + (loc || "Not set");

      updateClockUI();
      updateClock();

      updateTplUI();
      renderTimers();
      checkTimerAlarms();

      loadKitchenPct();
      loadCateringMini();

      setInterval(updateClock, 1000);
      setInterval(() => {
        renderTimers();
        checkTimerAlarms();
      }, 1000);
      setInterval(loadKitchenPct, 60000);
      setInterval(loadCateringMini, 60000);
    })();
  </script>
</body>
