<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Hub - Jeunes Restauranter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        /* Header */
        .header {
            background: rgba(15, 25, 50, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, #d4af37, #f4d03f, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .date-nav button {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #d4af37;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .date-nav button:hover {
            background: rgba(212, 175, 55, 0.3);
        }

        .date-display {
            color: #d4af37;
            font-size: 1.1em;
            font-weight: 600;
            min-width: 200px;
            text-align: center;
        }

        .back-btn {
            background: linear-gradient(135deg, #d4af37, #b8960c);
            color: #0a1628;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Grid Layout */
        .hub-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 20px;
        }

        .hub-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 16px;
            overflow: hidden;
        }

        .hub-card-header {
            background: rgba(212, 175, 55, 0.1);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hub-card-header h3 {
            color: #d4af37;
            font-size: 1.1em;
        }

        .hub-card-body {
            padding: 20px;
        }

        /* Menu Card */
        .menu-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-label {
            color: #8899aa;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .menu-value {
            color: #e0e0e0;
            text-align: right;
            max-width: 60%;
        }

        /* Catering Card */
        .catering-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .catering-item:last-child {
            margin-bottom: 0;
        }

        .catering-item h4 {
            color: #d4af37;
            margin-bottom: 8px;
        }

        .catering-detail {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.9em;
        }

        .catering-detail .label {
            color: #8899aa;
        }

        .catering-detail .value {
            color: #e0e0e0;
        }

        /* Full width card */
        .full-width {
            grid-column: 1 / -1;
        }

        /* Status badge */
        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .status-aktiv {
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #667788;
        }

        .empty-state .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.2);
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hub-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .header-right {
                flex-direction: column;
                width: 100%;
            }

            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div>
            <h1>👨‍🍳 Kitchen Hub</h1>
        </div>
        <div class="header-right">
            <div class="date-nav">
                <button onclick="changeDate(-1)">◀</button>
                <span class="date-display" id="dateDisplay">Indlæser...</span>
                <button onclick="changeDate(1)">▶</button>
                <button onclick="goToToday()" style="margin-left:5px;">I dag</button>
            </div>
            <a href="index.html" class="back-btn">← Dashboard</a>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Content -->
    <div class="container">
        <div class="hub-grid">

            <!-- Dagens Menu -->
            <div class="hub-card">
                <div class="hub-card-header">
                    <h3>🍽️ Dagens Menu</h3>
                </div>
                <div class="hub-card-body" id="menuContent">
                    <div class="empty-state">
                        <div class="icon">🔄</div>
                        <div>Indlæser menu...</div>
                    </div>
                </div>
            </div>

            <!-- Dagens Catering -->
            <div class="hub-card">
                <div class="hub-card-header">
                    <h3>🎪 Dagens Catering</h3>
                    <span id="cateringCount" class="status-badge status-aktiv">0</span>
                </div>
                <div class="hub-card-body" id="cateringContent">
                    <div class="empty-state">
                        <div class="icon">🔄</div>
                        <div>Indlæser catering...</div>
                    </div>
                </div>
            </div>

            <!-- Notater -->
            <div class="hub-card full-width">
                <div class="hub-card-header">
                    <h3>📝 Notater & Allergener</h3>
                </div>
                <div class="hub-card-body" id="notesContent">
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <div>Ingen notater for denne dag</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ============================================
        // KONFIGURATION
        // ============================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfe6VrFMOSHEjeOVyBPMPmGEagLJpw3kEwOiFssnsmz-DjAVKAFVkyBLBMGMAwMb5V/exec';

        // ============================================
        // DATO HÅNDTERING
        // ============================================
        let currentDate = new Date();

        const dayNames = ['Søndag', 'Mandag', 'Tirsdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lørdag'];
        const monthNames = ['januar', 'februar', 'marts', 'april', 'maj', 'juni', 'juli', 'august', 'september', 'oktober', 'november', 'december'];

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + d;
        }

        function formatDisplayDate(date) {
            return dayNames[date.getDay()] + ' d. ' + date.getDate() + '. ' + monthNames[date.getMonth()] + ' ' + date.getFullYear();
        }

        function changeDate(offset) {
            currentDate.setDate(currentDate.getDate() + offset);
            updateDisplay();
            loadKitchenHub();
        }

        function goToToday() {
            currentDate = new Date();
            updateDisplay();
            loadKitchenHub();
        }

        function updateDisplay() {
            document.getElementById('dateDisplay').textContent = formatDisplayDate(currentDate);
        }

        // ============================================
        // LOADING
        // ============================================
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        // ============================================
        // HENT DATA
        // ============================================
        async function loadKitchenHub() {
            try {
                showLoading(true);
                const dateStr = formatDate(currentDate);
                const url = APPS_SCRIPT_URL + '?action=getKitchenHub&date=' + dateStr + '&t=' + Date.now();

                console.log('Kitchen Hub henter:', url);

                const response = await fetch(url, {
                    method: 'GET',
                    redirect: 'follow',
                    mode: 'cors'
                });

                const text = await response.text();
                console.log('Response:', text.substring(0, 300));

                let result;
                try {
                    result = JSON.parse(text);
                } catch (e) {
                    console.error('Parse fejl:', e);
                    throw new Error('Kunne ikke læse serverens svar');
                }

                if (result.success) {
                    renderMenu(result.menu);
                    renderCatering(result.catering || []);
                    renderNotes(result.menu);
                } else {
                    throw new Error(result.error || 'Serverfejl');
                }

            } catch (error) {
                console.error('Kitchen Hub fejl:', error);

                document.getElementById('menuContent').innerHTML =
                    '<div class="empty-state"><div class="icon">❌</div><div>Fejl: ' + error.message + '</div></div>';
                document.getElementById('cateringContent').innerHTML =
                    '<div class="empty-state"><div class="icon">❌</div><div>Fejl: ' + error.message + '</div></div>';

            } finally {
                showLoading(false);
            }
        }

        // ============================================
        // RENDER MENU
        // ============================================
        function renderMenu(menu) {
            const container = document.getElementById('menuContent');

            if (!menu) {
                container.innerHTML =
                    '<div class="empty-state">' +
                    '<div class="icon">📭</div>' +
                    '<div>Ingen menu registreret for denne dag</div>' +
                    '</div>';
                return;
            }

            let html = '';

            const fields = [
                { key: 'Forret', label: 'Forret', icon: '🥗' },
                { key: 'Hovedret', label: 'Hovedret', icon: '🥩' },
                { key: 'Tilbehoer', label: 'Tilbehør', icon: '🥕' },
                { key: 'Dessert', label: 'Dessert', icon: '🍰' },
                { key: 'Antal', label: 'Antal kuverter', icon: '👥' }
            ];

            for (let i = 0; i < fields.length; i++) {
                const f = fields[i];
                const value = menu[f.key] || '';
                if (value) {
                    html += '<div class="menu-item">';
                    html += '<span class="menu-label">' + f.icon + ' ' + f.label + '</span>';
                    html += '<span class="menu-value">' + escapeHtml(String(value)) + '</span>';
                    html += '</div>';
                }
            }

            if (!html) {
                html = '<div class="empty-state"><div class="icon">📭</div><div>Ingen menu detaljer</div></div>';
            }

            container.innerHTML = html;
        }

        // ============================================
        // RENDER CATERING
        // ============================================
        function renderCatering(cateringList) {
            const container = document.getElementById('cateringContent');
            const countBadge = document.getElementById('cateringCount');

            const activeList = cateringList.filter(function(c) {
                return c.status === 'Aktiv';
            });

            countBadge.textContent = activeList.length;

            if (activeList.length === 0) {
                container.innerHTML =
                    '<div class="empty-state">' +
                    '<div class="icon">✅</div>' +
                    '<div>Ingen catering i dag</div>' +
                    '</div>';
                return;
            }

            let html = '';
            for (let i = 0; i < activeList.length; i++) {
                const c = activeList[i];
                html += '<div class="catering-item">';
                html += '<h4>' + escapeHtml(c.kunde || 'Ukendt kunde') + '</h4>';

                if (c.tidspunkt) {
                    html += '<div class="catering-detail"><span class="label">Tidspunkt</span><span class="value">' + escapeHtml(c.tidspunkt) + '</span></div>';
                }
                if (c.antalPersoner) {
                    html += '<div class="catering-detail"><span class="label">Personer</span><span class="value">' + escapeHtml(String(c.antalPersoner)) + '</span></div>';
                }
                if (c.menutype) {
                    html += '<div class="catering-detail"><span class="label">Menutype</span><span class="value">' + escapeHtml(c.menutype) + '</span></div>';
                }
                if (c.detaljer) {
                    html += '<div class="catering-detail"><span class="label">Detaljer</span><span class="value">' + escapeHtml(c.detaljer) + '</span></div>';
                }
                if (c.kontaktperson) {
                    html += '<div class="catering-detail"><span class="label">Kontakt</span><span class="value">' + escapeHtml(c.kontaktperson);
                    if (c.telefon) html += ' (' + escapeHtml(c.telefon) + ')';
                    html += '</span></div>';
                }

                html += '</div>';
            }

            container.innerHTML = html;
        }

        // ============================================
        // RENDER NOTES
        // ============================================
        function renderNotes(menu) {
            const container = document.getElementById('notesContent');

            if (!menu) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>Ingen notater for denne dag</div></div>';
                return;
            }

            let html = '';
            let hasContent = false;

            if (menu.Allergener) {
                hasContent = true;
                html += '<div class="menu-item">';
                html += '<span class="menu-label">⚠️ Allergener</span>';
                html += '<span class="menu-value">' + escapeHtml(String(menu.Allergener)) + '</span>';
                html += '</div>';
            }

            if (menu.Pi_pi) {
                hasContent = true;
                html += '<div class="menu-item">';
                html += '<span class="menu-label">🔔 Pi-Pi</span>';
                html += '<span class="menu-value">' + escapeHtml(String(menu.Pi_pi)) + '</span>';
                html += '</div>';
            }

            if (menu.Noter) {
                hasContent = true;
                html += '<div class="menu-item">';
                html += '<span class="menu-label">📝 Noter</span>';
                html += '<span class="menu-value">' + escapeHtml(String(menu.Noter)) + '</span>';
                html += '</div>';
            }

            if (!hasContent) {
                html = '<div class="empty-state"><div class="icon">📋</div><div>Ingen notater for denne dag</div></div>';
            }

            container.innerHTML = html;
        }

        // ============================================
        // HJÆLPEFUNKTION
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            updateDisplay();
            loadKitchenHub();
        });
    </script>
</body>
</html>
