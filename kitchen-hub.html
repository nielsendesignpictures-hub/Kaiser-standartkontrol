<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        /* Timer Styles */
        .timer-container {
            text-align: center;
        }

        .timer-display {
            font-size: 4em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .timer-display.warning {
            color: #ff9800;
            animation: pulse 1s infinite;
        }

        .timer-display.danger {
            color: #f44336;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .timer-controls button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-start {
            background: #4CAF50;
            color: white;
        }

        .btn-start:hover {
            background: #45a049;
        }

        .btn-pause {
            background: #ff9800;
            color: white;
        }

        .btn-pause:hover {
            background: #e68900;
        }

        .btn-reset {
            background: #f44336;
            color: white;
        }

        .btn-reset:hover {
            background: #da190b;
        }

        .time-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .time-input-group input {
            width: 80px;
            padding: 10px;
            font-size: 1.1em;
            border: 2px solid #667eea;
            border-radius: 8px;
            text-align: center;
        }

        .time-input-group label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            color: #333;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            height: 30px;
            background: linear-gradient(90deg, #4CAF50 0%, #8BC34A 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        /* Catering Widget */
        .catering-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 10px 0;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .catering-item:nth-child(even) {
            background: #e8eaf6;
        }

        .catering-name {
            font-weight: bold;
            color: #333;
        }

        .catering-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* Kitchen Percentage */
        .percentage-display {
            text-align: center;
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .percentage-label {
            text-align: center;
            color: #666;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 20px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c62828;
        }

        /* Alarm Modal */
        .alarm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .alarm-modal.active {
            display: flex;
        }

        .alarm-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .alarm-content h2 {
            color: #f44336;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .alarm-content button {
            padding: 15px 30px;
            font-size: 1.2em;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .alarm-content button:hover {
            background: #da190b;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🍳 Kitchen Dashboard</h1>
        
        <div class="grid-container">
            <!-- Timer Card -->
            <div class="card">
                <h2>⏱️ Timer</h2>
                <div class="timer-container">
                    <div class="time-input-group">
                        <label>
                            <span>Hours</span>
                            <input type="number" id="hours-input" min="0" max="23" value="0">
                        </label>
                        <label>
                            <span>Minutes</span>
                            <input type="number" id="minutes-input" min="0" max="59" value="0">
                        </label>
                        <label>
                            <span>Seconds</span>
                            <input type="number" id="seconds-input" min="0" max="59" value="0">
                        </label>
                    </div>
                    
                    <div class="timer-display" id="timer-display">00:00:00</div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar" style="width: 0%;">0%</div>
                    </div>
                    
                    <div class="timer-controls">
                        <button class="btn-start" onclick="startTimer()">▶ Start</button>
                        <button class="btn-pause" onclick="pauseTimer()">⏸ Pause</button>
                        <button class="btn-reset" onclick="resetTimer()">⟳ Reset</button>
                    </div>
                </div>
            </div>

            <!-- Kitchen Percentage Card -->
            <div class="card">
                <h2>📊 Kitchen Progress</h2>
                <div class="percentage-display" id="kitchen-percentage">0%</div>
                <div class="percentage-label">Completion Rate</div>
            </div>

            <!-- Catering Widget Card -->
            <div class="card">
                <h2>🍽️ Catering Orders</h2>
                <div id="catering-widget">
                    <div class="loading">Loading catering data...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alarm Modal -->
    <div class="alarm-modal" id="alarm-modal">
        <div class="alarm-content">
            <h2>⚠️ 15 Minutes Remaining!</h2>
            <p style="font-size: 1.2em; margin: 20px 0;">Time to finish up!</p>
            <button onclick="dismissAlarm()">OK, Got it!</button>
        </div>
    </div>

    <script>
        // Timer Variables
        let timerInterval = null;
        let isPaused = false;
        let totalSeconds = 0;
        let initialSeconds = 0;
        let alarmTriggered = false;

        // Alarm Sound
        const alarmSound = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUKzn77RgGwU7k9n0yHInBSl+zPLaizsKGGS56+mjUBELTKXh8bllHAU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBALTKXh8bllHAU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8blkGwU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8blkGwU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8blkGwU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8blkGwU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8blkGwU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8blkGwU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8blkGwU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8Q==');

        function updateTimerDisplay() {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            const display = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
            document.getElementById('timer-display').textContent = display;
            
            // Update progress bar
            if (initialSeconds > 0) {
                const progress = ((initialSeconds - totalSeconds) / initialSeconds) * 100;
                const progressBar = document.getElementById('progress-bar');
                progressBar.style.width = progress + '%';
                progressBar.textContent = Math.round(progress) + '%';
            }
            
            // Update display color based on time remaining
            const timerDisplay = document.getElementById('timer-display');
            timerDisplay.classList.remove('warning', 'danger');
            
            if (totalSeconds <= 300 && totalSeconds > 60) { // 5 minutes
                timerDisplay.classList.add('warning');
            } else if (totalSeconds <= 60) { // 1 minute
                timerDisplay.classList.add('danger');
            }
            
            // Check for 15-minute alarm
            if (totalSeconds === 900 && !alarmTriggered) { // 15 minutes = 900 seconds
                triggerAlarm();
                alarmTriggered = true;
            }
        }

        function pad(num) {
            return num.toString().padStart(2, '0');
        }

        function startTimer() {
            if (timerInterval) return;
            
            if (totalSeconds === 0) {
                const hours = parseInt(document.getElementById('hours-input').value) || 0;
                const minutes = parseInt(document.getElementById('minutes-input').value) || 0;
                const seconds = parseInt(document.getElementById('seconds-input').value) || 0;
                
                totalSeconds = (hours * 3600) + (minutes * 60) + seconds;
                initialSeconds = totalSeconds;
                alarmTriggered = false;
            }
            
            if (totalSeconds === 0) {
                alert('Please set a time first!');
                return;
            }
            
            isPaused = false;
            timerInterval = setInterval(() => {
                if (!isPaused && totalSeconds > 0) {
                    totalSeconds--;
                    updateTimerDisplay();
                    
                    if (totalSeconds === 0) {
                        pauseTimer();
                        playCompletionSound();
                        alert('Time is up!');
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            isPaused = true;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function resetTimer() {
            pauseTimer();
            totalSeconds = 0;
            initialSeconds = 0;
            alarmTriggered = false;
            updateTimerDisplay();
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('progress-bar').textContent = '0%';
        }

        function triggerAlarm() {
            document.getElementById('alarm-modal').classList.add('active');
            playAlarmSound();
        }

        function dismissAlarm() {
            document.getElementById('alarm-modal').classList.remove('active');
            stopAlarmSound();
        }

        function playAlarmSound() {
            alarmSound.loop = true;
            alarmSound.play().catch(e => console.log('Audio play failed:', e));
        }

        function stopAlarmSound() {
            alarmSound.pause();
            alarmSound.currentTime = 0;
        }

        function playCompletionSound() {
            const beep = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUKzn77RgGwU7k9n0yHInBSl+zPLaizsKGGS56+mjUBELTKXh8bllHAU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBALTKXh8bllHAU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8blkGwU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8blkGwU2jdXzzn0vBSyCz/HciDwGGGe88OWhUBAMTKTg8Q==');
            beep.play().catch(e => console.log('Audio play failed:', e));
        }

        // Catering Widget - Fetch from Google Sheets
        async function loadCateringData() {
            try {
                const sheetUrl = 'YOUR_GOOGLE_SHEETS_URL_HERE'; // Replace with your actual Google Sheets URL
                const response = await fetch(sheetUrl);
                const data = await response.json();
                
                displayCateringData(data);
            } catch (error) {
                console.error('Error loading catering data:', error);
                document.getElementById('catering-widget').innerHTML = 
                    '<div class="error">Failed to load catering data. Please check your connection.</div>';
            }
        }

        function displayCateringData(data) {
            const widget = document.getElementById('catering-widget');
            
            if (!data || data.length === 0) {
                widget.innerHTML = '<div class="loading">No catering orders found.</div>';
                return;
            }
            
            let html = '';
            data.forEach(item => {
                html += `
                    <div class="catering-item">
                        <span class="catering-name">${item.name}</span>
                        <span class="catering-count">${item.count}</span>
                    </div>
                `;
            });
            
            widget.innerHTML = html;
        }

        // Kitchen Percentage - Fetch from Google Sheets
        async function loadKitchenPercentage() {
            try {
                const sheetUrl = 'YOUR_KITCHEN_PERCENTAGE_SHEETS_URL_HERE'; // Replace with your actual Google Sheets URL
                const response = await fetch(sheetUrl);
                const data = await response.json();
                
                const percentage = data.percentage || 0;
                document.getElementById('kitchen-percentage').textContent = percentage + '%';
            } catch (error) {
                console.error('Error loading kitchen percentage:', error);
                document.getElementById('kitchen-percentage').textContent = 'Error';
            }
        }

        // Auto-refresh data every 30 seconds
        setInterval(() => {
            loadCateringData();
            loadKitchenPercentage();
        }, 30000);

        // Initial load
        window.onload = function() {
            updateTimerDisplay();
            loadCateringData();
            loadKitchenPercentage();
        };
    </script>
</body>
</html>
