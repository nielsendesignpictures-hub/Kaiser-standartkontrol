<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Allergiassistent</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0b0f1a, #111827);
      color: white;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.02);
    }

    .header {
      padding: 18px 16px 10px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      background: rgba(11,15,26,0.92);
      backdrop-filter: blur(14px);
      z-index: 5;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    .sub {
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
    }

    .toolbar {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(255,255,255,0.02);
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .quick-actions button {
      background: #1c2233;
      border: none;
      padding: 10px 14px;
      border-radius: 20px;
      color: white;
      white-space: nowrap;
      font-size: 14px;
      cursor: pointer;
    }

    .quick-actions button:hover {
      background: #27314a;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 12px 14px;
      border-radius: 16px;
      max-width: 86%;
      white-space: pre-line;
      line-height: 1.45;
      font-size: 14px;
    }

    .user {
      background: #2a6df4;
      margin-left: auto;
    }

    .bot {
      background: #1c2233;
      margin-right: auto;
    }

    .input-bar {
      display: flex;
      padding: 10px;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(11,15,26,0.96);
    }

    .input-bar input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 15px;
      background: white;
      color: black;
    }

    .input-bar button {
      background: #f5c542;
      border: none;
      padding: 12px 16px;
      border-radius: 20px;
      font-weight: 700;
      cursor: pointer;
    }

    .footer-note {
      padding: 8px 12px 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Allergiassistent</h1>
      <div class="sub">Hurtigt svar til service og buffet</div>
    </div>

    <div class="toolbar">
      <div class="quick-actions" id="allergi-knapper"></div>

      <label class="toggle">
        <input type="checkbox" id="sikkerMode">
        🔒 Kun 100% sikre
      </label>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-bar">
      <input id="input" placeholder="Skriv fx: gluten og laktose" />
      <button id="sendBtn">Send</button>
    </div>

    <div class="footer-note">
      Kun vejledende. Bekræft altid med køkken ved alvorlig allergi.
    </div>
  </div>

  <script src="./allergi-data.js"></script>
  <script>
    const ALLERGENER = [
      "gluten", "laktose", "æg", "nødder", "jordnødder",
      "soja", "selleri", "sesamfrø", "lupin", "sulfiter",
      "bløddyr", "sennep", "fisk", "krebs"
    ];

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const quickWrap = document.getElementById("allergi-knapper");

    function addMsg(text, type = "bot") {
      const div = document.createElement("div");
      div.className = `msg ${type}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function erSikkerMode() {
      return document.getElementById("sikkerMode").checked;
    }

    function findAllergier(text) {
      const t = String(text || "").toLowerCase();
      return ALLERGENER.filter(a => t.includes(a));
    }

    function erBuffetSpørgsmål(text) {
      const t = String(text || "").toLowerCase();
      return t.includes("buffet") || t.includes("brunch") || t.includes("station");
    }

    function erSikkerMulti(ret, allergier) {
      if (!ret.dataKomplet) return false;

      for (let allergi of allergier) {
        if (ret.allergener?.[allergi]) return false;
        if (ret.sporAf?.includes(allergi)) return false;
      }

      if (ret.køkkenRisiko) return false;

      return true;
    }

    function erBuffetSikkerMulti(ret, allergier) {
      if (!ret.dataKomplet) return false;
      if (!ret.buffet) return false;

      for (let allergi of allergier) {
        if (ret.allergener?.[allergi]) return false;
        if (ret.sporAf?.includes(allergi)) return false;
      }

      if (ret.buffet && ret.køkkenRisiko) return false;

      return true;
    }

    function findRetterMulti(allergier, sikkerMode = false) {
      const sikre = [];
      const tilpas = [];
      const undgå = [];

      (window.ALLERGI_DATA || []).forEach(ret => {
        if (sikkerMode) {
          if (erSikkerMulti(ret, allergier)) {
            sikre.push(ret.ret);
          }
          return;
        }

        let harAllergi = false;

        for (let allergi of allergier) {
          if (ret.allergener?.[allergi]) {
            harAllergi = true;
          }
          if (ret.sporAf?.includes(allergi)) {
            harAllergi = true;
          }
        }

        if (!harAllergi) {
          sikre.push(ret.ret);
          return;
        }

        const fixes = (ret.tilpasninger || []).filter(t =>
          (t.fjerner || []).some(a => allergier.includes(a))
        );

        if (fixes.length > 0) {
          tilpas.push({
            ret: ret.ret,
            fixes: fixes.map(f => f.tekst)
          });
        } else {
          undgå.push(ret.ret);
        }
      });

      return { sikre, tilpas, undgå };
    }

    function findBuffetMulti(allergier) {
      const sikre = [];

      (window.ALLERGI_DATA || []).forEach(ret => {
        if (erBuffetSikkerMulti(ret, allergier)) {
          sikre.push({
            ret: ret.ret,
            station: ret.station || "Ukendt station"
          });
        }
      });

      return sikre;
    }

    function genererMultiSvar(allergier, data, sikkerMode) {
      let titel = allergier.join(" + ").toUpperCase();
      let svar = `${titel}\n\n`;

      if (sikkerMode) {
        svar += "🔒 100% sikre retter:\n";

        if (data.sikre.length === 0) {
          svar += "- Ingen sikre retter\n";
          svar += "\n👉 Anbefaling: Kontakt køkkenet";
        } else {
          data.sikre.forEach(r => svar += `- ${r}\n`);
        }

        return svar;
      }

      if (data.sikre.length) {
        svar += "✅ Du kan spise:\n";
        data.sikre.forEach(r => svar += `- ${r}\n`);
        svar += "\n";
      }

      if (data.tilpas.length) {
        svar += "🛠 Kan tilpasses:\n";
        data.tilpas.forEach(t => {
          svar += `- ${t.ret} → ${t.fixes.join(", ")}\n`;
        });
        svar += "\n";
      }

      if (data.undgå.length) {
        svar += "⛔ Undgå:\n";
        data.undgå.forEach(r => svar += `- ${r}\n`);
      }

      if (!data.sikre.length && !data.tilpas.length && !data.undgå.length) {
        svar += "Ingen retter fundet.";
      }

      return svar;
    }

    function visBuffetSvarMulti(allergier, resultater) {
      let titel = allergier.join(" + ").toUpperCase();
      let svar = `${titel} – BUFFET\n\n`;
      svar += "⚠️ Risiko for krydskontaminering på buffet.\n\n";
      svar += "🔒 100% sikre buffetretter:\n";

      if (!resultater.length) {
        svar += "- Ingen sikre buffetretter fundet\n";
        svar += "\n👉 Anbefaling: Kontakt køkkenet";
      } else {
        resultater.forEach(r => {
          svar += `- ${r.ret} (${r.station})\n`;
        });
      }

      addMsg(svar, "bot");
    }

    function sendSvar(text) {
      const allergier = findAllergier(text);

      if (allergier.length === 0) {
        addMsg("⚠️ Kunne ikke finde allergi", "bot");
        return;
      }

      const sikkerMode = erSikkerMode();

      if (erBuffetSpørgsmål(text)) {
        const resultater = findBuffetMulti(allergier);
        visBuffetSvarMulti(allergier, resultater);
        return;
      }

      const data = findRetterMulti(allergier, sikkerMode);
      const svar = genererMultiSvar(allergier, data, sikkerMode);
      addMsg(svar, "bot");
    }

    function handleSend() {
      const value = input.value.trim();
      if (!value) return;

      addMsg(value, "user");
      input.value = "";
      sendSvar(value);
    }

    function buildQuickButtons() {
      quickWrap.innerHTML = "";
      ALLERGENER.forEach(allergi => {
        const btn = document.createElement("button");
        btn.textContent = allergi.charAt(0).toUpperCase() + allergi.slice(1);
        btn.dataset.allergi = allergi;
        btn.addEventListener("click", () => {
          addMsg(allergi, "user");
          sendSvar(allergi);
        });
        quickWrap.appendChild(btn);
      });
    }

    sendBtn.addEventListener("click", handleSend);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") handleSend();
    });

    buildQuickButtons();

    addMsg(
      "Hej.\n\nSkriv fx:\n- gluten\n- gluten og laktose\n- buffet gluten\n\nBrug 🔒 hvis du kun vil se 100% sikre retter.",
      "bot"
    );
  </script>
</body>
</html>
