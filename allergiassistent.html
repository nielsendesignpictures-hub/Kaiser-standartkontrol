<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Kaiser – Allergiassistent</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#0a0e14;
      --bg1:#111823;
      --panel:rgba(255,255,255,0.05);
      --panel2:rgba(255,255,255,0.035);
      --line:rgba(255,255,255,0.10);
      --line2:rgba(255,255,255,0.07);
      --text:rgba(255,255,255,0.97);
      --muted:rgba(255,255,255,0.78);
      --muted2:rgba(255,255,255,0.54);
      --gold:#d6b24a;
      --green:#62d26f;
      --red:#ff6b6b;
      --blue:#5ea7ff;
      --warn:#f59e0b;
      --shadow:0 24px 70px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.11), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      padding:14px;
    }

    .shell{max-width:1100px;margin:0 auto;}

    .hero{
      border-radius:28px;
      border:1px solid var(--line);
      background:
        radial-gradient(900px 260px at 50% 0%, rgba(255,255,255,0.08), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow:var(--shadow);
      padding:24px 18px 18px;
      text-align:center;
    }

    .kicker{
      font-size:10px;
      font-weight:900;
      letter-spacing:.26em;
      text-transform:uppercase;
      color:var(--muted2);
    }

    .title{
      margin-top:8px;
      font-family:"Playfair Display",serif;
      font-size:clamp(34px,6vw,56px);
      line-height:1;
      letter-spacing:-.03em;
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
      line-height:1.5;
    }

    .goldline{
      height:2px;
      margin:18px auto 0;
      max-width:760px;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,var(--gold),var(--blue),transparent);
    }

    .section{
      margin-top:14px;
      border-radius:24px;
      border:1px solid var(--line);
      background:var(--panel2);
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .sectionHead{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:14px 18px;
      background:rgba(255,255,255,0.03);
      border-bottom:1px solid var(--line2);
      flex-wrap:wrap;
    }

    .sectionTitle{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:12px;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .sectionDot{
      width:10px;height:10px;border-radius:50%;
      background:var(--gold);
    }

    .sectionInfo{
      font-size:12px;
      font-weight:800;
      color:var(--muted2);
    }

    .sectionBody{padding:16px;}

    .quickRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .quickBtn{
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
    }

    .chatBox{
      border-radius:22px;
      border:1px solid var(--line);
      background:
        radial-gradient(700px 220px at 50% 0%, rgba(255,255,255,0.06), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      min-height:420px;
      max-height:70vh;
      overflow:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .msg{
      max-width:84%;
      border-radius:20px;
      padding:14px 16px;
      line-height:1.55;
      white-space:pre-line;
    }

    .msg.user{
      align-self:flex-end;
      background:linear-gradient(180deg, rgba(94,167,255,0.22), rgba(94,167,255,0.12));
      border:1px solid rgba(94,167,255,0.28);
    }

    .msg.bot{
      align-self:flex-start;
      background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border:1px solid rgba(255,255,255,0.10);
    }

    .msgLabel{
      font-size:11px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted2);
      margin-bottom:6px;
    }

    .msgText{
      font-size:14px;
      font-weight:700;
      color:var(--text);
    }

    .replyCards{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    @media (max-width: 900px){
      .replyCards{grid-template-columns:1fr;}
      .msg{max-width:100%;}
    }

    .replyCard{
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.09);
      background:rgba(255,255,255,0.04);
      padding:12px;
    }

    .replyHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:10px;
    }

    .replyTitle{
      font-size:13px;
      font-weight:900;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      font-size:10px;
      font-weight:900;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .badge.green{
      background:rgba(98,210,111,0.14);
      border-color:rgba(98,210,111,0.35);
      color:#dff7e2;
    }

    .badge.warn{
      background:rgba(245,158,11,0.14);
      border-color:rgba(245,158,11,0.35);
      color:#ffe9b0;
    }

    .badge.red{
      background:rgba(255,107,107,0.14);
      border-color:rgba(255,107,107,0.35);
      color:#ffd0d0;
    }

    .dishList{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .dish{
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.05);
      padding:10px;
    }

    .dishName{
      font-size:13px;
      font-weight:900;
    }

    .dishMeta{
      margin-top:4px;
      font-size:11px;
      color:var(--muted);
      font-weight:700;
    }

    .inputBar{
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
    }

    .chatInput{
      width:100%;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:var(--text);
      padding:16px;
      outline:none;
      font-size:15px;
      font-weight:700;
    }

    .sendBtn{
      border:none;
      border-radius:18px;
      padding:0 18px;
      min-width:120px;
      background:linear-gradient(135deg, var(--gold), #f3d47c);
      color:#161616;
      font-size:13px;
      font-weight:900;
      text-transform:uppercase;
      cursor:pointer;
    }

    @media (max-width: 700px){
      .inputBar{grid-template-columns:1fr;}
      .sendBtn{min-height:52px;}
    }

    .mutedHelp{
      margin-top:8px;
      color:var(--muted2);
      font-size:12px;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="shell">

    <section class="hero">
      <div class="kicker">KAISER</div>
      <div class="title">Allergiassistent</div>
      <div class="sub">
        Skriv fx: “Min gæst har glutenallergi”<br>
        og få et hurtigt svar på hvilke retter der kan anbefales.
      </div>
      <div class="goldline"></div>
    </section>

    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle"><span class="sectionDot"></span> Hurtige forslag</div>
        <div class="sectionInfo">Tryk eller skriv selv</div>
      </div>
      <div class="sectionBody">
        <div class="quickRow" id="quickActions"></div>
      </div>
    </section>

    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle"><span class="sectionDot"></span> Chat</div>
        <div class="sectionInfo">Spørg om allergener og retter</div>
      </div>
      <div class="sectionBody">
        <div class="chatBox" id="chatBox"></div>

        <div class="inputBar">
          <input id="chatInput" class="chatInput" placeholder="Skriv fx: Min gæst har glutenallergi" />
          <button id="sendBtn" class="sendBtn">Send</button>
        </div>

        <div class="mutedHelp">
          Eksempler: “Hvad kan en med laktose spise?”, “Har I noget uden nødder?”, “Min gæst tåler ikke fisk”.
        </div>
      </div>
    </section>

  </div>

<script src="./allergi-data.js"></script>
<script>
  const $ = id => document.getElementById(id);

  const state = {
    lastAllergies: [],
    lastResult: null,
    lastDish: null
  };

  function escapeHtml(str) {
    return String(str || "").replace(/[&<>"']/g, c => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;"
    }[c]));
  }

  function normalizeValue(v) {
    return String(v || "").trim().toLowerCase();
  }

  function normalizeText(v) {
    return String(v || "")
      .toLowerCase()
      .replace(/[.,!?]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function capitalize(str) {
    str = String(str || "");
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  function getAllergiesFromData() {
    const rows = window.ALLERGI_DATA || [];
    const set = new Set();

    rows.forEach(row => {
      const allergener = row?.allergener || {};
      Object.keys(allergener).forEach(key => set.add(key));
    });

    return [...set];
  }

  function scrollChatToBottom() {
    const box = $("chatBox");
    box.scrollTop = box.scrollHeight;
  }

  function addUserMessage(text) {
    const el = document.createElement("div");
    el.className = "msg user";
    el.innerHTML = `
      <div class="msgLabel">Tjener</div>
      <div class="msgText">${escapeHtml(text)}</div>
    `;
    $("chatBox").appendChild(el);
    scrollChatToBottom();
  }

  function addBotMessage(text) {
    const el = document.createElement("div");
    el.className = "msg bot";
    el.innerHTML = `
      <div class="msgLabel">Kaiser</div>
      <div class="msgText">${text}</div>
    `;
    $("chatBox").appendChild(el);
    scrollChatToBottom();
  }

  function allergyAliasMap() {
    return {
      "gluten": ["gluten", "glutenallergi", "cøliaki", "coeliaki"],
      "laktose": ["laktose", "laktoseallergi", "laktoseintolerans", "mælk", "mejeri"],
      "nødder": ["nødder", "nøddeallergi", "noedder"],
      "æg": ["æg", "aeg", "ægallergi"],
      "krebs": ["krebs", "krebsdyr", "rejer", "krabbe", "hummer"],
      "fisk": ["fisk", "fiskeallergi"],
      "jordnødder": ["jordnødder", "jordnoedder", "peanuts", "peanut"],
      "soja": ["soja", "soy"],
      "selleri": ["selleri"],
      "sesamfrø": ["sesamfrø", "sesamfro", "sesam"],
      "lupin": ["lupin"],
      "sulfiter": ["sulfiter", "sulfit"],
      "bløddyr": ["bløddyr", "bloeddyr", "muslinger", "østers", "oesters"],
      "sennep": ["sennep"]
    };
  }

  function detectAllergiesFromMessage(message) {
    const text = normalizeText(message);
    const aliasMap = allergyAliasMap();
    const found = [];

    Object.keys(aliasMap).forEach(allergy => {
      const aliases = aliasMap[allergy];
      if (aliases.some(alias => text.includes(normalizeText(alias)))) {
        found.push(allergy);
      }
    });

    return [...new Set(found)];
  }

  function findDishByMessage(message) {
    const text = normalizeText(message);
    const rows = window.ALLERGI_DATA || [];

    let bestMatch = null;
    let bestLength = 0;

    rows.forEach(row => {
      const dish = normalizeText(row.ret);
      if (!dish) return;

      if (text.includes(dish) && dish.length > bestLength) {
        bestMatch = row;
        bestLength = dish.length;
      }
    });

    return bestMatch;
  }

  function getDishStatusForAllergy(row, allergy) {
    return normalizeValue(row?.allergener?.[allergy]);
  }

  function getResultsForAllergies(allergies) {
    const rows = window.ALLERGI_DATA || [];
    const safe = [];
    const trace = [];
    const avoid = [];

    rows.forEach(row => {
      const values = allergies.map(allergy => getDishStatusForAllergy(row, allergy));

      if (values.some(v => v === "ja")) {
        avoid.push(row);
      } else if (values.some(v => v === "spor af")) {
        trace.push(row);
      } else if (values.every(v => v === "nej")) {
        safe.push(row);
      }
    });

    return { safe, trace, avoid };
  }

  function formatDishList(items, limit = 5, withSuggestions = false, allergies = []) {
    if (!items.length) return "Ingen fundet.";

    return items.slice(0, limit).map((item, index) => {
      let line = `${index + 1}. ${item.ret}`;

      if (withSuggestions) {
        const suggestion = getModificationSuggestion(item, allergies);
        if (suggestion) line += ` (${suggestion})`;
      }

      return line;
    }).join("\n");
  }

  function getModificationSuggestion(row, allergies) {
    const name = normalizeText(row?.ret || "");
    const suggestions = [];

    allergies.forEach(allergy => {
      const status = getDishStatusForAllergy(row, allergy);

      if (status !== "ja") return;

      if (allergy === "gluten") {
        if (name.includes("cæsar") || name.includes("caesar")) suggestions.push("muligvis uden croutoner");
        else if (name.includes("burger")) suggestions.push("muligvis uden bolle");
        else if (name.includes("sandwich")) suggestions.push("muligvis uden brød");
        else if (name.includes("salat")) suggestions.push("muligvis uden croutoner eller topping");
      }

      if (allergy === "laktose") {
        if (name.includes("salat")) suggestions.push("muligvis uden dressing eller ost");
        else if (name.includes("burger")) suggestions.push("muligvis uden ost");
        else if (name.includes("pasta")) suggestions.push("muligvis uden ost eller flødesauce");
      }

      if (allergy === "æg") {
        if (name.includes("burger")) suggestions.push("spørg om mayo kan undlades");
        if (name.includes("salat")) suggestions.push("spørg om dressing kan serveres ved siden af");
      }
    });

    return suggestions.length ? suggestions.join(" / ") : "";
  }

  function formatAllergyReply(allergies, result) {
    const label = allergies.map(capitalize).join(" + ");

    return `
<b>${escapeHtml(label)}</b>

Du kan spise:
${escapeHtml(formatDishList(result.safe, 5, false, allergies))}

Mulige tilpasninger:
${escapeHtml(formatDishList(result.avoid.filter(r => getModificationSuggestion(r, allergies)).slice(0, 3), 3, true, allergies))}

Vil du også have retter med spor af eller retter der bør undgås?
    `.trim();
  }

  function formatTraceReply(allergies, result) {
    const label = allergies.map(capitalize).join(" + ");

    return `
<b>${escapeHtml(label)}</b>

Retter med spor af:
${escapeHtml(formatDishList(result.trace, 10, false, allergies))}
    `.trim();
  }

  function formatAvoidReply(allergies, result) {
    const label = allergies.map(capitalize).join(" + ");

    return `
<b>${escapeHtml(label)}</b>

Bør undgås:
${escapeHtml(formatDishList(result.avoid, 10, false, allergies))}
    `.trim();
  }

  function formatDishReply(row, allergies) {
    const dishName = row.ret;
    const lines = [`<b>${escapeHtml(dishName)}</b>`];

    allergies.forEach(allergy => {
      const status = getDishStatusForAllergy(row, allergy);

      if (status === "ja") {
        lines.push(`${capitalize(allergy)}: Indeholder`);
      } else if (status === "nej") {
        lines.push(`${capitalize(allergy)}: Nej`);
      } else if (status === "spor af") {
        lines.push(`${capitalize(allergy)}: Spor af`);
      } else {
        lines.push(`${capitalize(allergy)}: Ukendt`);
      }

      const suggestion = getModificationSuggestion(row, [allergy]);
      if (suggestion) {
        lines.push(`Forslag: ${suggestion}`);
      }
    });

    lines.push(`Kategori: ${escapeHtml(row.kategori || "Ukendt")}`);
    lines.push(`Bekræft altid med køkkenet ved ændringer.`);

    return lines.join("\n");
  }

  function wantsTrace(message) {
    const text = normalizeText(message);
    return text.includes("spor af") || text === "ja" || text === "ja tak";
  }

  function wantsAvoid(message) {
    const text = normalizeText(message);
    return text.includes("undgå") || text.includes("undga") || text.includes("må ikke");
  }

  function handleFollowUp(message) {
    if (!state.lastAllergies.length || !state.lastResult) return false;

    if (wantsTrace(message)) {
      addBotMessage(formatTraceReply(state.lastAllergies, state.lastResult));
      return true;
    }

    if (wantsAvoid(message)) {
      addBotMessage(formatAvoidReply(state.lastAllergies, state.lastResult));
      return true;
    }

    return false;
  }

  function handleMessage(message) {
    const text = String(message || "").trim();
    if (!text) return;

    addUserMessage(text);

    if (handleFollowUp(text)) return;

    const allergies = detectAllergiesFromMessage(text);
    const dish = findDishByMessage(text);

    if (dish && allergies.length) {
      state.lastDish = dish;
      addBotMessage(formatDishReply(dish, allergies));
      return;
    }

    if (allergies.length) {
      const result = getResultsForAllergies(allergies);
      state.lastAllergies = allergies;
      state.lastResult = result;
      addBotMessage(formatAllergyReply(allergies, result));
      return;
    }

    if (dish) {
      addBotMessage(
        `<b>${escapeHtml(dish.ret)}</b>\n\nJeg fandt retten, men ikke allergien i beskeden.\n\nPrøv fx:\n- Indeholder ${escapeHtml(dish.ret)} gluten?\n- Kan ${escapeHtml(dish.ret)} laves uden laktose?`
      );
      return;
    }

    addBotMessage(
      `Jeg kunne ikke forstå spørgsmålet.\n\nPrøv fx:\n- Gluten\n- Gluten og laktose\n- Indeholder Cæsar salat gluten?\n- Kan burger laves uden laktose?`
    );
  }

  function buildQuickActions() {
    const wrap = $("quickActions");
    const allergies = getAllergiesFromData();

    wrap.innerHTML = "";

    allergies.forEach(allergy => {
      const btn = document.createElement("button");
      btn.className = "quickBtn";
      btn.textContent = capitalize(allergy);
      btn.addEventListener("click", () => handleMessage(allergy));
      wrap.appendChild(btn);
    });
  }

  function bindEvents() {
    $("sendBtn").addEventListener("click", () => {
      const input = $("chatInput");
      const value = input.value;
      input.value = "";
      handleMessage(value);
      input.focus();
    });

    $("chatInput").addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        $("sendBtn").click();
      }
    });
  }

  function boot() {
    if (!Array.isArray(window.ALLERGI_DATA)) {
      addBotMessage("Data blev ikke fundet. Tjek at allergi-data.js starter med window.ALLERGI_DATA = [...];");
      return;
    }

    buildQuickActions();
    bindEvents();

    addBotMessage(
      `Hej.\n\nSkriv fx:\n- Gluten\n- Gluten og laktose\n- Indeholder Cæsar salat gluten?\n- Kan burger laves uden laktose?\n\nSå giver jeg et hurtigt serversvar.`
    );
  }

  boot();
</script>
</body>
</html>
