.sticky{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(10px);

.total{

}

.total-macros{

.disclaimer{

  line-height:1.5;

let total = {
  kcal:0,
  protein:0,
  carbs:0,
  fat:0
};

function updateTotals(){

  document.getElementById("totalKcal").innerText =
    Math.round(total.kcal) + " kcal";

  document.getElementById("totalMacros").innerText =
    "Protein " + Math.round(total.protein) + "g | " +
    "Kulhydrat " + Math.round(total.carbs) + "g | " +
    "Fedt " + Math.round(total.fat) + "g";
}

function adjustTotals(data, add=true){

  const factor = add ? 1 : -1;

  total.kcal += data.kcal * factor;
  total.protein += data.protein * factor;
  total.carbs += data.carbs * factor;
  total.fat += data.fat * factor;

  updateTotals();
}

function renderMenu(){

  const container = document.getElementById("menu");

  menu.forEach(section => {

    const sectionEl = document.createElement("div");
    sectionEl.className = "section";

    sectionEl.innerHTML = `<h2>${section.category}</h2>`;

    section.items.forEach(item => {

      const itemEl = document.createElement("div");
      itemEl.className = "item";

      itemEl.innerHTML = `

        <div class="item-top">

          <div>
            <div class="item-name">${item.name}</div>

            <div class="kcal">
              ${Math.round(item.kcal)} kcal
            </div>

            <div class="macros">
              Protein ${item.protein}g |
              Kulhydrat ${item.carbs}g |
              Fedt ${item.fat}g
            </div>
          </div>

          <div>
            <input type="checkbox">
          </div>

        </div>

        ${
          item.addon ? `
          <div class="addon">
            <label>
              <input type="checkbox" disabled class="addon-check">
              ${item.addon.name} (${Math.abs(item.addon.kcal)} kcal)
            </label>
          </div>
          ` : ""
        }

      `;

      const mainCheckbox = itemEl.querySelector('input[type="checkbox"]');
      const addonCheckbox = itemEl.querySelector(".addon-check");

      mainCheckbox.addEventListener("change", () => {

        if(mainCheckbox.checked){

          itemEl.classList.add("active");
          adjustTotals(item,true);

          if(addonCheckbox){
            addonCheckbox.disabled = false;
          }

        } else {

          itemEl.classList.remove("active");
          adjustTotals(item,false);

          if(addonCheckbox){

            if(addonCheckbox.checked){
              adjustTotals(item.addon,false);
              addonCheckbox.checked = false;
            }

            addonCheckbox.disabled = true;
          }
        }
      });

      if(addonCheckbox){

        addonCheckbox.addEventListener("change", () => {

          if(addonCheckbox.checked){
            adjustTotals(item.addon,true);
          } else {
            adjustTotals(item.addon,false);
          }

        });
      }

      sectionEl.appendChild(itemEl);

    });

    container.appendChild(sectionEl);

  });

}

renderMenu();
