<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Kaiser – Brunch Makro</title>

<style>
body{
  margin:0;
  font-family:"Georgia",serif;
  background:#f4efe9;
  color:#1c1c1c;
}

header{
  text-align:center;
  padding:40px 20px 20px;
}

header img{
  width:140px;
}

h1{
  font-size:22px;
  letter-spacing:2px;
}

.section{
  padding:25px 20px;
  border-bottom:1px solid #e5ded6;
}

.section h2{
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:18px;
}

.item{
  margin-bottom:20px;
}

.item label{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:16px;
}

.kcal{
  font-size:13px;
  color:#7a6f64;
}

.macros{
  font-size:12px;
  color:#8c8176;
  margin-top:4px;
  display:none;
}

.addon{
  margin-left:25px;
  font-size:13px;
  color:#9c9187;
  margin-top:6px;
}

.sticky{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#ffffff;
  border-top:1px solid #e5ded6;
  padding:18px;
  text-align:center;
}

.total{
  font-size:18px;
  font-weight:bold;
}

.total-macros{
  font-size:13px;
  margin-top:5px;
}

.disclaimer{
  font-size:11px;
  color:#8c8176;
  margin-top:6px;
}
</style>
</head>
<body>

<header>
  <img src="./logo.png">
  <h1>BYG-SELV-BRUNCH<br>NÆRINGSOVERSIGT</h1>
</header>

<script>
let total = {kcal:0, protein:0, carbs:0, fat:0};

function updateDisplay(){
  if(total.kcal < 0) total.kcal = 0;

  document.getElementById("totalKcal").innerText =
    Math.round(total.kcal) + " kcal";

  document.getElementById("totalMacros").innerText =
    "Protein " + Math.round(total.protein) + "g | " +
    "Kulhydrat " + Math.round(total.carbs) + "g | " +
    "Fedt " + Math.round(total.fat) + "g";
}

function toggleMain(el,data,macroId,addonId){
  const addon = document.getElementById(addonId);
  const macroBox = document.getElementById(macroId);

  if(el.checked){
    total.kcal += data.kcal;
    total.protein += data.protein;
    total.carbs += data.carbs;
    total.fat += data.fat;

    macroBox.style.display = "block";
    if(addon) addon.disabled = false;

  } else {

    total.kcal -= data.kcal;
    total.protein -= data.protein;
    total.carbs -= data.carbs;
    total.fat -= data.fat;

    macroBox.style.display = "none";

    if(addon){
      if(addon.checked){
        toggleAddon(addon, JSON.parse(addon.dataset.macro), true);
        addon.checked = false;
      }
      addon.disabled = true;
    }
  }

  updateDisplay();
}

function toggleAddon(el,data,forceRemove=false){
  if(el.checked && !forceRemove){
    total.kcal += data.kcal;
    total.protein += data.protein;
    total.carbs += data.carbs;
    total.fat += data.fat;
  } else {
    total.kcal -= data.kcal;
    total.protein -= data.protein;
    total.carbs -= data.carbs;
    total.fat -= data.fat;
  }
  updateDisplay();
}
</script>

<!-- MEJERI -->
<div class="section">
<h2>Mejeri</h2>

<div class="item">
<label>
<span>Røræg <span class="kcal">(259 kcal)</span></span>
<input type="checkbox"
onchange='toggleMain(this,
{kcal:259.12,protein:17.6,carbs:3.41,fat:19.34},
"m1","a1")'>
</label>

<div class="macros" id="m1">
Protein 18g | Kulhydrat 3g | Fedt 19g
</div>

<div class="addon">
<label>
<input type="checkbox" id="a1"
data-macro='{"kcal":-70,"protein":-6,"carbs":0,"fat":-6}'
disabled
onchange='toggleAddon(this,JSON.parse(this.dataset.macro))'>
Fjern bacon (-70 kcal)
</label>
</div>
</div>

</div>

<!-- KØD & FISK -->
<div class="section">
<h2>Kød & Fisk</h2>

<div class="item">
<label>
<span>Hønsesalat <span class="kcal">(410 kcal)</span></span>
<input type="checkbox"
onchange='toggleMain(this,
{kcal:410.3,protein:13.32,carbs:0.65,fat:40.02},
"m2","a2")'>
</label>

<div class="macros" id="m2">
Protein 13g | Kulhydrat 1g | Fedt 40g
</div>

<div class="addon">
<label>
<input type="checkbox" id="a2"
data-macro='{"kcal":-70,"protein":-6,"carbs":0,"fat":-6}'
disabled
onchange='toggleAddon(this,JSON.parse(this.dataset.macro))'>
Fjern bacon (-70 kcal)
</label>
</div>
</div>

</div>

<!-- FINALEN -->
<div class="section">
<h2>Finalen</h2>

<div class="item">
<label>
<span>2 amerikanske pandekager <span class="kcal">(563 kcal)</span></span>
<input type="checkbox"
onchange='toggleMain(this,
{kcal:563,protein:8.84,carbs:87.21,fat:18.72},
"m3","a3")'>
</label>

<div class="macros" id="m3">
Protein 9g | Kulhydrat 87g | Fedt 19g
</div>

<div class="addon">
<label>
<input type="checkbox" id="a3"
data-macro='{"kcal":-160,"protein":0,"carbs":-40,"fat":0}'
disabled
onchange='toggleAddon(this,JSON.parse(this.dataset.macro))'>
Uden sirup (-160 kcal)
</label>
</div>
</div>

</div>

<div class="sticky">
<div class="total" id="totalKcal">0 kcal</div>
<div class="total-macros" id="totalMacros">
Protein 0g | Kulhydrat 0g | Fedt 0g
</div>
<div class="disclaimer">
Næringsværdier er vejledende og kan variere en smule.
</div>
</div>

</body>
</html>
