<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Byg-Selv-Brunch – Næringsoversigt</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f7f3ee;
  color:#1a1a1a;
}

header{
  text-align:center;
  padding:30px 20px 10px;
}

header img{
  width:120px;
}

h1{
  font-size:20px;
  margin:10px 0 5px;
}

.lang-toggle{
  font-size:14px;
  cursor:pointer;
  color:#777;
}

.section{
  padding:20px;
}

.section h2{
  font-size:16px;
  margin-bottom:10px;
  border-bottom:1px solid #ddd;
  padding-bottom:4px;
}

.item{
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.item label{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.kcal{
  font-size:13px;
  color:#777;
}

.addon{
  font-size:12px;
  color:#999;
  margin-left:20px;
}

.sticky-total{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #ddd;
  padding:15px;
  text-align:center;
}

.total-kcal{
  font-size:18px;
  font-weight:bold;
}

.small{
  font-size:11px;
  color:#777;
  margin-top:5px;
}
</style>
</head>
<body>

<header>
  <img src="logo.png">
  <h1 id="title">Byg-Selv-Brunch – Næringsoversigt</h1>
  <div class="lang-toggle" onclick="toggleLang()">English</div>
</header>

<!-- MEJERI -->
<div class="section">
<h2>Mejeri</h2>

<div class="item">
<label>
<span>Røræg <span class="kcal">(259 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,259)">
</label>
<div class="addon">
<label>
<input type="checkbox" onchange="updateTotal(this,-70)">
Fjern bacon (-70 kcal)
</label>
</div>
</div>

<div class="item">
<label>
<span>Spejlæg <span class="kcal">(230 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,230)">
</label>
</div>

<div class="item">
<label>
<span>Modnet havarti ost <span class="kcal">(280 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,280)">
</label>
</div>

<div class="item">
<label>
<span>Hjemmelavet blåbæryoghurt <span class="kcal">(180 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,180)">
</label>
</div>

<div class="item">
<label>
<span>Hjemmelavet chiagrød <span class="kcal">(210 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,210)">
</label>
</div>

</div>

<!-- KØD & FISK -->
<div class="section">
<h2>Kød & Fisk</h2>

<div class="item">
<label>
<span>Rösti <span class="kcal">(340 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,340)">
</label>
</div>

<div class="item">
<label>
<span>Hjemmelavet hønsesalat <span class="kcal">(410 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,410)">
</label>
<div class="addon">
<label>
<input type="checkbox" onchange="updateTotal(this,-70)">
Fjern bacon (-70 kcal)
</label>
</div>
</div>

<div class="item">
<label>
<span>Crispy chicken <span class="kcal">(320 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,320)">
</label>
</div>

<div class="item">
<label>
<span>2 brunchpølser <span class="kcal">(290 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,290)">
</label>
</div>

<div class="item">
<label>
<span>Koldrøget laks <span class="kcal">(250 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,250)">
</label>
</div>

</div>

<!-- PLANTERIGET -->
<div class="section">
<h2>Planteriget</h2>

<div class="item">
<label>
<span>Avocado & hytteost <span class="kcal">(270 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,270)">
</label>
</div>

<div class="item">
<label>
<span>Eksotisk frugtskål <span class="kcal">(150 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,150)">
</label>
</div>

<div class="item">
<label>
<span>Smashed peas <span class="kcal">(190 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,190)">
</label>
</div>

</div>

<!-- BAGERIET -->
<div class="section">
<h2>Bageriet</h2>

<div class="item">
<label>
<span>Pain au chocolat <span class="kcal">(320 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,320)">
</label>
</div>

<div class="item">
<label>
<span>Øko smørcroissant <span class="kcal">(300 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,300)">
</label>
</div>

<div class="item">
<label>
<span>Mariagertoba-toast <span class="kcal">(350 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,350)">
</label>
</div>

</div>

<!-- FINALEN -->
<div class="section">
<h2>Finalen</h2>

<div class="item">
<label>
<span>Lun rabarber crumble <span class="kcal">(290 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,290)">
</label>
</div>

<div class="item">
<label>
<span>Øllebrød <span class="kcal">(260 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,260)">
</label>
</div>

<div class="item">
<label>
<span>2 amerikanske pandekager <span class="kcal">(563 kcal)</span></span>
<input type="checkbox" onchange="updateTotal(this,563)">
</label>
<div class="addon">
<label>
<input type="checkbox" onchange="updateTotal(this,-160)">
Uden sirup (-160 kcal)
</label>
</div>
</div>

</div>

<div class="sticky-total">
<div class="total-kcal" id="totalKcal">0 kcal</div>
<div class="small">
Næringsværdier er vejledende og kan variere en smule.
</div>
</div>

<script>
let total = 0;

function updateTotal(el,value){
  if(el.checked){
    total += value;
  } else {
    total -= value;
  }
  document.getElementById("totalKcal").innerText = total + " kcal";
}

function toggleLang(){
  alert("Engelsk version kommer i næste version – struktur er klar.");
}
</script>

</body>
</html>
