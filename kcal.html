<style>

body{
  margin:0;
  padding:0 0 140px;
  background:#f4efe9;
  color:#1d1d1d;
  font-family:Georgia, serif;
}

header{
  text-align:center;
  padding:40px 20px 20px;
}

header img{
  width:140px;
}

h1{

  letter-spacing:2px;
  margin-top:10px;
}

.section{

  border-bottom:1px solid #e7ddd3;
}

.section h2{
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:20px;
}

.item{
  background:#fff;
  border:1px solid #e8dfd6;
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
  transition:0.2s ease;
}

.item.active{
  border-color:#b79f8a;
  background:#f9f5f1;
}

.item:hover{
  transform:translateY(-1px);
}

.item-top{
  display:flex;
  justify-content:space-between;
  gap:15px;
}

.item-name{
  font-size:16px;
  line-height:1.4;
}

.kcal{
  font-size:13px;
  color:#85786d;
  margin-top:4px;
}

.macros{
  font-size:12px;
  color:#8f8479;
  margin-top:10px;
}

.addon{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid #eee4db;
  font-size:13px;
  color:#7b7066;
}

input[type="checkbox"]{
  width:18px;
  height:18px;
  accent-color:#b5967b;
  cursor:pointer;
}

.sticky{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(10px);
  border-top:1px solid #e7ddd3;
  padding:18px;
  text-align:center;
}

.total{
  font-size:22px;
  font-weight:bold;
}

.total-macros{
  margin-top:6px;
  font-size:13px;
  color:#6f655d;
}

.disclaimer{
  margin-top:8px;
  font-size:11px;
  color:#91867a;
}

</style>
</head>

let total = {
  kcal:0,
  protein:0,
  carbs:0,
  fat:0
};

function updateTotals(){

  document.getElementById("totalKcal").innerText =
    Math.round(total.kcal) + " kcal";

  document.getElementById("totalMacros").innerText =
    "Protein " + Math.round(total.protein) + "g | " +
    "Kulhydrat " + Math.round(total.carbs) + "g | " +
    "Fedt " + Math.round(total.fat) + "g";
}

function adjustTotals(data, add=true){

  const factor = add ? 1 : -1;

  total.kcal += data.kcal * factor;
  total.protein += data.protein * factor;
  total.carbs += data.carbs * factor;
  total.fat += data.fat * factor;

  updateTotals();
}

function renderMenu(){

  const container = document.getElementById("menu");

  menu.forEach(section => {

    const sectionEl = document.createElement("div");
    sectionEl.className = "section";

    sectionEl.innerHTML = `<h2>${section.category}</h2>`;

    section.items.forEach(item => {

      const itemEl = document.createElement("div");
      itemEl.className = "item";

      const itemId = "item_" + Date.now() + Math.floor(Math.random()*10000);

      itemEl.innerHTML = `

        <div class="item-top">

          <div>
            <div class="item-name">${item.name}</div>

            <div class="kcal">
              ${item.kcal} kcal
            </div>

            <div class="macros">
              Protein ${item.protein}g |
              Kulhydrat ${item.carbs}g |
              Fedt ${item.fat}g
            </div>
          </div>

          <div>
            <input type="checkbox" id="${itemId}">
          </div>

        </div>

        ${
          item.addon ? `
          <div class="addon">
            <label>
              <input type="checkbox" disabled class="addon-check">
              ${item.addon.name}
            </label>
          </div>
          ` : ""
        }

      `;

      const mainCheckbox = document.getElementById(itemId);

      const addonCheckbox = itemEl.querySelector(".addon-check");

      mainCheckbox.addEventListener("change", () => {

        if(mainCheckbox.checked){

          itemEl.classList.add("active");
          adjustTotals(item,true);

          if(addonCheckbox){
            addonCheckbox.disabled = false;
          }

        } else {

          itemEl.classList.remove("active");
          adjustTotals(item,false);

          if(addonCheckbox){

            if(addonCheckbox.checked){
              adjustTotals(item.addon,false);
              addonCheckbox.checked = false;
            }

            addonCheckbox.disabled = true;
          }
        }
      });

      if(addonCheckbox){

        addonCheckbox.addEventListener("change", () => {

          if(addonCheckbox.checked){
            adjustTotals(item.addon,true);
          } else {
            adjustTotals(item.addon,false);
          }

        });
      }

      sectionEl.appendChild(itemEl);

    });

    container.appendChild(sectionEl);

  });

}

renderMenu();

</script>
