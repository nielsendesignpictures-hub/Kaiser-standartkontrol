<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café Kaiser</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family:'Poppins', sans-serif; background:#0a0a0a; color:white; }

    /* HERO */
    .hero { position:relative; height:100vh; overflow:hidden; }
    .hero video { position:absolute; width:100%; height:100%; object-fit:cover; }
    .hero-overlay {
      position:relative; z-index:2; height:100%;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      background:rgba(0,0,0,0.5); text-align:center;
    }

    h1 { font-size:48px; margin:0; }
    p { color:#ddd; }

    /* STICKY CTA */
    .sticky-cta {
      position:fixed; bottom:0; width:100%; display:flex; z-index:999;
    }
    .sticky-cta a {
      flex:1; text-align:center; padding:18px;
      font-weight:bold; text-decoration:none;
    }
    .book { background:#C6A96B; color:black; }
    .menu { background:black; color:white; border-top:1px solid #333; }
    .takeaway { background:#1a1a1a; color:white; border-top:1px solid #333; }

    /* SECTION */
    .section { padding:80px 20px; text-align:center; }

    /* GALLERY */
    .gallery { display:grid; gap:10px; }
    @media(min-width:768px){
      .gallery { grid-template-columns:repeat(3,1fr); }
    }
    .gallery img { width:100%; height:250px; object-fit:cover; }

    /* FOOTER */
    footer { background:#000; padding:40px 20px; }
    .locations { display:grid; gap:20px; }
    @media(min-width:768px){
      .locations { grid-template-columns:repeat(5,1fr); }
    }
    .location { font-size:14px; color:#aaa; }
    .location h4 { color:white; margin-bottom:5px; }

    /* MODAL */
    .modal {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.9); display:none;
      justify-content:center; align-items:center; z-index:1000;
    }
    .modal-content { text-align:center; }
    .modal button {
      display:block; margin:10px auto; padding:15px 30px;
      border:none; border-radius:30px; background:#C6A96B; font-weight:bold;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="https://cdn.coverr.co/videos/coverr-restaurant-interior-5171/1080p.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay">
      <h1>Café Kaiser</h1>
      <p>Mere end bare en café</p>
    </div>
  </section>

  <!-- STORY -->
  <section class="section">
    <h2>Mad lavet fra bunden</h2>
    <p>Vi skaber hyggelige oplevelser med kvalitet og stemning i centrum</p>
  </section>

  <!-- STEMNING -->
  <section class="section">
    <h2>Stemningen hos os</h2>

    <div class="gallery">
      <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de">
      <img src="https://images.unsplash.com/photo-1528605248644-14dd04022da1">
      <img src="https://images.unsplash.com/photo-1550966871-3ed3cdb5ed0c">
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="locations">
      <div class="location"><h4>Helsingør</h4></div>
      <div class="location"><h4>Hillerød</h4></div>
      <div class="location"><h4>Farum</h4></div>
      <div class="location"><h4>Hørsholm</h4></div>
      <div class="location"><h4>Vanløse</h4></div>
    </div>
  </footer>

  <!-- STICKY CTA -->
  <div class="sticky-cta">
    <a href="#" class="book" onclick="openModal()">Book</a>
    <a href="DIN-MENU-LINK" class="menu">Menu</a>
    <a href="DIN-TAKEAWAY-LINK" class="takeaway">Takeaway</a>
  </div>

  <!-- BOOKING MODAL -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Vælg café</h2>

      <button onclick="go('HELSINGOR-LINK')">Helsingør</button>
      <button onclick="go('HILLEROD-LINK')">Hillerød</button>
      <button onclick="go('FARUM-LINK')">Farum</button>
      <button onclick="go('HORSHOLM-LINK')">Hørsholm</button>
      <button onclick="go('VANLOSE-LINK')">Vanløse</button>

      <br>
      <button onclick="closeModal()">Luk</button>
    </div>
  </div>

  <script>
    function openModal(){
      document.getElementById("modal").style.display = "flex";
    }

    function closeModal(){
      document.getElementById("modal").style.display = "none";
    }

    function go(link){
      window.location.href = link;
    }
  </script>

</body>
</html>
