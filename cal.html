<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Catering Produktionsberegner</title>

<style>
body {
  margin:0;
  font-family: system-ui, sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:#f8fafc;
  padding:40px;
}

h1 { margin-bottom:30px; }

.cards {
  display:flex;
  gap:20px;
  margin-bottom:40px;
}

.card {
  flex:1;
  background:#1e293b;
  padding:30px;
  border-radius:14px;
  cursor:pointer;
  border:2px solid transparent;
  transition:0.2s;
}

.card:hover {
  border:2px solid #d4af37;
}

.card.active {
  border:2px solid #d4af37;
  background:#111827;
}

.section {
  background:#1e293b;
  padding:25px;
  border-radius:14px;
  margin-bottom:20px;
}

h3 { margin-top:0; }

button {
  background:#d4af37;
  color:#000;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}

.result {
  background:#0f172a;
  padding:25px;
  border-radius:14px;
  margin-top:30px;
}
.hidden { display:none; }
label { display:block; margin:6px 0; }
input[type="number"] { padding:8px; width:100px; }
</style>
</head>
<body>

<h1>Catering Produktionsberegner</h1>

<div class="cards">
  <div class="card active" onclick="showBrunch()" id="brunchCard">
    <h2>Brunchbuffet</h2>
    <p>Fast standard buffet</p>
  </div>
  <div class="card" onclick="showBuild()" id="buildCard">
    <h2>Byg selv menu</h2>
    <p>Sammensæt menu efter kundens valg</p>
  </div>
</div>

<!-- BRUNCH -->
<div id="brunchSection">

<div class="section">
Antal personer:
<input type="number" id="brunchGuests" value="50" min="1">
<button onclick="calculateBrunch()">Beregn</button>
</div>

<div class="result" id="brunchResult"></div>
</div>


<!-- BYG SELV -->
<div id="buildSection" class="hidden">

<div class="section">
Antal personer:
<input type="number" id="buildGuests" value="50" min="1">
</div>

<div class="section">
<h3>🥩 Kød (vælg 2–3)</h3>
<label><input type="checkbox" value="oksefilet"> Helstegt oksefilet</label>
<label><input type="checkbox" value="oksemoerbrad"> Helstegt oksemørbrad</label>
<label><input type="checkbox" value="frikadeller"> Frikadeller</label>
<label><input type="checkbox" value="skinke"> Glaseret skinke</label>
<label><input type="checkbox" value="kylling"> Marineret kyllingebryst</label>
<label><input type="checkbox" value="laks"> Varmrøget laks med sauce verde</label>
</div>

<div class="section">
<h3>🥗 Salater (vælg 2)</h3>
<label><input type="checkbox" value="100"> Broccolisalat</label>
<label><input type="checkbox" value="125"> Nudelsalat m. tigerrejer</label>
<label><input type="checkbox" value="100"> Kaisers kartoffelsalat</label>
<label><input type="checkbox" value="90"> Rustik tomatsalat</label>
<label><input type="checkbox" value="100"> Couscoussalat</label>
</div>

<div class="section">
<h3>🥔 Kartofler (vælg 2)</h3>
<label><input type="checkbox" value="150"> Flødekartofler</label>
<label><input type="checkbox" value="150"> Trøffel flødekartofler</label>
<label><input type="checkbox" value="150"> Små ovnkartofler</label>
<label><input type="checkbox" value="bagekartoffel"> Bagekartoffel</label>
<label><input type="checkbox" value="gratin"> Kartoffelgratin</label>
</div>

<div class="section">
<h3>🥣 Sauce (vælg 2)</h3>
<label><input type="checkbox" value="100"> Bearnaise sauce</label>
<label><input type="checkbox" value="100"> Rødvinssauce</label>
<label><input type="checkbox" value="100"> Pebersauce</label>
<label><input type="checkbox" value="75"> Hjemmelavet tzatziki</label>
</div>

<div class="section">
<h3>🍰 Dessert (vælg 1)</h3>
<label><input type="checkbox" value="stk"> Chokolademousse</label>
<label><input type="checkbox" value="stk"> Panna cotta</label>
<label><input type="checkbox" value="100"> Chokolade brownie</label>
<label><input type="checkbox" value="180"> Frugtsalat m. vaniljecreme</label>
<label><input type="checkbox" value="stk"> Kaiser’s jordbær/rabarber trifli</label>
</div>

<button onclick="calculateBuild()">Beregn</button>
<div class="result" id="buildResult"></div>

</div>


<script>
function showBrunch(){
  document.getElementById("brunchSection").classList.remove("hidden");
  document.getElementById("buildSection").classList.add("hidden");
  document.getElementById("brunchCard").classList.add("active");
  document.getElementById("buildCard").classList.remove("active");
}

function showBuild(){
  document.getElementById("buildSection").classList.remove("hidden");
  document.getElementById("brunchSection").classList.add("hidden");
  document.getElementById("buildCard").classList.add("active");
  document.getElementById("brunchCard").classList.remove("active");
}

function roundKg(grams){
  let kg = grams/1000;
  if(kg < 5) return Math.ceil(kg*10)/10;
  return Math.ceil(kg*2)/2;
}

function calculateBrunch(){
  const guests = parseInt(document.getElementById("brunchGuests").value);
  const buffer = 1.10;

  const brunchItems = [
    ["Økologisk blandet brød",90],
    ["Laks",45],
    ["Ostefad",55],
    ["Pålægsfad",65],
    ["Røræg",110],
    ["Bacon",35]
  ];

  let output = `<h2>Brunch – ${guests} personer</h2><ul>`;

  brunchItems.forEach(item=>{
    let total = item[1]*guests*buffer;
    output += `<li>${item[0]}: <strong>${roundKg(total)} kg</strong></li>`;
  });

  output += "</ul>";
  document.getElementById("brunchResult").innerHTML = output;
}

function calculateBuild(){
  const guests = parseInt(document.getElementById("buildGuests").value);
  const buffer = 1.10;
  let output = `<h2>Byg selv – ${guests} personer</h2><ul>`;

  document.querySelectorAll('#buildSection input:checked').forEach(item=>{
    if(item.value==="stk" || item.value==="bagekartoffel" || item.value==="gratin"){
      let total = Math.ceil(guests*buffer);
      output += `<li>${item.parentNode.textContent}: <strong>${total} stk</strong></li>`;
    } else {
      let total = parseInt(item.value)*guests*buffer;
      output += `<li>${item.parentNode.textContent}: <strong>${roundKg(total)} kg</strong></li>`;
    }
  });

  output += "</ul>";
  document.getElementById("buildResult").innerHTML = output;
}
</script>

</body>
</html>
