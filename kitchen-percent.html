<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Kitchen %</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#070A12; --bg1:#0B1020;
      --text:rgba(255,255,255,0.94);
      --muted:rgba(255,255,255,0.74);
      --muted2:rgba(255,255,255,0.52);
      --gold:#d6b24a; --gold2:#b9921f;
      --danger:#ff6b6b;
      --shadow: 0 26px 75px rgba(0,0,0,.55);
      --shadow2: 0 18px 55px rgba(0,0,0,.35);
    }
    html,body{height:100%;}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.10), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      overflow-x:hidden; margin:0;
    }
    body:before{
      content:""; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity:0.06; pointer-events:none;
      mask-image: radial-gradient(1000px 700px at 50% 0%, black, transparent 75%);
    }

    .shell{max-width:1100px; margin:0 auto; padding:18px 16px 44px;}
    .hero{
      border-radius: 28px;
      border:1px solid rgba(255,255,255,0.10);
      background:
        radial-gradient(900px 260px at 50% 0%, rgba(255,255,255,0.08), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      padding: 22px 18px 16px;
      position:relative;
      overflow:hidden;
    }
    .hero:after{
      content:""; position:absolute; inset:-2px;
      background:
        radial-gradient(700px 240px at 20% 0%, rgba(245,158,11,0.18), transparent 60%),
        radial-gradient(700px 240px at 80% 0%, rgba(56,189,248,0.14), transparent 60%);
      opacity:.55; pointer-events:none;
    }
    .kicker{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted2);font-weight:900;text-align:center;position:relative;}
    .title{font-family:"Playfair Display",serif;font-size:44px;line-height:1.02;letter-spacing:-0.02em;font-weight:700;text-align:center;margin-top:8px;position:relative;}
    .subtitle{color:var(--muted);font-weight:800;font-size:13px;text-align:center;margin-top:8px;position:relative;}
    .goldline{height:2px;margin:16px auto 0;max-width:720px;border-radius:999px;background:linear-gradient(90deg,transparent,rgba(214,178,74,0.92),transparent);opacity:.95;position:relative;}

    .controls{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;position:relative;}
    .pill,.btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 12px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      font-weight:1000;letter-spacing:.10em;text-transform:uppercase;font-size:11px;
      color: rgba(255,255,255,0.90);white-space:nowrap;user-select:none;
    }
    .btn{cursor:pointer;transition:transform .08s ease;}
    .btn:active{transform:translateY(1px);}
    .btn.primary{
      border:none;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color:#0b0c0f;
      box-shadow: 0 18px 40px rgba(214,178,74,0.18);
    }
    .btn.ghost{
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.14);
    }

    .section{
      margin-top:18px;border-radius:26px;border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);box-shadow: var(--shadow2);overflow:hidden;
    }
    .sectionHead{
      padding:14px 14px 10px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;
      background:
        radial-gradient(900px 200px at 50% 0%, rgba(255,255,255,0.06), transparent 65%),
        linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
    }
    .sectionTitle{
      font-weight:1000;letter-spacing:.20em;text-transform:uppercase;font-size:12px;color:rgba(255,255,255,0.72);
      display:flex;align-items:center;gap:10px;
    }
    .dot{width:10px;height:10px;border-radius:999px;background:rgba(214,178,74,0.85);box-shadow:0 0 0 5px rgba(214,178,74,0.10);}
    .sectionSub{color:rgba(255,255,255,0.55);font-weight:900;font-size:12px;}
    .divider{height:1px;background:rgba(255,255,255,0.10);}

    .grid{
      display:grid;grid-template-columns:1fr;gap:14px;padding:14px;
    }
    @media (min-width: 820px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;}
    }

    .card{
      border-radius:26px;padding:16px;border:1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(900px 240px at 50% 0%, rgba(255,255,255,0.07), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow:0 20px 60px rgba(0,0,0,.40);
      display:flex;flex-direction:column;gap:10px;min-height:140px;
    }
    .cardLabel{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,0.55);font-weight:1000;}
    .cardValue{font-family:"Playfair Display",serif;font-size: clamp(34px, 3.8vw, 54px);line-height:1.02;letter-spacing:-0.02em;font-weight:700;}
    .cardSub{color:rgba(255,255,255,0.74);font-weight:800;font-size:13px;line-height:1.25;}
    .error{color:var(--danger);font-weight:1000;text-align:center;display:none;margin-top:10px;}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px;}
    .input{
      flex:1 1 220px;border-radius:14px;border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);padding:12px;outline:none;color:rgba(255,255,255,0.92);font-weight:900;
    }

    .list{padding:14px;display:flex;flex-direction:column;gap:10px;}
    .line{
      border-radius:18px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.03);
      padding:12px;
    }
    .lineTop{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:baseline;}
    .lineDate{font-weight:1000;}
    .lineVals{color:rgba(255,255,255,0.70);font-weight:900;font-size:12px;}
    
    .tag{
      display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);background: rgba(255,255,255,0.03);
      font-weight:1000;letter-spacing:.12em;text-transform:uppercase;font-size:11px;
      color: rgba(255,255,255,0.76);white-space:nowrap;
    }
    .miniDot{ width:7px;height:7px;border-radius:999px; background: rgba(214,178,74,0.85); }
  </style>
</head>

<body>
  <div class="shell">
    <header class="hero mt-6">
      <div class="kicker">KAISER</div>
      <div class="title">Kitchen %</div>
      <div class="subtitle">Daily entry • Month-to-date overview</div>
      <div class="goldline"></div>

      <div class="controls">
        <div class="pill" id="locPill">Location: —</div>
        <div class="pill" id="updatedPill">Updated: —</div>
        <button class="btn ghost" id="changeLocBtn" type="button">Change Loc (Leader)</button>
      </div>

      <div class="error" id="errorText"></div>
    </header>

    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle"><span class="dot"></span> Overview</div>
        <div class="sectionSub">Month-to-date</div>
      </div>
      <div class="divider"></div>

      <div class="grid">
        <div class="card">
          <div class="cardLabel">Kitchen % (MTD)</div>
          <div class="cardValue" id="kpiPct">—</div>
          <div class="cardSub" id="kpiSub">—</div>
          <div class="tag" id="kpiMtdTag"><span class="miniDot"></span> —</div>
        </div>

        <div class="card">
          <div class="cardLabel">Purchases (MTD)</div>
          <div class="cardValue" id="kpiBuy">—</div>
          <div class="cardSub">Total purchases recorded</div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle"><span class="dot"></span> Enter day</div>
        <div class="sectionSub">Revenue + Purchases</div>
      </div>
      <div class="divider"></div>

      <div class="row">
        <input class="input" id="dateInput" placeholder="Date (YYYY-MM-DD)" />
        <input class="input" id="revInput" placeholder="Revenue (DKK)" />
        <input class="input" id="buyInput" placeholder="Purchases (DKK)" />
        <button class="btn primary" id="saveBtn" type="button">Save</button>
      </div>
    </section>

    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle"><span class="dot"></span> Latest entries</div>
        <div class="sectionSub">Click a line to edit</div>
      </div>
      <div class="divider"></div>

      <div class="list" id="list"></div>
    </section>
  </div>

  <script>
    // VIGTIGT: SÆT DIN RIGTIGE /EXEC URL IND HER!
    // F.eks: "https://script.google.com/macros/s/AKfycb.../exec"
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeCnIsYirU3iB8rse1dU7HX4HSzG6hxl0vEPstyIy0hLOhje06kXsyO6-DzMYan-u4/exec"; 
    const TOKEN = "KAISER_TOKEN_2026";
    const LEADER_CODE = "KAISER2026";

    // 01-03 to 10-03 baseline data
    const BASELINE_DATA = {
      "Café Kaiser Hillerød":  { revGross: 424048.75, buy: 64582.71 },
      "Café Kaiser Farum":     { revGross: 352679.74, buy: 59115.96 },
      "Café Kaiser Hørsholm":  { revGross: 377223.23, buy: 45801.28 },
      "Café Kaiser Vanløse":   { revGross: 402930.64, buy: 65871.02 },
      "Café Kaiser Helsingør": { revGross: 293146.85, buy: 43294.36 }
    };

    const VAT_FACTOR = 1.25;

    const LOCATIONS = [
      "Café Kaiser Helsingør",
      "Café Kaiser Hillerød",
      "Café Kaiser Farum",
      "Café Kaiser Hørsholm",
      "Café Kaiser Vanløse"
    ];

    const LOC_KEY = "kaiser_kitchenpct_loc";

    function $(id){ return document.getElementById(id); }
    function setError(msg){
      const el = $("errorText");
      if (!msg){ el.style.display="none"; el.textContent=""; return; }
      el.style.display="block"; el.textContent=msg;
    }

    function isoToday(){
      const d = new Date();
      const off = d.getTimezoneOffset();
      const local = new Date(d.getTime() - off*60000);
      return local.toISOString().slice(0,10);
    }
    function isoYesterday(){
      const d = new Date();
      d.setDate(d.getDate()-1);
      const off = d.getTimezoneOffset();
      const local = new Date(d.getTime() - off*60000);
      return local.toISOString().slice(0,10);
    }
    function monthKey(iso){ return String(iso || "").slice(0,7); }

    function fmtDKK(n){
      const val = Number(n || 0);
      return val.toLocaleString("en-US", { style:"currency", currency:"DKK", maximumFractionDigits:0 });
    }
    function pctStr(p){
      if (p === null || !isFinite(p)) return "—";
      return (p*100).toFixed(1) + "%";
    }
    function parseMoney(input){
      let s = String(input || "").trim().toLowerCase();
      if (!s) return NaN;
      s = s.replace(/kr\.?/g, "").replace(/\s/g, "");
      s = s.replace(/\./g, "");
      s = s.replace(",", ".");
      const n = Number(s);
      return isFinite(n) ? n : NaN;
    }

    function getLoc(){
      const fromQS = new URLSearchParams(location.search).get("loc");
      if (fromQS && LOCATIONS.includes(fromQS)) {
        localStorage.setItem(LOC_KEY, fromQS);
        return fromQS;
      }
      const saved = localStorage.getItem(LOC_KEY) || "";
      if (saved && LOCATIONS.includes(saved)) return saved;

      const pick = prompt("Select location (exact):\n" + LOCATIONS.join("\n"));
      if (!pick || !LOCATIONS.includes(pick.trim())) return "";
      localStorage.setItem(LOC_KEY, pick.trim());
      return pick.trim();
    }

    // JSONP setup
    function jsonp(url, params){
      return new Promise((resolve, reject) => {
        // If script url is not set, just return empty data
        if (!url || url.includes("PASTE_YOUR_EXEC_URL")) {
            resolve({ok:true, entries:[], totals:{revenueGross:0, purchases:0}});
            return;
        }

        const cb = "__cb_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams({ ...params, callback: cb }).toString();
        const src = url + (url.includes("?") ? "&" : "?") + qs;

        const s = document.createElement("script");
        const t = setTimeout(() => {
          cleanup();
          reject(new Error("timeout"));
        }, 12000);

        function cleanup(){
          clearTimeout(t);
          delete window[cb];
          s.remove();
        }

        window[cb] = (data) => {
          cleanup();
          resolve(data);
        };

        s.src = src;
        s.onerror = () => { cleanup(); reject(new Error("load error")); };
        document.body.appendChild(s);
      });
    }

    async function loadMonth(){
      setError("");
      $("saveBtn").textContent = "Loading...";
      $("saveBtn").disabled = true;

      const loc = getLoc();
      if (!loc) return setError("Location not set.");

      const m = monthKey(isoToday());
      $("locPill").textContent = "Location: " + loc;

      const data = await jsonp(SCRIPT_URL, { action:"get", loc: loc, month: m }).catch(e => null);
      
      $("saveBtn").textContent = "Save";
      $("saveBtn").disabled = false;

      if (!data || !data.ok) {
        // If fetching fails, we still show the baseline
        data = { entries: [], totals: {revenueGross:0, purchases:0} };
      }

      $("updatedPill").textContent = "Updated: " + new Date().toLocaleTimeString("da-DK", {hour: '2-digit', minute:'2-digit'});

      // Add baseline
      const base = BASELINE_DATA[loc] || { revGross: 0, buy: 0 };
      const totalGross = data.totals.revenueGross + base.revGross;
      const totalBuy   = data.totals.purchases + base.buy;
      const totalNet   = totalGross / VAT_FACTOR;
      const mtdPct     = totalNet > 0 ? (totalBuy / totalNet) : null;

      $("kpiPct").textContent = pctStr(mtdPct);
      $("kpiBuy").textContent = fmtDKK(totalBuy);
      $("kpiSub").textContent = "Net Revenue: " + fmtDKK(totalNet);
      $("kpiMtdTag").innerHTML = `<span class="miniDot"></span> Includes baseline from Mar 1-10`;

      const list = $("list");
      list.innerHTML = "";

      const entries = (data.entries || []).slice().sort((a,b) => b.date.localeCompare(a.date)).slice(0, 14);
      if (!entries.length){
        const div = document.createElement("div");
        div.className = "line";
        div.textContent = "No recent days saved. Only showing baseline data.";
        list.appendChild(div);
        return;
      }

      for (const e of entries){
        const net = (e.revenueGross || 0) / VAT_FACTOR;
        const pct = net > 0 ? (e.purchases / net) : null;

        const row = document.createElement("div");
        row.className = "line";
        row.style.cursor = "pointer";
        row.innerHTML = `
          <div class="lineTop">
            <div class="lineDate">${e.date}</div>
            <div class="lineVals">Rev: ${fmtDKK(e.revenueGross)} • Buy: ${fmtDKK(e.purchases)} • ${pctStr(pct)}</div>
          </div>
        `;
        row.addEventListener("click", () => {
          $("dateInput").value = e.date;
          $("revInput").value = String(Math.round(e.revenueGross || 0));
          $("buyInput").value = String(Math.round(e.purchases || 0));
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        list.appendChild(row);
      }
    }

    async function saveDay(){
      setError("");
      if(SCRIPT_URL.includes("PASTE_YOUR_EXEC_URL_HERE")) {
          return alert("You need to paste your Google Apps Script /exec URL into the code first.");
      }

      const loc = getLoc();
      if (!loc) return setError("Location not set.");

      const date = ($("dateInput").value || "").trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return setError("Date must be YYYY-MM-DD.");

      const revenueGross = parseMoney($("revInput").value);
      const purchases = parseMoney($("buyInput").value);

      if (!isFinite(revenueGross) || revenueGross < 0) return setError("Revenue must be a valid number.");
      if (!isFinite(purchases) || purchases < 0) return setError("Purchases must be a valid number.");

      $("saveBtn").textContent = "Saving...";
      $("saveBtn").disabled = true;

      const res = await jsonp(SCRIPT_URL, {
        action:"save",
        token: TOKEN,
        loc: loc,
        date: date,
        revenueGross: String(revenueGross),
        purchases: String(purchases)
      }).catch(e => null);

      if (!res || !res.ok) {
          $("saveBtn").textContent = "Save";
          $("saveBtn").disabled = false;
          return setError("Save failed. Try again.");
      }
      
      $("dateInput").value = isoYesterday();
      $("revInput").value = "";
      $("buyInput").value = "";
      await loadMonth();
    }

    $("saveBtn").addEventListener("click", saveDay);

    $("changeLocBtn").addEventListener("click", () => {
      const code = prompt("Leader code:");
      if (code !== LEADER_CODE) return alert("Wrong code.");
      localStorage.removeItem(LOC_KEY);
      location.reload();
    });

    (function init(){
      $("dateInput").value = isoYesterday();
      loadMonth();
    })();
  </script>
</body>
</html>
