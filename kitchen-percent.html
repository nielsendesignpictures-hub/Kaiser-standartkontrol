<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Kitchen % Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#0d1117;
      --bg1:#161b22;
      --text:rgba(255,255,255,0.95);
      --muted:rgba(255,255,255,0.70);
      --gold:#d6b24a;
      --gold2:#b9921f;
      --ok:#62d26f;
      --danger:#ff6b6b;
      --warn:#f59e0b;
      --shadow:0 20px 60px rgba(0,0,0,.40);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.10), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      padding:20px;
    }

    .wrap{max-width:620px;margin:0 auto;}
    .card{
      border-radius:28px;
      border:1px solid rgba(255,255,255,0.12);
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow:var(--shadow);
      padding:24px;
    }

    .kicker{
      font-size:12px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.55);
      font-weight:900;
      text-align:center;
    }

    h1{
      margin:10px 0 0;
      text-align:center;
      font-family:"Playfair Display",serif;
      font-size:40px;
      line-height:1;
    }

    .sub{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
      margin-top:10px;
    }

    .goldline{
      height:2px;
      margin:18px auto 0;
      max-width:420px;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
    }

    .pillbar{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .pill{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      font-weight:800;
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.92);
    }

    .grid{
      display:grid;
      gap:16px;
      margin-top:22px;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-weight:800;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    input,select{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:var(--text);
      padding:14px 16px;
      font-size:16px;
      font-weight:700;
      outline:none;
    }

    input:focus,select:focus{
      border-color:var(--gold);
      background:rgba(255,255,255,0.09);
    }

    select option{
      background:#161b22;
      color:#fff;
    }

    .preview{
      margin-top:22px;
      border-radius:22px;
      border:1px solid rgba(214,178,74,0.35);
      background:rgba(214,178,74,0.08);
      padding:20px;
      text-align:center;
    }

    .previewKicker{
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.70);
      font-weight:800;
    }

    .previewPct{
      font-family:"Playfair Display",serif;
      font-size:58px;
      line-height:1;
      margin-top:10px;
    }

    .previewMeta{
      margin-top:8px;
      color:var(--muted);
      font-weight:700;
      font-size:14px;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    .btn{
      flex:1;
      min-width:180px;
      border:none;
      border-radius:16px;
      padding:16px;
      font-size:14px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#0b0c0f;
    }

    .btn.ghost{
      background:rgba(255,255,255,0.08);
      color:#fff;
      border:1px solid rgba(255,255,255,0.14);
    }

    .status{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      font-size:14px;
      font-weight:700;
      display:none;
    }
    .status.ok{
      display:block;
      background:rgba(98,210,111,0.15);
      border:1px solid rgba(98,210,111,0.35);
      color:var(--ok);
    }
    .status.err{
      display:block;
      background:rgba(255,107,107,0.15);
      border:1px solid rgba(255,107,107,0.35);
      color:var(--danger);
    }

    .small{
      margin-top:12px;
      color:rgba(255,255,255,0.55);
      font-size:12px;
      font-weight:600;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="kicker">KAISER</div>
      <h1>Kitchen % Admin</h1>
      <div class="sub">Indtast dagens omsætning og indkøb pr. lokation</div>
      <div class="goldline"></div>

      <div class="pillbar">
        <div class="pill" id="locPill">📍 Location: —</div>
        <div class="pill" id="datePill">📅 Date: —</div>
      </div>

      <div class="grid">
        <div>
          <label for="locSelect">Lokation</label>
          <select id="locSelect">
            <option value="Café Kaiser Helsingør">Café Kaiser Helsingør</option>
            <option value="Café Kaiser Hillerød">Café Kaiser Hillerød</option>
            <option value="Café Kaiser Farum">Café Kaiser Farum</option>
            <option value="Café Kaiser Hørsholm">Café Kaiser Hørsholm</option>
            <option value="Café Kaiser Vanløse">Café Kaiser Vanløse</option>
          </select>
        </div>

        <div>
          <label for="dateInput">Dato</label>
          <input id="dateInput" type="date" />
        </div>

        <div>
          <label for="revInput">Omsætning brutto</label>
          <input id="revInput" type="number" inputmode="decimal" placeholder="Fx 15000" />
        </div>

        <div>
          <label for="purInput">Indkøb / bestilling</label>
          <input id="purInput" type="number" inputmode="decimal" placeholder="Fx 3200" />
        </div>
      </div>

      <div class="preview">
        <div class="previewKicker">Live beregning</div>
        <div class="previewPct" id="livePct">—</div>
        <div class="previewMeta" id="liveMeta">Netto omsætning: —</div>
      </div>

      <div class="actions">
        <button class="btn ghost" id="loadTodayBtn" type="button">Hent dagens tal</button>
        <button class="btn primary" id="saveBtn" type="button">Gem</button>
      </div>

      <div class="status" id="statusBox"></div>
      <div class="small">Tip: brug links som kitchen-admin.html?loc=Helsingør</div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "DIN_APPS_SCRIPT_WEB_APP_URL_HER";
    const VAT_FACTOR = 1.25;

    const $ = id => document.getElementById(id);

    function isoToday() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function fmtDKK(n) {
      return Number(n || 0).toLocaleString("da-DK", {
        style: "currency",
        currency: "DKK",
        maximumFractionDigits: 0
      });
    }

    function pctStr(p) {
      if (p === null || !isFinite(p)) return "—";
      return (p * 100).toFixed(1).replace(".", ",") + "%";
    }

    function setStatus(msg, type) {
      const box = $("statusBox");
      box.className = "status " + (type === "ok" ? "ok" : "err");
      box.textContent = msg;
    }

    function clearStatus() {
      $("statusBox").className = "status";
      $("statusBox").textContent = "";
    }

    function getLocFromQS() {
      return new URLSearchParams(location.search).get("loc") || "";
    }

    function updateHeaderPills() {
      $("locPill").textContent = "📍 Location: " + $("locSelect").value.replace("Café Kaiser ", "");
      $("datePill").textContent = "📅 Date: " + ($("dateInput").value || "—");
    }

    function updatePreview() {
      const revGross = Number(($("revInput").value || "").replace(",", ".")) || 0;
      const purchases = Number(($("purInput").value || "").replace(",", ".")) || 0;

      if (revGross <= 0) {
        $("livePct").textContent = "—";
        $("liveMeta").textContent = "Netto omsætning: —";
        return;
      }

      const revNet = revGross / VAT_FACTOR;
      const pct = revNet > 0 ? purchases / revNet : null;

      $("livePct").textContent = pctStr(pct);
      $("liveMeta").textContent = "Netto omsætning: " + fmtDKK(revNet);
    }

    function jsonp(url, params = {}) {
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams({ ...params, callback: cb }).toString();
        const src = url + (url.includes("?") ? "&" : "?") + qs;

        const s = document.createElement("script");
        const t = setTimeout(() => {
          cleanup();
          reject(new Error("timeout"));
        }, 15000);

        function cleanup() {
          clearTimeout(t);
          try { delete window[cb]; } catch (_) {}
          if (s.parentNode) s.parentNode.removeChild(s);
        }

        window[cb] = (data) => {
          cleanup();
          resolve(data);
        };

        s.src = src;
        s.async = true;
        s.onerror = () => {
          cleanup();
          reject(new Error("load error"));
        };

        document.body.appendChild(s);
      });
    }

    async function loadTodayData() {
      clearStatus();
      const loc = $("locSelect").value;
      const date = $("dateInput").value;

      try {
        const data = await jsonp(SCRIPT_URL, {
          action: "getKitchenDay",
          loc,
          date
        });

        if (!data || !data.ok) {
          throw new Error(data?.error || "Load failed");
        }

        if (!data.row) {
          setStatus("Ingen tal fundet for denne dato/lokation endnu.", "err");
          $("revInput").value = "";
          $("purInput").value = "";
          updatePreview();
          return;
        }

        $("revInput").value = data.row.revenueGross || "";
        $("purInput").value = data.row.purchases || "";
        updatePreview();
        setStatus("Dagens tal hentet.", "ok");

      } catch (e) {
        setStatus("Kunne ikke hente dagens tal.", "err");
      }
    }

    async function saveData() {
      clearStatus();

      const location = $("locSelect").value;
      const date = $("dateInput").value;
      const revenueGross = $("revInput").value;
      const purchases = $("purInput").value;

      if (!date || revenueGross === "" || purchases === "") {
        setStatus("Udfyld alle felter.", "err");
        return;
      }

      const btn = $("saveBtn");
      btn.disabled = true;
      btn.textContent = "Gemmer...";

      try {
        const form = new URLSearchParams();
        form.append("action", "saveKitchenPct");
        form.append("date", date);
        form.append("location", location);
        form.append("revenueGross", revenueGross);
        form.append("purchases", purchases);

        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          body: form
        });

        const data = await res.json();

        if (!data || !data.ok) {
          throw new Error(data?.error || "Save failed");
        }

        setStatus("✅ Gemt. Hub’en opdaterer automatisk.", "ok");

      } catch (e) {
        console.error(e);
        setStatus("❌ Kunne ikke gemme data.", "err");
      } finally {
        btn.disabled = false;
        btn.textContent = "Gem";
      }
    }

    (function init() {
      $("dateInput").value = isoToday();

      const locQS = getLocFromQS();
      if (locQS) {
        const wanted = "Café Kaiser " + locQS.trim();
        const options = Array.from($("locSelect").options);
        const match = options.find(o => o.value.toLowerCase() === wanted.toLowerCase());
        if (match) $("locSelect").value = match.value;
      }

      updateHeaderPills();
      updatePreview();

      $("locSelect").addEventListener("change", () => {
        updateHeaderPills();
        clearStatus();
      });

      $("dateInput").addEventListener("change", () => {
        updateHeaderPills();
        clearStatus();
      });

      $("revInput").addEventListener("input", updatePreview);
      $("purInput").addEventListener("input", updatePreview);

      $("loadTodayBtn").addEventListener("click", loadTodayData);
      $("saveBtn").addEventListener("click", saveData);
    })();
  </script>
</body>
</html>
