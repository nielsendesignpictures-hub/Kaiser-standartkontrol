<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Catering Schedule</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#070A12; --bg1:#0B1020;
      --text:rgba(255,255,255,0.94);
      --muted:rgba(255,255,255,0.74);
      --muted2:rgba(255,255,255,0.52);
      --gold:#d6b24a; --gold2:#b9921f;
      --danger:#ff6b6b; --warn:#f59e0b; --ok:#62d26f;
      --shadow: 0 26px 75px rgba(0,0,0,.55);
      --shadow2: 0 18px 55px rgba(0,0,0,.35);
    }
    html,body{height:100%;}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.10), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      overflow-x:hidden; margin:0;
    }
    body:before{
      content:""; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity:0.06; pointer-events:none;
      mask-image: radial-gradient(1000px 700px at 50% 0%, black, transparent 75%);
    }
    .shell{max-width:1200px; margin:0 auto; padding:18px 16px 44px;}

    .hero{
      border-radius: 28px;
      border:1px solid rgba(255,255,255,0.10);
      background:
        radial-gradient(900px 260px at 50% 0%, rgba(255,255,255,0.08), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      padding: 22px 18px 16px;
      position:relative; overflow:hidden;
    }
    .hero:after{
      content:""; position:absolute; inset:-2px;
      background:
        radial-gradient(700px 240px at 20% 0%, rgba(245,158,11,0.18), transparent 60%),
        radial-gradient(700px 240px at 80% 0%, rgba(56,189,248,0.14), transparent 60%);
      opacity:.55; pointer-events:none;
    }
    .kicker{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted2);font-weight:900;text-align:center;position:relative;}
    .title{font-family:"Playfair Display",serif;font-size:44px;line-height:1.02;letter-spacing:-0.02em;font-weight:700;text-align:center;margin-top:8px;position:relative;}
    .subtitle{color:var(--muted);font-weight:800;font-size:13px;text-align:center;margin-top:8px;position:relative;}
    .goldline{height:2px;margin:16px auto 0;max-width:720px;border-radius:999px;background:linear-gradient(90deg,transparent,rgba(214,178,74,0.92),transparent);opacity:.95;position:relative;}

    .controls{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;position:relative;}
    .pill,.btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 12px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      font-weight:1000;letter-spacing:.10em;text-transform:uppercase;font-size:11px;
      color: rgba(255,255,255,0.90);white-space:nowrap;user-select:none;
    }
    .btn{cursor:pointer;transition:transform .08s ease;}
    .btn:active{transform:translateY(1px);}
    .btn.primary{border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0b0c0f;box-shadow:0 18px 40px rgba(214,178,74,0.18);}
    .btn.ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);}

    .section{margin-top:18px;border-radius:26px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.03);box-shadow:var(--shadow2);overflow:hidden;}
    .sectionHead{
      padding:14px 14px 10px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;
      background:
        radial-gradient(900px 200px at 50% 0%, rgba(255,255,255,0.06), transparent 65%),
        linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
    }
    .sectionTitle{font-weight:1000;letter-spacing:.20em;text-transform:uppercase;font-size:12px;color:rgba(255,255,255,0.72);display:flex;align-items:center;gap:10px;}
    .dot{width:10px;height:10px;border-radius:999px;background:rgba(214,178,74,0.85);box-shadow:0 0 0 5px rgba(214,178,74,0.10);}
    .sectionSub{color:rgba(255,255,255,0.55);font-weight:900;font-size:12px;}
    .divider{height:1px;background:rgba(255,255,255,0.10);}

    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:14px;}
    .input{
      flex:1 1 200px;border-radius:14px;border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);padding:12px;outline:none;color:rgba(255,255,255,0.92);font-weight:900;
    }

    .grid{display:grid;grid-template-columns:1fr;gap:12px;padding:14px;}
    @media (min-width: 820px){ .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;} }

    .event{
      border-radius:22px;border:1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(900px 220px at 50% 0%, rgba(255,255,255,0.06), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: 0 18px 50px rgba(0,0,0,.38);
      padding:14px;
      position:relative;
      overflow:hidden;
      display:flex;
      gap:12px;
    }
    .bar{
      width:10px;border-radius:999px;flex:0 0 auto;align-self:stretch;opacity:.95;
    }
    .bar.red{ background: rgba(255,107,107,0.85); box-shadow: 0 0 0 5px rgba(255,107,107,0.10); }
    .bar.yellow{ background: rgba(245,158,11,0.90); box-shadow: 0 0 0 5px rgba(245,158,11,0.10); }
    .bar.green{ background: rgba(98,210,111,0.90); box-shadow: 0 0 0 5px rgba(98,210,111,0.10); }
    .bar.gray{ background: rgba(255,255,255,0.25); box-shadow: 0 0 0 5px rgba(255,255,255,0.06); }

    .body{flex:1;min-width:0;}
    .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:baseline;}
    .name{font-weight:1000;letter-spacing:-0.01em;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
    .meta{color:rgba(255,255,255,0.65);font-weight:900;font-size:12px;white-space:nowrap;}
    .msg{margin-top:6px;color:rgba(255,255,255,0.80);font-weight:800;font-size:13px;line-height:1.35;}
    .tags{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:space-between;align-items:center;}
    .tag{
      display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.03);
      font-weight:1000;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:rgba(255,255,255,0.76);
    }
    .miniDot{ width:7px;height:7px;border-radius:999px;background:rgba(214,178,74,0.85); }
    .smallBtn{
      padding:8px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.90);
      font-weight:1000;letter-spacing:.12em;text-transform:uppercase;font-size:11px;cursor:pointer;user-select:none;
    }
    .smallBtn.danger{ border-color: rgba(255,107,107,0.35); background: rgba(255,107,107,0.12); }

    .err{display:none;color:var(--danger);font-weight:1000;text-align:center;padding:10px 14px;}
  </style>
</head>

<body>
  <div class="shell">
    <header class="hero mt-6">
      <div class="kicker">KAISER</div>
      <div class="title">Catering Schedule</div>
      <div class="subtitle">Location-specific</div>
      <div class="goldline"></div>

      <div class="controls">
        <div class="pill" id="locPill">Location: —</div>
        <div class="pill" id="updPill">Updated: —</div>
        <button class="btn ghost" id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle"><span class="dot"></span> Add / Edit</div>
        <div class="sectionSub">Leader code required</div>
      </div>
      <div class="divider"></div>

      <div class="row">
        <input class="input" id="dateInput" placeholder="Date (YYYY-MM-DD)" />
        <input class="input" id="timeInput" placeholder="Time (HH:MM)" />
        <input class="input" id="titleInput" placeholder="Title (e.g. Company name)" />
        <input class="input" id="guestsInput" placeholder="Guests (optional)" />
        <input class="input" id="noteInput" placeholder="Note (optional)" />
        <button class="btn primary" id="saveBtn" type="button">Save</button>
      </div>

      <div class="err" id="errText"></div>
    </section>

    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle"><span class="dot"></span> Upcoming</div>
        <div class="sectionSub">Next 21 days</div>
      </div>
      <div class="divider"></div>

      <div class="grid" id="grid"></div>
    </section>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeCnIsYirU3iB8rse1dU7HX4HSzG6hxl0vEPstyIy0hLOhje06kXsyO6-DzMYan-u4/exec";
    const TOKEN = "KAISER_TOKEN_2026"; // must match Apps Script
    const LOC_KEY = "kaiser_kitchenpct_loc"; // reuse your location lock
    const DAYS_AHEAD = 21;

    // Color thresholds (edit if you want):
    // Green: today + tomorrow (<= 36h)
    // Yellow: 36-72h
    // Red: >72h
    const GREEN_HOURS = 36;
    const YELLOW_HOURS = 72;

    function $(id){ return document.getElementById(id); }
    function setErr(msg){
      const el = $("errText");
      if (!msg){ el.style.display="none"; el.textContent=""; return; }
      el.style.display="block"; el.textContent=msg;
    }

    function jsonp(url, params){
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams({ ...params, callback: cb }).toString();
        const src = url + (url.includes("?") ? "&" : "?") + qs;

        const s = document.createElement("script");
        const t = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 12000);
        function cleanup(){ clearTimeout(t); delete window[cb]; s.remove(); }
        window[cb] = (data) => { cleanup(); resolve(data); };
        s.src = src;
        s.onerror = () => { cleanup(); reject(new Error("load error")); };
        document.body.appendChild(s);
      });
    }

    function getLoc(){
      const fromQS = new URLSearchParams(location.search).get("loc");
      if (fromQS) localStorage.setItem(LOC_KEY, fromQS);
      const saved = localStorage.getItem(LOC_KEY) || "";
      return saved;
    }

    function isoToday(){
      const d = new Date();
      const off = d.getTimezoneOffset();
      const local = new Date(d.getTime() - off*60000);
      return local.toISOString().slice(0,10);
    }

    function hoursUntil(dateStr, timeStr){
      const t = (timeStr && /^\d{2}:\d{2}$/.test(timeStr)) ? timeStr : "00:00";
      const dt = new Date(dateStr + "T" + t + ":00");
      return (dt.getTime() - Date.now()) / (3600*1000);
    }

    function colorFor(h){
      if (!isFinite(h)) return "gray";
      if (h < 0) return "red";             // overdue
      if (h <= GREEN_HOURS) return "green";
      if (h <= YELLOW_HOURS) return "yellow";
      return "red";
    }

    function escapeHtml(s){
      return String(s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c]));
    }

    let editingId = "";

    async function load(){
      setErr("");
      const loc = getLoc();
      $("locPill").textContent = "Location: " + (loc || "—");

      if (!loc) {
        setErr("Location not set. Open with ?loc=... once.");
        return;
      }

      $("refreshBtn").textContent = "Loading…";
      $("refreshBtn").disabled = true;

      let data = null;
      try{
        data = await jsonp(SCRIPT_URL, { action:"catering_get", loc: loc, days: String(DAYS_AHEAD) });
      } catch(e){
        data = null;
      }

      $("refreshBtn").textContent = "Refresh";
      $("refreshBtn").disabled = false;

      if (!data || !data.ok) {
        setErr("Could not load data.");
        return;
      }

      $("updPill").textContent = "Updated: " + new Date().toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"});

      renderList(data.events || []);
    }

    function renderList(events){
      const grid = $("grid");
      grid.innerHTML = "";

      if (!events.length) {
        const div = document.createElement("div");
        div.className = "event";
        div.innerHTML = `<div class="bar gray"></div><div class="body"><div class="name">No upcoming events</div></div>`;
        grid.appendChild(div);
        return;
      }

      events.forEach(ev => {
        const h = hoursUntil(ev.date, ev.time);
        const col = colorFor(h);
        const when = ev.date + (ev.time ? (" " + ev.time) : "");
        const leftTxt = (h < 0) ? "OVERDUE" : (h < 48 ? "SOON" : Math.round(h/24) + "d");

        const card = document.createElement("div");
        card.className = "event";
        card.innerHTML = `
          <div class="bar ${col}"></div>
          <div class="body">
            <div class="top">
              <div class="name">${escapeHtml(ev.title || "Catering")}</div>
              <div class="meta">${escapeHtml(when)} • ${escapeHtml(leftTxt)}</div>
            </div>
            <div class="msg">
              ${escapeHtml(ev.location || "")}
              ${ev.guests ? (" • Guests: " + Number(ev.guests)) : ""}
              ${ev.note ? (" • " + escapeHtml(ev.note)) : ""}
            </div>
            <div class="tags">
              <div class="tag"><span class="miniDot"></span> ${escapeHtml(col.toUpperCase())}</div>
              <div>
                <button class="smallBtn" data-edit="${escapeHtml(ev.id)}">Edit</button>
                <button class="smallBtn danger" data-del="${escapeHtml(ev.id)}">Delete</button>
              </div>
            </div>
          </div>
        `;

        grid.appendChild(card);

        card.querySelector("[data-edit]").addEventListener("click", () => {
          editingId = ev.id;
          $("dateInput").value = ev.date || "";
          $("timeInput").value = ev.time || "";
          $("titleInput").value = ev.title || "";
          $("guestsInput").value = ev.guests ? String(ev.guests) : "";
          $("noteInput").value = ev.note || "";
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        card.querySelector("[data-del]").addEventListener("click", async () => {
          const code = prompt("Leader code:");
          if (!code) return;
          if (code.trim() !== "KAISER2026") return alert("Wrong code.");
          if (!confirm("Delete this event?")) return;

          const res = await jsonp(SCRIPT_URL, { action:"catering_delete", token: TOKEN, id: ev.id });
          if (!res || !res.ok) return alert("Delete failed.");
          editingId = "";
          await load();
        });
      });
    }

    async function save(){
      setErr("");
      const loc = getLoc();
      if (!loc) return setErr("Location not set.");

      const code = prompt("Leader code:");
      if (!code) return;
      if (code.trim() !== "KAISER2026") return alert("Wrong code.");

      const date = ($("dateInput").value || "").trim();
      const time = ($("timeInput").value || "").trim();
      const title = ($("titleInput").value || "").trim();
      const guests = ($("guestsInput").value || "").trim();
      const note = ($("noteInput").value || "").trim();

      if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return setErr("Date must be YYYY-MM-DD.");
      if (time && !/^\d{2}:\d{2}$/.test(time)) return setErr("Time must be HH:MM.");
      if (!title) return setErr("Title is required.");

      $("saveBtn").textContent = "Saving…";
      $("saveBtn").disabled = true;

      let res = null;
      try{
        res = await jsonp(SCRIPT_URL, {
          action: "catering_save",
          token: TOKEN,
          id: editingId || "",
          loc: loc,
          date: date,
          time: time,
          title: title,
          guests: guests ? String(Number(guests)) : "0",
          note: note
        });
      } catch(e){
        res = null;
      }

      $("saveBtn").textContent = "Save";
      $("saveBtn").disabled = false;

      if (!res || !res.ok) return setErr("Save failed.");

      editingId = "";
      $("dateInput").value = isoToday();
      $("timeInput").value = "";
      $("titleInput").value = "";
      $("guestsInput").value = "";
      $("noteInput").value = "";

      await load();
    }

    $("saveBtn").addEventListener("click", save);
    $("refreshBtn").addEventListener("click", load);

    (function init(){
      $("dateInput").value = isoToday();
      load();
      setInterval(load, 60000);
    })();
  </script>
</body>
</html>
