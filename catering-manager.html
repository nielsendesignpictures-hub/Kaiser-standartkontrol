<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catering Manager - Kaiser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg0: #070A12;
            --bg1: #0B1020;
            --panel: rgba(255,255,255,0.055);
            --border: rgba(255,255,255,0.10);
            --text: rgba(255,255,255,0.94);
            --muted: rgba(255,255,255,0.74);
            --muted2: rgba(255,255,255,0.52);
            --gold: #d6b24a;
            --gold2: #b9921f;
            --kitchen: #f59e0b;
            --success: #22c55e;
            --danger: #ff6b6b;
            --shadow: 0 26px 75px rgba(0,0,0,.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.10), transparent 55%),
                radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
                radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
                linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
            min-height: 100vh;
            padding: 20px;
        }

        body:before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 38px 38px;
            opacity: 0.06;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--gold);
        }

        .header {
            position: relative;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-family: "Playfair Display", serif;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--muted);
            font-size: 14px;
        }

        .goldline {
            height: 2px;
            margin: 20px auto 0;
            max-width: 400px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .success-message {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.5s ease;
            font-weight: 600;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-card {
            position: relative;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="time"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(214,178,74,0.15);
        }

        select {
            cursor: pointer;
        }

        select option {
            background: var(--bg1);
            color: var(--text);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: var(--bg0);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(214,178,74,0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.12);
            color: var(--text);
        }

        .orders-list {
            position: relative;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--gold);
            color: var(--bg0);
            border-color: var(--gold);
        }

        .order-card {
            background: rgba(255,255,255,0.04);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--gold);
            transition: all 0.3s ease;
        }

        .order-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateX(5px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .order-location {
            font-weight: 800;
            color: var(--gold);
            font-size: 16px;
        }

        .order-date {
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            margin-top: 4px;
        }

        .order-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .order-detail {
            font-size: 13px;
            color: var(--muted);
        }

        .order-detail strong {
            color: var(--text);
        }

        .order-notes {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted2);
        }

        .delete-btn {
            background: rgba(255,107,107,0.15);
            color: var(--danger);
            border: 1px solid rgba(255,107,107,0.3);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: white;
        }

        .empty-state {
            text-align: center;
            color: var(--muted2);
            padding: 40px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .input-row {
                grid-template-columns: 1fr;
            }
            .order-details {
                grid-template-columns: 1fr;
            }
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="portal.html" class="back-btn">← Tilbage til Portal</a>

        <div class="header">
            <h1>🎉 Catering Manager</h1>
            <p>Opret og send catering ordrer direkte til afdelingernes køkken</p>
            <div class="goldline"></div>
        </div>

        <div class="success-message" id="successMessage">
            ✅ Catering sendt til køkkenet!
        </div>

        <div class="form-card">
            <div class="section-title">📍 Afdeling & Tidspunkt</div>

            <div class="input-group">
                <label for="location">Vælg Afdeling *</label>
                <select id="location" required>
                    <option value="">-- Vælg afdeling --</option>
                    <option value="Café Kaiser Helsingør">Café Kaiser Helsingør</option>
                    <option value="Café Kaiser Hillerød">Café Kaiser Hillerød</option>
                    <option value="Café Kaiser Farum">Café Kaiser Farum</option>
                    <option value="Café Kaiser Hørsholm">Café Kaiser Hørsholm</option>
                    <option value="Café Kaiser Vanløse">Café Kaiser Vanløse</option>
                </select>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="date">Dato *</label>
                    <input type="date" id="date" required>
                </div>
                <div class="input-group">
                    <label for="time">Tidspunkt *</label>
                    <input type="time" id="time" required>
                </div>
            </div>

            <div class="section-title">👥 Ordre Detaljer</div>

            <div class="input-row">
                <div class="input-group">
                    <label for="guests">Antal Gæster *</label>
                    <input type="number" id="guests" placeholder="f.eks. 50" min="1" required>
                </div>
                <div class="input-group">
                    <label for="menuType">Menu Type *</label>
                    <select id="menuType" required>
                        <option value="">-- Vælg menu --</option>
                        <option value="Buffet">Buffet</option>
                        <option value="3-retters">3-retters</option>
                        <option value="4-retters">4-retters</option>
                        <option value="Cocktail">Cocktail / Snacks</option>
                        <option value="Brunch">Brunch</option>
                        <option value="Frokost">Frokost</option>
                        <option value="Andet">Andet</option>
                    </select>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="contactName">Kontaktperson</label>
                    <input type="text" id="contactName" placeholder="Navn på bestiller">
                </div>
                <div class="input-group">
                    <label for="phone">Telefonnummer</label>
                    <input type="text" id="phone" placeholder="Telefon">
                </div>
            </div>

            <div class="input-group">
                <label for="notes">Bemærkninger / Specielle Ønsker</label>
                <textarea id="notes" placeholder="Vegetar, allergier, opstilling, særlige ønsker..."></textarea>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="resetForm()">🔄 Ryd</button>
                <button class="btn btn-primary" onclick="sendToKitchen()">📤 Send til Køkken</button>
            </div>
        </div>

        <div class="orders-list">
            <div class="section-title">📋 Alle Catering Ordrer</div>
            
            <div class="filter-row">
                <button class="filter-btn active" onclick="filterOrders('all', this)">Alle</button>
                <button class="filter-btn" onclick="filterOrders('Café Kaiser Helsingør', this)">Helsingør</button>
                <button class="filter-btn" onclick="filterOrders('Café Kaiser Hillerød', this)">Hillerød</button>
                <button class="filter-btn" onclick="filterOrders('Café Kaiser Farum', this)">Farum</button>
                <button class="filter-btn" onclick="filterOrders('Café Kaiser Hørsholm', this)">Hørsholm</button>
                <button class="filter-btn" onclick="filterOrders('Café Kaiser Vanløse', this)">Vanløse</button>
            </div>

            <div id="ordersList">
                <div class="empty-state">Ingen ordrer endnu</div>
            </div>
        </div>
    </div>

    <script>
        // VIGTIG: Bruger SAMME localStorage key som catering-schedule.html
        const STORAGE_KEY = 'kaiserCateringEvents';
        let currentFilter = 'all';

        document.getElementById('date').valueAsDate = new Date();
        window.addEventListener('DOMContentLoaded', () => loadOrders());

        function sendToKitchen() {
            const location = document.getElementById('location').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const guests = document.getElementById('guests').value;
            const menuType = document.getElementById('menuType').value;

            if (!location || !date || !time || !guests || !menuType) {
                alert('⚠️ Udfyld venligst alle påkrævede felter (*)');
                return;
            }

            // Opret event i SAMME format som catering-schedule.html forventer
            const event = {
                id: Date.now(),
                title: `${menuType} - ${guests} gæster`,
                date: date,
                time: time,
                location: location,
                guests: parseInt(guests),
                menuType: menuType,
                contact: document.getElementById('contactName').value || '',
                phone: document.getElementById('phone').value || '',
                notes: document.getElementById('notes').value || '',
                createdAt: new Date().toISOString(),
                createdFrom: 'catering-manager' // Så vi ved den kom fra manager
            };

            // Gem i localStorage
            let events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            events.push(event);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(events));

            // Vis success
            const msg = document.getElementById('successMessage');
            msg.textContent = `✅ Catering sendt til ${location}!`;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);

            resetForm();
            loadOrders();
        }

        function loadOrders() {
            let events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            
            // Filtrer efter lokation hvis valgt
            if (currentFilter !== 'all') {
                events = events.filter(e => e.location === currentFilter);
            }

            // Sorter efter dato (nyeste først)
            events.sort((a, b) => new Date(a.date) - new Date(b.date));

            const container = document.getElementById('ordersList');

            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state">Ingen ordrer ' + (currentFilter !== 'all' ? 'for ' + currentFilter : '') + '</div>';
                return;
            }

            container.innerHTML = events.map(e => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-location">${e.location}</div>
                            <div class="order-date">📅 ${formatDate(e.date)} kl. ${e.time}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteOrder(${e.id})">🗑️ Slet</button>
                    </div>
                    <div class="order-details">
                        <div class="order-detail"><strong>Gæster:</strong> ${e.guests} personer</div>
                        <div class="order-detail"><strong>Menu:</strong> ${e.menuType}</div>
                        <div class="order-detail"><strong>Kontakt:</strong> ${e.contact || 'Ikke angivet'}</div>
                        <div class="order-detail"><strong>Telefon:</strong> ${e.phone || 'Ikke angivet'}</div>
                    </div>
                    ${e.notes ? `<div class="order-notes"><strong>📝</strong> ${e.notes}</div>` : ''}
                </div>
            `).join('');
        }

        function filterOrders(location, btn) {
            currentFilter = location;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadOrders();
        }

        function deleteOrder(id) {
            if (!confirm('Slet denne catering ordre?')) return;
            let events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            events = events.filter(e => e.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
            loadOrders();
        }

        function resetForm() {
            document.getElementById('location').value = '';
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('time').value = '';
            document.getElementById('guests').value = '';
            document.getElementById('menuType').value = '';
            document.getElementById('contactName').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('notes').value = '';
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('da-DK', { 
                weekday: 'short', 
                day: 'numeric', 
                month: 'short' 
            });
        }
    </script>
</body>
</html>
