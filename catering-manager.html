<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catering Manager - Kaiser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #070A12;
            --bg1: #0B1020;
            --panel: rgba(255,255,255,0.055);
            --border: rgba(255,255,255,0.10);
            --text: rgba(255,255,255,0.94);
            --muted: rgba(255,255,255,0.74);
            --muted2: rgba(255,255,255,0.52);
            --gold: #d6b24a;
            --gold2: #b9921f;
            --success: #22c55e;
            --danger: #ff6b6b;
            --shadow: 0 26px 75px rgba(0,0,0,.55);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Inter, system-ui, sans-serif;
            color: var(--text);
            background: radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.10), transparent 55%),
                        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
                        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
                        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
            min-height: 100vh;
            padding: 20px;
        }

        body:before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 38px 38px;
            opacity: 0.06;
            pointer-events: none;
            z-index: -1;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }
        .back-btn:hover { color: var(--gold); }

        .header {
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-family: "Playfair Display", serif;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p { color: var(--muted); font-size: 14px; }

        .goldline {
            height: 2px;
            margin: 20px auto 0;
            max-width: 400px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .status-bar {
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 14px;
            display: none;
            text-align: center;
        }
        .status-bar.success { display: block; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
        .status-bar.error { display: block; background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.3); color: var(--danger); }
        .status-bar.loading { display: block; background: rgba(56,189,248,0.15); border: 1px solid rgba(56,189,248,0.3); color: #38bdf8; }

        .form-card, .orders-list {
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .input-group { margin-bottom: 20px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: rgba(255,255,255,0.05);
            color: var(--text);
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(214,178,74,0.15);
        }
        select { cursor: pointer; }
        select option { background: var(--bg1); color: var(--text); }
        textarea { resize: vertical; min-height: 100px; }

        .button-group { display: flex; gap: 15px; margin-top: 30px; }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: var(--bg0);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(214,178,74,0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover:not(:disabled) {
            background: rgba(255,255,255,0.12);
            color: var(--text);
        }

        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--gold);
            color: var(--bg0);
            border-color: var(--gold);
        }

        .order-card {
            background: rgba(255,255,255,0.04);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--gold);
            transition: all 0.3s ease;
        }
        .order-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateX(5px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .order-location { font-weight: 800; color: var(--gold); font-size: 16px; }
        .order-date { color: var(--muted); font-size: 14px; font-weight: 600; margin-top: 4px; }

        .order-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .order-detail { font-size: 13px; color: var(--muted); }
        .order-detail strong { color: var(--text); }

        .order-notes {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted2);
        }

        .empty-state {
            text-align: center;
            color: var(--muted2);
            padding: 40px;
            font-size: 14px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .input-row { grid-template-columns: 1fr; }
            .order-details { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="portal.html" class="back-btn">← Tilbage til Portal</a>

        <div class="header">
            <h1>🎉 Catering Manager</h1>
            <p>Opret og send catering ordrer direkte til afdelingernes køkken</p>
            <div class="goldline"></div>
        </div>

        <div class="status-bar" id="statusBar"></div>

        <div class="form-card">
            <div class="section-title">📍 Afdeling & Tidspunkt</div>

            <div class="input-group">
                <label for="location">Vælg Afdeling *</label>
                <select id="location" required>
                    <option value="">-- Vælg afdeling --</option>
                    <option value="Helsingør">Café Kaiser Helsingør</option>
                    <option value="Hillerød">Café Kaiser Hillerød</option>
                    <option value="Farum">Café Kaiser Farum</option>
                    <option value="Hørsholm">Café Kaiser Hørsholm</option>
                    <option value="Vanløse">Café Kaiser Vanløse</option>
                </select>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="deliveryDate">Dato *</label>
                    <input type="date" id="deliveryDate" required>
                </div>
                <div class="input-group">
                    <label for="deliveryTime">Tidspunkt *</label>
                    <input type="time" id="deliveryTime" required>
                </div>
            </div>

            <div class="section-title">👥 Kunde & Ordre Detaljer</div>

            <div class="input-row">
                <div class="input-group">
                    <label for="customerName">Kunde / Firma *</label>
                    <input type="text" id="customerName" placeholder="Navn på kunde eller firma" required>
                </div>
                <div class="input-group">
                    <label for="guests">Antal Gæster *</label>
                    <input type="number" id="guests" placeholder="50" min="1" required>
                </div>
            </div>

            <div class="input-group">
                <label for="note">Bemærkninger / Specielle Ønsker</label>
                <textarea id="note" placeholder="Menu, allergier, opstilling, særlige ønsker..."></textarea>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="resetForm()">🔄 Ryd</button>
                <button class="btn btn-primary" id="submitBtn" onclick="sendOrder()">📤 Send til Køkken</button>
            </div>
        </div>

        <div class="orders-list">
            <div class="section-title">📋 Alle Catering Ordrer</div>
            
            <div class="filter-row">
                <button class="filter-btn active" onclick="filterOrders('all', this)">Alle</button>
                <button class="filter-btn" onclick="filterOrders('Helsingør', this)">Helsingør</button>
                <button class="filter-btn" onclick="filterOrders('Hillerød', this)">Hillerød</button>
                <button class="filter-btn" onclick="filterOrders('Farum', this)">Farum</button>
                <button class="filter-btn" onclick="filterOrders('Hørsholm', this)">Hørsholm</button>
                <button class="filter-btn" onclick="filterOrders('Vanløse', this)">Vanløse</button>
            </div>

            <div id="ordersList">
                <div class="empty-state"><span class="spinner"></span> Henter ordrer...</div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8ztJIUOk-4GkhkTwHbpJiSOi7uJjPivpWc5skVr0KXJ1m-j3dcVNF3BSe3sbnWIds/exec';
        
        let allOrders = [];
        let currentFilter = 'all';

        document.getElementById('deliveryDate').valueAsDate = new Date();
        document.addEventListener('DOMContentLoaded', loadOrders);

        function showStatus(msg, type) {
            const bar = document.getElementById('statusBar');
            bar.className = 'status-bar ' + type;
            bar.innerHTML = type === 'loading' ? '<span class="spinner"></span>' + msg : msg;
            if (type !== 'loading') setTimeout(() => bar.className = 'status-bar', 4000);
        }

        // JSONP fetch
        function jsonp(url) {
            return new Promise((resolve, reject) => {
                const cb = 'cb_' + Date.now();
                const script = document.createElement('script');
                const timeout = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 15000);
                function cleanup() { clearTimeout(timeout); delete window[cb]; script.remove(); }
                window[cb] = (data) => { cleanup(); resolve(data); };
                script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
                script.onerror = () => { cleanup(); reject(new Error('Netværk')); };
                document.body.appendChild(script);
            });
        }

        // Load orders
        async function loadOrders() {
            const container = document.getElementById('ordersList');
            container.innerHTML = '<div class="empty-state"><span class="spinner"></span> Henter ordrer...</div>';

            try {
                const data = await jsonp(SCRIPT_URL + '?action=getOrders');
                
                if (data.ok && data.orders) {
                    allOrders = data.orders;
                    renderOrders();
                } else {
                    throw new Error(data.error || 'Ingen data');
                }
            } catch (error) {
                console.error('Load error:', error);
                container.innerHTML = '<div class="empty-state">❌ Fejl ved hentning<br><small>' + error.message + '</small></div>';
            }
        }

        // Render
        function renderOrders() {
            let orders = [...allOrders];
            
            if (currentFilter !== 'all') {
                orders = orders.filter(o => {
                    const loc = (o.location || '').toLowerCase();
                    return loc.includes(currentFilter.toLowerCase());
                });
            }

            // Sort by date
            orders.sort((a, b) => new Date(a.deliveryDate) - new Date(b.deliveryDate));

            const container = document.getElementById('ordersList');

            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-state">Ingen ordrer' + (currentFilter !== 'all' ? ' for ' + currentFilter : '') + '</div>';
                return;
            }

            container.innerHTML = orders.map(o => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-location">Café Kaiser ${o.location || 'Ukendt'}</div>
                            <div class="order-date">📅 ${o.deliveryDate} kl. ${o.deliveryTime}</div>
                        </div>
                        <span class="order-status confirmed">${o.status || 'Bekræftet'}</span>
                    </div>
                    <div class="order-details">
                        <div class="order-detail"><strong>Kunde:</strong> ${escapeHtml(o.customerName) || '-'}</div>
                        <div class="order-detail"><strong>Gæster:</strong> ${o.guests || '?'}</div>
                    </div>
                    ${o.note ? `<div class="order-notes"><strong>📝</strong> ${escapeHtml(o.note)}</div>` : ''}
                </div>
            `).join('');
        }

        // Send order
        async function sendOrder() {
            const form = {
                location: document.getElementById('location').value,
                deliveryDate: document.getElementById('deliveryDate').value,
                deliveryTime: document.getElementById('deliveryTime').value,
                customerName: document.getElementById('customerName').value,
                guests: document.getElementById('guests').value,
                note: document.getElementById('note').value
            };

            if (!form.location || !form.deliveryDate || !form.deliveryTime || !form.customerName || !form.guests) {
                showStatus('⚠️ Udfyld alle påkrævede felter', 'error');
                return;
            }

            document.getElementById('submitBtn').disabled = true;
            showStatus('Sender...', 'loading');

            try {
                // POST via form
                const formEl = document.createElement('form');
                formEl.method = 'POST';
                formEl.action = SCRIPT_URL;
                formEl.style.display = 'none';

                const actionInput = document.createElement('input');
                actionInput.name = 'action';
                actionInput.value = 'addOrder';
                formEl.appendChild(actionInput);

                for (const key in form) {
                    const input = document.createElement('input');
                    input.name = key;
                    input.value = form[key] || '';
                    formEl.appendChild(input);
                }

                document.body.appendChild(formEl);
                formEl.submit();
                formEl.remove();

                showStatus('✅ Ordre sendt til ' + form.location + '!', 'success');
                resetForm();
                setTimeout(loadOrders, 2000);

            } catch (err) {
                showStatus('❌ Fejl: ' + err.message, 'error');
            } finally {
                document.getElementById('submitBtn').disabled = false;
            }
        }

        function filterOrders(loc, btn) {
            currentFilter = loc;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderOrders();
        }

        function resetForm() {
            document.getElementById('location').value = '';
            document.getElementById('deliveryDate').valueAsDate = new Date();
            document.getElementById('deliveryTime').value = '';
            document.getElementById('customerName').value = '';
            document.getElementById('guests').value = '';
            document.getElementById('note').value = '';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
