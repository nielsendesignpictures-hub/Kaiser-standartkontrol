<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catering Manager - Jeunes Restauranter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
            min-height: 100vh;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: rgba(15, 25, 50, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, #d4af37, #f4d03f, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            color: #8899aa;
            font-size: 0.85em;
            margin-top: 2px;
        }

        .back-btn {
            background: linear-gradient(135deg, #d4af37, #b8960c);
            color: #0a1628;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Top Actions */
        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn-create {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group select,
        .filter-group input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #e0e0e0;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .filter-group select option {
            background: #1a2a4a;
            color: #e0e0e0;
        }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: #d4af37;
        }

        .stat-card .stat-label {
            color: #8899aa;
            font-size: 0.85em;
            margin-top: 5px;
        }

        /* Table */
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .table-header {
            background: rgba(212, 175, 55, 0.1);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h3 {
            color: #d4af37;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: rgba(212, 175, 55, 0.08);
            padding: 12px 15px;
            text-align: left;
            color: #d4af37;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        tbody td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9em;
        }

        tbody tr:hover {
            background: rgba(212, 175, 55, 0.05);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            display: inline-block;
        }

        .status-aktiv {
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }

        .status-afsluttet {
            background: rgba(149, 165, 166, 0.2);
            color: #95a5a6;
            border: 1px solid rgba(149, 165, 166, 0.3);
        }

        .status-annulleret {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .action-btns {
            display: flex;
            gap: 5px;
        }

        .action-btns button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e0e0e0;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s ease;
        }

        .action-btns button:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.4);
        }

        .action-btns .btn-delete:hover {
            background: rgba(231, 76, 60, 0.2);
            border-color: rgba(231, 76, 60, 0.4);
            color: #e74c3c;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #0f1932, #1a2a4a);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal h2 {
            color: #d4af37;
            margin-bottom: 20px;
            font-size: 1.4em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #8899aa;
            font-size: 0.85em;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #e0e0e0;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.95em;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-save {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.2);
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #667788;
        }

        .empty-state .empty-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .top-actions {
                flex-direction: column;
                align-items: stretch;
            }

            table {
                font-size: 0.8em;
            }

            thead th, tbody td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div>
            <h1>🍽️ Catering Manager</h1>
            <div class="header-subtitle">Jeunes Restauranter - Administration</div>
        </div>
        <a href="index.html" class="back-btn">← Tilbage til Dashboard</a>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Main Content -->
    <div class="container">

        <!-- Top Actions -->
        <div class="top-actions">
            <button class="btn-create" onclick="openModal()">
                ➕ Ny Catering Booking
            </button>
            <div class="filter-group">
                <select id="filterStatus" onchange="filterList()">
                    <option value="alle">Alle status</option>
                    <option value="Aktiv">Aktiv</option>
                    <option value="Afsluttet">Afsluttet</option>
                    <option value="Annulleret">Annulleret</option>
                </select>
                <input type="text" id="filterSearch" placeholder="🔍 Søg kunde..." oninput="filterList()">
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total bookinger</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statActive">0</div>
                <div class="stat-label">Aktive</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statPersons">0</div>
                <div class="stat-label">Total personer</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statUpcoming">0</div>
                <div class="stat-label">Kommende</div>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <div class="table-header">
                <h3>📋 Catering Bookinger</h3>
                <button onclick="loadCateringEvents()" style="background:rgba(212,175,55,0.2);border:1px solid rgba(212,175,55,0.3);color:#d4af37;padding:8px 15px;border-radius:8px;cursor:pointer;">🔄 Opdater</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Kunde</th>
                        <th>Dato</th>
                        <th>Tidspunkt</th>
                        <th>Personer</th>
                        <th>Menutype</th>
                        <th>Status</th>
                        <th>Handlinger</th>
                    </tr>
                </thead>
                <tbody id="cateringTableBody">
                    <tr>
                        <td colspan="7" class="empty-state">
                            <div class="empty-icon">📭</div>
                            <div>Indlæser catering bookinger...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal: Opret/Rediger Catering -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">➕ Ny Catering Booking</h2>
            <form id="cateringForm" onsubmit="saveCatering(event)">
                <input type="hidden" id="editId">

                <div class="form-group">
                    <label>Kunde / Firma *</label>
                    <input type="text" id="kunde" required placeholder="Kundenavn eller firmanavn">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Dato *</label>
                        <input type="date" id="dato" required>
                    </div>
                    <div class="form-group">
                        <label>Tidspunkt *</label>
                        <input type="time" id="tidspunkt" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Antal personer *</label>
                        <input type="number" id="antalPersoner" required min="1" placeholder="Antal">
                    </div>
                    <div class="form-group">
                        <label>Menutype</label>
                        <select id="menutype">
                            <option value="Frokost">Frokost</option>
                            <option value="Middag">Middag</option>
                            <option value="Buffet">Buffet</option>
                            <option value="Tapas">Tapas</option>
                            <option value="Brunch">Brunch</option>
                            <option value="Finger food">Finger food</option>
                            <option value="Andet">Andet</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Kontaktperson</label>
                        <input type="text" id="kontaktperson" placeholder="Kontaktpersonens navn">
                    </div>
                    <div class="form-group">
                        <label>Telefon</label>
                        <input type="tel" id="telefon" placeholder="Telefonnummer">
                    </div>
                </div>

                <div class="form-group">
                    <label>Detaljer / Ønsker</label>
                    <textarea id="detaljer" placeholder="Særlige ønsker, allergier, opsætning osv."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Annuller</button>
                    <button type="submit" class="btn-save">💾 Gem Booking</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // KONFIGURATION - INDSÆT DIN URL HER
        // ============================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfe6VrFMOSHEjeOVyBPMPmGEagLJpw3kEwOiFssnsmz-DjAVKAFVkyBLBMGMAwMb5V/exec';

        // ============================================
        // DATA
        // ============================================
        let cateringEvents = [];
        let filteredEvents = [];

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            loadCateringEvents();
        });

        // ============================================
        // LOADING
        // ============================================
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (show) {
                overlay.classList.add('active');
            } else {
                overlay.classList.remove('active');
            }
        }

        // ============================================
        // HENT CATERING DATA
        // ============================================
        async function loadCateringEvents() {
            try {
                showLoading(true);

                const url = APPS_SCRIPT_URL + '?action=getCatering&t=' + Date.now();
                console.log('Henter fra:', url);

                const response = await fetch(url, {
                    method: 'GET',
                    redirect: 'follow',
                    mode: 'cors'
                });

                const text = await response.text();
                console.log('Rå response:', text.substring(0, 200));

                let result;
                try {
                    result = JSON.parse(text);
                } catch (parseErr) {
                    console.error('JSON parse fejl:', parseErr);
                    console.error('Response text:', text);
                    throw new Error('Kunne ikke parse response fra serveren');
                }

                if (result.success) {
                    cateringEvents = result.data || [];
                    console.log('Hentet', cateringEvents.length, 'bookinger');
                    filterList();
                    updateStats();
                } else {
                    throw new Error(result.error || 'Ukendt serverfejl');
                }

            } catch (error) {
                console.error('Fejl ved hentning:', error);
                document.getElementById('cateringTableBody').innerHTML =
                    '<tr><td colspan="7" class="empty-state">' +
                    '<div class="empty-icon">❌</div>' +
                    '<div>Fejl ved hentning: ' + error.message + '</div>' +
                    '<div style="margin-top:10px;font-size:0.8em;color:#667788;">Tjek konsollen (F12) for detaljer</div>' +
                    '</td></tr>';
            } finally {
                showLoading(false);
            }
        }

        // ============================================
        // GEM CATERING
        // ============================================
        async function saveCatering(event) {
            event.preventDefault();

            try {
                showLoading(true);

                const payload = {
                    action: 'addCatering',
                    kunde: document.getElementById('kunde').value,
                    dato: document.getElementById('dato').value,
                    tidspunkt: document.getElementById('tidspunkt').value,
                    antalPersoner: document.getElementById('antalPersoner').value,
                    menutype: document.getElementById('menutype').value,
                    detaljer: document.getElementById('detaljer').value,
                    kontaktperson: document.getElementById('kontaktperson').value,
                    telefon: document.getElementById('telefon').value,
                    status: 'Aktiv'
                };

                console.log('Gemmer catering:', payload);

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: {
                        'Content-Type': 'text/plain',
                    },
                    body: JSON.stringify(payload)
                });

                const text = await response.text();
                console.log('Gem response:', text);

                const result = JSON.parse(text);

                if (result.success) {
                    alert('✅ Catering booking oprettet!');
                    closeModal();
                    loadCateringEvents();
                } else {
                    throw new Error(result.error || 'Kunne ikke gemme');
                }

            } catch (error) {
                console.error('Fejl ved gem:', error);
                alert('❌ Fejl ved gem: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // ============================================
        // OPDATER STATUS
        // ============================================
        async function updateStatus(id, newStatus) {
            if (!confirm('Skift status til "' + newStatus + '"?')) return;

            try {
                showLoading(true);

                const payload = {
                    action: 'updateCateringStatus',
                    id: id,
                    status: newStatus
                };

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: {
                        'Content-Type': 'text/plain',
                    },
                    body: JSON.stringify(payload)
                });

                const text = await response.text();
                const result = JSON.parse(text);

                if (result.success) {
                    loadCateringEvents();
                } else {
                    throw new Error(result.error || 'Kunne ikke opdatere');
                }

            } catch (error) {
                console.error('Fejl ved statusopdatering:', error);
                alert('❌ Fejl: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // ============================================
        // SLET CATERING
        // ============================================
        async function deleteCatering(id) {
            if (!confirm('Er du sikker på du vil slette denne booking?')) return;

            try {
                showLoading(true);

                const payload = {
                    action: 'deleteCatering',
                    id: id
                };

                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: {
                        'Content-Type': 'text/plain',
                    },
                    body: JSON.stringify(payload)
                });

                const text = await response.text();
                const result = JSON.parse(text);

                if (result.success) {
                    alert('✅ Booking slettet');
                    loadCateringEvents();
                } else {
                    throw new Error(result.error || 'Kunne ikke slette');
                }

            } catch (error) {
                console.error('Fejl ved sletning:', error);
                alert('❌ Fejl: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        // ============================================
        // FILTER
        // ============================================
        function filterList() {
            const statusFilter = document.getElementById('filterStatus').value;
            const searchFilter = document.getElementById('filterSearch').value.toLowerCase();

            filteredEvents = cateringEvents.filter(function(item) {
                let matchStatus = statusFilter === 'alle' || item.status === statusFilter;
                let matchSearch = !searchFilter ||
                    (item.kunde && item.kunde.toLowerCase().includes(searchFilter)) ||
                    (item.kontaktperson && item.kontaktperson.toLowerCase().includes(searchFilter));
                return matchStatus && matchSearch;
            });

            renderTable();
        }

        // ============================================
        // RENDER TABLE
        // ============================================
        function renderTable() {
            const tbody = document.getElementById('cateringTableBody');

            if (filteredEvents.length === 0) {
                tbody.innerHTML =
                    '<tr><td colspan="7" class="empty-state">' +
                    '<div class="empty-icon">📭</div>' +
                    '<div>Ingen catering bookinger fundet</div>' +
                    '</td></tr>';
                return;
            }

            // Sorter efter dato (nyeste først)
            filteredEvents.sort(function(a, b) {
                return new Date(b.dato) - new Date(a.dato);
            });

            let html = '';
            for (let i = 0; i < filteredEvents.length; i++) {
                const item = filteredEvents[i];
                const statusClass = 'status-' + (item.status || 'aktiv').toLowerCase();

                // Format dato
                let displayDato = item.dato || '';
                if (displayDato && displayDato.includes('-')) {
                    const parts = displayDato.split('-');
                    if (parts.length === 3) {
                        displayDato = parts[2] + '/' + parts[1] + '/' + parts[0];
                    }
                }

                html += '<tr>';
                html += '<td><strong>' + escapeHtml(item.kunde || '') + '</strong>';
                if (item.kontaktperson) {
                    html += '<br><small style="color:#8899aa;">' + escapeHtml(item.kontaktperson) + '</small>';
                }
                html += '</td>';
                html += '<td>' + displayDato + '</td>';
                html += '<td>' + escapeHtml(item.tidspunkt || '') + '</td>';
                html += '<td>' + escapeHtml(String(item.antalPersoner || '')) + '</td>';
                html += '<td>' + escapeHtml(item.menutype || '') + '</td>';
                html += '<td><span class="status-badge ' + statusClass + '">' + escapeHtml(item.status || 'Aktiv') + '</span></td>';
                html += '<td><div class="action-btns">';

                if (item.status !== 'Afsluttet') {
                    html += '<button onclick="updateStatus(\'' + item.id + '\', \'Afsluttet\')" title="Marker som afsluttet">✅</button>';
                }
                if (item.status !== 'Annulleret') {
                    html += '<button onclick="updateStatus(\'' + item.id + '\', \'Annulleret\')" title="Annuller">🚫</button>';
                }
                if (item.status !== 'Aktiv') {
                    html += '<button onclick="updateStatus(\'' + item.id + '\', \'Aktiv\')" title="Genaktiver">🔄</button>';
                }
                html += '<button class="btn-delete" onclick="deleteCatering(\'' + item.id + '\')" title="Slet">🗑️</button>';

                html += '</div></td>';
                html += '</tr>';
            }

            tbody.innerHTML = html;
        }

        // ============================================
        // STATS
        // ============================================
        function updateStats() {
            const total = cateringEvents.length;
            const active = cateringEvents.filter(function(e) { return e.status === 'Aktiv'; }).length;
            const today = new Date().toISOString().split('T')[0];
            const upcoming = cateringEvents.filter(function(e) { return e.dato >= today && e.status === 'Aktiv'; }).length;

            let totalPersons = 0;
            for (let i = 0; i < cateringEvents.length; i++) {
                totalPersons += parseInt(cateringEvents[i].antalPersoner) || 0;
            }

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statPersons').textContent = totalPersons;
            document.getElementById('statUpcoming').textContent = upcoming;
        }

        // ============================================
        // MODAL
        // ============================================
        function openModal() {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalTitle').textContent = '➕ Ny Catering Booking';
            document.getElementById('cateringForm').reset();
            document.getElementById('editId').value = '';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.getElementById('cateringForm').reset();
        }

        // Luk modal ved klik udenfor
        document.addEventListener('click', function(e) {
            if (e.target.id === 'modalOverlay') {
                closeModal();
            }
        });

        // ============================================
        // HJÆLPEFUNKTION
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }
    </script>
</body>
</html>
