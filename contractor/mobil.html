<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaiser Håndværker</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f3f4f6;
}
.header{
  background:#000;
  color:white;
  padding:16px;
}
.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:12px;
}
.loading{
  padding:40px;
  text-align:center;
}
button{
  width:100%;
  padding:14px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">Kaiser – Håndværker</div>
<div id="issues">
  <div class="loading">Indlæser...</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxAGsOfZaupooAVQv7u3X4a_HKVlZIaAyjgAdKU-Wdys8N8ghCcqYlIv6srdoPWkGMM/exec";

function loadData(){

  const old = document.getElementById("jsonp");
  if(old) old.remove();

  const script = document.createElement("script");
  script.id = "jsonp";
  script.src = API_URL + "?callback=handleData&t=" + Date.now();
  document.body.appendChild(script);
}

function handleData(data){

  // Hvis gammel struktur
  if(Array.isArray(data)){
    render(data);
    return;
  }

  // Hvis ny struktur
  render(data.issues || []);
}

function render(issues){

  const container = document.getElementById("issues");
  container.innerHTML = "";

  const active = issues.filter(i => i.status !== "Closed");

  if(active.length === 0){
    container.innerHTML = "<div class='loading'>Ingen aktive sager ✅</div>";
    return;
  }

  active.forEach(issue => {

    container.innerHTML += `
      <div class="card">
        <h3>${issue.location}</h3>
        <p>${issue.description}</p>

        <button onclick="markDone('${issue.id}')">
          Markér færdig
        </button>
      </div>
    `;
  });
}

function markDone(id){

  const script = document.createElement("script");
  script.src =
    API_URL +
    "?action=update&id=" + id +
    "&status=Closed&t=" + Date.now();

  document.body.appendChild(script);

  setTimeout(loadData, 800);
}

loadData();

</script>

</body>
</html>
