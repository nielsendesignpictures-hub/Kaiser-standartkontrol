<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Kaiser – Håndværker Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --sidebar:#000;
  --border:#e5e7eb;
  --muted:#6b7280;
  --danger:#dc2626;
  --warning:#f59e0b;
  --success:#16a34a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,sans-serif;
  display:flex;
  background:#f3f4f6;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:var(--sidebar);
  color:white;
  height:100vh;
  padding:30px 20px;
  overflow-y:auto;
}

.logo{
  font-size:20px;
  font-weight:600;
  margin-bottom:40px;
}

.menu-item{
  padding:10px 14px;
  border-radius:8px;
  margin-bottom:6px;
  cursor:pointer;
  transition:.2s;
}

.menu-item:hover{background:#1f1f1f}
.menu-item.active{background:#1f1f1f}

hr{
  border:none;
  border-top:1px solid #222;
  margin:25px 0;
}

/* Main */
.main{
  flex:1;
  padding:40px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.live{
  background:#e6f4ea;
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
  color:#166534;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:40px;
}

.kpi{
  background:white;
  padding:20px;
  border-radius:14px;
  border:1px solid var(--border);
}

.kpi h2{
  margin:10px 0 0 0;
  font-size:28px;
}

/* Cards */
.card{
  background:white;
  padding:20px;
  border-radius:14px;
  border:1px solid var(--border);
  margin-bottom:20px;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.severity-high{color:var(--danger);font-weight:600}
.severity-medium{color:var(--warning);font-weight:600}
.severity-low{color:var(--success);font-weight:600}

.muted{color:var(--muted);font-size:14px}

.actions{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

textarea{
  width:100%;
  margin-top:10px;
  padding:8px;
}

input[type="date"]{
  padding:6px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:500;
}

.btn-dark{background:black;color:white}
.btn-success{background:var(--success);color:white}
.btn-light{background:#ddd}

.history{
  margin-top:15px;
  padding-top:10px;
  border-top:1px solid #eee;
}

.history-entry{
  font-size:14px;
  margin-top:8px;
}

  @media (max-width: 768px){

  body{
    display:block;
  }

  .sidebar{
    width:100%;
    height:auto;
    position:relative;
  }

  .main{
    padding:15px;
  }

  .kpi-grid{
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  button{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Café Kaiser</div>

  <div id="nav-open" class="menu-item active" onclick="setView('open')">
    Åbne sager
  </div>

  <div id="nav-closed" class="menu-item" onclick="setView('closed')">
    Færdige
  </div>

  <hr>

  <strong style="font-size:13px;color:#aaa;">Lokationer</strong>
  <div id="locationList"></div>
</div>

<div class="main">

  <div class="header">
    <h1 id="title">Åbne sager</h1>
    <div>
      <span id="liveStatus" class="live">● Live</span>
      <span id="lastUpdated" style="margin-left:10px;color:#6b7280;"></span>
      <button class="btn-light" onclick="loadData(true)" style="margin-left:20px;">
        Opdater
      </button>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi">Åbne<h2 id="kpi-open">0</h2></div>
    <div class="kpi">Kritiske<h2 id="kpi-high">0</h2></div>
    <div class="kpi">I gang<h2 id="kpi-progress">0</h2></div>
    <div class="kpi">Færdige<h2 id="kpi-closed">0</h2></div>
  </div>

  <div id="issues"></div>

</div>

<script>

const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnTDzvdfwYx7PmWh6JHXgghKnXv_5Ew3wRvPMTULnJg68QH4jYs-cYkfM-eDTP7AbwvAiM52QPgValpvZBDMKKQSir2i_ttOLVkOQwyOB2n_WGQR1BWVR2hBHmUeH8XdW7FIMbcs4p-jxLfDUaEkM9hjc3VPVuHWdPRO1TzKRXqIGJEWHBvjX0cCvnNAxJsdJZAewiMlObaF0QEPJNaYPTbdZZTOiEK9XN92TRXDylF4d49sh4UujFalEXN8uUbHm50XR1kQijFrpghdP-_7TNbXAjQZ_5lw&lib=Mv462BO7g3XA9FBtJ8YosmVhwL89NOhPq";

function loadData(){

  const script=document.createElement("script");
  script.src = API_URL + "&callback=handleData";
  document.body.appendChild(script);
}

function handleData(data){
  document.body.innerHTML = "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
}

loadData();

</script>

</body>
</html>
