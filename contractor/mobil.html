<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaiser – Håndværker</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f3f4f6;
}

.header{
  background:#000;
  color:white;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge{
  background:red;
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

.kpi{
  display:flex;
  gap:10px;
  padding:10px;
}

.kpi div{
  background:white;
  padding:8px 12px;
  border-radius:10px;
}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.loading{
  text-align:center;
  padding:40px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:600;
}

.btn-save{background:#000;color:white;}
.btn-done{background:#16a34a;color:white;}
.btn-comment{background:#333;color:white;}

textarea{
  width:100%;
  margin-top:10px;
  padding:8px;
}

input[type="date"]{
  width:100%;
  margin-top:10px;
  padding:8px;
}
</style>
</head>

<body>

<div class="header">
  <div>Kaiser – Håndværker</div>
  <div id="commentBadge"></div>
</div>

<div class="kpi" id="kpiBar"></div>

<div id="issues">
  <div class="loading">Indlæser...</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbx90unEejk2SC4TVBHA0JZXz7ZSwrKp3tUr92L8gX_JbyhBDsSADsihl-RNf0UvEsda/exec";

/* Hvis håndværker kun skal se én lokation, indsæt navn her. 
   Ellers sæt den til null */
const HANDWERKER_LOCATION = null;

let isLoading = false;
let lastCommentCheck = localStorage.getItem("lastCommentCheck") || 0;

/* ===== LOAD ===== */
function loadData(){

  if(isLoading) return;
  isLoading = true;

  const old=document.getElementById("jsonp");
  if(old) old.remove();

  const script=document.createElement("script");
  script.id="jsonp";
  script.src=API_URL+"?callback=handleData&t="+Date.now();
  document.body.appendChild(script);
}

/* ===== CALLBACK ===== */
function handleData(data){

  let issues = [];
  let comments = [];

  if(Array.isArray(data)){
    issues = data;
  } else {
    issues = data.issues || [];
    comments = data.comments || [];
  }

  render(issues, comments);
  updateBadge(comments);

  isLoading=false;
}

/* ===== BADGE ===== */
function updateBadge(comments){

  const newestComment = comments.length
    ? Math.max(...comments.map(c => new Date(c.createdAt).getTime()))
    : 0;

  if(newestComment > lastCommentCheck){
    document.getElementById("commentBadge").innerHTML =
      "<span class='badge'>Ny kommentar</span>";
  } else {
    document.getElementById("commentBadge").innerHTML = "";
  }

  localStorage.setItem("lastCommentCheck", newestComment);
}

/* ===== RENDER ===== */
function render(issues, comments){

  const container = document.getElementById("issues");
  container.innerHTML = "";

  let active = issues
    .filter(i => i.status !== "Closed");

  if(HANDWERKER_LOCATION){
    active = active.filter(i => i.location === HANDWERKER_LOCATION);
  }

  active.sort((a,b)=> a.severity==="High" ? -1 : 1);

  document.getElementById("kpiBar").innerHTML = `
    <div>Åbne: ${active.length}</div>
    <div>Kritiske: ${active.filter(i=>i.severity==="High").length}</div>
  `;

  if(active.length === 0){
    container.innerHTML = "<div class='loading'>Ingen aktive sager ✅</div>";
    return;
  }

  active.forEach(issue => {

    const issueComments =
      comments.filter(c => c.issueId === issue.id);

    container.innerHTML += `
      <div class="card"
        ontouchstart="startTouch(event,'${issue.id}')"
        ontouchend="endTouch(event,'${issue.id}')">

        <h3>${issue.location}</h3>
        <p>${issue.description}</p>

        <input type="date"
          id="date-${issue.id}"
          value="${issue.estimatedCompletion 
            ? issue.estimatedCompletion.split('T')[0] 
            : ""}">

        <button class="btn-save"
          onclick="saveDate('${issue.id}')">
          Gem dato
        </button>

        <button class="btn-done"
          onclick="markDone('${issue.id}')">
          Markér færdig
        </button>

        <textarea id="comment-${issue.id}"
          placeholder="Skriv status..."></textarea>

        <button class="btn-comment"
          onclick="saveComment('${issue.id}','${issue.location}')">
          Tilføj kommentar
        </button>

        ${issueComments.map(c=>`
          <div style="margin-top:8px;font-size:14px;">
            <strong>${c.author}</strong><br>
            ${c.comment}
          </div>
        `).join("")}
      </div>
    `;
  });
}

/* ===== UPDATE ===== */
function saveDate(id){

  const date = document.getElementById("date-"+id).value;
  if(!date) return;

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update&id="+encodeURIComponent(id)+
    "&estimatedCompletion="+encodeURIComponent(date)+
    "&t="+Date.now();

  document.body.appendChild(script);
  setTimeout(loadData,800);
}

function markDone(id){

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update&id="+encodeURIComponent(id)+
    "&status=Closed&t="+Date.now();

  document.body.appendChild(script);
  setTimeout(loadData,800);
}

function saveComment(id, location){

  const comment = document.getElementById("comment-"+id).value;
  if(!comment) return;

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update&id="+encodeURIComponent(id)+
    "&comment="+encodeURIComponent(comment)+
    "&author=Håndværker"+
    "&location="+encodeURIComponent(location)+
    "&t="+Date.now();

  document.body.appendChild(script);
  setTimeout(loadData,800);
}

/* ===== SWIPE ===== */
let touchStartX = 0;

function startTouch(e,id){
  touchStartX = e.changedTouches[0].screenX;
}

function endTouch(e,id){
  const diff = e.changedTouches[0].screenX - touchStartX;
  if(diff < -100){
    markDone(id);
  }
}

/* ===== INIT ===== */
document.addEventListener("DOMContentLoaded", function(){
  loadData();
  setInterval(loadData,20000);
});

</script>

</body>
</html>
