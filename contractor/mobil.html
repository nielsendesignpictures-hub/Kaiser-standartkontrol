<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaiser – Håndværker</title>

<style>
body{margin:0;font-family:sans-serif;background:#f3f4f6;}
.header{background:#000;color:white;padding:16px;}
.card{background:white;margin:15px;padding:15px;border-radius:12px;}
.loading{text-align:center;padding:40px;}
button{width:100%;padding:14px;margin-top:10px;}
</style>
</head>

<body>

<div class="header">Kaiser – Håndværker</div>
<div id="issues"><div class="loading">Indlæser...</div></div>

<script>

/* ✅ Echo URL */
const API_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnTDzvdfwYx7PmWh6JHXgghKnXv_5Ew3wRvPMTULnJg68QH4jYs-cYkfM-eDTP7AbwvAiM52QPgValpvZBDMKKQSir2i_ttOLVkOQwyOB2n_WGQR1BWVR2hBHmUeH8XdW7FIMbcs4p-jxLfDUaEkM9hjc3VPVuHWdPRO1TzKRXqIGJEWHBvjX0cCvnNAxJsdJZAewiMlObaF0QEPJNaYPTbdZZTOiEK9XN92TRXDylF4d49sh4Uje4rfMXVbIshWydbNY7n5NtUqa_UmpMtIhDW4LN-IUA&lib=Mv462BO7g3XA9FBtJ8YosmVhwL89NOhPq";

function loadData(){

  const old=document.getElementById("jsonp");
  if(old) old.remove();

  const script=document.createElement("script");
  script.id="jsonp";
  script.src = API_URL + "&callback=handleData&t=" + Date.now();
  document.body.appendChild(script);
}

function handleData(data){

  const issues = Array.isArray(data) ? data : (data.issues || []);

  const container=document.getElementById("issues");
  container.innerHTML="";

  const active = issues.filter(i => i.status !== "Closed");

  if(active.length === 0){
    container.innerHTML="<div class='loading'>Ingen aktive sager ✅</div>";
    return;
  }

  active.forEach(issue=>{
    container.innerHTML+=`
      <div class="card">
        <h3>${issue.location}</h3>
        <p>${issue.description}</p>
        <button onclick="markDone('${issue.id}')">
          Markér færdig
        </button>
      </div>
    `;
  });
}

function markDone(id){

  const script=document.createElement("script");
  script.src = API_URL +
    "&action=update&id="+id+
    "&status=Closed&t="+Date.now();

  document.body.appendChild(script);

  setTimeout(loadData,800);
}

document.addEventListener("DOMContentLoaded", loadData);

</script>

</body>
</html>
