<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kaiser – Håndværker</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f3f4f6;
  overscroll-behavior-y:contain;
}

.header{
  position:sticky;
  top:0;
  background:#000;
  color:white;
  padding:16px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

.kpi{
  display:flex;
  gap:10px;
  padding:10px;
}

.kpi div{
  background:white;
  padding:8px 12px;
  border-radius:10px;
  font-size:14px;
}

.card{
  background:white;
  margin:15px;
  padding:15px;
  border-radius:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  transition:transform 0.2s;
}

.loading{
  text-align:center;
  padding:40px;
  color:#666;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:600;
  font-size:16px;
}

.btn-save{background:#000;color:white;}
.btn-done{background:#16a34a;color:white;}
.btn-comment{background:#333;color:white;}

textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
}

input[type="date"]{
  width:100%;
  margin-top:10px;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
  <div>Kaiser – Håndværker</div>
  <div id="liveStatus">● Live</div>
</div>

<div class="kpi" id="kpiBar"></div>

<div id="issues">
  <div class="loading">Indlæser...</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbx90unEejk2SC4TVBHA0JZXz7ZSwrKp3tUr92L8gX_JbyhBDsSADsihl-RNf0UvEsda/exec";

let isLoading=false;
let scrollPos=0;

/* ===== Pull to refresh ===== */
let startY=0;

document.addEventListener("touchstart",e=>{
  if(window.scrollY===0){
    startY=e.touches[0].clientY;
  }
});

document.addEventListener("touchend",e=>{
  if(window.scrollY===0){
    const diff=e.changedTouches[0].clientY-startY;
    if(diff>120){
      loadData();
    }
  }
});

/* ===== LOAD ===== */
function loadData(){

  if(isLoading) return;
  isLoading=true;

  scrollPos = window.scrollY;

  const old=document.getElementById("jsonp");
  if(old) old.remove();

  const script=document.createElement("script");
  script.id="jsonp";
  script.src=API_URL+"?callback=handleData&t="+Date.now();
  document.body.appendChild(script);
}

/* ===== CALLBACK ===== */
function handleData(data){

  let issues = Array.isArray(data) ? data : (data.issues || []);
  let comments = data.comments || [];

  render(issues, comments);

  window.scrollTo(0,scrollPos);

  document.getElementById("liveStatus").innerText="● Live";
  isLoading=false;
}

/* ===== DATE FIX ===== */
function formatDate(dateString){
  if(!dateString) return "";
  const d=new Date(dateString);
  return d.toISOString().split("T")[0];
}

/* ===== RENDER ===== */
function render(issues, comments){

  const container=document.getElementById("issues");
  container.innerHTML="";

  const active = issues
    .filter(i=>i.status!=="Closed")
    .sort((a,b)=>a.severity==="High"?-1:1);

  document.getElementById("kpiBar").innerHTML=`
    <div>Åbne: ${active.length}</div>
    <div>Kritiske: ${active.filter(i=>i.severity==="High").length}</div>
  `;

  if(active.length===0){
    container.innerHTML="<div class='loading'>Ingen aktive sager ✅</div>";
    return;
  }

  active.forEach(issue=>{

    const issueComments=
      comments.filter(c=>c.issueId===issue.id);

    container.innerHTML+=`
      <div class="card"
        ontouchstart="startTouch(event,'${issue.id}')"
        ontouchend="endTouch(event,'${issue.id}')">

        <h3>${issue.location}</h3>
        <p>${issue.description}</p>

        <input type="date"
          id="date-${issue.id}"
          value="${formatDate(issue.estimatedCompletion)}">

        <button class="btn-save"
          onclick="saveDate('${issue.id}')">
          Gem dato
        </button>

        <button class="btn-done"
          onclick="markDone('${issue.id}')">
          Markér færdig
        </button>

        <textarea id="comment-${issue.id}"
          placeholder="Skriv status..."></textarea>

        <button class="btn-comment"
          onclick="saveComment('${issue.id}','${issue.location}')">
          Tilføj kommentar
        </button>

        ${issueComments.map(c=>`
          <div style="margin-top:8px;font-size:14px;">
            <strong>${c.author}</strong><br>
            ${c.comment}
          </div>
        `).join("")}

      </div>
    `;
  });
}

/* ===== UPDATE ===== */
function saveDate(id){

  const date=document.getElementById("date-"+id).value;
  if(!date) return;

  navigator.vibrate?.(50);

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update&id="+encodeURIComponent(id)+
    "&estimatedCompletion="+encodeURIComponent(date)+
    "&t="+Date.now();

  document.body.appendChild(script);
  setTimeout(loadData,800);
}

function markDone(id){

  navigator.vibrate?.([50,50]);

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update&id="+encodeURIComponent(id)+
    "&status=Closed&t="+Date.now();

  document.body.appendChild(script);
  setTimeout(loadData,800);
}

function saveComment(id, location){

  const comment=document.getElementById("comment-"+id).value;
  if(!comment) return;

  navigator.vibrate?.(30);

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update&id="+encodeURIComponent(id)+
    "&comment="+encodeURIComponent(comment)+
    "&author=Håndværker"+
    "&location="+encodeURIComponent(location)+
    "&t="+Date.now();

  document.body.appendChild(script);
}

/* ===== Swipe to close ===== */
let touchStartX=0;

function startTouch(e,id){
  touchStartX=e.changedTouches[0].screenX;
}

function endTouch(e,id){
  const diff=e.changedTouches[0].screenX-touchStartX;
  if(diff<-100){
    markDone(id);
  }
}

/* ===== INIT ===== */
document.addEventListener("DOMContentLoaded",function(){
  loadData();
  setInterval(loadData,20000);
});

</script>

</body>
</html>
