<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Café Kaiser – Håndværker Portal</title>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "74e1dc7f-43a7-4ce5-a4eb-687c22f60472",
      safari_web_id: "web.onesignal.auto.50dac47a-d084-4e57-bf73-88f5ab7beb6e",
      notifyButton: {
        enable: true,
      },
    });
  });
</script>

<style>
:root{
  --sidebar:#000;
  --border:#e5e7eb;
  --muted:#6b7280;
  --danger:#dc2626;
  --warning:#f59e0b;
  --success:#16a34a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  display:flex;
  background:#f3f4f6;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:var(--sidebar);
  color:white;
  height:100vh;
  padding:30px 20px;
  overflow-y:auto;
}

.logo{
  font-size:20px;
  font-weight:600;
  margin-bottom:40px;
}

.menu-item{
  padding:10px 14px;
  border-radius:8px;
  margin-bottom:6px;
  cursor:pointer;
}

.menu-item.active{
  background:#1f1f1f;
}

/* Main */
.main{
  flex:1;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.kpi-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:20px;
}

.kpi{
  background:white;
  padding:15px;
  border-radius:14px;
  border:1px solid var(--border);
}

.card{
  background:white;
  padding:15px;
  border-radius:14px;
  border:1px solid var(--border);
  margin-bottom:15px;
}

.severity-high{color:var(--danger);font-weight:600}
.severity-medium{color:var(--warning);font-weight:600}
.severity-low{color:var(--success);font-weight:600}

textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
}

input[type="date"]{
  width:100%;
  margin-top:10px;
  padding:12px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:600;
}

.btn-dark{background:#000;color:white}
.btn-success{background:var(--success);color:white}
.btn-light{background:#ddd}

@media(max-width:768px){
  body{display:block;}
  .sidebar{width:100%;height:auto;}
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Café Kaiser</div>

  <div id="nav-open" class="menu-item active" onclick="setView('open')">
    Åbne sager
  </div>

  <div id="nav-closed" class="menu-item" onclick="setView('closed')">
    Færdige
  </div>

  <hr>

  <strong style="font-size:13px;color:#aaa;">Lokationer</strong>
  <div id="locationList"></div>
</div>

<div class="main">

  <div class="header">
    <h2 id="title">Åbne sager</h2>
    <button class="btn-light" onclick="loadData(true)">Opdater</button>
  </div>

  <div class="kpi-grid">
    <div class="kpi">Åbne<br><strong id="kpi-open">0</strong></div>
    <div class="kpi">Kritiske<br><strong id="kpi-high">0</strong></div>
  </div>

  <div id="issues"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbx90unEejk2SC4TVBHA0JZXz7ZSwrKp3tUr92L8gX_JbyhBDsSADsihl-RNf0UvEsda/exec";

let CURRENT_VIEW="open";
let CURRENT_LOCATION=null;
let isLoading=false;

function loadData(manual=false){

  if(isLoading) return;
  isLoading=true;

  const old=document.getElementById("jsonp");
  if(old) old.remove();

  const script=document.createElement("script");
  script.id="jsonp";
  script.src=API_URL+"?callback=handleData&t="+Date.now();
  document.body.appendChild(script);
}

function handleData(data){

  let issues=[];
  let comments=[];

  if(Array.isArray(data)){
    issues=data;
  } else {
    issues=data.issues||[];
    comments=data.comments||[];
  }

  render(issues,comments);
  isLoading=false;
}

function formatDate(dateString){
  if(!dateString) return "";
  return new Date(dateString).toISOString().split("T")[0];
}

function render(issues,comments){

  const container=document.getElementById("issues");
  container.innerHTML="";

  let open=0;
  let high=0;
  const locationCount={};

  issues.forEach(issue=>{
    if(issue.status!=="Closed") open++;
    if(issue.severity==="High") high++;

    if(issue.status!=="Closed"){
      locationCount[issue.location]=(locationCount[issue.location]||0)+1;
    }

    if(CURRENT_VIEW==="open" && issue.status==="Closed") return;
    if(CURRENT_VIEW==="closed" && issue.status!=="Closed") return;
    if(CURRENT_LOCATION && issue.location!==CURRENT_LOCATION) return;

    const issueComments=comments.filter(c=>c.issueId===issue.id);

    container.innerHTML+=`
      <div class="card">
        <h3>${issue.location}</h3>
        <div class="severity-${issue.severity?.toLowerCase()}">
          ${issue.severity||""}
        </div>
        <p>${issue.description||""}</p>

        ${CURRENT_VIEW==="open"?`
        <input type="date"
          id="date-${issue.id}"
          value="${formatDate(issue.estimatedCompletion)}">

        <button class="btn-dark"
          onclick="saveDate('${issue.id}')">
          Gem dato
        </button>

        <button class="btn-success"
          onclick="markDone('${issue.id}')">
          Færdig
        </button>

        <textarea id="comment-${issue.id}"
          placeholder="Skriv status..."></textarea>

        <button class="btn-dark"
          onclick="saveComment('${issue.id}','${issue.location}')">
          Tilføj kommentar
        </button>
        `:""}

        ${issueComments.map(c=>`
          <div style="margin-top:8px;font-size:14px;">
            <strong>${c.author}</strong><br>
            ${c.comment}
          </div>
        `).join("")}
      </div>
    `;
  });

  document.getElementById("kpi-open").innerText=open;
  document.getElementById("kpi-high").innerText=high;

  const locContainer=document.getElementById("locationList");
  locContainer.innerHTML="";
  Object.keys(locationCount).forEach(loc=>{
    locContainer.innerHTML+=`
      <div class="menu-item"
        onclick="filterLocation('${loc}')">
        ${loc} (${locationCount[loc]})
      </div>
    `;
  });
}

function saveDate(id){

  const date=document.getElementById("date-"+id).value;
  if(!date) return;

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update&id="+encodeURIComponent(id)+
    "&estimatedCompletion="+encodeURIComponent(date)+
    "&t="+Date.now();

  document.body.appendChild(script);
  setTimeout(()=>loadData(true),1500);
}

function markDone(id){

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update&id="+encodeURIComponent(id)+
    "&status=Closed&t="+Date.now();

  document.body.appendChild(script);
  setTimeout(()=>loadData(true),1500);
}

function saveComment(id,location){

  const comment=document.getElementById("comment-"+id).value;
  if(!comment) return;

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update&id="+encodeURIComponent(id)+
    "&comment="+encodeURIComponent(comment)+
    "&author=Håndværker"+
    "&location="+encodeURIComponent(location)+
    "&t="+Date.now();

  document.body.appendChild(script);
  setTimeout(()=>loadData(true),1500);
}

function setView(view){
  CURRENT_VIEW=view;
  document.getElementById("title").innerText=
    view==="open"?"Åbne sager":"Færdige";
  loadData(true);
}

function filterLocation(loc){
  CURRENT_LOCATION=loc;
  loadData(true);
}

document.addEventListener("DOMContentLoaded",function(){
  loadData();
  setInterval(loadData,20000);
});

</script>

</body>
</html>
