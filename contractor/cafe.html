<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Kaiser – Drift Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#f3f4f6;
  padding:40px;
}

h1{
  margin-bottom:20px;
}

select{
  padding:8px 12px;
  margin-bottom:30px;
  font-size:16px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid #e5e7eb;
}

.status-open{
  color:#dc2626;
  font-weight:600;
}

.status-inprogress{
  color:#f59e0b;
  font-weight:600;
}

.deadline{
  margin-top:10px;
  font-size:14px;
}

.overdue{
  color:#dc2626;
  font-weight:600;
}

.history{
  margin-top:15px;
  padding-top:10px;
  border-top:1px solid #eee;
}

.history-entry{
  font-size:14px;
  margin-top:8px;
}
</style>
</head>

<body>

<h1>Drift Status</h1>

<select id="locationSelect">
  <option value="">Vælg lokation</option>
</select>

<div id="issues"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxKNg1OGlbT0cOlPhW4BpM2L-_9EVdDyhn9lhnyuYLiNrofIQaR0FJ15Vwc7ROg1clv/exec";

let ALL_ISSUES = [];
let ALL_COMMENTS = [];
let CURRENT_LOCATION = null;

/* LOAD DATA */
function loadData(){
  const old=document.getElementById("jsonp");
  if(old) old.remove();

  const script=document.createElement("script");
  script.id="jsonp";
  script.src=API_URL+"?callback=handleData&t="+Date.now();
  document.body.appendChild(script);
}

function handleData(data){

  ALL_ISSUES = data.issues || [];
  ALL_COMMENTS = data.comments || [];

  populateLocations();
}

/* Populate dropdown */
function populateLocations(){

  const select=document.getElementById("locationSelect");

  const locations=[...new Set(ALL_ISSUES.map(i=>i.location))];

  select.innerHTML='<option value="">Vælg lokation</option>';

  locations.forEach(loc=>{
    select.innerHTML+=`<option value="${loc}">${loc}</option>`;
  });

  select.onchange=function(){
    CURRENT_LOCATION=this.value;
    render();
  };
}

/* Render issues */
function render(){

  const container=document.getElementById("issues");
  container.innerHTML="";

  if(!CURRENT_LOCATION) return;

  const today = new Date().toISOString().split("T")[0];

  const filtered = ALL_ISSUES
    .filter(issue =>
      issue.location===CURRENT_LOCATION &&
      issue.status!=="Closed"
    )
    .sort((a,b)=>{
      if(a.severity==="High") return -1;
      if(b.severity==="High") return 1;
      return 0;
    });

  if(filtered.length===0){
    container.innerHTML="<p>Ingen aktive sager ✅</p>";
    return;
  }

  filtered.forEach(issue=>{

    const issueComments =
      ALL_COMMENTS.filter(c=>c.issueId===issue.id);

    const statusClass =
      issue.status==="In Progress"
        ? "status-inprogress"
        : "status-open";

    const overdue =
      issue.estimatedCompletion &&
      issue.estimatedCompletion < today;

    container.innerHTML+=`
      <div class="card">

        <h3>${issue.description}</h3>

        <p class="${statusClass}">
          ${issue.status}
        </p>

        ${issue.estimatedCompletion ? `
          <div class="deadline">
            Forventet færdig: ${issue.estimatedCompletion}
            ${overdue ? "<span class='overdue'> (Forsinket)</span>" : ""}
          </div>
        ` : `
          <div class="deadline">
            Ikke planlagt endnu
          </div>
        `}

        ${issueComments.length ? `
          <div class="history">
            <strong>Historik:</strong>
            ${issueComments.map(c=>`
              <div class="history-entry">
                <strong>${c.author}</strong>
                (${new Date(c.createdAt).toLocaleString()}):
                <br>
                ${c.comment}
              </div>
            `).join("")}
          </div>
        ` : ""}

      </div>
    `;
  });
}

loadData();
setInterval(loadData,20000);

</script>

</body>
</html>
