<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasmus -  Håndværker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f1115;
  --sidebar: #111318;
  --card: #1a1d24;
  --border: #262a33;
  --gold: #d4af37;
  --danger: #ff4d4f;
  --warning: #faad14;
  --success: #52c41a;
  --text: #f5f5f5;
  --muted: #8c8c8c;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, sans-serif;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: var(--sidebar);
  height: 100vh;
  padding: 30px 20px;
  border-right: 1px solid var(--border);
}

.logo {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 40px;
}

.menu-item {
  padding: 12px 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
  color: var(--muted);
}

.menu-item.active,
.menu-item:hover {
  background: var(--card);
  color: white;
}

/* MAIN */
.main {
  flex: 1;
  padding: 40px;
  overflow-y: auto;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
}

.live-bar {
  background: rgba(82,196,26,0.1);
  border: 1px solid rgba(82,196,26,0.3);
  padding: 12px 20px;
  border-radius: 12px;
  margin-bottom: 30px;
  display: flex;
  justify-content: space-between;
}

/* KPI */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 40px;
}

.kpi-card {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid var(--border);
}

.kpi-card h2 {
  margin: 10px 0 0 0;
  font-size: 32px;
}

/* ISSUE CARDS */
.issue-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  transition: 0.2s;
}

.issue-card:hover {
  border-color: var(--gold);
}

.issue-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.severity-high { color: var(--danger); }
.severity-medium { color: var(--warning); }
.severity-low { color: var(--success); }

.muted {
  color: var(--muted);
  font-size: 14px;
}

.actions {
  margin-top: 15px;
  display: flex;
  gap: 10px;
}

input[type="date"] {
  background: #111;
  border: 1px solid var(--border);
  padding: 8px;
  border-radius: 8px;
  color: white;
}

button {
  background: var(--gold);
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

button.secondary {
  background: #333;
  color: white;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Café Kaiser</div>
  <div class="menu-item active">Operations</div>
  <div class="menu-item">Lokationer</div>
  <div class="menu-item">Rapporter</div>
  <div class="menu-item">Indstillinger</div>
</div>

<div class="main">

  <div class="header">
    <h1>Operations Dashboard</h1>
    <button onclick="loadIssues()">Opdater</button>
  </div>

  <div class="live-bar">
    <div>● Live – Data opdateret</div>
    <div id="lastUpdated">--:--</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      Åbne sager
      <h2 id="kpi-open">0</h2>
    </div>
    <div class="kpi-card">
      Kritiske
      <h2 id="kpi-high">0</h2>
    </div>
    <div class="kpi-card">
      I gang
      <h2 id="kpi-progress">0</h2>
    </div>
    <div class="kpi-card">
      Færdige
      <h2 id="kpi-closed">0</h2>
    </div>
  </div>

  <div id="issues"></div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwQjy6TWmmz-O-CkyvM2HQa1elhwF8VBlxE7jHb2SZOOyr5D9HciOjGp3dHDxoF01Hy/exec";

async function loadIssues() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const container = document.getElementById("issues");
  container.innerHTML = "";

  let open = 0, high = 0, progress = 0, closed = 0;

  data.forEach(issue => {

    if(issue.status === "Closed") {
      closed++;
      return;
    }

    open++;
    if(issue.severity === "High") high++;
    if(issue.status === "In Progress") progress++;

    container.innerHTML += `
      <div class="issue-card">
        <div class="issue-header">
          <h3>${issue.location}</h3>
          <span class="severity-${issue.severity.toLowerCase()}">
            ${issue.severity}
          </span>
        </div>

        <p class="muted">
          ${issue.area} • ${issue.issueType}
        </p>

        <p>${issue.description}</p>

        <div class="actions">
          <input type="date" id="date-${issue.id}" />
          <button onclick="updateIssue('${issue.id}')">
            Gem dato
          </button>
          <button class="secondary" onclick="closeIssue('${issue.id}')">
            Markér færdig
          </button>
        </div>
      </div>
    `;
  });

  document.getElementById("kpi-open").innerText = open;
  document.getElementById("kpi-high").innerText = high;
  document.getElementById("kpi-progress").innerText = progress;
  document.getElementById("kpi-closed").innerText = closed;
  document.getElementById("lastUpdated").innerText =
    new Date().toLocaleTimeString();
}

async function updateIssue(id) {
  const date = document.getElementById(`date-${id}`).value;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      id: id,
      estimatedDate: date
    })
  });

  loadIssues();
}

async function closeIssue(id) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      id: id,
      status: "Closed"
    })
  });

  loadIssues();
}

loadIssues();
setInterval(loadIssues, 30000);
</script>

</body>
</html>
