<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Kaiser – Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --sidebar:#000;
  --border:#e5e7eb;
  --muted:#6b7280;
  --danger:#dc2626;
  --warning:#f59e0b;
  --success:#16a34a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,sans-serif;
  display:flex;
  background:#f3f4f6;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:var(--sidebar);
  color:white;
  height:100vh;
  padding:30px 20px;
  overflow-y:auto;
}

.logo{
  font-size:20px;
  font-weight:600;
  margin-bottom:40px;
}

.menu-item{
  padding:10px 14px;
  border-radius:8px;
  margin-bottom:6px;
  cursor:pointer;
  transition:.2s;
}

.menu-item:hover{background:#1f1f1f}
.menu-item.active{background:#1f1f1f}

hr{
  border:none;
  border-top:1px solid #222;
  margin:25px 0;
}

/* Main */
.main{
  flex:1;
  padding:40px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.live{
  background:#e6f4ea;
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
  color:#166534;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:40px;
}

.kpi{
  background:white;
  padding:20px;
  border-radius:14px;
  border:1px solid var(--border);
}

.kpi h2{
  margin:10px 0 0 0;
  font-size:28px;
}

/* Cards */
.card{
  background:white;
  padding:20px;
  border-radius:14px;
  border:1px solid var(--border);
  margin-bottom:20px;
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.severity-high{color:var(--danger);font-weight:600}
.severity-medium{color:var(--warning);font-weight:600}
.severity-low{color:var(--success);font-weight:600}

.muted{color:var(--muted);font-size:14px}

.actions{
  margin-top:15px;
  display:flex;
  gap:10px;
}

input[type="date"]{
  padding:6px;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:500;
}

.btn-dark{background:black;color:white}
.btn-success{background:var(--success);color:white}
.btn-light{background:#ddd}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Café Kaiser</div>

  <div id="nav-open" class="menu-item active" onclick="setView('open')">
    Åbne sager
  </div>

  <div id="nav-closed" class="menu-item" onclick="setView('closed')">
    Færdige
  </div>

  <hr>

  <strong style="font-size:13px;color:#aaa;">Lokationer</strong>
  <div id="locationList"></div>

</div>

<div class="main">

  <div class="header">
    <h1 id="title">Åbne sager</h1>
    <div>
      <span id="liveStatus" class="live">● Live</span>
      <span id="lastUpdated" style="margin-left:10px;color:#6b7280;"></span>
      <button class="btn-light" onclick="loadData(true)" style="margin-left:20px;">
        Opdater
      </button>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi">Åbne<h2 id="kpi-open">0</h2></div>
    <div class="kpi">Kritiske<h2 id="kpi-high">0</h2></div>
    <div class="kpi">I gang<h2 id="kpi-progress">0</h2></div>
    <div class="kpi">Færdige<h2 id="kpi-closed">0</h2></div>
  </div>

  <div id="issues"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxKNg1OGlbT0cOlPhW4BpM2L-_9EVdDyhn9lhnyuYLiNrofIQaR0FJ15Vwc7ROg1clv/exec";

let CURRENT_VIEW="open";
let CURRENT_LOCATION=null;
let isLoading=false;

/* LOAD */
function loadData(manual=false){

  if(isLoading) return;
  isLoading=true;

  document.getElementById("liveStatus").innerText=
    manual ? "● Opdaterer..." : "● Auto opdaterer...";

  const old=document.getElementById("jsonp");
  if(old) old.remove();

  const script=document.createElement("script");
  script.id="jsonp";
  script.src=API_URL+"?callback=handleData&t="+Date.now();
  document.body.appendChild(script);
}

/* CALLBACK */
function handleData(data){
  render(data.issues, data.comments);
}

  render(data);

  document.getElementById("liveStatus").innerText="● Live";
  document.getElementById("lastUpdated").innerText=
    new Date().toLocaleTimeString();

  isLoading=false;
}

/* RENDER */
function render(issues, comments){

  const container=document.getElementById("issues");
  container.innerHTML="";

  let open=0,high=0,progress=0,closed=0;
  const locationCount={};

  issues.sort((a,b)=>{
    if(a.severity==="High") return -1;
    if(b.severity==="High") return 1;
    return 0;
  });

  issues.forEach(issue=>{
    const issueComments =
  comments.filter(c => c.issueId === issue.id);

    if(issue.status==="Closed") closed++;
    else open++;

    if(issue.severity==="High") high++;
    if(issue.status==="In Progress") progress++;

    if(issue.status!=="Closed"){
      locationCount[issue.location]=(locationCount[issue.location]||0)+1;
    }

    if(CURRENT_VIEW==="open" && issue.status==="Closed") return;
    if(CURRENT_VIEW==="closed" && issue.status!=="Closed") return;
    if(CURRENT_LOCATION && issue.location!==CURRENT_LOCATION) return;

    container.innerHTML+=`
      <div class="card">
        <div class="card-header">
          <h3>${issue.location}</h3>
          <span class="severity-${issue.severity?.toLowerCase()}">
            ${issue.severity||""}
            <hr>

<textarea id="comment-${issue.id}"
  placeholder="Skriv status..."
  style="width:100%;margin-top:10px;"></textarea>

<button class="btn-dark"
  onclick="saveComment('${issue.id}','${issue.location}')">
  Tilføj kommentar
</button>

${issueComments.length ? `
  <div style="margin-top:15px;">
    <strong>Historik:</strong>
    ${issueComments.map(c=>`
      <div style="font-size:14px;margin-top:8px;">
        <strong>${c.author}</strong>
        (${new Date(c.createdAt).toLocaleString()}):
        <br>${c.comment}
      </div>
    `).join("")}
  </div>

          </span>
        </div>

        <p class="muted">${issue.area||""} • ${issue.issueType||""}</p>
        <p>${issue.description||""}</p>

        ${CURRENT_VIEW==="open" ? `
        <div class="actions">
          <input type="date" id="date-${issue.id}"
            value="${issue.estimatedCompletion||""}">
          <button class="btn-dark" onclick="saveDate('${issue.id}')">
            Gem dato
          </button>
          <button class="btn-success" onclick="markDone('${issue.id}')">
            Færdig
          </button>
        </div>` : `
        <p class="muted">Afsluttet</p>
        `}
      </div>
    `;
  });

  document.getElementById("kpi-open").innerText=open;
  document.getElementById("kpi-high").innerText=high;
  document.getElementById("kpi-progress").innerText=progress;
  document.getElementById("kpi-closed").innerText=closed;

  const locContainer=document.getElementById("locationList");
  locContainer.innerHTML="";

  Object.keys(locationCount).forEach(loc=>{
    locContainer.innerHTML+=`
      <div class="menu-item"
           onclick="filterLocation('${loc}')">
        ${loc} (${locationCount[loc]})
      </div>
    `;
  });
}

/* UPDATE VIA GET */
function saveDate(id){

  const date=document.getElementById("date-"+id).value;

  if(!date){
    alert("Vælg en dato først");
    return;
  }

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update"+
    "&id="+encodeURIComponent(id)+
    "&estimatedCompletion="+encodeURIComponent(date)+
    "&t="+Date.now();

  document.body.appendChild(script);

  setTimeout(()=>loadData(true),1000);
}

function markDone(id){

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update"+
    "&id="+encodeURIComponent(id)+
    "&status=Closed"+
    "&t="+Date.now();

  document.body.appendChild(script);

  setTimeout(()=>loadData(true),1000);
}

/* NAV */
function setView(view){
  CURRENT_VIEW=view;
  CURRENT_LOCATION=null;

  document.getElementById("title").innerText=
    view==="open"?"Åbne sager":"Færdige";

  document.getElementById("nav-open").classList.toggle("active",view==="open");
  document.getElementById("nav-closed").classList.toggle("active",view==="closed");

  loadData(true);
}

function filterLocation(loc){
  CURRENT_LOCATION=loc;
  loadData(true);
}

/* INIT */
loadData();
setInterval(()=>loadData(false),20000);

function saveComment(id, location){

  const comment =
    document.getElementById("comment-"+id).value;

  if(!comment) return;

  const script=document.createElement("script");
  script.src=
    API_URL+
    "?action=update"+
    "&id="+encodeURIComponent(id)+
    "&comment="+encodeURIComponent(comment)+
    "&author=Håndværker"+
    "&location="+encodeURIComponent(location)+
    "&t="+Date.now();

  document.body.appendChild(script);

  setTimeout(()=>loadData(true),1000);
}
</script>

</body>
</html>
