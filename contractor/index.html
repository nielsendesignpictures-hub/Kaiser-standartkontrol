<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaiser Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f1115;
  --sidebar: #111318;
  --card: #1a1d24;
  --border: #262a33;
  --gold: #d4af37;
  --danger: #ff4d4f;
  --warning: #faad14;
  --success: #52c41a;
  --text: #f5f5f5;
  --muted: #8c8c8c;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, sans-serif;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: var(--sidebar);
  height: 100vh;
  padding: 30px 20px;
  border-right: 1px solid var(--border);
}

.logo {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 40px;
}

.menu-item {
  padding: 12px 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  color: var(--muted);
}

.menu-item.active {
  background: var(--card);
  color: white;
}

/* Main */
.main {
  flex: 1;
  padding: 40px;
  overflow-y: auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.live-bar {
  background: rgba(82,196,26,0.1);
  border: 1px solid rgba(82,196,26,0.3);
  padding: 10px 20px;
  border-radius: 10px;
  margin: 20px 0 30px 0;
  display: flex;
  justify-content: space-between;
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 40px;
}

.kpi-card {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid var(--border);
}

.kpi-card h2 {
  margin: 10px 0 0 0;
  font-size: 32px;
}

.issue-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

.issue-header {
  display: flex;
  justify-content: space-between;
}

.severity-high { color: var(--danger); }
.severity-medium { color: var(--warning); }
.severity-low { color: var(--success); }

.muted {
  color: var(--muted);
  font-size: 14px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">Café Kaiser</div>
  <div class="menu-item active">Operations</div>
  <div class="menu-item">Lokationer</div>
  <div class="menu-item">Rapporter</div>
  <div class="menu-item">Indstillinger</div>
</div>

<div class="main">

  <div class="header">
    <h1>Operations Dashboard</h1>
  </div>

  <div class="live-bar">
    <div>● Live – Data opdateret</div>
    <div id="lastUpdated">--:--</div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card">
      Åbne sager
      <h2 id="kpi-open">0</h2>
    </div>
    <div class="kpi-card">
      Kritiske
      <h2 id="kpi-high">0</h2>
    </div>
    <div class="kpi-card">
      I gang
      <h2 id="kpi-progress">0</h2>
    </div>
    <div class="kpi-card">
      Færdige
      <h2 id="kpi-closed">0</h2>
    </div>
  </div>

  <div id="issues"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxh_V_dfa0NtQWOQ8rkzqDq8z9GnRGLHXhneT7F_dQOOPO9XKem4M6UtT_sR6n05WVp/exec";

/* Load JSONP */
function loadIssues() {
  console.log("Loading JSONP...");

  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "jsonpScript";
  script.src = API_URL + "?callback=handleData&t=" + Date.now();
  document.body.appendChild(script);
}

/* Callback fra Apps Script */
function handleData(data) {
  console.log("DATA RECEIVED:", data);

  renderIssues(data);
}

/* Render dashboard */
function renderIssues(data) {

  const container = document.getElementById("issues");
  container.innerHTML = "";

  let open = 0, high = 0, progress = 0, closed = 0;

  data.forEach(issue => {

    if(issue.status === "Closed") {
      closed++;
      return;
    }

    open++;

    if(issue.severity === "High") high++;
    if(issue.status === "In Progress") progress++;

    container.innerHTML += `
      <div class="issue-card">
        <div class="issue-header">
          <h3>${issue.location}</h3>
          <span class="severity-${issue.severity ? issue.severity.toLowerCase() : 'low'}">
            ${issue.severity || ""}
          </span>
        </div>
        <p class="muted">
          ${issue.area || ""} • ${issue.issueType || ""}
        </p>
        <p>${issue.description || ""}</p>
      </div>
    `;
  });

  document.getElementById("kpi-open").innerText = open;
  document.getElementById("kpi-high").innerText = high;
  document.getElementById("kpi-progress").innerText = progress;
  document.getElementById("kpi-closed").innerText = closed;
  document.getElementById("lastUpdated").innerText =
    new Date().toLocaleTimeString();
}

/* Init */
loadIssues();
setInterval(loadIssues, 30000);

</script>

</body>
</html>
