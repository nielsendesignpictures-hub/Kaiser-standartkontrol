<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Chef Radar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Portal look */
      --bg0:#070A12;
      --bg1:#0B1020;
      --panel:rgba(255,255,255,0.055);
      --panel2:rgba(255,255,255,0.035);
      --border:rgba(255,255,255,0.10);

      --text:rgba(255,255,255,0.94);
      --muted:rgba(255,255,255,0.74);
      --muted2:rgba(255,255,255,0.52);

      --gold:#d6b24a;
      --gold2:#b9921f;

      --danger:#ff6b6b;
      --warn:#f59e0b;
      --info:#38bdf8;
      --ok:#62d26f;

      --shadow: 0 26px 75px rgba(0,0,0,.55);
      --shadow2: 0 18px 55px rgba(0,0,0,.35);
    }

    html,body{height:100%;}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.10), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      overflow-x:hidden;
      margin:0;
    }
    body:before{
      content:"";
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity:0.06;
      pointer-events:none;
      mask-image: radial-gradient(1000px 700px at 50% 0%, black, transparent 75%);
    }

    .shell{max-width:1200px; margin:0 auto; padding:18px 16px 44px;}

    /* Hero */
    .hero{
      position:relative;
      border-radius: 28px;
      border:1px solid rgba(255,255,255,0.10);
      background:
        radial-gradient(900px 260px at 50% 0%, rgba(255,255,255,0.08), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      overflow:hidden;
      padding: 26px 20px 18px;
    }
    .hero:after{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(700px 240px at 20% 0%, rgba(245,158,11,0.20), transparent 60%),
        radial-gradient(700px 240px at 80% 0%, rgba(56,189,248,0.16), transparent 60%);
      opacity:.55;
      pointer-events:none;
    }

    .kicker{
      position:relative;
      font-size:12px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--muted2);
      font-weight:900;
      text-align:center;
    }
    .title{
      position:relative;
      font-family:"Playfair Display", serif;
      font-size:48px;
      line-height:1.02;
      letter-spacing:-0.02em;
      font-weight:700;
      text-align:center;
      margin-top:10px;
    }
    .subtitle{
      position:relative;
      text-align:center;
      margin-top:10px;
      color:var(--muted);
      font-weight:800;
      font-size:13px;
    }
    .goldline{
      position:relative;
      height:2px;
      margin:18px auto 0;
      max-width: 680px;
      border-radius:999px;
      background: linear-gradient(90deg, transparent, rgba(214,178,74,0.92), transparent);
      opacity:.95;
    }

    /* Controls */
    .controls{
      position:relative;
      margin-top:16px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
    }

    .pill, .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      font-weight:1000;
      letter-spacing:.10em;
      text-transform:uppercase;
      font-size:11px;
      color: rgba(255,255,255,0.86);
      white-space:nowrap;
      user-select:none;
    }
    .btn{
      cursor:pointer;
      transition: transform .08s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .btn:active{ transform: translateY(1px); }
    .btnPrimary{
      border:none;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color:#0b0c0f;
      box-shadow: 0 18px 40px rgba(214,178,74,0.18);
    }

    /* Section */
    .section{
      margin-top:18px;
      border-radius:26px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
      box-shadow: var(--shadow2);
      overflow:hidden;
    }
    .sectionHead{
      padding:16px 16px 12px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      background:
        radial-gradient(900px 200px at 50% 0%, rgba(255,255,255,0.06), transparent 65%),
        linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
    }
    .sectionTitle{
      font-weight:1000;
      letter-spacing:.20em;
      text-transform:uppercase;
      font-size:12px;
      color: rgba(255,255,255,0.72);
      display:flex;
      align-items:center;
      gap:10px;
    }
    .sectionTitle .dot{
      width:10px;height:10px;border-radius:999px;
      background: rgba(214,178,74,0.85);
      box-shadow: 0 0 0 5px rgba(214,178,74,0.10);
      opacity:.95;
    }
    .sectionSub{
      color: rgba(255,255,255,0.55);
      font-weight:900;
      font-size:12px;
    }
    .divider{height:1px;background:rgba(255,255,255,0.10);}

    /* Alerts */
    .list{
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .alertCard{
      border-radius:22px;
      border:1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(900px 220px at 50% 0%, rgba(255,255,255,0.06), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: 0 18px 50px rgba(0,0,0,.38);
      padding:14px;
      display:flex;
      align-items:flex-start;
      gap:12px;
      overflow:hidden;
      position:relative;
    }

    .sevBar{
      width:10px;
      border-radius:999px;
      flex:0 0 auto;
      align-self:stretch;
      opacity:.95;
    }
    .sev-high{ background: rgba(255,107,107,0.85); box-shadow: 0 0 0 5px rgba(255,107,107,0.10); }
    .sev-med { background: rgba(245,158,11,0.90);  box-shadow: 0 0 0 5px rgba(245,158,11,0.10); }
    .sev-low { background: rgba(56,189,248,0.90);  box-shadow: 0 0 0 5px rgba(56,189,248,0.10); }
    .sev-ok  { background: rgba(98,210,111,0.90); box-shadow: 0 0 0 5px rgba(98,210,111,0.10); }

    .alertBody{flex:1; min-width:0;}
    .alertTop{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .alertTitle{
      font-weight:1000;
      letter-spacing:-0.01em;
      font-size:15px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width: 100%;
    }
    .alertMeta{
      color: rgba(255,255,255,0.60);
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }
    .alertMsg{
      margin-top:6px;
      color: rgba(255,255,255,0.78);
      font-weight:800;
      font-size:13px;
      line-height:1.35;
    }

    .badge{
      margin-top:10px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      font-weight:1000;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:11px;
      color: rgba(255,255,255,0.76);
    }
    .badgeDot{
      width:7px;height:7px;border-radius:999px;
      background: rgba(214,178,74,0.85);
    }

    .empty{
      border-radius:22px;
      border:1px solid rgba(98,210,111,0.22);
      background: rgba(98,210,111,0.10);
      padding:14px;
      margin:14px;
    }
    .emptyTitle{ font-weight:1000; }
    .emptySub{ margin-top:6px; color: rgba(255,255,255,0.70); font-weight:800; font-size:13px; }

    @media (max-width:520px){
      .title{font-size:40px;}
    }
  </style>
</head>

<body>
  <div class="shell w-full">

    <header class="hero mt-6">
      <div class="kicker">KAISER</div>
      <div class="title">Chef Radar</div>
      <div class="subtitle" id="greetText">—</div>
      <div class="goldline"></div>

      <div class="controls">
        <div class="pill" id="countPill">—</div>
        <div class="pill" id="updatedPill">—</div>
        <button class="btn btnPrimary" id="refreshBtn" type="button">Opdater</button>
        <a class="btn" href="./portal.html" style="text-decoration:none;">Til portal</a>
      </div>
    </header>

    <section class="section" aria-label="Alerts">
      <div class="sectionHead">
        <div class="sectionTitle"><span class="dot"></span> Manager alerts</div>
        <div class="sectionSub">Kun det der kræver handling</div>
      </div>
      <div class="divider"></div>

      <div id="emptyBox" class="empty" style="display:none;">
        <div class="emptyTitle">Ingen alerts.</div>
        <div class="emptySub">Alt ser stabilt ud lige nu.</div>
      </div>

      <div class="list" id="radarList"></div>
    </section>

  </div>

  <script>
    // ================== Demo data (samme som din kode, men vi understøtter også severity) ==================
    // Du kan bruge strings eller objects.
    // Object format (klar til API):
    // { message:"...", location:"Hillerød", severity:"high|med|low|ok" }
    const alertsDemo = [
      { message: "Nørrebro lav mad rating", location: "Nørrebro", severity: "med" },
      { message: "Østerbro høj køkken %", location: "Østerbro", severity: "high" },
      { message: "Vesterbro mange klager", location: "Vesterbro", severity: "high" }
    ];

    const radarList = document.getElementById("radarList");
    const emptyBox = document.getElementById("emptyBox");

    function nowDK(){
      return new Date().toLocaleString("da-DK", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
    }

    function getManagerName(){
      const p = new URLSearchParams(location.search);
      const n = (p.get("name") || "").trim();
      return n || "F&B Manager";
    }

    function normalizeAlert(a){
      if (typeof a === "string") return { message: a, location: "", severity: "low" };
      const msg = (a && a.message) ? String(a.message) : "";
      const loc = (a && a.location) ? String(a.location) : "";
      const sev = (a && a.severity) ? String(a.severity) : "low";
      const map = { high:"high", med:"med", medium:"med", low:"low", ok:"ok", info:"low" };
      return { message: msg, location: loc, severity: map[sev] || "low" };
    }

    function sevLabel(sev){
      if (sev === "high") return "Høj";
      if (sev === "med") return "Mellem";
      if (sev === "ok") return "OK";
      return "Lav";
    }

    function renderAlerts(alertArray){
      const arr = (alertArray || []).map(normalizeAlert).filter(x => x.message);

      radarList.innerHTML = "";
      emptyBox.style.display = arr.length ? "none" : "block";

      document.getElementById("countPill").textContent = arr.length
        ? (arr.length + " kræver opmærksomhed")
        : "0 kræver opmærksomhed";

      document.getElementById("updatedPill").textContent = "Opdateret: " + nowDK();

      arr.forEach((a) => {
        const card = document.createElement("div");
        card.className = "alertCard";

        const sevClass = a.severity === "high" ? "sev-high" :
                         a.severity === "med"  ? "sev-med"  :
                         a.severity === "ok"   ? "sev-ok"   : "sev-low";

        card.innerHTML = `
          <div class="sevBar ${sevClass}"></div>
          <div class="alertBody">
            <div class="alertTop">
              <div class="alertTitle">${escapeHtml(a.location || "Lokation")}</div>
              <div class="alertMeta">Severity: ${sevLabel(a.severity)}</div>
            </div>
            <div class="alertMsg">${escapeHtml(a.message)}</div>
            <div class="badge"><span class="badgeDot"></span> handling kræves</div>
          </div>
        `;
        radarList.appendChild(card);
      });
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[c]));
    }

    // ================== API placeholder (som din kode) ==================
    async function fetchAlertsFromAPI(){
      // Eksempel:
      // const response = await fetch("https://api.kaiserportal.com/alerts");
      // const data = await response.json();
      // const alerts = data.map(item => ({ message:item.message, location:item.location, severity:item.severity }));
      // renderAlerts(alerts);

      // For nu: demo
      renderAlerts(alertsDemo);
    }

    // ================== Init ==================
    document.getElementById("greetText").textContent = "Godmorgen " + getManagerName() + " • her er dagens radar";
    document.getElementById("refreshBtn").addEventListener("click", fetchAlertsFromAPI);

    renderAlerts(alertsDemo);
  </script>
</body>
</html>
