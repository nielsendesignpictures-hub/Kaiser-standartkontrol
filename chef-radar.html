<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Kaiser Chef Radar</title>

<style>
.radar-panel{
  background:#f8f9fa;
  border:2px solid #007bff;
  padding:20px;
  width:380px;
  border-radius:10px;
  font-family:Arial;
}

.radar-panel h2{
  margin-top:0;
  color:#007bff;
}

.radar-panel ul{
  padding-left:20px;
}

.radar-panel li{
  margin-bottom:8px;
  font-weight:bold;
}
</style>

</head>
<body>

<div class="radar-panel">

<h2>Godmorgen Stefan</h2>
<p>3 ting kræver opmærksomhed:</p>

<ul id="radar-list"></ul>

</div>

<script>

const cafes = [

{
name:"Nørrebro",
madRating:3.8,
kitchenPercent:28,
complaints:2
},

{
name:"Østerbro",
madRating:4.5,
kitchenPercent:34,
complaints:1
},

{
name:"Vesterbro",
madRating:4.2,
kitchenPercent:29,
complaints:5
},

{
name:"Hellerup",
madRating:4.6,
kitchenPercent:26,
complaints:0
},

{
name:"Frederiksberg",
madRating:4.4,
kitchenPercent:27,
complaints:1
}

];


let alerts = [];

cafes.forEach(cafe => {

if(cafe.madRating < 4){
alerts.push({
text: cafe.name + " lav mad rating",
severity: 3
});
}

if(cafe.kitchenPercent > 30){
alerts.push({
text: cafe.name + " høj køkken %",
severity: 2
});
}

if(cafe.complaints >= 3){
alerts.push({
text: cafe.name + " mange klager",
severity: 2
});
}

});


alerts.sort((a,b)=> b.severity - a.severity);

alerts = alerts.slice(0,3);


const list = document.getElementById("radar-list");

alerts.forEach(alert =>{

const li = document.createElement("li");

li.textContent = alert.text;

list.appendChild(li);

});

</script>

</body>
</html>

fetch("/api/cafe-data")
.then(res => res.json())
.then(data => {
cafes = data
runRadar()
})
