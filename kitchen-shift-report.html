<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaiser – Kitchen Shift Report</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#071019;
      --panel:rgba(15,22,34,.88);
      --border:rgba(145,205,255,.14);
      --text:rgba(255,255,255,.95);
      --muted:rgba(213,231,248,.72);
      --blue:#9bd3ff;
      --blue2:#66b7ff;
      --blueGlow:rgba(102,183,255,.20);
      --gold:#d7b24c;
    }

    body{
      margin:0; padding:0;
      font-family:Inter,system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    .shell{ max-width:1080px; margin:0 auto; padding:20px; padding-bottom:140px; }

    .hero{
      border:1px solid var(--border);
      border-radius:30px;
      padding:28px 24px;
      background:rgba(255,255,255,.03);
      text-align:center;
      backdrop-filter:blur(10px);
    }

    .kicker{ font-size:14px; letter-spacing:.24em; text-transform:uppercase; color:#8899aa; font-weight:800; }
    .title{ font-family:"Playfair Display",serif; font-size:48px; margin:10px 0 8px; }
    .subtitle{ color:var(--muted); font-size:18px; font-weight:600; }

    .heroLine{
      height:2px; margin:18px auto 0; max-width:300px;
      background:linear-gradient(90deg, transparent, rgba(214,178,74,.9), rgba(102,183,255,.85), transparent);
    }

    .panel{
      margin-top:20px;
      border:1px solid var(--border);
      border-radius:24px;
      background:var(--panel);
      overflow:hidden;
    }

    .panelHead{ padding:20px 24px 12px; }
    .panelBody{ padding:20px 24px 28px; }

    .blockTitle{ font-size:24px; font-weight:900; letter-spacing:-0.02em; }
    .hint{ font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#8899aa; font-weight:900; }

    .label{
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#8899aa;
      font-weight:900;
      margin-bottom:6px;
      display:block;
    }

    .input, .select, .textarea{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(145,205,255,.14);
      background:rgba(255,255,255,.045);
      color:var(--text);
      padding:14px 16px;
      font-size:18px;
    }

    .textarea{ min-height:110px; resize:vertical; }

    .ratingWrap{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
      margin:10px 0;
    }

    .ratingBtn{
      padding:12px 8px;
      border-radius:16px;
      border:1px solid rgba(145,205,255,.2);
      background:rgba(255,255,255,.04);
      font-weight:900;
      cursor:pointer;
      text-align:center;
    }

    .ratingBtn.selected{
      background:linear-gradient(135deg, var(--blue), var(--blue2));
      color:#071019;
    }

    .statusLine{
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(145,205,255,.1);
    }

    .statusProgress{
      height:10px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      margin-top:10px;
      overflow:hidden;
    }

    .statusBar{
      height:100%;
      background:linear-gradient(90deg, #72c96b, #66b7ff);
      width:0%;
      transition:width 0.4s ease;
    }

    .statusMissing{
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .statusChip{
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,199,92,.12);
      border:1px solid rgba(255,199,92,.3);
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .actionsSticky{
      position:fixed;
      bottom:0; left:0; right:0;
      background:linear-gradient(180deg, transparent, #071019 30%);
      padding:16px 20px 20px;
      z-index:100;
    }

    .actionsInner{
      max-width:1080px;
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .btn{
      min-height:68px;
      border:none;
      border-radius:18px;
      font-size:19px;
      font-weight:900;
      cursor:pointer;
    }

    .btn-dark{ background:rgba(255,255,255,.08); color:white; }
    .btn-gold{ background:linear-gradient(135deg, var(--gold), #b9921f); color:#071019; }

    .successScreen{ text-align:center; padding:40px 20px; }
    .successIcon{
      width:80px; height:80px; margin:0 auto 16px;
      background:rgba(72,201,135,.15);
      border:2px solid #48c987;
      border-radius:50%;
      font-size:36px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
  </style>
</head>

<body>
  <div class="shell">

    <header class="hero">
      <div class="kicker">KAISER DIGITAL OPERATIONS</div>
      <div class="title">Kitchen Shift Report</div>
      <div class="subtitle">Daily Operational Summary</div>
      <div class="heroLine"></div>
    </header>

    <div style="margin-top:12px; text-align:center; color:rgba(184,210,234,.5); font-size:12px; font-weight:800; letter-spacing:.14em; text-transform:uppercase;">
      Drift version · Kitchen Report v1.0
    </div>

    <section id="formWrap">
      <form id="reportForm" method="POST" action="https://formsubmit.co/skiftlederrapport@gmail.com">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_next" id="nextField">
        <input type="hidden" name="_subject" id="subjectField">
        <input type="hidden" name="_cc" value="Christian@cafekaiser.dk,DIT_EMAIL_HER">
        <input type="text" name="_honey" style="display:none">

        <!-- Status -->
        <div class="panel">
          <div class="panelHead">
            <div class="pill pill-blue">STATUS</div>
          </div>
          <div class="panelBody">
            <div id="statusLine" class="statusLine warn">
              <div id="statusText">Status: —</div>
              <div class="statusProgress"><div id="statusBar" class="statusBar"></div></div>
              <div id="statusMeta" class="statusMeta"></div>
              <div id="statusMissing" class="statusMissing"></div>
            </div>
          </div>
        </div>

        <!-- Basic Information -->
        <div class="panel">
          <div class="panelHead"><div class="blockTitle">Basic Information</div></div>
          <div class="panelBody grid2">
            <div class="field" id="cardDepartment">
              <label class="label">Location</label>
              <select class="select" id="department" name="Location" required>
                <option value="">Select location...</option>
                <option>Café Kaiser Helsingør</option>
                <option>Café Kaiser Hillerød</option>
                <option>Café Kaiser Farum</option>
                <option>Café Kaiser Hørsholm</option>
                <option>Café Kaiser Vanløse</option>
              </select>
            </div>
            <div class="field">
              <label class="label">Date & Time</label>
              <input class="input" id="dateField" name="Date & Time" readonly>
            </div>
          </div>
        </div>

        <!-- Chef & Performance -->
        <div class="panel">
          <div class="panelHead"><div class="blockTitle">Chef & Performance</div></div>
          <div class="panelBody">
            <div class="sectionCard" id="cardChefName">
              <label class="label">Chef Name</label>
              <input class="input" id="chefName" name="Chef Name" required>
            </div>

            <div class="sectionCard" id="cardDayRating">
              <label class="label">Rate the Day</label>
              <div class="ratingWrap">
                <button type="button" class="ratingBtn" data-target="dayRating" data-value="1/5">1</button>
                <button type="button" class="ratingBtn" data-target="dayRating" data-value="2/5">2</button>
                <button type="button" class="ratingBtn" data-target="dayRating" data-value="3/5">3</button>
                <button type="button" class="ratingBtn" data-target="dayRating" data-value="4/5">4</button>
                <button type="button" class="ratingBtn" data-target="dayRating" data-value="5/5">5</button>
              </div>
              <input type="hidden" id="dayRating" name="Day Rating" required>
            </div>

            <div class="sectionCard" id="cardRevenue">
              <label class="label">Daily Revenue (DKK)</label>
              <input class="input" id="revenue" name="Daily Revenue" required>
            </div>
          </div>
        </div>

        <!-- Operations -->
        <div class="panel">
          <div class="panelHead"><div class="blockTitle">Operations</div></div>
          <div class="panelBody">
            <div class="sectionCard" id="cardMise">
              <label class="label">Mise en Place Done?</label>
              <select class="select" id="miseStatus" name="Mise en Place Done" required>
                <option value="">Select...</option>
                <option>Yes</option>
                <option>No</option>
              </select>
              <label class="label" style="margin-top:16px;">Comment / Missing</label>
              <textarea class="textarea" id="miseComment" name="Mise Comment"></textarea>
            </div>

            <div class="sectionCard" id="cardCleaning">
              <label class="label">Cleaning Done?</label>
              <select class="select" id="cleaningStatus" name="Cleaning Done" required>
                <option value="">Select...</option>
                <option>Yes</option>
                <option>No</option>
              </select>
              <label class="label" style="margin-top:16px;">Missing</label>
              <textarea class="textarea" id="cleaningMissing" name="Cleaning Missing"></textarea>
            </div>
          </div>
        </div>

        <!-- Team -->
        <div class="panel">
          <div class="panelHead"><div class="blockTitle">Team</div></div>
          <div class="panelBody">
            <div class="sectionCard" id="cardTeamRating">
              <label class="label">Teamwork Rating</label>
              <div class="ratingWrap">
                <button type="button" class="ratingBtn" data-target="teamRating" data-value="1/5">1</button>
                <button type="button" class="ratingBtn" data-target="teamRating" data-value="2/5">2</button>
                <button type="button" class="ratingBtn" data-target="teamRating" data-value="3/5">3</button>
                <button type="button" class="ratingBtn" data-target="teamRating" data-value="4/5">4</button>
                <button type="button" class="ratingBtn" data-target="teamRating" data-value="5/5">5</button>
              </div>
              <input type="hidden" id="teamRating" name="Teamwork Rating" required>
            </div>
          </div>
        </div>

        <!-- Notes -->
        <div class="panel">
          <div class="panelHead"><div class="blockTitle">Daily Notes</div></div>
          <div class="panelBody">
            <div class="sectionCard">
              <label class="label">Daily Feedback</label>
              <textarea class="textarea" id="dailyFeedback" name="Daily Feedback"></textarea>
            </div>
            <div class="sectionCard">
              <label class="label">Errors & Issues</label>
              <textarea class="textarea" id="errorsIssues" name="Errors & Issues"></textarea>
            </div>
          </div>
        </div>

      </form>
    </section>

    <!-- SUCCESS -->
    <section id="thanksWrap" class="hidden">
      <div class="panel">
        <div class="panelBody successScreen">
          <div class="successIcon">✓</div>
          <div class="successTitle">Report Submitted</div>
          <div class="successText">Kitchen Shift Report has been sent successfully.</div>
          <button id="newReportBtn" class="btn btn-gold" style="margin-top:24px; width:100%;">Start New Report</button>
        </div>
      </div>
    </section>

  </div>

  <!-- STICKY BUTTONS -->
  <div class="actionsSticky" id="actionsSticky">
    <div class="actionsInner">
      <button id="secondaryAction" class="btn btn-dark">Reset</button>
      <button id="primaryAction" class="btn btn-gold">Submit Kitchen Report</button>
    </div>
  </div>

<script>
/* ==================== FULL ENGINE ==================== */
const STORAGE_KEY = "kaiser_kitchen_v1";

function $(id){ return document.getElementById(id); }
function val(id){ const el = $(id); return el ? (el.value || "").trim() : ""; }
function setVal(id, v){ const el = $(id); if(el) el.value = v || ""; }

function nowLocalString(){ return new Date().toLocaleString("da-DK"); }
function localISODate(){ 
  const d = new Date();
  const local = new Date(d.getTime() - d.getTimezoneOffset()*60000);
  return local.toISOString().slice(0,10);
}

function updateSubject(){
  const loc = val("department") || "Location";
  $("subjectField").value = `Kitchen Shift Report – ${loc} – ${localISODate()}`;
}

function requiredFields(){
  return [
    {id:"department", label:"Location", anchor:"cardDepartment"},
    {id:"chefName", label:"Chef Name", anchor:"cardChefName"},
    {id:"dayRating", label:"Day Rating", anchor:"cardDayRating"},
    {id:"revenue", label:"Daily Revenue", anchor:"cardRevenue"},
    {id:"miseStatus", label:"Mise en Place", anchor:"cardMise"},
    {id:"cleaningStatus", label:"Cleaning", anchor:"cardCleaning"},
    {id:"teamRating", label:"Teamwork Rating", anchor:"cardTeamRating"}
  ];
}

function updateStatusLine(){
  const req = requiredFields();
  const filled = req.filter(f => !!val(f.id)).length;
  const pct = Math.round((filled / req.length) * 100);
  const missing = req.filter(f => !val(f.id));

  $("statusBar").style.width = pct + "%";
  $("statusMeta").textContent = `${filled}/${req.length} fields · ${pct}%`;

  const box = $("statusMissing");
  box.innerHTML = "";

  if(missing.length === 0){
    $("statusLine").classList.add("good");
    $("statusLine").classList.remove("warn");
    $("statusText").textContent = "Status: Ready to submit";
    box.classList.add("hidden");
    return;
  }

  $("statusLine").classList.add("warn");
  $("statusLine").classList.remove("good");
  $("statusText").textContent = missing.length === 1 
    ? `Missing – ${missing[0].label}` 
    : `Missing – ${missing.length} fields`;

  box.classList.remove("hidden");
  box.innerHTML = missing.map(f => 
    `<button type="button" class="statusChip" data-anchor="${f.anchor}">${f.label}</button>`
  ).join("");
}

function scrollToField(anchor){
  const el = $(anchor);
  if(!el) return;
  el.scrollIntoView({behavior:"smooth", block:"center"});
  el.classList.add("fieldPulse");
  setTimeout(()=>el.classList.remove("fieldPulse"), 800);
}

$("statusMissing").addEventListener("click", e => {
  const btn = e.target.closest(".statusChip");
  if(btn) scrollToField(btn.dataset.anchor);
});

function bindRatings(){
  document.querySelectorAll(".ratingBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const target = btn.dataset.target;
      setVal(target, btn.dataset.value);

      document.querySelectorAll(`[data-target="${target}"]`).forEach(b => 
        b.classList.toggle("selected", b.dataset.value === btn.dataset.value)
      );

      saveDraft();
      updateStatusLine();
    });
  });
}

function saveDraft(){
  const data = {};
  document.querySelectorAll("input,select,textarea").forEach(el => {
    if(el.id) data[el.id] = el.value;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadDraft(){
  const raw = localStorage.getItem(STORAGE_KEY);
  $("dateField").value = nowLocalString();
  updateSubject();

  if(!raw) return;
  try {
    const data = JSON.parse(raw);
    Object.keys(data).forEach(k => { if($(k)) $(k).value = data[k]; });
    document.querySelectorAll(".ratingBtn").forEach(btn => {
      if(val(btn.dataset.target) === btn.dataset.value) btn.classList.add("selected");
    });
  } catch(e){}
}

function bindAutosave(){
  document.querySelectorAll("input,select,textarea").forEach(el => {
    el.addEventListener("input", () => { saveDraft(); updateStatusLine(); if(el.id==="department") updateSubject(); });
  });
}

function resetAll(){
  document.querySelectorAll("input,select,textarea").forEach(el => {
    if(el.type !== "hidden") el.value = "";
  });
  document.querySelectorAll(".ratingBtn").forEach(b => b.classList.remove("selected"));
  localStorage.removeItem(STORAGE_KEY);
  $("dateField").value = nowLocalString();
  updateSubject();
  updateStatusLine();
}

$("secondaryAction").addEventListener("click", () => {
  if(confirm("Reset entire report?")) resetAll();
});

$("primaryAction").addEventListener("click", () => {
  const missing = requiredFields().filter(f => !val(f.id));
  if(missing.length){
    updateStatusLine();
    scrollToField(missing[0].anchor);
    return;
  }

  updateSubject();
  localStorage.removeItem(STORAGE_KEY);
  $("primaryAction").disabled = true;
  $("primaryAction").textContent = "Sending...";
  $("reportForm").submit();
});

$("newReportBtn").addEventListener("click", () => {
  resetAll();
  $("thanksWrap").classList.add("hidden");
  $("formWrap").classList.remove("hidden");
  $("actionsSticky").classList.remove("hidden");
});

const params = new URLSearchParams(window.location.search);
if(params.get("sent") === "1"){
  $("formWrap").classList.add("hidden");
  $("thanksWrap").classList.remove("hidden");
  $("actionsSticky").classList.add("hidden");
}

$("nextField").value = window.location.origin + window.location.pathname + "?sent=1";

bindRatings();
bindAutosave();
loadDraft();
updateStatusLine();
$("dateField").value = nowLocalString();
</script>
</body>
</html>
