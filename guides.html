<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Café Hub | Guides</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    /* Samme stil som din hub - forkortet til det nødvendige */
    :root{
      --bg0:#0d1117;--bg1:#161b22;
      --text:rgba(255,255,255,0.95);
      --muted:rgba(255,255,255,0.78);
      --muted2:rgba(255,255,255,0.55);
      --gold:#d6b24a;--green:#62d26f;--blue:#5ea7ff;
      --shadow:0 20px 60px rgba(0,0,0,.40);
    }
    *{box-sizing:border-box}
    body{margin:0;padding:14px;min-height:100vh;
      font-family:Inter,system-ui,sans-serif;color:var(--text);
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.12), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.10), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
    }
    .shell{max-width:1180px;margin:0 auto;}

    /* Hero/Header */
    .hero{
      border-radius:28px;border:1px solid rgba(255,255,255,0.12);
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow:var(--shadow);padding:22px 18px;margin-bottom:14px;
      text-align:center;
    }
    .kicker{font-size:10px;font-weight:900;letter-spacing:.26em;text-transform:uppercase;color:var(--muted2)}
    .title{font-family:"Playfair Display",serif;font-size:clamp(30px,6vw,48px);margin-top:8px;letter-spacing:-.03em;}
    .sub{color:var(--muted);font-size:13px;font-weight:800;margin-top:8px;}
    .goldline{height:2px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),transparent);
      margin:18px auto;border-radius:999px;opacity:.9;max-width:700px;}

    /* Section */
    .section{border-radius:22px;border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);box-shadow:var(--shadow);}
    .sectionHead{display:flex;justify-content:space-between;align-items:center;
      padding:14px 16px;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.10);}
    .sectionTitle{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:900;
      letter-spacing:.16em;color:var(--muted);text-transform:uppercase;}
    .sectionDot{width:10px;height:10px;border-radius:50%;background:var(--gold);}
    .sectionInfo{font-size:11px;font-weight:800;color:var(--muted2);}
    .sectionBody{padding:16px;}

    /* Grid + cards */
    .toolGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;}
    .toolCard{
      border-radius:22px;border:1px solid rgba(255,255,255,0.12);
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      padding:18px;min-height:220px;
      display:flex;flex-direction:column;justify-content:space-between;
      transition:.15s ease;cursor:pointer;overflow:hidden;
    }
    .toolCard:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px);}
    .toolTop{display:flex;justify-content:space-between;align-items:flex-start;}
    .toolIcon{font-size:28px;}
    .badge{padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
    .badge.green{background:rgba(98,210,111,0.12);border-color:rgba(98,210,111,0.30);color:#93e49c;}
    .toolName{margin-top:12px;font-size:18px;font-weight:900;}
    .toolDesc{margin-top:8px;color:var(--muted);font-size:13px;font-weight:700;}
    .toolBottom{margin-top:18px;display:flex;justify-content:space-between;align-items:center;}
    .metaChip{padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
    .launchText{color:rgba(255,255,255,0.90);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;}

    /* viewer */
    .toolViewer{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
      background:var(--bg0);z-index:9999;padding:14px;flex-direction:column;}
    .toolViewer.open{display:flex;}
    .toolBar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .toolPill{padding:8px 20px;border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);border-radius:999px;font-size:14px;font-weight:900;text-transform:uppercase;color:var(--text);}
    #closeToolBtn{background:rgba(255,107,107,0.2);border-color:rgba(255,107,107,0.4);color:#ff6b6b;}
    .frame{flex-grow:1;width:100%;border:1px solid rgba(255,255,255,0.12);
      border-radius:20px;background:rgba(0,0,0,0.25);}
  </style>
</head>

<body>
  <div class="shell">
    <header class="hero">
      <div class="kicker">KAISER</div>
      <div class="title">Café Hub</div>
      <div class="sub">Guides & Manualer</div>
      <div class="goldline"></div>
    </header>

    <section class="section">
      <div class="sectionHead">
        <div class="sectionTitle"><span class="sectionDot"></span> GUIDES</div>
        <div class="sectionInfo">Tryk på et kort for at åbne</div>
      </div>

      <div class="sectionBody">
        <div class="toolGrid">
          <div class="toolCard" data-file="aeldresagen.pdf">
            <div>
              <div class="toolTop"><div class="toolIcon">👵</div><div class="badge green">Guide</div></div>
              <div class="toolName">Ældresagen</div>
              <div class="toolDesc">Retningslinjer og rabatoversigt.</div>
            </div>
            <div class="toolBottom">
              <div class="metaChip">HQ</div><div class="launchText">Åbn →</div>
            </div>
          </div>

          <div class="toolCard" data-file="kaffe.pdf">
            <div>
              <div class="toolTop"><div class="toolIcon">☕</div><div class="badge green">Guide</div></div>
              <div class="toolName">Kaffe</div>
              <div class="toolDesc">Dosering, maskinpleje og opskrifter.</div>
            </div>
            <div class="toolBottom">
              <div class="metaChip">Drift</div><div class="launchText">Åbn →</div>
            </div>
          </div>

          <div class="toolCard" data-file="service.pdf">
            <div>
              <div class="toolTop"><div class="toolIcon">🧼</div><div class="badge green">Guide</div></div>
              <div class="toolName">Service</div>
              <div class="toolDesc">Rengøring, service og vedligehold.</div>
            </div>
            <div class="toolBottom">
              <div class="metaChip">Vedligehold</div><div class="launchText">Åbn →</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div style="text-align:center;margin-top:20px;">
      <a href="../drift-hub.html" class="metaChip">← Tilbage til Hub</a>
    </div>
  </div>

  <!-- PDF Viewer -->
  <div class="toolViewer" id="toolViewer">
    <div class="toolBar">
      <div class="toolPill">GUIDE VISNING</div>
      <button id="closeToolBtn" class="toolPill">✖ Luk Værktøj</button>
    </div>
    <iframe class="frame" id="guideFrame"></iframe>
  </div>

  <script>
    // Åbn PDF i viewer
    const cards=document.querySelectorAll('.toolCard');
    const viewer=document.getElementById('toolViewer');
    const frame=document.getElementById('guideFrame');
    const closeBtn=document.getElementById('closeToolBtn');

    cards.forEach(card=>{
      card.addEventListener('click',()=>{
        const file=card.dataset.file;
        if(file){
          frame.src=file;
          viewer.classList.add('open');
        }
      });
    });
    closeBtn.addEventListener('click',()=>viewer.classList.remove('open'));
  </script>
</body>
</html>
