<!doctype html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#0d1117;--bg1:#161b22;--text:rgba(255,255,255,.95);
  --muted:rgba(255,255,255,.78);--gold:#d6b24a;--blue:#5ea7ff;--green:#62d26f;
  --shadow:0 20px 60px rgba(0,0,0,.40);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:Inter,sans-serif;color:var(--text);padding:14px;min-height:100vh;
  background:
    radial-gradient(1100px 700px at 12% -8%,rgba(167,139,250,.12),transparent 55%),
    radial-gradient(1000px 650px at 105% 0%,rgba(56,189,248,.10),transparent 55%),
    linear-gradient(180deg,var(--bg0),var(--bg1) 55%,var(--bg0));
}
.shell{max-width:700px;margin:0 auto;}
.hero{
  border:1px solid rgba(255,255,255,.12);border-radius:28px;
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  box-shadow:var(--shadow);padding:22px 18px;margin-bottom:18px;text-align:center;
}
.kicker{font-size:10px;text-transform:uppercase;letter-spacing:.26em;color:rgba(255,255,255,.6);font-weight:900}
.title{font-family:"Playfair Display",serif;font-size:clamp(30px,6vw,48px);}
.sub{color:var(--muted);font-weight:700;font-size:13px;}
.goldline{height:2px;margin:18px auto;border-radius:999px;max-width:500px;
  background:linear-gradient(90deg,transparent,var(--blue),var(--gold),transparent);}
.section{
  border:1px solid rgba(255,255,255,.12);border-radius:22px;
  background:rgba(255,255,255,.04);box-shadow:var(--shadow);
  padding:18px;margin-bottom:14px;
}
.section h3{font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.inputRow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
.inputRow label{flex:1;}
.inputRow input[type=number]{
  flex:1;text-align:right;padding:8px 10px;border-radius:10px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
  color:var(--text);font-weight:700;width:100%;
}
.inputRow input[type=text]{
  flex:2;text-align:left;padding:8px 10px;border-radius:10px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--muted);font-weight:600;width:100%;
}
.summary{
  text-align:center;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);border-radius:20px;padding:18px;
}
.summary h3{color:var(--gold);letter-spacing:.12em;}
.total{margin-top:6px;font-size:28px;font-weight:900;color:var(--green)}
.button{
  margin-top:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:var(--text);padding:10px 18px;border-radius:999px;letter-spacing:.08em;
  font-size:12px;font-weight:900;text-transform:uppercase;cursor:pointer;
}
.button:hover{background:rgba(255,255,255,.12);}
@media(max-width:600px){.inputRow{flex-direction:column;align-items:flex-start}}
</style>
</head>

<body>
<div class="shell">
  <header class="hero">
    <div class="kicker">S&F</div>
    <div class="title">Budget Regner</div>
    <div class="sub">Overblik over indkomst og udgifter</div>
    <div class="goldline"></div>
  </header>

  <!-- 🔹 Indkomst -->
  <section class="section" id="indtjening">
    <h3>Indkomst</h3>
    <div class="inputRow"><label>Indkomst 1:</label><input type="number" id="inc1" placeholder="0"></div>
    <div class="inputRow"><label>Indkomst 2:</label><input type="number" id="inc2" placeholder="0"></div>
    <div class="inputRow"><label>Børnebidrag:</label><input type="number" id="inc3" placeholder="0"></div>
    <div class="inputRow"><label>Børnepenge:</label><input type="number" id="inc4" placeholder="0"></div>
  </section>

  <!-- 🔹 Udgifter -->
  <section class="section" id="udgifter">
    <h3>Udgifter</h3>

    <div class="inputRow"><label>Husleje:</label><input type="number" class="expense" id="ud1" placeholder="0"></div>
    <div class="inputRow"><label>Mad:</label><input type="number" class="expense" id="ud2" placeholder="0"></div>
    <div class="inputRow"><label>Clever:</label><input type="number" class="expense" id="ud3" placeholder="0"></div>
    <div class="inputRow"><label>Forsikring:</label><input type="number" class="expense" id="ud4" placeholder="0"></div>
    <div class="inputRow"><label>Abonnementer:</label><input type="number" class="expense" id="ud5" placeholder="0"></div>
    <div class="inputRow"><label>Resurs bank - Freja:</label><input type="number" class="expense" id="ud6" placeholder="0"></div>
    <div class="inputRow"><label>Resurs bank - Stefan:</label><input type="number" class="expense" id="ud8" placeholder="0"></div>
    <div class="inputRow"><label>Børnehave madordning:</label><input type="number" class="expense" id="ud9" placeholder="0"></div>
    <div class="inputRow"><label>SFO:</label><input type="number" class="expense" id="ud10" placeholder="0"></div>
    <div class="inputRow"><label>Boliglån:</label><input type="number" class="expense" id="ud11" placeholder="0"></div>
    <div class="inputRow"><label>Norwegian Stefan:</label><input type="number" class="expense" id="ud12" placeholder="0"></div>
    <div class="inputRow"><label>Klara:</label><input type="number" class="expense" id="ud13" placeholder="0"></div>
    <div class="inputRow"><label>Clubtan x2:</label><input type="number" class="expense" id="ud14" placeholder="0"></div>
    <div class="inputRow"><label>Leasing:</label><input type="number" class="expense" id="ud15" placeholder="0"></div>
    <div class="inputRow"><label>El regning:</label><input type="number" class="expense" id="ud16" placeholder="0"></div>
    <div class="inputRow"><label>Viabill Stefan:</label><input type="number" class="expense" id="ud17" placeholder="0"></div>
    <div class="inputRow"><label>Viabill Freja:</label><input type="number" class="expense" id="ud18" placeholder="0"></div>
    <div class="inputRow"><label>Streaming:</label><input type="number" class="expense" id="ud19" placeholder="0"></div>
    <div class="inputRow"><label>Mobil/Internet:</label><input type="number" class="expense" id="ud20" placeholder="0"></div>
    <div class="inputRow"><label>Annas dans:</label><input type="number" class="expense" id="ud21" placeholder="0"></div>
    <div class="inputRow"><label>Vipper:</label><input type="number" class="expense" id="ud22" placeholder="0"></div>

    <!-- 🔸 Andet med kommentar -->
    <div class="inputRow">
      <label>Andet:</label>
      <input type="number" class="expense" id="ud23" placeholder="0">
      <input type="text" class="note" id="note23" placeholder="Kommentar...">
    </div>
    <div class="inputRow">
      <label>Andet:</label>
      <input type="number" class="expense" id="ud24" placeholder="0">
      <input type="text" class="note" id="note24" placeholder="Kommentar...">
    </div>
    <div class="inputRow">
      <label>Andet:</label>
      <input type="number" class="expense" id="ud25" placeholder="0">
      <input type="text" class="note" id="note25" placeholder="Kommentar...">
    </div>
    <div class="inputRow">
      <label>Andet:</label>
      <input type="number" class="expense" id="ud26" placeholder="0">
      <input type="text" class="note" id="note26" placeholder="Kommentar...">
    </div>
  </section>

  <div class="summary">
    <h3>Tilbage Efter Udgifter</h3>
    <div class="total" id="result">0 kr</div>
    <button class="button" id="resetBtn">Nulstil Alt</button>
  </div>
</div>

<script>
const incs = [
  document.getElementById('inc1'),
  document.getElementById('inc2'),
  document.getElementById('inc3'),
  document.getElementById('inc4')
];
const expenses = document.querySelectorAll('.expense');
const notes = document.querySelectorAll('.note');
const result = document.getElementById('result');
const resetBtn = document.getElementById('resetBtn');

// Load gemte værdier
window.addEventListener('load', ()=>{
  [...incs, ...expenses, ...notes].forEach(i=>{
    i.value = localStorage.getItem(i.id) || '';
  });
  calc();
});

// Gem automatisk
[...incs, ...expenses, ...notes].forEach(inp=>{
  inp.addEventListener('input', ()=>{
    localStorage.setItem(inp.id, inp.value);
    calc();
  });
});

resetBtn.addEventListener('click', ()=>{
  [...incs, ...expenses, ...notes].forEach(inp=>{
    inp.value='';
    localStorage.removeItem(inp.id);
  });
  calc();
});

function calc(){
  const totalInc = incs.reduce((a,i)=>a+(parseFloat(i.value)||0),0);
  const totalExp = [...expenses].reduce((a,i)=>a+(parseFloat(i.value)||0),0);
  const left = totalInc - totalExp;
  result.textContent = `${left.toLocaleString('da-DK')} kr`;
  result.style.color = left >= 0 ? 'var(--green)' : '#ff6b6b';
}
</script>
</body>
</html>
