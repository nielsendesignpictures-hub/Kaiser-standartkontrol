<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Gæsteklager</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#0d1117;
      --bg1:#161b22;
      --text:rgba(255,255,255,0.95);
      --muted:rgba(255,255,255,0.72);
      --muted2:rgba(255,255,255,0.52);
      --gold:#d6b24a;
      --gold2:#b9921f;
      --ok:#62d26f;
      --danger:#ff6b6b;
      --warn:#f59e0b;
      --shadow:0 20px 60px rgba(0,0,0,.40);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      color:var(--text);
      font-family:Inter,system-ui,sans-serif;
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.12), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.10), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.12), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      padding:18px;
    }

    .wrap{max-width:960px;margin:0 auto;}
    .card{
      border-radius:28px;
      border:1px solid rgba(255,255,255,0.12);
      background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow:var(--shadow);
      padding:24px;
    }

    .kicker{
      text-align:center;
      font-size:12px;
      font-weight:900;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--muted2);
    }

    h1{
      margin:10px 0 0;
      text-align:center;
      font-family:"Playfair Display",serif;
      font-size:46px;
      line-height:1;
      letter-spacing:-.03em;
    }

    .sub{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
      margin-top:10px;
    }

    .goldline{
      height:2px;
      margin:18px auto 0;
      max-width:420px;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
    }

    .pillRow{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      font-size:11px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.92);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:22px;
    }

    @media (max-width: 780px){
      .grid{grid-template-columns:1fr;}
    }

    .full{grid-column:1/-1;}

    label{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-weight:900;
      font-size:12px;
      letter-spacing:.10em;
      text-transform:uppercase;
    }

    input, select, textarea{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:var(--text);
      padding:14px 16px;
      font-size:15px;
      font-weight:700;
      outline:none;
    }

    input:focus, select:focus, textarea:focus{
      border-color:var(--gold);
      background:rgba(255,255,255,0.10);
    }

    select option{
      background:#161b22;
      color:#fff;
    }

    textarea{
      resize:vertical;
      min-height:120px;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    .btn{
      flex:1;
      min-width:180px;
      border:none;
      border-radius:16px;
      padding:16px;
      font-size:14px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      cursor:pointer;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#0b0c0f;
    }

    .btn.ghost{
      background:rgba(255,255,255,0.08);
      color:#fff;
      border:1px solid rgba(255,255,255,0.14);
    }

    .status{
      margin-top:16px;
      padding:14px 16px;
      border-radius:14px;
      font-size:14px;
      font-weight:700;
      display:none;
    }
    .status.ok{
      display:block;
      background:rgba(98,210,111,0.15);
      border:1px solid rgba(98,210,111,0.35);
      color:var(--ok);
    }
    .status.err{
      display:block;
      background:rgba(255,107,107,0.15);
      border:1px solid rgba(255,107,107,0.35);
      color:var(--danger);
    }

    .listWrap{
      margin-top:24px;
      border-top:1px solid rgba(255,255,255,0.10);
      padding-top:20px;
    }

    .listTitle{
      font-size:12px;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--muted2);
      margin-bottom:12px;
    }

    .itemList{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:12px;
      border-radius:16px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
    }

    .bar{
      width:5px;
      height:60px;
      border-radius:4px;
      background:var(--danger);
      flex:0 0 auto;
    }
    .bar.low{background:var(--ok);}
    .bar.medium{background:var(--warn);}
    .bar.high{background:var(--danger);}

    .itemInfo{flex:1;min-width:0;}
    .itemTitle{
      font-weight:800;
      font-size:14px;
      line-height:1.3;
    }

    .itemMeta{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .itemDesc{
      margin-top:6px;
      font-size:13px;
      color:rgba(255,255,255,0.90);
      line-height:1.4;
    }

    .empty{
      text-align:center;
      padding:24px;
      color:var(--muted2);
      font-size:13px;
    }

    iframe.hiddenFrame{
      display:none;
      width:0;height:0;border:0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="kicker">KAISER</div>
      <h1>Gæsteklager</h1>
      <div class="sub">Hurtig registrering af gæsteklager til drift og opfølgning</div>
      <div class="goldline"></div>

      <div class="pillRow">
        <div class="pill" id="locPill">📍 Location: —</div>
        <div class="pill" id="datePill">📅 Date: —</div>
      </div>

      <div class="grid">
        <div>
          <label for="locSelect">Lokation</label>
          <select id="locSelect">
            <option value="Café Kaiser Helsingør">Café Kaiser Helsingør</option>
            <option value="Café Kaiser Hillerød">Café Kaiser Hillerød</option>
            <option value="Café Kaiser Farum">Café Kaiser Farum</option>
            <option value="Café Kaiser Hørsholm">Café Kaiser Hørsholm</option>
            <option value="Café Kaiser Vanløse">Café Kaiser Vanløse</option>
          </select>
        </div>

        <div>
          <label for="dateInput">Dato</label>
          <input id="dateInput" type="date" />
        </div>

        <div>
          <label for="categoryInput">Kategori</label>
          <select id="categoryInput">
            <option value="">Vælg kategori</option>
            <option value="Food">Mad</option>
            <option value="Service">Service</option>
            <option value="Waiting time">Ventetid</option>
            <option value="Wrong order">Fejl i ordre</option>
            <option value="Cleanliness">Renlighed</option>
            <option value="Staff behaviour">Personale adfærd</option>
            <option value="Other">Andet</option>
          </select>
        </div>

        <div>
          <label for="severityInput">Alvorlighed</label>
          <select id="severityInput">
            <option value="">Vælg alvorlighed</option>
            <option value="Low">Lav</option>
            <option value="Medium">Mellem</option>
            <option value="High">Høj</option>
          </select>
        </div>

        <div>
          <label for="tableRefInput">Bord / reference</label>
          <input id="tableRefInput" type="text" placeholder="e.g. Table 12" />
        </div>

        <div>
          <label for="resolvedNowInput">Løst nu?</label>
          <select id="resolvedNowInput">
            <option value="No">Nej</option>
            <option value="Yes">Ja</option>
          </select>
        </div>

        <div class="full">
          <label for="descriptionInput">Kort beskrivelse</label>
          <textarea id="descriptionInput" placeholder="What happened?"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn ghost" id="refreshBtn" type="button">Refresh list</button>
        <button class="btn primary" id="submitBtn" type="button">Send complaint</button>
      </div>

      <div class="status" id="statusBox"></div>

      <div class="listWrap">
        <div class="listTitle">Latest guest complaints</div>
        <div class="itemList" id="itemList">
          <div class="empty">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <iframe name="saveTarget" class="hiddenFrame"></iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8ztJIUOk-4GkhkTwHbpJiSOi7uJjPivpWc5skVr0KXJ1m-j3dcVNF3BSe3sbnWIds/exec";

    const $ = id => document.getElementById(id);

    function isoToday() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function setStatus(msg, type) {
      const box = $("statusBox");
      box.className = "status " + (type === "ok" ? "ok" : "err");
      box.textContent = msg;
    }

    function clearStatus() {
      $("statusBox").className = "status";
      $("statusBox").textContent = "";
    }

    function getLocFromQS() {
      return new URLSearchParams(location.search).get("loc") || "";
    }

    function updatePills() {
      $("locPill").textContent = "📍 Location: " + $("locSelect").value.replace("Café Kaiser ", "");
      $("datePill").textContent = "📅 Date: " + ($("dateInput").value || "—");
    }

    function jsonp(url, params = {}) {
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Math.random().toString(16).slice(2);
        const qs = new URLSearchParams({ ...params, callback: cb }).toString();
        const src = url + (url.includes("?") ? "&" : "?") + qs;

        const s = document.createElement("script");
        const t = setTimeout(() => {
          cleanup();
          reject(new Error("timeout"));
        }, 15000);

        function cleanup() {
          clearTimeout(t);
          try { delete window[cb]; } catch (_) {}
          if (s.parentNode) s.parentNode.removeChild(s);
        }

        window[cb] = data => {
          cleanup();
          resolve(data);
        };

        s.src = src;
        s.async = true;
        s.onerror = () => {
          cleanup();
          reject(new Error("load error"));
        };

        document.body.appendChild(s);
      });
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    }

    function severityClass(sev) {
      const s = String(sev || "").toLowerCase();
      if (s === "low") return "low";
      if (s === "medium") return "medium";
      return "high";
    }

    async function loadComplaints() {
      clearStatus();
      const loc = $("locSelect").value;

      try {
        const data = await jsonp(SCRIPT_URL, {
          action: "getGuestComplaints",
          loc
        });

        if (!data || !data.ok || !Array.isArray(data.complaints) || !data.complaints.length) {
          $("itemList").innerHTML = '<div class="empty">No complaints registered yet</div>';
          return;
        }

        $("itemList").innerHTML = data.complaints.map(item => `
          <div class="item">
            <div class="bar ${severityClass(item.severity)}"></div>
            <div class="itemInfo">
              <div class="itemTitle">${escapeHtml(item.category)} • ${escapeHtml(item.severity)}</div>
              <div class="itemMeta">📅 ${escapeHtml(item.date)}${item.tableRef ? " • " + escapeHtml(item.tableRef) : ""} • Status: ${escapeHtml(item.status)}</div>
              <div class="itemDesc">${escapeHtml(item.description)}</div>
            </div>
          </div>
        `).join("");

      } catch (e) {
        $("itemList").innerHTML = '<div class="empty">❌ Error loading</div>';
      }
    }

    function submitComplaint() {
      clearStatus();

      const location = $("locSelect").value;
      const date = $("dateInput").value;
      const category = ($("categoryInput").value || "").trim();
      const severity = ($("severityInput").value || "").trim();
      const description = ($("descriptionInput").value || "").trim();
      const tableRef = ($("tableRefInput").value || "").trim();
      const resolvedNow = ($("resolvedNowInput").value || "").trim();

      if (!date || !location || !category || !severity || !description) {
        setStatus("Please fill date, location, category, severity and description.", "err");
        return;
      }

      const btn = $("submitBtn");
      btn.disabled = true;
      btn.textContent = "Sending...";

      const form = document.createElement("form");
      form.method = "POST";
      form.action = SCRIPT_URL;
      form.target = "saveTarget";
      form.style.display = "none";

      const fields = {
        action: "addGuestComplaint",
        date,
        location,
        category,
        severity,
        description,
        tableRef,
        resolvedNow
      };

      Object.keys(fields).forEach(key => {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = fields[key];
        form.appendChild(input);
      });

      document.body.appendChild(form);
      form.submit();

      setTimeout(() => {
        form.remove();
        btn.disabled = false;
        btn.textContent = "Send complaint";
        $("categoryInput").value = "";
        $("severityInput").value = "";
        $("descriptionInput").value = "";
        $("tableRefInput").value = "";
        $("resolvedNowInput").value = "No";
        setStatus("✅ Complaint saved.", "ok");
        loadComplaints();
      }, 1200);
    }

    (function init() {
      $("dateInput").value = isoToday();

      const locQS = getLocFromQS();
      if (locQS) {
        const wanted = "Café Kaiser " + locQS.trim();
        const options = Array.from($("locSelect").options);
        const match = options.find(o => o.value.toLowerCase() === wanted.toLowerCase());
        if (match) $("locSelect").value = match.value;
      }

      updatePills();
      loadComplaints();

      $("locSelect").addEventListener("change", () => {
        updatePills();
        loadComplaints();
      });

      $("dateInput").addEventListener("change", updatePills);
      $("refreshBtn").addEventListener("click", loadComplaints);
      $("submitBtn").addEventListener("click", submitComplaint);
    })();
  </script>
</body>
</html>
