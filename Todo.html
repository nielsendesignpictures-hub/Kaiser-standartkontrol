<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Todo Liste</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 50px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #888;
            font-size: 16px;
        }

        .input-section {
            margin-bottom: 50px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        #taskInput {
            flex: 1;
            padding: 14px 18px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.2s;
        }

        #taskInput:focus {
            outline: none;
            border-color: #666;
            background: #151515;
        }

        #taskInput::placeholder {
            color: #555;
        }

        .priority-buttons {
            display: flex;
            gap: 8px;
        }

        .priority-btn {
            padding: 14px 20px;
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .priority-btn:hover {
            background: #252525;
            border-color: #444;
        }

        .priority-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        #addBtn {
            padding: 14px 32px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #addBtn:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        .section {
            margin-bottom: 40px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a2a;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
        }

        .task-count {
            background: #1f1f1f;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #888;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .task-item:hover {
            background: #1f1f1f;
            border-color: #333;
        }

        .task-item.completed {
            opacity: 0.5;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #666;
        }

        .task-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #fff;
        }

        .task-text {
            flex: 1;
            font-size: 15px;
            color: #e0e0e0;
            line-height: 1.5;
        }

        .delete-btn {
            padding: 6px 14px;
            background: transparent;
            color: #666;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            opacity: 0;
        }

        .task-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: #2a2a2a;
            color: #ff4444;
            border-color: #ff4444;
        }

        .empty-state {
            text-align: center;
            color: #444;
            padding: 40px 20px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 36px;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .priority-buttons {
                width: 100%;
            }

            .priority-btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Todo</h1>
            <p class="subtitle">Hold styr på dine opgaver</p>
        </header>
        
        <div class="input-section">
            <div class="input-wrapper">
                <input type="text" id="taskInput" placeholder="Skriv en ny opgave...">
                <button id="addBtn">Tilføj</button>
            </div>
            <div class="priority-buttons">
                <button class="priority-btn active" data-priority="high">🔴 Haster</button>
                <button class="priority-btn" data-priority="medium">🟠 Denne uge</button>
                <button class="priority-btn" data-priority="low">🟡 Projekt</button>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-title">🔴 Haster</span>
                <span class="task-count" id="highCount">0</span>
            </div>
            <ul class="task-list" id="highPriority"></ul>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-title">🟠 Denne uge</span>
                <span class="task-count" id="mediumCount">0</span>
            </div>
            <ul class="task-list" id="mediumPriority"></ul>
        </div>

        <div class="section">
            <div class="section-header">
                <span class="section-title">🟡 Projekter</span>
                <span class="task-count" id="lowCount">0</span>
            </div>
            <ul class="task-list" id="lowPriority"></ul>
        </div>
    </div>

    <script>
        // Initial tasks
        let tasks = JSON.parse(localStorage.getItem('tasks')) || {
            high: [
                { text: 'Pænstere drifttool til mødet mandag', completed: false },
                { text: 'Sende mails ud omkring køkkenchefmøde', completed: false }
            ],
            medium: [
                { text: 'Har køkkencheferne styr på alt omkring flæsk?', completed: false },
                { text: 'Opdatere køkken %', completed: false },
                { text: 'Skrive nye opskrifter ind i SharePoint', completed: false }
            ],
            low: [
                { text: 'Catering-opskrifter', completed: false },
                { text: 'Oprette nye knapper i Friendly', completed: false },
                { text: 'Lave AI-opskriftsbot til tjenere', completed: false }
            ]
        };

        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const priorityBtns = document.querySelectorAll('.priority-btn');
        let selectedPriority = 'high';

        // Priority button selection
        priorityBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                priorityBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPriority = btn.dataset.priority;
            });
        });

        // Render all tasks
        function renderTasks() {
            ['high', 'medium', 'low'].forEach(priority => {
                const list = document.getElementById(`${priority}Priority`);
                const countElement = document.getElementById(`${priority}Count`);
                list.innerHTML = '';

                const activeTasks = tasks[priority].filter(t => !t.completed);
                countElement.textContent = activeTasks.length;

                if (tasks[priority].length === 0) {
                    list.innerHTML = '<div class="empty-state">Ingen opgaver</div>';
                    return;
                }

                tasks[priority].forEach((task, index) => {
                    const li = document.createElement('li');
                    li.className = `task-item ${task.completed ? 'completed' : ''}`;
                    li.innerHTML = `
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="toggleTask('${priority}', ${index})">
                        <span class="task-text">${task.text}</span>
                        <button class="delete-btn" onclick="deleteTask('${priority}', ${index})">Slet</button>
                    `;
                    list.appendChild(li);
                });
            });
        }

        // Add new task
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;

            tasks[selectedPriority].push({
                text: text,
                completed: false
            });

            saveTasks();
            renderTasks();
            taskInput.value = '';
        }

        // Toggle task completion
        function toggleTask(priority, index) {
            tasks[priority][index].completed = !tasks[priority][index].completed;
            saveTasks();
            renderTasks();
        }

        // Delete task
        function deleteTask(priority, index) {
            tasks[priority].splice(index, 1);
            saveTasks();
            renderTasks();
        }

        // Save to localStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Event listeners
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Initial render
        renderTasks();
    </script>
</body>
</html>
