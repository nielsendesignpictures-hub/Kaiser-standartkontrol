<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaiser • Command</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0ea5e9;
      --red: #ef4444;
      --amber: #f59e0b;
      --emerald: #10b981;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      line-height: 1.6;
    }

    .container { max-width: 1280px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      padding: 16px 24px;
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, #0ea5e9, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 14px;
    }

    .metric {
      text-align: center;
    }
    .metric-label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .metric-value { font-size: 22px; font-weight: 700; }

    .main {
      display: grid;
      grid-template-columns: 7fr 5fr;
      gap: 24px;
    }
    @media (max-width: 1024px) { .main { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.04);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Briefing */
    .briefing {
      font-size: 21px;
      line-height: 1.3;
      font-weight: 600;
      color: var(--text);
    }

    .briefing small {
      display: block;
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
    }

    /* Signals */
    .signals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .signal-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
    }
    .signal-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.06);
    }

    .signal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .signal-count {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }

    /* Lists */
    .list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .list-item {
      padding: 14px 16px;
      background: #f8fafc;
      border-radius: 10px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
    }

    .badge-red { background: #fee2e2; color: var(--red); }
    .badge-amber { background: #fef3c7; color: var(--amber); }
    .badge-emerald { background: #d1fae5; color: var(--emerald); }

    .empty {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Goals */
    .goal-inputs {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      gap: 12px;
      margin-bottom: 20px;
    }

    input, button {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
    }

    button {
      background: var(--text);
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="logo">Kaiser</div>
      <div class="header-right">
        <div class="metric">
          <div class="metric-label">Fokus</div>
          <div class="metric-value" id="focusLocation">—</div>
        </div>
        <div class="metric">
          <div class="metric-label">Signaler</div>
          <div class="metric-value" id="totalSignals">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Status</div>
          <div class="metric-value" id="statusText" style="color:#15803d;">Live</div>
        </div>
      </div>
    </header>

    <!-- Daily Briefing -->
    <div class="card">
      <div class="section-header">
        <div class="section-title">Dagens Overblik</div>
        <div style="font-size:13px; color:var(--muted);" id="lastUpdated">Opdateret for et øjeblik siden</div>
      </div>
      <div class="briefing" id="briefing">
        Henter dagens billede...
      </div>
    </div>

    <!-- Key Signals -->
    <div class="card">
      <div class="section-header">
        <div class="section-title">Aktive Signaler</div>
      </div>
      <div class="signals-grid">
        <div class="signal-card">
          <div class="signal-header">
            <span style="color:var(--red); font-size:20px;">⚠️</span>
            <span class="badge badge-red">KLAGER</span>
          </div>
          <div class="signal-count" id="complaintsCount">0</div>
          <div class="list" id="complaintsList"></div>
        </div>

        <div class="signal-card">
          <div class="signal-header">
            <span style="color:var(--amber); font-size:20px;">📦</span>
            <span class="badge badge-amber">UDSOLGT</span>
          </div>
          <div class="signal-count" id="soldoutCount">0</div>
          <div class="list" id="soldoutList"></div>
        </div>

        <div class="signal-card">
          <div class="signal-header">
            <span style="color:var(--emerald); font-size:20px;">🔧</span>
            <span class="badge badge-emerald">FEJL</span>
          </div>
          <div class="signal-count" id="faultsCount">0</div>
          <div class="list" id="faultsList"></div>
        </div>

        <div class="signal-card">
          <div class="signal-header">
            <span style="color:#0ea5e9; font-size:20px;">🚚</span>
            <span class="badge" style="background:#e0f2fe; color:#0369a1;">LEVERANDØR</span>
          </div>
          <div class="signal-count" id="supplierCount">0</div>
          <div class="list" id="supplierList"></div>
        </div>
      </div>
    </div>

    <!-- Lokationer + Mål -->
    <div class="main">
      <div class="card">
        <div class="section-header">
          <div class="section-title">Lokationer i Fokus</div>
        </div>
        <div class="list" id="locationsList"></div>
      </div>

      <div class="card">
        <div class="section-header">
          <div class="section-title">Mål & Frister</div>
        </div>
        <div class="goal-inputs">
          <input type="date" id="goalDate">
          <input type="text" id="goalInput" placeholder="Skriv nyt mål...">
          <button onclick="addGoal()">Tilføj</button>
        </div>
        <div class="list" id="goalsList"></div>
      </div>
    </div>

    <div class="footer">
      Kaiser Operations Board • Data hentes live fra dit Google Script
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8ztJIUOk-4GkhkTwHbpJiSOi7uJjPivpWc5skVr0KXJ1m-j3dcVNF3BSe3sbnWIds/exec";
    const $ = id => document.getElementById(id);
    let goals = JSON.parse(localStorage.getItem("kaiser_goals_v3") || "[]");

    function fetchData() {
      const cb = "jsonp" + Date.now();
      const month = new Date().toISOString().slice(0,7);
      const url = `${SCRIPT_URL}?action=fbPortalBundle&month=${month}&callback=${cb}`;

      const script = document.createElement("script");
      window[cb] = function(res) {
        if (res && res.ok) {
          renderBoard(res);
        } else {
          $('briefing').innerHTML = "Kunne ikke hente data. Tjek dit script.";
        }
        delete window[cb];
        script.remove();
      };
      script.src = url;
      document.body.appendChild(script);
    }

    function renderBoard(data) {
      const complaints = data.complaints || [];
      const soldout = data.soldout || [];
      const faults = data.faults || [];
      const supplier = data.supplier || [];
      const total = complaints.length + soldout.length + faults.length + supplier.length;

      // Top metrics
      $('totalSignals').textContent = total;

      // Find fokuslokation
      const locCount = {};
      [...complaints, ...soldout, ...faults, ...supplier].forEach(i => {
        const loc = i.location || "Ukendt";
        locCount[loc] = (locCount[loc] || 0) + 1;
      });
      const topLoc = Object.entries(locCount).sort((a,b) => b[1] - a[1])[0];
      $('focusLocation').textContent = topLoc ? topLoc[0] : "Alle stabile";

      // Briefing
      if (total === 0) {
        $('briefing').innerHTML = `Driften er stabil i dag.<small>Ingen kritiske signaler på tværs af kæden.</small>`;
      } else {
        $('briefing').innerHTML = `${topLoc[0]} er dagens hovedfokus.<small>${topLoc[1]} signaler — det er det mest kritiske sted lige nu.</small>`;
      }

      // Signal counts
      $('complaintsCount').textContent = complaints.length;
      $('soldoutCount').textContent = soldout.length;
      $('faultsCount').textContent = faults.length;
      $('supplierCount').textContent = supplier.length;

      // Live lists (kun de vigtigste)
      function renderList(id, items, max = 4) {
        const container = $(id);
        container.innerHTML = items.slice(0, max).map(item => `
          <div class="list-item">
            <div>${item.location || "Ukendt"} — ${item.description || item.productName || item.category || ""}</div>
            <div class="badge badge-red">NY</div>
          </div>
        `).join('');
      }

      renderList("complaintsList", complaints);
      renderList("soldoutList", soldout);
      renderList("faultsList", faults);
      renderList("supplierList", supplier);

      // Lokationer
      let locHTML = "";
      Object.entries(locCount).sort((a,b)=>b[1]-a[1]).forEach(([loc, count]) => {
        locHTML += `
          <div class="list-item">
            <div style="font-weight:600;">${loc}</div>
            <div class="badge ${count > 3 ? 'badge-red' : 'badge-amber'}">${count} signaler</div>
          </div>`;
      });
      $('locationsList').innerHTML = locHTML || '<div class="empty">Ingen lokationer i fokus</div>';

      renderGoals();
    }

    function renderGoals() {
      let html = goals.map((g, i) => `
        <div class="list-item">
          <div>${g.text}</div>
          <button onclick="deleteGoal(${i})" style="color:#ef4444;background:none;border:none;cursor:pointer;">×</button>
        </div>`).join('');
      $('goalsList').innerHTML = html || '<div class="empty">Ingen mål endnu</div>';
    }

    function addGoal() {
      const text = $('goalInput').value.trim();
      if (!text) return;
      goals.unshift({ text });
      localStorage.setItem("kaiser_goals_v3", JSON.stringify(goals));
      $('goalInput').value = "";
      renderGoals();
    }

    function deleteGoal(i) {
      goals.splice(i, 1);
      localStorage.setItem("kaiser_goals_v3", JSON.stringify(goals));
      renderGoals();
    }

    // Start
    fetchData();
    setInterval(fetchData, 90000); // Opdater hvert 1,5 minut
    renderGoals();
  </script>
</body>
</html>
