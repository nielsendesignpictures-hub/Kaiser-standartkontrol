<!doctype html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaiser – Live Score</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      /* Modern dark, but readable */
      --bg0:#070A12;
      --bg1:#0B1020;
      --panel:rgba(255,255,255,0.055);
      --panel2:rgba(255,255,255,0.035);
      --border:rgba(255,255,255,0.10);

      --text:rgba(255,255,255,0.94);
      --muted:rgba(255,255,255,0.74);
      --muted2:rgba(255,255,255,0.52);

      /* Kaiser gold accent */
      --gold:#d6b24a;
      --gold2:#b9921f;

      /* Category colors */
      --kitchen:#f59e0b; /* amber */
      --drift:#38bdf8;   /* sky */
      --quality:#a78bfa; /* violet */

      --danger:#ff6b6b;
      --shadow: 0 26px 75px rgba(0,0,0,.55);
      --shadow2: 0 18px 55px rgba(0,0,0,.35);
    }

    html,body{height:100%;}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 700px at 12% -8%, rgba(167,139,250,0.10), transparent 55%),
        radial-gradient(1000px 650px at 105% 0%, rgba(56,189,248,0.08), transparent 55%),
        radial-gradient(900px 700px at 25% 110%, rgba(245,158,11,0.10), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      overflow-x:hidden;
    }

    /* subtle grid texture */
    body:before{
      content:"";
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity:0.06;
      pointer-events:none;
      mask-image: radial-gradient(1000px 700px at 50% 0%, black, transparent 75%);
    }

    .shell{max-width:1200px; margin:0 auto; padding:18px 16px 44px;}

    /* Header / hero */
    .hero{
      position:relative;
      border-radius: 28px;
      border:1px solid rgba(255,255,255,0.10);
      background:
        radial-gradient(900px 260px at 50% 0%, rgba(255,255,255,0.08), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
      overflow:hidden;
      padding: 26px 20px 18px;
    }
    .hero:after{
      content:"";
      position:absolute; inset:-2px;
      background:
        radial-gradient(700px 240px at 20% 0%, rgba(245,158,11,0.20), transparent 60%),
        radial-gradient(700px 240px at 80% 0%, rgba(56,189,248,0.16), transparent 60%);
      opacity:.55;
      pointer-events:none;
    }

    .kicker{
      position:relative;
      font-size:12px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--muted2);
      font-weight:900;
      text-align:center;
    }
    .title{
      position:relative;
      font-family:"Playfair Display", serif;
      font-size:48px;
      line-height:1.02;
      letter-spacing:-0.02em;
      font-weight:700;
      text-align:center;
      margin-top:10px;
    }
    .subtitle{
      position:relative;
      text-align:center;
      margin-top:10px;
      color:var(--muted);
      font-weight:700;
      font-size:13px;
    }
    .goldline{
      position:relative;
      height:2px;
      margin:18px auto 0;
      max-width: 680px;
      border-radius:999px;
      background: linear-gradient(90deg, transparent, rgba(214,178,74,0.92), transparent);
      opacity:.95;
    }

    /* Controls (simple pills + actions) */
    .controls{
      position:relative;
      margin-top:16px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      font-weight:1000;
      letter-spacing:.10em;
      text-transform:uppercase;
      font-size:11px;
      color: rgba(255,255,255,0.86);
      white-space:nowrap;
      user-select:none;
    }
    .pill.open{ border-color: rgba(214,178,74,0.22); background: rgba(214,178,74,0.10); }

    .btnPrimary{
      border-radius: 999px;
      font-weight: 1000;
      letter-spacing: .10em;
      text-transform:uppercase;
      font-size:11px;
      padding: 10px 12px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #0b0c0f;
      box-shadow: 0 18px 40px rgba(214,178,74,0.18);
      border: none;
      user-select:none;
    }
    .btnSecondary{
      border-radius: 999px;
      font-weight: 1000;
      letter-spacing: .10em;
      text-transform:uppercase;
      font-size:11px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.90);
      user-select:none;
    }
    .btnPrimary:active, .btnSecondary:active{ transform: translateY(1px); }

    /* Section blocks */
    .section{
      margin-top:18px;
      border-radius:26px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.03);
      box-shadow: var(--shadow2);
      overflow:hidden;
    }
    .sectionHead{
      padding:16px 16px 12px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      background:
        radial-gradient(900px 200px at 50% 0%, rgba(255,255,255,0.06), transparent 65%),
        linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
    }
    .sectionTitle{
      font-weight:1000;
      letter-spacing:.20em;
      text-transform:uppercase;
      font-size:12px;
      color: rgba(255,255,255,0.72);
      display:flex;
      align-items:center;
      gap:10px;
    }
    .sectionTitle .dot{
      width:10px;height:10px;border-radius:999px;
      background: rgba(214,178,74,0.85);
      box-shadow: 0 0 0 5px rgba(214,178,74,0.10);
      opacity:.95;
    }
    .sectionSub{
      color: rgba(255,255,255,0.55);
      font-weight:800;
      font-size:12px;
    }
    .divider{height:1px;background:rgba(255,255,255,0.10);}

    /* Grid inside sections */
    .gridTools{
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
      padding: 14px;
    }
    @media (min-width: 820px){
      .gridTools{ grid-template-columns: repeat(2, minmax(0, 1fr)); gap:18px; }
      .gridTools > .tile:last-child:nth-child(odd){ grid-column: 1 / -1; }
    }

    /* Tiles (portal look) */
    .tile{
      position:relative;
      display:flex;
      flex-direction:column;
      gap:10px;
      border-radius:26px;
      padding:18px 18px 16px;
      border:1px solid rgba(255,255,255,0.12);
      background:
        radial-gradient(900px 240px at 50% 0%, rgba(255,255,255,0.07), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      box-shadow: 0 20px 60px rgba(0,0,0,.40);
      overflow:hidden;
      min-height: 168px;
    }
    .tile:before{
      content:"";
      position:absolute; inset:-2px;
      opacity:0;
      transition: opacity .18s ease;
      pointer-events:none;
      background: radial-gradient(520px 220px at 16% 10%, rgba(214,178,74,0.16), transparent 60%);
    }
    .tile:hover:before{ opacity:1; }

    .tileTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }
    .icon{
      width:42px;height:42px;border-radius:16px;
      display:flex;align-items:center;justify-content:center;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      font-weight:1000;
      letter-spacing:.08em;
      user-select:none;
      flex:0 0 auto;
    }
    .tileKicker{
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color: rgba(255,255,255,0.55);
      font-weight:1000;
      margin-top: 4px;
    }
    .tileTitle{
      font-family:"Playfair Display", serif;
      font-size:34px;
      line-height:1.06;
      letter-spacing:-0.02em;
      font-weight:700;
      margin-top: 2px;
    }
    .tileSub{
      color: rgba(255,255,255,0.74);
      font-weight:700;
      font-size:13px;
      line-height:1.3;
      max-width: 60ch;
    }
    .tileGoldline{
      height:2px;
      border-radius:999px;
      background: linear-gradient(90deg, transparent, rgba(214,178,74,0.65), transparent);
      opacity:.85;
      margin-top:4px;
    }
    .tileMeta{
      margin-top:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      padding-top: 8px;
    }
    .tag{
      display:inline-flex;
