<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kagekøleskab</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent: #d9b65a;
      --bad: #ff2d2d;
      --shadow: 0 18px 50px rgba(0,0,0,.50);
      --r: 22px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: var(--font);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(217,182,90,.25), transparent 55%),
        radial-gradient(900px 500px at 10% 10%, rgba(120,180,255,.15), transparent 55%),
        radial-gradient(900px 500px at 90% 20%, rgba(120,255,200,.10), transparent 55%),
        var(--bg);
      color: var(--text);
    }
    .wrap{max-width: 1100px; margin: 18px auto; padding: 0 18px 50px;}
    .shell{
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    h1{margin:0; text-align:center; font-size: 42px; letter-spacing:.01em;}
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: 0 14px 45px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    .card h2{margin:0 0 12px; font-size: 17px; letter-spacing:.02em;}
    .row{display:flex; gap:12px; flex-wrap:wrap; align-items:end;}
    .field{flex:1; min-width: 220px;}
    label{display:block; color: var(--muted); font-size: 13px; margin: 0 0 6px;}
    input, textarea, button{
      width:100%;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 14px 14px;
      outline:none;
      font-size: 16px;
    }
    textarea{min-height: 46px; resize: vertical;}
    .btn{
      cursor:pointer;
      border-radius: 999px;
      font-weight: 950;
      letter-spacing:.02em;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(217,182,90,.25), rgba(217,182,90,.10));
      padding: 16px 16px;
      font-size: 16px;
    }
    .btnDanger{
      cursor:pointer;
      border-radius: 999px;
      font-weight: 950;
      background: rgba(255,45,45,.16);
      border: 1px solid rgba(255,45,45,.28);
      padding: 14px 14px;
      font-size: 15px;
    }

    .cakeGrid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 6px;
    }
    @media (max-width: 980px){ .cakeGrid{grid-template-columns: repeat(2, minmax(0, 1fr));} }
    .cakeBtn{
      text-align:left;
      padding: 14px 14px;
      border-radius: 18px;
      cursor:pointer;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      user-select:none;
    }
    .cakeBtn .name{font-weight: 950; font-size: 16px;}
    .cakeBtn .meta{color: var(--muted); font-size: 13px; margin-top: 4px;}
    .cakeBtn.active{
      border-color: rgba(217,182,90,.55);
      box-shadow: 0 0 0 3px rgba(217,182,90,.12);
      background: rgba(217,182,90,.10);
    }

    table{width:100%; border-collapse: collapse; margin-top: 8px; overflow:hidden; border-radius: 16px;}
    th, td{
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      text-align:left;
      font-size: 14px;
      vertical-align: top;
    }
    th{color: var(--muted); font-weight: 900; font-size: 12px; letter-spacing:.03em;}
    tr:hover td{background: rgba(255,255,255,.03)}
    .actions{display:flex; gap:10px; flex-wrap:wrap}
    .mini{padding: 12px 14px; font-size: 14px;}
    .small{font-size: 12px; color: var(--muted)}

    /* Modal base */
    .overlay{
      position: fixed; inset:0;
      background: rgba(0,0,0,.70);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 2147483647; /* ekstremt højt, så den ikke gemmes bag hub/iframe layers */
    }
    .modal{
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 26px;
      padding: 16px;
      box-shadow: 0 30px 90px rgba(0,0,0,.70);
      backdrop-filter: blur(12px);
    }
    .modalHead{display:flex; align-items:center; justify-content:space-between; gap: 10px;}
    .modal h3{margin:0; font-size: 18px;}
    .modal p{margin: 8px 0 0; color: var(--muted); font-size: 14px;}
    .modalFoot{display:flex; justify-content:flex-end; gap: 10px; margin-top: 12px; flex-wrap:wrap;}
    .xBtn{width:auto;}

    /* Alarm (stor rød) */
    .alarmModal{
      border-color: rgba(255,45,45,.45);
      box-shadow: 0 35px 120px rgba(255,45,45,.10), 0 30px 90px rgba(0,0,0,.70);
    }
    .alarmTitle{
      font-size: 30px;
      font-weight: 1000;
      letter-spacing:.03em;
      text-transform: uppercase;
      color: rgba(255,255,255,.95);
    }
    .alarmBanner{
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,45,45,.16);
      border: 1px solid rgba(255,45,45,.30);
      color: rgba(255,255,255,.95);
      font-weight: 950;
      font-size: 14px;
    }
    .list{margin-top:12px;}
    .item{
      display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      margin-bottom: 10px;
    }

    /* Smidt ud modal */
    .qtyRow{display:flex; gap:10px; align-items:end; flex-wrap:wrap; margin-top:10px;}
    .unitBadge{
      width:auto;
      padding: 14px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      font-weight: 1000;
      font-size: 16px;
    }
    .keypad{
      display:grid;
      grid-template-columns: repeat(5, minmax(0,1fr));
      gap:10px;
      margin-top: 12px;
    }
    .keypad button{
      padding: 14px 10px;
      border-radius: 16px;
      font-weight: 1000;
      font-size: 16px;
      cursor:pointer;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      user-select:none;
    }
    .keypad button.primary{
      background: rgba(217,182,90,.14);
      border-color: rgba(217,182,90,.25);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="shell">
      <h1>Kagekøleskab</h1>

      <div class="grid">
        <div class="card">
          <h2>Tilføj kage</h2>

          <div class="row">
            <div class="field">
              <label for="by">Navn (tjener)</label>
              <input id="by" placeholder="Fx Mads" autocomplete="name"/>
            </div>
            <div class="field">
              <label for="place">Køleskab / Plads</label>
              <input id="place" placeholder="Fx 1"/>
            </div>
          </div>

          <div style="margin-top:10px;">
            <label>Vælg kage</label>
            <div class="cakeGrid" id="cakeGrid"></div>
          </div>

          <div class="row" style="margin-top:10px; display:none;" id="customRow">
            <div class="field">
              <label for="customName">Andet – kagenavn</label>
              <input id="customName" placeholder="Fx Citronmåne"/>
            </div>
            <div class="field">
              <label for="customDays">Holdbarhed (dage)</label>
              <input id="customDays" type="number" min="0" step="1" placeholder="Fx 3"/>
            </div>
          </div>

          <div class="row" style="margin-top:10px;">
            <div class="field">
              <label for="note">Note (valgfri)</label>
              <textarea id="note" placeholder=""></textarea>
            </div>
          </div>

          <div class="row" style="margin-top:10px;">
            <div class="field">
              <button class="btn" id="addBtn" type="button">Tilføj</button>
              <div class="small" id="preview"></div>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Aktive kager</h2>
          <table>
            <thead>
              <tr>
                <th>Kage</th>
                <th>Dato ind</th>
                <th>Smides ud</th>
                <th>Handling</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ALARM -->
  <div class="overlay" id="alarmOverlay" aria-hidden="true">
    <div class="modal alarmModal">
      <div class="modalHead">
        <div>
          <div class="alarmTitle">KAGE SMIDES UD IDAG</div>
          <div class="alarmBanner">Kager med udløbsdato i dag:</div>
        </div>
        <button class="btn2 xBtn" id="closeAlarmBtn" type="button">Luk</button>
      </div>

      <div class="list" id="alarmList"></div>

      <div class="modalFoot">
        <button class="btn2" id="snoozeBtn" type="button">Slumre 30 min</button>
      </div>
    </div>
  </div>

  <!-- SMIDT UD -->
  <div class="overlay" id="discardOverlay" aria-hidden="true">
    <div class="modal">
      <div class="modalHead">
        <div>
          <h3>Smidt ud – antal</h3>
          <p id="discardSub">–</p>
        </div>
        <button class="btn2 xBtn" id="closeDiscardBtn" type="button">Luk</button>
      </div>

      <div style="margin-top:10px;">
        <label>Hvor mange smider du ud?</label>
        <div class="qtyRow">
          <div style="flex:1; min-width:220px;">
            <input id="wasteQty" inputmode="numeric" pattern="[0-9]*" type="number" min="1" step="1" placeholder="Antal" />
          </div>
          <div class="unitBadge">stk</div>
        </div>

        <div class="keypad" id="keypad"></div>
      </div>

      <div class="modalFoot">
        <button class="btn2" id="discardCancelBtn" type="button">Annuller</button>
        <button class="btn" id="discardSaveBtn" type="button">Gem</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const STORAGE_KEY = "kagekoeleskab.entries.v5";
  const LEGACY_KEYS = [
    "kagekoeleskab.entries.v4",
    "kagekoeleskab.entries.v3",
    "kagekoeleskab.entries.v2"
  ];
  const PREF_KEY = "kagekoeleskab.prefs.v5";
  const LEGACY_PREF_KEYS = [
    "kagekoeleskab.prefs.v4",
    "kagekoeleskab.prefs.v3",
    "kagekoeleskab.prefs.v2"
  ];

  const TYPES = [
    { id: "gulerod", name: "Gulerodskage", days: 3 },
    { id: "chokolade", name: "Chokoladekage", days: 2 },
    { id: "aeble", name: "Æblekage", days: 3 },
    { id: "custom", name: "Andet", days: null }
  ];

  const $ = (id) => document.getElementById(id);

  const cakeGrid = $("cakeGrid");
  const customRow = $("customRow");
  const customName = $("customName");
  const customDays = $("customDays");

  const by = $("by");
  const place = $("place");
  const note = $("note");
  const addBtn = $("addBtn");
  const tbody = $("tbody");
  const preview = $("preview");

  // Alarm
  const alarmOverlay = $("alarmOverlay");
  const alarmList = $("alarmList");
  const closeAlarmBtn = $("closeAlarmBtn");
  const snoozeBtn = $("snoozeBtn");

  // Discard
  const discardOverlay = $("discardOverlay");
  const closeDiscardBtn = $("closeDiscardBtn");
  const discardCancelBtn = $("discardCancelBtn");
  const discardSaveBtn = $("discardSaveBtn");
  const discardSub = $("discardSub");
  const wasteQty = $("wasteQty");
  const keypad = $("keypad");

  let entries = loadEntriesWithMigration();
  let prefs = loadPrefsWithMigration();
  let selectedTypeId = prefs.lastTypeId || "gulerod";
  let pendingDiscardId = null;

  function tryParse(raw){ try{ return raw ? JSON.parse(raw) : null; } catch { return null; } }

  function loadPrefsWithMigration(){
    const direct = tryParse(localStorage.getItem(PREF_KEY));
    if (direct) return normalizePrefs(direct);

    for (const k of LEGACY_PREF_KEYS){
      const legacy = tryParse(localStorage.getItem(k));
      if (legacy){
        const p = normalizePrefs(legacy);
        localStorage.setItem(PREF_KEY, JSON.stringify(p));
        return p;
      }
    }
    return normalizePrefs(null);
  }
  function normalizePrefs(p){
    return { lastBy:"", lastPlace:"1", lastTypeId:"gulerod", snoozeUntil:0, ...(p||{}) };
  }
  function savePrefs(){ localStorage.setItem(PREF_KEY, JSON.stringify(prefs)); }

  function loadEntriesWithMigration(){
    const direct = tryParse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(direct)) return direct.map(normalizeEntry);

    for (const k of LEGACY_KEYS){
      const legacy = tryParse(localStorage.getItem(k));
      if (Array.isArray(legacy)){
        const migrated = legacy.map(normalizeEntry);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
        return migrated;
      }
    }
    return [];
  }
  function normalizeEntry(e){
    const base = {
      id: "", cakeName: "", days: 0,
      addedAt: new Date().toISOString(),
      discardAt: new Date().toISOString(),
      by: "", place: "", note: "",
      status: "active",
      discardedAt: null,
      wasteQty: null,
      wasteUnit: "stk"
    };
    return { ...base, ...(e||{}) };
  }
  function saveEntries(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }

  function uuid(){
    if (crypto && crypto.randomUUID) return crypto.randomUUID();
    return "id-" + Math.random().toString(16).slice(2) + "-" + Date.now();
  }

  function escapeHtml(str){
    return String(str ?? "").replace(/[&<>"']/g, (m) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function fmtDateTime(iso){
    const d = new Date(iso);
    return d.toLocaleString("da-DK", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
  }

  function isSameLocalDate(a,b){
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }

  // 72 timer præcis (dage × 24t)
  function computeDiscardAt(addedAtIso, days){
    const ms = Number(days) * 24 * 60 * 60 * 1000;
    return new Date(new Date(addedAtIso).getTime() + ms).toISOString();
  }

  function statusFor(entry){
    if (entry.status === "discarded") return "discarded";
    const now = Date.now();
    const disc = new Date(entry.discardAt).getTime();
    if (now >= disc) return "expired";
    if (isSameLocalDate(new Date(), new Date(entry.discardAt))) return "dueToday";
    return "ok";
  }

  function renderCakeButtons(){
    cakeGrid.innerHTML = TYPES.map(t => {
      const meta = (t.days != null) ? `${t.days} dage` : `skriv selv`;
      return `
        <div class="cakeBtn ${t.id===selectedTypeId ? "active":""}" data-type="${t.id}">
          <div class="name">${escapeHtml(t.name)}</div>
          <div class="meta">${escapeHtml(meta)}</div>
        </div>
      `;
    }).join("");

    cakeGrid.querySelectorAll(".cakeBtn").forEach(btn => {
      btn.addEventListener("click", () => {
        selectedTypeId = btn.getAttribute("data-type");
        prefs.lastTypeId = selectedTypeId;
        savePrefs();
        renderCakeButtons();
        customRow.style.display = (selectedTypeId === "custom") ? "flex" : "none";
        updatePreview();
      });
    });
  }

  function updatePreview(){
    const nowIso = new Date().toISOString();
    const t = TYPES.find(x => x.id === selectedTypeId) || TYPES[0];

    let days = t.days;
    let name = t.name;

    if (t.id === "custom"){
      name = (customName.value || "").trim();
      days = Number(customDays.value);
      if (!name || !Number.isFinite(days) || days < 0){
        preview.textContent = "";
        return;
      }
    }
    preview.textContent = `Smides ud: ${fmtDateTime(computeDiscardAt(nowIso, days))}`;
  }

  function addEntry(){
    const t = TYPES.find(x => x.id === selectedTypeId) || TYPES[0];
    const nowIso = new Date().toISOString();

    let cakeName = t.name;
    let days = t.days;

    if (t.id === "custom"){
      cakeName = (customName.value || "").trim();
      days = Number(customDays.value);
      if (!cakeName || !Number.isFinite(days) || days < 0){
        alert("Udfyld 'Andet – kagenavn' og 'Holdbarhed (dage)'.");
        return;
      }
    }

    const entry = normalizeEntry({
      id: uuid(),
      cakeName,
      days,
      addedAt: nowIso,
      discardAt: computeDiscardAt(nowIso, days),
      by: (by.value || "").trim(),
      place: (place.value || "").trim(),
      note: (note.value || "").trim(),
      status: "active"
    });

    entries.unshift(entry);
    saveEntries();

// Gem stadig plads, men nulstil navn
prefs.lastBy = "";
prefs.lastPlace = entry.place || prefs.lastPlace;
savePrefs();

// Ryd felter i UI
by.value = "";
note.value = "";
    if (t.id === "custom"){ customName.value = ""; customDays.value = ""; }
    updatePreview();
    render();
    checkAlarm(true);
  }

  function render(){
    const list = entries.filter(e => e.status !== "discarded");

    tbody.innerHTML = list.map(e => `
      <tr>
<td>
  <strong>${escapeHtml(e.cakeName)}</strong><br/>

  <span class="small" style="color:var(--muted)">
    ${escapeHtml(e.place ? `Plads ${e.place}` : "")}${e.by ? ` • ${e.by}` : ""}
  </span>

  ${e.note ? `<br><span class="small" style="color:var(--muted)">${escapeHtml(e.note)}</span>` : ``}
</td>
        <td>${fmtDateTime(e.addedAt)}</td>
        <td><strong>${fmtDateTime(e.discardAt)}</strong></td>
        <td>
          <div class="actions">
            <button class="btn mini" type="button" data-action="discard" data-id="${e.id}">Smidt ud</button>
            <button class="btnDanger mini" type="button" data-action="delete" data-id="${e.id}">Slet</button>
          </div>
        </td>
      </tr>
    `).join("");

    tbody.querySelectorAll("button[data-action]").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-id");
        const action = btn.getAttribute("data-action");
        if (action === "discard") openDiscardModal(id);
        if (action === "delete") deleteEntry(id);
      });
    });
  }

  function deleteEntry(id){
    const e = entries.find(x => x.id === id);
    if(!e) return;
    if (!confirm(`Slet "${e.cakeName}"?`)) return;
    entries = entries.filter(x => x.id !== id);
    saveEntries();
    render();
  }

  // Alarm: kun kager med udløbsdato i dag
  function alarmEntries(){
    return entries.filter(e => e.status !== "discarded" && statusFor(e) === "dueToday");
  }

  function openAlarmModal(list){
    alarmList.innerHTML = list.map(e => `
      <div class="item">
        <div>
          <strong>${escapeHtml(e.cakeName)}</strong><br/>
          <span class="small">Udløb: <strong>${escapeHtml(fmtDateTime(e.discardAt))}</strong></span><br/>
          <span class="small" style="color:var(--muted)">
            ${escapeHtml(e.place ? `Plads ${e.place}` : "")}${e.by ? ` • ${e.by}` : ""}
          </span>
        </div>
        <div>
          <button class="btn mini" type="button" data-mid="discard" data-id="${e.id}">Smidt ud</button>
        </div>
      </div>
    `).join("");

    alarmList.querySelectorAll("button[data-mid='discard']").forEach(btn => {
      btn.addEventListener("click", () => {
        closeAlarmModal();
        openDiscardModal(btn.getAttribute("data-id"));
      });
    });

    alarmOverlay.style.display = "flex";
    alarmOverlay.setAttribute("aria-hidden", "false");
  }

  function closeAlarmModal(){
    alarmOverlay.style.display = "none";
    alarmOverlay.setAttribute("aria-hidden", "true");
  }

  function checkAlarm(force){
    const now = Date.now();
    if (!force && now < Number(prefs.snoozeUntil || 0)) return;
    const list = alarmEntries();
    if (list.length > 0) openAlarmModal(list);
  }

  snoozeBtn.addEventListener("click", () => {
    prefs.snoozeUntil = Date.now() + 30*60*1000;
    savePrefs();
    closeAlarmModal();
  });
  closeAlarmBtn.addEventListener("click", closeAlarmModal);
  alarmOverlay.addEventListener("click", (e) => { if (e.target === alarmOverlay) closeAlarmModal(); });

  // Discard modal (antal stk)
  function renderKeypad(){
    const buttons = [
      { t:"1", v:1, cls:"primary" }, { t:"2", v:2, cls:"primary" }, { t:"3", v:3, cls:"primary" }, { t:"4", v:4, cls:"primary" }, { t:"5", v:5, cls:"primary" },
      { t:"6", v:6 }, { t:"7", v:7 }, { t:"8", v:8 }, { t:"9", v:9 }, { t:"10", v:10 },
      { t:"-1", v:"-1" }, { t:"+1", v:"+1" }, { t:"Ryd", v:"clear" }, { t:"", v:null, disabled:true }, { t:"", v:null, disabled:true }
    ];

    keypad.innerHTML = buttons.map(b => {
      if (b.disabled) return `<button type="button" disabled style="opacity:.15; cursor:default;"></button>`;
      const cls = b.cls ? `class="${b.cls}"` : "";
      return `<button type="button" ${cls} data-k="${b.v}">${escapeHtml(b.t)}</button>`;
    }).join("");

    keypad.querySelectorAll("button[data-k]").forEach(btn => {
      btn.addEventListener("click", () => {
        const k = btn.getAttribute("data-k");
        let n = parseInt(wasteQty.value || "0", 10);
        if (Number.isNaN(n)) n = 0;

        if (k === "clear") n = 0;
        else if (k === "+1") n = n + 1;
        else if (k === "-1") n = Math.max(0, n - 1);
        else n = parseInt(k, 10);

        wasteQty.value = n > 0 ? String(n) : "";
        wasteQty.focus();
      });
    });
  }

  function openDiscardModal(id){
    const e = entries.find(x => x.id === id);
    if(!e) return;

    pendingDiscardId = id;
    discardSub.innerHTML = `<strong>${escapeHtml(e.cakeName)}</strong> • Udløb: ${escapeHtml(fmtDateTime(e.discardAt))}`;
    wasteQty.value = "";
    renderKeypad();

    discardOverlay.style.display = "flex";
    discardOverlay.setAttribute("aria-hidden", "false");
    setTimeout(() => wasteQty.focus(), 30);
  }

  function closeDiscardModal(){
    pendingDiscardId = null;
    discardOverlay.style.display = "none";
    discardOverlay.setAttribute("aria-hidden", "true");
  }

  function saveDiscard(){
    const e = entries.find(x => x.id === pendingDiscardId);
    if(!e) return;

    const qty = Number(wasteQty.value);
    if (!Number.isInteger(qty) || qty < 1){
      alert("Vælg antal (stk).");
      return;
    }

    e.status = "discarded";
    e.discardedAt = new Date().toISOString();
    e.wasteQty = qty;
    e.wasteUnit = "stk";

    saveEntries();
    closeDiscardModal();
    render();
  }

  closeDiscardBtn.addEventListener("click", closeDiscardModal);
  discardCancelBtn.addEventListener("click", closeDiscardModal);
  discardOverlay.addEventListener("click", (e) => { if (e.target === discardOverlay) closeDiscardModal(); });
  discardSaveBtn.addEventListener("click", saveDiscard);

  // Init
  by.value = prefs.lastBy || "";
  place.value = prefs.lastPlace || "1";

  renderCakeButtons();
  customRow.style.display = (selectedTypeId === "custom") ? "flex" : "none";
  updatePreview();
  render();

  addBtn.addEventListener("click", addEntry);
  customName.addEventListener("input", updatePreview);
  customDays.addEventListener("input", updatePreview);
  by.addEventListener("input", () => { prefs.lastBy = by.value; savePrefs(); });
  place.addEventListener("input", () => { prefs.lastPlace = place.value; savePrefs(); });

  // Auto alarm check
  checkAlarm(false);
  setInterval(() => checkAlarm(false), 30 * 1000);
})();
</script>
</body>
</html>
