<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flirter Kaffe Timer</title>
  <style>
    :root{
      --bg:#0b0f14;
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent: #d9b65a;
      --bad: #ff2d2d;
      --shadow: 0 18px 50px rgba(0,0,0,.50);
      --r: 22px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0; padding:0; background:var(--bg); color:var(--text); font-family:var(--font);}
    .wrap{max-width:1100px; margin:20px auto; padding:0 20px;}

    .shell{
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    h1{margin:0 0 20px; text-align:center; font-size:42px; letter-spacing:.02em;}
    .subtitle{text-align:center; color:var(--muted); margin-bottom:20px;}

    .quickBtns{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap:12px;
      margin-bottom:24px;
    }
    .quickBtn{
      padding:18px;
      font-size:18px;
      font-weight:900;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      transition:all .2s;
    }
    .quickBtn:hover{background:rgba(217,182,90,.15); border-color:var(--accent);}

    .timerDisplay{
      text-align:center;
      font-size:92px;
      font-weight:900;
      letter-spacing:-4px;
      margin:20px 0;
      min-height:110px;
      color:var(--accent);
    }
    .timerDisplay.expired{color:var(--bad); animation: pulse 1s infinite;}

    .activeTimers{
      margin-top:30px;
    }
    .timerCard{
      background:rgba(255,255,255,.06);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px 18px;
      margin-bottom:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .timerInfo strong{font-size:18px;}
    .timerTime{font-size:28px; font-weight:900; color:var(--accent);}
    .timerTime.expired{color:var(--bad);}

    .btn{
      padding:14px 24px;
      border-radius:999px;
      font-weight:900;
      cursor:pointer;
      font-size:16px;
    }
    .btn-red{
      background:rgba(255,45,45,.18);
      border:1px solid rgba(255,45,45,.4);
      color:white;
    }

    /* Alarm Modal */
    .overlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,.85);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }
    .alarmModal{
      background:linear-gradient(180deg, #2a0f0f, #1a0a0a);
      border:3px solid #ff2d2d;
      border-radius:26px;
      padding:30px 40px;
      text-align:center;
      max-width:520px;
      box-shadow:0 0 80px rgba(255,45,45,.6);
    }
    .alarmTitle{
      font-size:32px;
      font-weight:1000;
      text-transform:uppercase;
      color:#ffdddd;
      margin:0 0 10px;
    }
    .alarmText{
      font-size:18px;
      color:#ffaaaa;
      margin-bottom:20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shell">
      <h1>Flirter Kaffe</h1>
      <div class="subtitle">Nedtælling + alarm når kaffen er klar</div>

      <div class="quickBtns" id="quickBtns"></div>

      <div class="timerDisplay" id="mainTimer">00:00</div>

      <div style="text-align:center; margin:15px 0;">
        <button class="btn" id="customBtn">Indtast egen tid (minutter)</button>
      </div>

      <div class="activeTimers">
        <h2 style="margin:0 0 12px; font-size:18px; color:var(--muted);">Aktive timere</h2>
        <div id="activeList"></div>
      </div>
    </div>
  </div>

  <!-- Alarm Modal -->
  <div class="overlay" id="alarmOverlay">
    <div class="alarmModal">
      <div class="alarmTitle">TID ER UDLØBET</div>
      <div class="alarmText">Flirter Kaffe er klar til servering!</div>
      <button class="btn btn-red" id="stopAlarmBtn">Stop alarm</button>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
let timers = [];
let alarmAudio = null;
let currentAlarmTimerId = null;

const defaultTimes = [
  {label: "4 minutter", seconds: 240},
  {label: "5 minutter", seconds: 300},
  {label: "6 minutter", seconds: 360},
  {label: "8 minutter", seconds: 480}
];

function createQuickButtons(){
  const container = $("quickBtns");
  defaultTimes.forEach(t => {
    const btn = document.createElement("div");
    btn.className = "quickBtn";
    btn.textContent = t.label;
    btn.onclick = () => startNewTimer(t.seconds, t.label);
    container.appendChild(btn);
  });
}

function formatTime(seconds){
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function startNewTimer(totalSeconds, label){
  const timer = {
    id: Date.now(),
    label: label || "Custom",
    remaining: totalSeconds,
    interval: null
  };

  timer.interval = setInterval(() => {
    timer.remaining--;
    renderActiveTimers();

    if (timer.remaining <= 0){
      clearInterval(timer.interval);
      triggerAlarm(timer.id);
    }
  }, 1000);

  timers.push(timer);
  renderActiveTimers();
}

function renderActiveTimers(){
  const list = $("activeList");
  list.innerHTML = "";

  if (timers.length === 0){
    list.innerHTML = `<div style="color:var(--muted); text-align:center; padding:20px;">Ingen aktive timere</div>`;
    return;
  }

  timers.forEach(t => {
    const div = document.createElement("div");
    div.className = "timerCard";
    div.innerHTML = `
      <div class="timerInfo">
        <strong>${t.label}</strong>
      </div>
      <div class="timerTime ${t.remaining <= 0 ? 'expired' : ''}">
        ${formatTime(t.remaining)}
      </div>
      <button class="btn btn-red" style="padding:10px 18px; font-size:14px;">Stop</button>
    `;

    div.querySelector("button").onclick = () => stopTimer(t.id);
    list.appendChild(div);
  });
}

function stopTimer(id){
  const timer = timers.find(t => t.id === id);
  if (timer && timer.interval) clearInterval(timer.interval);
  timers = timers.filter(t => t.id !== id);
  renderActiveTimers();

  if (currentAlarmTimerId === id) stopAlarm();
}

function triggerAlarm(timerId){
  currentAlarmTimerId = timerId;
  $("alarmOverlay").style.display = "flex";

  // Simpel men kraftig alarm-lyd (gentages)
  if (!alarmAudio){
    alarmAudio = new (window.AudioContext || window.webkitAudioContext)();
  }
  playAlarmSound();
}

function playAlarmSound(){
  if (!alarmAudio) return;
  const oscillator = alarmAudio.createOscillator();
  const gain = alarmAudio.createGain();

  oscillator.connect(gain);
  gain.connect(alarmAudio.destination);
  oscillator.frequency.setValueAtTime(620, alarmAudio.currentTime);
  gain.gain.setValueAtTime(0.6, alarmAudio.currentTime);

  oscillator.start();
  setTimeout(() => {
    oscillator.stop();
    if ($("alarmOverlay").style.display !== "none") setTimeout(playAlarmSound, 800);
  }, 600);
}

function stopAlarm(){
  $("alarmOverlay").style.display = "none";
  currentAlarmTimerId = null;
}

$("customBtn").onclick = () => {
  const min = parseInt(prompt("Hvor mange minutter skal timeren køre?", "6"));
  if (min && min > 0) startNewTimer(min * 60, `${min} minutter`);
};

$("stopAlarmBtn").onclick = stopAlarm;

// Init
createQuickButtons();
renderActiveTimers();
</script>
</body>
</html>
