<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kaffetimer – Filterkaffe</title>
  <style>
    :root {
      --bg: #0b0f14;
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent: #d9b65a;
      --bad: #ff2d2d;
      --shadow: 0 18px 50px rgba(0,0,0,.50);
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: var(--font);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(217,182,90,.25), transparent 55%),
        radial-gradient(900px 500px at 10% 10%, rgba(120,180,255,.15), transparent 55%),
        var(--bg);
      color: var(--text);
    }

    .wrap { max-width: 1100px; margin: 18px auto; padding: 0 18px 50px; }

    .shell {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    h1 { margin: 0; text-align: center; font-size: 42px; letter-spacing: .01em; }

    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 14px; }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 14px 45px rgba(0,0,0,.35);
    }

    .card h2 { margin: 0 0 12px; font-size: 17px; letter-spacing: .02em; }

    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
    .field { flex: 1; min-width: 220px; }

    label { display: block; color: var(--muted); font-size: 13px; margin: 0 0 6px; }

    input {
      width: 100%;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 14px;
      outline: none;
      font-size: 16px;
    }

    .btn {
      cursor: pointer;
      border-radius: 999px;
      font-weight: 950;
      letter-spacing: .02em;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(217,182,90,.25), rgba(217,182,90,.10));
      padding: 16px;
      font-size: 16px;
      color: var(--text);
    }

    .btn:active { transform: scale(0.98); }

    .btnDanger {
      cursor: pointer;
      border-radius: 999px;
      font-weight: 950;
      background: rgba(255,45,45,.16);
      border: 1px solid rgba(255,45,45,.28);
      padding: 14px;
      font-size: 15px;
      color: var(--text);
    }

    /* Preset tider taster */
    .presetGrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 6px;
    }

    .presetBtn {
      padding: 14px;
      border-radius: 18px;
      cursor: pointer;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      text-align: center;
      user-select: none;
    }

    .presetBtn.active {
      border-color: rgba(217,182,90,.55);
      background: rgba(217,182,90,.10);
    }

    .presetBtn .time { font-weight: 950; font-size: 18px; color: var(--text); }
    .presetBtn .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }

    /* Timers Liste */
    .timerList { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }

    .timerItem {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      position: relative;
      overflow: hidden;
    }

    .timerItem.expired {
      border-color: rgba(255,45,45,.40);
      background: rgba(255,45,45,.12);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 45, 45, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(255, 45, 45, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 45, 45, 0); }
    }

    .timerProgress {
      position: absolute;
      bottom: 0; left: 0; height: 4px;
      background: var(--accent);
      width: 0%;
      transition: width 1s linear;
    }

    .timerItem.expired .timerProgress { background: var(--bad); }

    .timerInfo { flex: 1; }
    .timerName { font-weight: 950; font-size: 18px; }
    .timerSub { color: var(--muted); font-size: 13px; margin-top: 2px; }

    .timerDisplay {
      font-family: monospace;
      font-weight: 1000;
      font-size: 32px;
      letter-spacing: 0.02em;
      min-width: 120px;
      text-align: right;
    }

    .timerItem.expired .timerDisplay { color: var(--bad); }

    .timerActions { margin-left: 12px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="shell">
      <h1>Filterkaffe Timer</h1>

      <div class="grid">
        <!-- OPRET NY TIMERS -->
        <div class="card">
          <h2>Bryg ny kande</h2>

          <div class="row">
            <div class="field">
              <label for="potName">Hvilken kande / lokation?</label>
              <input id="potName" placeholder="Fx Kande 1 / Termo / Servering" />
            </div>
          </div>

          <div style="margin-top: 14px;">
            <label>Sæt tid</label>
            <div class="presetGrid">
              <div class="presetBtn active" data-mins="60">
                <div class="time">60 min</div>
                <div class="meta">Normal kaffe</div>
              </div>
              <div class="presetBtn" data-mins="90">
                <div class="time">90 min</div>
                <div class="meta">Max tid</div>
              </div>
              <div class="presetBtn" data-mins="custom">
                <div class="time">Andet</div>
                <div class="meta">Valgfri tid</div>
              </div>
            </div>
          </div>

          <div class="row" id="customRow" style="margin-top: 12px; display: none;">
            <div class="field">
              <label for="customMins">Antal minutter</label>
              <input id="customMins" type="number" min="1" placeholder="Fx 30" />
            </div>
          </div>

          <div class="row" style="margin-top: 14px;">
            <div class="field">
              <button class="btn" id="startBtn" type="button">Start timer</button>
            </div>
          </div>
        </div>

        <!-- AKTIVE TIDER -->
        <div class="card">
          <h2>Aktive kander</h2>
          <div class="timerList" id="timerList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = "kaffetimer.timers.v1";
      const $ = (id) => document.getElementById(id);

      const potName = $("potName");
      const customRow = $("customRow");
      const customMins = $("customMins");
      const startBtn = $("startBtn");
      const timerList = $("timerList");

      let timers = loadTimers();
      let selectedMins = 60; // default standard

      function tryParse(raw) { try { return raw ? JSON.parse(raw) : null; } catch { return null; } }
      function loadTimers() {
        const arr = tryParse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(arr) ? arr : [];
      }
      function saveTimers() { localStorage.setItem(STORAGE_KEY, JSON.stringify(timers)); }

      // Setup presets
      document.querySelectorAll(".presetBtn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".presetBtn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");

          const val = btn.getAttribute("data-mins");
          if (val === "custom") {
            selectedMins = "custom";
            customRow.style.display = "flex";
          } else {
            selectedMins = parseInt(val, 10);
            customRow.style.display = "none";
          }
        });
      });

      startBtn.addEventListener("click", () => {
        let mins = selectedMins;
        if (mins === "custom") {
          mins = parseInt(customMins.value, 10);
          if (isNaN(mins) || mins <= 0) {
            alert("Udfyld antal minutter.");
            return;
          }
        }

        const name = (potName.value || "").trim() || "Batch brew";
        const now = Date.now();
        const durationMs = mins * 60 * 1000;

        const newTimer = {
          id: "id-" + Math.random().toString(16).slice(2) + "-" + now,
          name: name,
          durationMs: durationMs,
          startedAt: now,
          endsAt: now + durationMs,
          soundPlayed: false
        };

        timers.unshift(newTimer);
        saveTimers();

        // Reset inputs
        potName.value = "";
        customMins.value = "";

        render();
      });

      // Lyd alarm (Web Audio API - genererer sit eget biiiiib)
      function playBeep() {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();

          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);

          oscillator.type = 'sine';
          oscillator.frequency.value = 880; // A-note (skarp og klar)

          gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
          // skruer op til volumen
          gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);

          oscillator.start();

          // Beep mønster: biib - biib - biib
          setTimeout(() => {
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            setTimeout(() => {
              gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
              setTimeout(() => {
                oscillator.stop();
              }, 300);
            }, 200);
          }, 400);

        } catch (e) {
          console.log("Audio API not allowed before user interaction.");
        }
      }

      function render() {
        if (timers.length === 0) {
          timerList.innerHTML = `<div class="small" style="color:var(--muted); text-align:center; margin-top:20px;">Ingen aktive kander.</div>`;
          return;
        }

        const now = Date.now();

        timerList.innerHTML = timers.map(t => {
          const leftMs = t.endsAt - now;
          const expired = leftMs <= 0;

          // Beregn resterende tid
          let absMs = Math.abs(leftMs);
          const hrs = Math.floor(absMs / 3600000);
          const mins = Math.floor((absMs % 3600000) / 60000);
          const secs = Math.floor((absMs % 60000) / 1000);

          const displayTime = `${hrs > 0 ? hrs + ":" : ""}${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;

          // Beregn progress bar %
          const elapsed = now - t.startedAt;
          const pct = Math.min(100, (elapsed / t.durationMs) * 100);

          // Spil lyd hvis den rammer præcis 0
          if (expired && !t.soundPlayed) {
            t.soundPlayed = true;
            playBeep();
            saveTimers(); // gem at lyd er spillet
          }

          return `
            <div class="timerItem ${expired ? 'expired' : ''}">
              <div class="timerProgress" style="width: ${pct}%"></div>
              <div class="timerInfo">
                <div class="timerName">${escapeHtml(t.name)}</div>
                <div class="timerSub">Brygget kl: ${new Date(t.startedAt).toLocaleTimeString("da-DK", { hour: "2-digit", minute: "2-digit" })}</div>
              </div>
              <div class="timerDisplay">
                ${expired ? "-" : ""}${displayTime}
              </div>
              <div class="timerActions">
                <button class="btnDanger mini" data-action="delete" data-id="${t.id}" style="width:auto; padding: 12px;">Slet</button>
              </div>
            </div>
          `;
        }).join("");

        // Attach eventlisteners for slet
        timerList.querySelectorAll("button[data-action='delete']").forEach(btn => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-id");
            timers = timers.filter(x => x.id !== id);
            saveTimers();
            render();
          });
        });
      }

      // Tick hvert sekund
      setInterval(() => {
        render();
      }, 1000);

      render();
    })();
  </script>
</body>
</html>
