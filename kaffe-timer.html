<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Filterkaffe Timer</title>
  <style>
    :root{
      --bg:#0b0f14;
      --border: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent: #d9b65a;
      --bad: #ff2d2d;
      --shadow: 0 18px 50px rgba(0,0,0,.50);
      --r: 22px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: var(--font);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(217,182,90,.25), transparent 55%),
        radial-gradient(900px 500px at 10% 10%, rgba(120,180,255,.15), transparent 55%),
        radial-gradient(900px 500px at 90% 20%, rgba(120,255,200,.10), transparent 55%),
        var(--bg);
      color: var(--text);
    }
    .wrap{max-width: 1100px; margin: 18px auto; padding: 0 18px 50px;}
    .shell{
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    h1{margin:0; text-align:center; font-size: 42px; letter-spacing:.01em;}
    .grid{display:grid; grid-template-columns: 1fr; gap:14px; margin-top:14px;}
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: 0 14px 45px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    .card h2{margin:0 0 12px; font-size: 17px; letter-spacing:.02em;}
    .row{display:flex; gap:12px; flex-wrap:wrap; align-items:end;}
    .field{flex:1; min-width: 220px;}
    label{display:block; color: var(--muted); font-size: 13px; margin: 0 0 6px;}
    input{
      width:100%;
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 14px 14px;
      outline:none;
      font-size: 16px;
    }
    .btn{
      width:100%;
      cursor:pointer;
      border-radius: 999px;
      font-weight: 950;
      letter-spacing:.02em;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(217,182,90,.25), rgba(217,182,90,.10));
      padding: 16px 16px;
      font-size: 16px;
      color: var(--text);
    }
    .btn2{
      width:100%;
      cursor:pointer;
      border-radius: 999px;
      font-weight: 950;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      padding: 14px 14px;
      font-size: 15px;
      color: var(--text);
    }
    .btnDanger{
      cursor:pointer;
      border-radius: 999px;
      font-weight: 950;
      background: rgba(255,45,45,.16);
      border: 1px solid rgba(255,45,45,.28);
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      width:auto;
    }

    /* Presets */
    .presetGrid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 6px;
    }
    .presetBtn{
      padding: 14px 14px;
      border-radius: 18px;
      cursor:pointer;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      user-select:none;
      text-align:left;
    }
    .presetBtn.active{
      border-color: rgba(217,182,90,.55);
      box-shadow: 0 0 0 3px rgba(217,182,90,.12);
      background: rgba(217,182,90,.10);
    }
    .presetBtn .name{font-weight: 950; font-size: 16px;}
    .presetBtn .meta{color: var(--muted); font-size: 13px; margin-top: 4px;}

    /* Timer list */
    .list{display:flex; flex-direction:column; gap:10px;}
    .item{
      display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
    }
    .left{min-width:260px; flex:1;}
    .name{font-weight: 950; font-size: 18px;}
    .sub{color: var(--muted); font-size: 13px; margin-top: 3px;}
    .time{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-weight: 1000;
      font-size: 34px;
      letter-spacing:.02em;
      min-width: 160px;
      text-align:right;
    }
    .expired .time{color: var(--bad);}
    .actions{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end;}

    /* Alarm modal */
    .overlay{
      position: fixed; inset:0;
      background: rgba(0,0,0,.70);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 2147483647;
    }
    .modal{
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 26px;
      padding: 16px;
      box-shadow: 0 30px 90px rgba(0,0,0,.70);
      backdrop-filter: blur(12px);
    }
    .alarmModal{
      border-color: rgba(255,45,45,.45);
      box-shadow: 0 35px 120px rgba(255,45,45,.10), 0 30px 90px rgba(0,0,0,.70);
    }
    .modalHead{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .alarmTitle{
      font-size: 30px;
      font-weight: 1000;
      letter-spacing:.03em;
      text-transform: uppercase;
    }
    .alarmBanner{
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,45,45,.16);
      border: 1px solid rgba(255,45,45,.30);
      font-weight: 950;
      font-size: 14px;
    }
    .modalFoot{display:flex; justify-content:flex-end; gap:10px; margin-top:12px; flex-wrap:wrap;}
    .xBtn{width:auto;}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="shell">
      <h1>Filterkaffe Timer</h1>

      <div class="grid">
        <div class="card">
          <h2>Start ny timer</h2>

          <div class="row">
            <div class="field">
              <label for="name">Kande / placering</label>
              <input id="name" placeholder="Fx Kande 1 / Termo / Bar" />
            </div>
          </div>

          <div style="margin-top:10px;">
            <label>Vælg tid</label>
            <div class="presetGrid" id="presetGrid">
              <div class="presetBtn active" data-min="60">
                <div class="name">60 min</div>
                <div class="meta">Standard</div>
              </div>
              <div class="presetBtn" data-min="120">
                <div class="name">120 min</div>
                <div class="meta">Max</div>
              </div>
              <div class="presetBtn" data-min="custom">
                <div class="name">Andet</div>
                <div class="meta">Valgfri</div>
              </div>
            </div>
          </div>

          <div class="row" style="margin-top:10px; display:none;" id="customRow">
            <div class="field">
              <label for="customMin">Minutter</label>
              <input id="customMin" type="number" min="1" step="1" placeholder="Fx 30" />
            </div>
          </div>

          <div class="row" style="margin-top:10px;">
            <div class="field">
              <button class="btn" id="startBtn" type="button">Start</button>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Aktive timers</h2>
          <div class="list" id="list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ALARM -->
  <div class="overlay" id="alarmOverlay">
    <div class="modal alarmModal">
      <div class="modalHead">
        <div>
          <div class="alarmTitle">KAFFE SKAL BRYGGES</div>
          <div class="alarmBanner">Følgende timer er udløbet:</div>
        </div>
        <button class="btn2 xBtn" id="closeAlarmBtn" type="button">Luk</button>
      </div>

      <div class="list" id="alarmList" style="margin-top:12px;"></div>

      <div class="modalFoot">
        <button class="btn2 xBtn" id="snoozeBtn" type="button">Slumre 5 min</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const STORAGE_KEY = "filterkaffe.timers.v1";
  const PREF_KEY = "filterkaffe.prefs.v1";

  const $ = (id) => document.getElementById(id);
  const nameEl = $("name");
  const presetGrid = $("presetGrid");
  const customRow = $("customRow");
  const customMin = $("customMin");
  const startBtn = $("startBtn");
  const listEl = $("list");

  const alarmOverlay = $("alarmOverlay");
  const alarmList = $("alarmList");
  const closeAlarmBtn = $("closeAlarmBtn");
  const snoozeBtn = $("snoozeBtn");

  let timers = loadTimers();
  let prefs = loadPrefs();
  let selectedMin = 60;

  // Audio unlock (så lyd virker når tiden udløber)
  let audioCtx = null;
  function unlockAudio(){
    try{
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
    }catch(e){}
  }
  document.addEventListener("pointerdown", unlockAudio, { once:false });

  function beep(){
    unlockAudio();
    try{
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.value = 880;
      g.gain.value = 0;

      o.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime;

      // 3 korte bip
      const pattern = [0, 0.35, 0.70];
      pattern.forEach((offset) => {
        g.gain.setValueAtTime(0, t + offset);
        g.gain.linearRampToValueAtTime(0.25, t + offset + 0.05);
        g.gain.linearRampToValueAtTime(0, t + offset + 0.20);
      });

      o.start(t);
      o.stop(t + 1.0);
    }catch(e){}
  }

  function tryParse(raw){ try{ return raw ? JSON.parse(raw) : null; } catch { return null; } }
  function loadTimers(){ const arr = tryParse(localStorage.getItem(STORAGE_KEY)); return Array.isArray(arr) ? arr : []; }
  function saveTimers(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(timers)); }
  function loadPrefs(){ return { snoozeUntil: 0, ...(tryParse(localStorage.getItem(PREF_KEY)) || {}) }; }
  function savePrefs(){ localStorage.setItem(PREF_KEY, JSON.stringify(prefs)); }

  function escapeHtml(str){
    return String(str ?? "").replace(/[&<>"']/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
  }

  function fmtMs(ms){
    const neg = ms < 0;
    ms = Math.abs(ms);
    const total = Math.floor(ms/1000);
    const m = Math.floor(total/60);
    const s = total % 60;
    return (neg ? "-" : "") + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
  }

  // Presets
  presetGrid.querySelectorAll(".presetBtn").forEach(btn => {
    btn.addEventListener("click", () => {
      presetGrid.querySelectorAll(".presetBtn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      const v = btn.getAttribute("data-min");
      if (v === "custom"){
        selectedMin = "custom";
        customRow.style.display = "flex";
      }else{
        selectedMin = parseInt(v, 10);
        customRow.style.display = "none";
      }
    });
  });

  startBtn.addEventListener("click", () => {
    unlockAudio();

    let mins = selectedMin;
    if (mins === "custom"){
      mins = parseInt(customMin.value, 10);
      if (!Number.isFinite(mins) || mins < 1) return alert("Udfyld minutter.");
    }

    const label = (nameEl.value || "").trim() || "Kaffe";
    const now = Date.now();
    const durationMs = mins * 60 * 1000;

    timers.unshift({
      id: "id-" + Math.random().toString(16).slice(2) + "-" + now,
      label,
      startedAt: now,
      endsAt: now + durationMs,
      durationMs,
      alarmed: false
    });
    saveTimers();

    nameEl.value = "";
    customMin.value = "";
    render();
  });

  function expiredTimers(){
    const now = Date.now();
    return timers.filter(t => (t.endsAt - now) <= 0);
  }

  function openAlarm(){
    const list = expiredTimers();
    if (list.length === 0) return;

    alarmList.innerHTML = list.map(t => `
      <div class="item expired">
        <div class="left">
          <div class="name">${escapeHtml(t.label)}</div>
          <div class="sub">Udløb: ${new Date(t.endsAt).toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"})}</div>
        </div>
        <div class="time">${fmtMs(t.endsAt - Date.now())}</div>
        <div class="actions">
          <button class="btnDanger" type="button" data-act="done" data-id="${t.id}">Fjern</button>
        </div>
      </div>
    `).join("");

    alarmList.querySelectorAll("button[data-act='done']").forEach(b => {
      b.addEventListener("click", () => {
        const id = b.getAttribute("data-id");
        timers = timers.filter(x => x.id !== id);
        saveTimers();
        render();
        openAlarm(); // opdater listen
        if (expiredTimers().length === 0) closeAlarm();
      });
    });

    alarmOverlay.style.display = "flex";
  }

  function closeAlarm(){
    alarmOverlay.style.display = "none";
  }

  closeAlarmBtn.addEventListener("click", closeAlarm);
  alarmOverlay.addEventListener("click", (e) => { if (e.target === alarmOverlay) closeAlarm(); });

  snoozeBtn.addEventListener("click", () => {
    prefs.snoozeUntil = Date.now() + 5*60*1000;
    savePrefs();
    closeAlarm();
  });

  function render(){
    if (timers.length === 0){
      listEl.innerHTML = `<div style="color:var(--muted); text-align:center; padding: 10px 0;">Ingen aktive timers</div>`;
      return;
    }

    const now = Date.now();

    listEl.innerHTML = timers.map(t => {
      const left = t.endsAt - now;
      const isExpired = left <= 0;
      return `
        <div class="item ${isExpired ? "expired" : ""}">
          <div class="left">
            <div class="name">${escapeHtml(t.label)}</div>
            <div class="sub">Udløb: ${new Date(t.endsAt).toLocaleTimeString("da-DK",{hour:"2-digit",minute:"2-digit"})}</div>
          </div>
          <div class="time">${fmtMs(left)}</div>
          <div class="actions">
            <button class="btnDanger" type="button" data-act="delete" data-id="${t.id}">Fjern</button>
          </div>
        </div>
      `;
    }).join("");

    listEl.querySelectorAll("button[data-act='delete']").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-id");
        timers = timers.filter(x => x.id !== id);
        saveTimers();
        render();
      });
    });
  }

  // Tick: opdater display + alarm
  setInterval(() => {
    render();

    // Alarm logik
    const now = Date.now();
    if (now < Number(prefs.snoozeUntil || 0)) return;

    // hvis en timer netop er udløbet -> lyd + popup
    const exp = expiredTimers();
    if (exp.length > 0){
      // beep kun én gang pr timer
      let changed = false;
      exp.forEach(t => {
        if (!t.alarmed){
          t.alarmed = true;
          changed = true;
          beep();
        }
      });
      if (changed) saveTimers();
      openAlarm();
    }
  }, 1000);

  // Init
  render();
})();
</script>
</body>
</html>
